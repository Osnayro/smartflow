<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>ACQ SmartFlow Pro - Industrial</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0a0f1a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column}
.toolbar{background:#161b22;padding:8px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid #30363d}
button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;background:#21262d;color:#e0e0e0}
.btn-primary{background:#238636;color:#fff}
.btn-ai{background:linear-gradient(45deg,#7c3aed,#c084fc);color:#fff}
.canvas-container{flex:1;position:relative}
canvas{width:100%;height:100%;cursor:grab}
.inspector,.command-panel,.ai-panel,.manual-tools{position:fixed;background:#1e1e2e;border-radius:12px;padding:16px;border:1px solid #3a3a4a;z-index:1000;max-width:400px}
.inspector{right:20px;top:80px;display:none}
.command-panel{left:20px;bottom:20px;display:none}
.ai-panel{left:20px;top:80px;display:none}
.manual-tools{right:20px;top:80px;width:300px;display:none}
textarea{width:100%;background:#0f0f17;color:#eee;border:1px solid #3a3a4a;border-radius:8px;padding:8px}
.ins-row{margin-bottom:12px}
.ins-row input,.ins-row select{width:100%;padding:6px;background:#0f0f17;color:#eee}
.notification{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #238636;padding:8px 16px;border-radius:40px;z-index:2000;display:none}
.status-bar{background:#0f0f17;padding:4px 12px;font-size:12px;display:flex;justify-content:space-between}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="toolbar">
<button id="btnNew" class="btn-primary">Nuevo</button>
<button id="btnUndo">Undo</button>
<button id="btnRedo">Redo</button>
<button id="btnImportPCF">Importar PCF</button>
<button id="btnExportPCF">Exportar PCF</button>
<button id="btnCommandPanel">Comandos</button>
<button id="btnAI" class="btn-ai">IA</button>
<button id="btnMTO">MTO</button>
<button id="btnValidate">Validar</button>
<button id="btnSupports">Soportes</button>
<button id="btnPDF">PDF</button>
<button id="btnPNG">PNG</button>
<button id="btnResetView">Reset</button>
<button id="btnManual">Manual</button>
<button id="btnManualMode">Modo Manual OFF</button>
<button id="btnLayers">Capas</button>
<button id="btnSnapToggle">Snap OFF</button>
<button id="voiceToggle">Voz ON</button>
</div>
<div class="canvas-container"><canvas id="isoCanvas"></canvas></div>
<div class="status-bar"><span id="statusMsg">Listo - Industrial ISOGEN</span><span>Arrastrar=mover | Rueda=zoom</span></div>
<div id="inspector" class="inspector"><h3>Propiedades</h3><div id="inspectorContent"></div><button id="inspectorSave">Guardar</button><button id="inspectorDelete">Eliminar</button></div>
<div id="commandPanel" class="command-panel"><textarea id="commandText" rows="4" placeholder="line L-101 diameter 6 points (0,0,0) (5000,0,0)"></textarea><button id="runCommands">Ejecutar</button><button id="closeCommandPanel">Cerrar</button></div>
<div id="aiPanel" class="ai-panel"><textarea id="aiText" rows="4" placeholder="Escribe en español..."></textarea><button id="runAI">Ejecutar</button><button id="closeAI">Cerrar</button><div id="aiPreview"></div></div>
<div id="manualTools" class="manual-tools"><div><label>Equipo</label><select id="manualEquipType"><option>tanque</option><option>bomba</option></select><input id="manualEquipTag"><button id="placeEquip">Colocar</button></div><hr><div><label>Tubería</label><input id="pipeDiameter" value="4"><select id="pipeMaterial"><option>PPR</option><option>CS</option></select><button id="startPipe">Iniciar</button><button id="cancelPipe">Cancelar</button><div id="pipeStatus">Inactivo</div></div><hr><div><label>Componente</label><select id="compType"><option>VALVE</option><option>ELBOW</option><option>TEE</option><option>REDUCER</option></select><input id="compSkey" placeholder="SKEY"><input id="compTag"><input id="compParam" value="0.5"><button id="placeComp">Colocar</button></div></div>
<div id="layersPanel" class="layers-panel"><h3>Capas</h3><div><input type="checkbox" id="layerPipes" checked><label>Tuberías</label></div><div><input type="checkbox" id="layerEquipment" checked><label>Equipos</label></div><div><input type="checkbox" id="layerSupports" checked><label>Soportes</label></div><div><input type="checkbox" id="layerComponents" checked><label>Componentes</label></div><div><input type="checkbox" id="layerGrid" checked><label>Grilla</label></div><button id="closeLayers">Cerrar</button></div>
<div id="manualModal"><h2>Manual ISOGEN</h2><div id="manualContent"></div><button id="closeManual">Cerrar</button></div>
<div id="notification"></div>
<div id="multiSelectBadge"></div>
<script>
let db={lines:[],equipos:[],supports:[],selected:null,selectionSet:new Set()};
let cam={s:1,pX:0,pY:0},snap=false,routing=true;
let canvas,ctx;
function proj(p){let c=Math.cos(30*Math.PI/180),s=Math.sin(30*Math.PI/180);return{x:(p.x-p.z)*c*cam.s+cam.pX,y:(p.x+p.z)*s*cam.s-p.y*cam.s+cam.pY};}
function render(){
    if(!ctx)return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let l of db.lines){
        if(!l.points3D)continue;
        ctx.beginPath();
        let pr=l.points3D.map(p=>proj(p));
        ctx.moveTo(pr[0].x,pr[0].y);
        for(let i=1;i<pr.length;i++)ctx.lineTo(pr[i].x,pr[i].y);
        ctx.strokeStyle='#58a6ff';
        ctx.lineWidth=Math.max(2,(l.diameter||6)*cam.s/6);
        ctx.stroke();
    }
    for(let e of db.equipos){
        let p=proj(e);
        ctx.beginPath();ctx.arc(p.x,p.y,10*cam.s,0,2*Math.PI);
        ctx.fillStyle='#3498db';ctx.fill();
        ctx.fillStyle='white';ctx.fillText(e.tag,p.x+12,p.y+4);
    }
}
function getPos(line,t){let pts=line.points3D;if(!pts||pts.length<2)return null;if(t<=0)return pts[0];if(t>=1)return pts[pts.length-1];let idx=Math.floor(t*(pts.length-1));let seg=t*(pts.length-1)-idx;let p1=pts[idx],p2=pts[idx+1];return{x:p1.x+seg*(p2.x-p1.x),y:p1.y+seg*(p2.y-p1.y),z:p1.z+seg*(p2.z-p1.z)};}
function applyCommand(cmd){
    if(cmd.type==='line')db.lines.push(cmd);
    else if(cmd.type==='equipment')db.equipos.push(cmd);
    render();
}
function parseCommands(txt){
    let m=txt.match(/line\s+(\S+)\s+diameter\s+(\d+)\s+points\s+\((\d+),(\d+),(\d+)\)\s+\((\d+),(\d+),(\d+)\)/i);
    if(m)applyCommand({type:'line',tag:m[1],diameter:parseFloat(m[2]),points3D:[{x:parseFloat(m[3]),y:parseFloat(m[4]),z:parseFloat(m[5])},{x:parseFloat(m[6]),y:parseFloat(m[7]),z:parseFloat(m[8])}],components:[]});
    m=txt.match(/equipment\s+(\S+)\s+at\s+\((\d+),(\d+),(\d+)\)/i);
    if(m)applyCommand({type:'equipment',tag:m[1],x:parseFloat(m[2]),y:parseFloat(m[3]),z:parseFloat(m[4]),tipo:'tanque'});
}
function notify(msg){let n=document.getElementById('notification');n.textContent=msg;n.style.display='block';setTimeout(()=>n.style.display='none',3000);}
window.onload=()=>{
    canvas=document.getElementById('isoCanvas');ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth-20;canvas.height=window.innerHeight-100;
    cam.pX=canvas.width/2;cam.pY=canvas.height/2;
    db.lines.push({tag:'L-001',diameter:6,points3D:[{x:0,y:0,z:0},{x:5000,y:0,z:0},{x:5000,y:3000,z:0}],components:[]});
    render();
    document.getElementById('btnNew').onclick=()=>{db.lines=[];db.equipos=[];render();};
    document.getElementById('btnUndo').onclick=()=>notify('Undo');
    document.getElementById('btnRedo').onclick=()=>notify('Redo');
    document.getElementById('btnImportPCF').onclick=()=>alert('Importar PCF');
    document.getElementById('btnExportPCF').onclick=()=>alert('Exportar PCF');
    document.getElementById('btnCommandPanel').onclick=()=>document.getElementById('commandPanel').style.display='block';
    document.getElementById('closeCommandPanel').onclick=()=>document.getElementById('commandPanel').style.display='none';
    document.getElementById('runCommands').onclick=()=>{parseCommands(document.getElementById('commandText').value);document.getElementById('commandPanel').style.display='none';};
    document.getElementById('btnAI').onclick=()=>document.getElementById('aiPanel').style.display='block';
    document.getElementById('closeAI').onclick=()=>document.getElementById('aiPanel').style.display='none';
    document.getElementById('runAI').onclick=()=>{parseCommands(document.getElementById('aiText').value);document.getElementById('aiPanel').style.display='none';};
    document.getElementById('btnMTO').onclick=()=>alert('MTO');
    document.getElementById('btnValidate').onclick=()=>alert('Validación');
    document.getElementById('btnSupports').onclick=()=>alert('Soportes');
    document.getElementById('btnPDF').onclick=()=>alert('PDF');
    document.getElementById('btnPNG').onclick=()=>alert('PNG');
    document.getElementById('btnResetView').onclick=()=>{cam.s=1;cam.pX=canvas.width/2;cam.pY=canvas.height/2;render();};
    document.getElementById('btnManual').onclick=()=>alert('Manual');
    document.getElementById('btnManualMode').onclick=()=>alert('Modo manual');
    document.getElementById('btnLayers').onclick=()=>alert('Capas');
    document.getElementById('btnSnapToggle').onclick=()=>{snap=!snap;document.getElementById('btnSnapToggle').textContent=snap?'Snap ON':'Snap OFF';};
    document.getElementById('voiceToggle').onclick=()=>alert('Voz');
    document.getElementById('inspectorSave').onclick=()=>alert('Guardado');
    document.getElementById('inspectorDelete').onclick=()=>alert('Eliminado');
    document.getElementById('placeEquip').onclick=()=>{
        let tag=document.getElementById('manualEquipTag').value||'E-001';
        applyCommand({type:'equipment',tag:tag,x:Math.random()*5000,y:0,z:Math.random()*5000,tipo:'tanque'});
    };
    document.getElementById('startPipe').onclick=()=>alert('Dibujar');
    document.getElementById('cancelPipe').onclick=()=>alert('Cancelar');
    document.getElementById('placeComp').onclick=()=>alert('Colocar');
    let drag=false,last={x:0,y:0};
    canvas.onmousedown=(e)=>{drag=true;last={x:e.clientX,y:e.clientY};};
    window.onmousemove=(e)=>{if(drag){cam.pX+=e.clientX-last.x;cam.pY+=e.clientY-last.y;last={x:e.clientX,y:e.clientY};render();}};
    window.onmouseup=()=>{drag=false;};
    canvas.onwheel=(e)=>{cam.s*=e.deltaY>0?0.9:1.1;cam.s=Math.min(Math.max(0.1,cam.s),10);render();e.preventDefault();};
};
</script>
</body>
</html>
