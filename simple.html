
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFlow - Test Completo de Botones</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: Arial; padding: 20px; }
        button { background: #2c3e66; color: white; padding: 8px 14px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        button:hover { background: #3b5a8c; }
        .btn-primary { background: #238636; }
        .btn-warning { background: #d29922; color: #1f1f1f; }
        .btn-speak { background: #7c3aed; }
        #log { background: #0f0f17; padding: 15px; margin-top: 20px; border-radius: 8px; font-family: monospace; height: 300px; overflow-y: auto; }
        .success { color: #4ade80; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>SmartFlow - Verificación de Botones</h1>
    
    <div class="toolbar">
        <button id="btnNew" class="btn-primary">📄 Nuevo</button>
        <button id="btnOpen">📂 Abrir</button>
        <button id="btnSave">💾 Guardar</button>
        <button id="btnReset">🔄 Centrar</button>
        <button id="btnCommand" class="btn-primary">🤖 Comandos</button>
        <button id="btnAddTank">🏭 Tanque</button>
        <button id="btnAddPump">⚙️ Bomba</button>
        <button id="btnMTO">📊 MTO</button>
        <button id="btnPDF">📄 PDF</button>
        <button id="btnUndo" class="btn-warning">↩️ Undo</button>
        <button id="btnRedo" class="btn-warning">↪️ Redo</button>
        <button id="btnVoice" style="background:#7c3aed">🔊 Voz ON</button>
        <button id="btnApplyNorm">📐 Normas</button>
        <button id="btnSpeakSummary" class="btn-speak">📢 Resumen</button>
        <button id="btnRecalc">🔄 Recalcular</button>
        <button id="btnToggleCatalog" class="btn-speak">📦 Catálogo</button>
    </div>
    
    <div id="log">
        Verificando botones de la interfaz original...<br>
    </div>
    
    <script>
        const logDiv = document.getElementById('log');
        
        function log(msg, isError) {
            const color = isError ? 'error' : 'success';
            logDiv.innerHTML += `<span class="${color}">${msg}</span><br>`;
            console.log(msg);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        log('Iniciando verificación de botones...');
        
        const botones = [
            'btnNew', 'btnOpen', 'btnSave', 'btnReset', 'btnCommand',
            'btnAddTank', 'btnAddPump', 'btnMTO', 'btnPDF', 'btnUndo',
            'btnRedo', 'btnVoice', 'btnApplyNorm', 'btnSpeakSummary',
            'btnRecalc', 'btnToggleCatalog'
        ];
        
        let encontrados = 0;
        let faltantes = 0;
        
        botones.forEach(id => {
            const btn = document.getElementById(id);
            if (btn) {
                encontrados++;
                log(`✅ ${id} - ENCONTRADO`);
                btn.onclick = function() {
                    log(`👉 Clic en: ${id}`);
                };
            } else {
                faltantes++;
                log(`❌ ${id} - NO ENCONTRADO`, true);
            }
        });
        
        log(`---`);
        log(`RESULTADO: ${encontrados} botones encontrados, ${faltantes} botones faltantes`);
        
        if (faltantes === 0) {
            log(`✅ TODOS los botones existen. El problema NO es de IDs.`);
            log(`👉 Revise la consola (F12) para ver errores de carga de módulos.`);
        } else {
            log(`❌ Faltan ${faltantes} botones. Debe agregarlos al HTML.`);
        }
    </script>
</body>
</html>
