
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartFlow Pro - Debug Visual</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0f1a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .toolbar{background:#161b22;padding:8px;display:flex;gap:8px}
    button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;background:#238636;color:white}
    .canvas-container{flex:1;position:relative;background:#0a0f1a}
    canvas{display:block;width:100%;height:100%;cursor:grab}
    .status-bar{background:#0f0f17;padding:6px;font-size:12px;text-align:center}
    .notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#238636;padding:8px 16px;border-radius:8px;z-index:1000;display:none}
</style>
</head>
<body>
<div class="toolbar">
    <button id="btnReset">🔄 Centrar Vista</button>
    <button id="btnInfo">ℹ️ Info</button>
</div>
<div class="canvas-container"><canvas id="isoCanvas"></canvas></div>
<div class="status-bar"><span id="statusMsg">Cargando...</span></div>
<div id="notification" class="notification"></div>

<script>
// ==================== CONFIGURACIÓN ====================
const canvas = document.getElementById('isoCanvas');
const ctx = canvas.getContext('2d');

// DATOS DE EJEMPLO (visibles y bien posicionados)
const db = {
    equipos: [
        { tag: 'TK-01', tipo: 'tanque_v', x: 2000, y: 1250, z: 0, diametro: 2400, altura: 2500 }
    ],
    lines: [
        { tag: 'L-101', diameter: 4, material: 'PPR', points3D: [{x:2000, y:1500, z:0}, {x:5000, y:1500, z:0}], components: [] }
    ]
};

// Cámara isométrica
let cam = { scale: 0.5, panX: 0, panY: 0 };
let dragging = false;
let lastMouse = { x: 0, y: 0 };

// Proyección isométrica (ángulos 30°)
function project(p) {
    const cos30 = Math.cos(30 * Math.PI / 180);
    const sin30 = Math.sin(30 * Math.PI / 180);
    const x = (p.x - p.z) * cos30;
    const y = (p.x + p.z) * sin30 - p.y;
    return { x: x * cam.scale + cam.panX, y: y * cam.scale + cam.panY };
}

// Dibujar una cruz en el origen (para referencia)
function drawOrigin() {
    const o = project({ x: 0, y: 0, z: 0 });
    ctx.beginPath();
    ctx.moveTo(o.x - 10, o.y);
    ctx.lineTo(o.x + 10, o.y);
    ctx.moveTo(o.x, o.y - 10);
    ctx.lineTo(o.x, o.y + 10);
    ctx.strokeStyle = '#ff5555';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ff5555';
    ctx.font = '12px monospace';
    ctx.fillText('ORIGEN (0,0,0)', o.x + 12, o.y - 5);
}

// Dibujar grilla isométrica (cada 1000 mm)
function drawGrid() {
    const step = 1000;
    const minX = -5000, maxX = 15000, minZ = -5000, maxZ = 10000;
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = '#2a4a6a';
    ctx.lineWidth = 0.8;
    for (let x = minX; x <= maxX; x += step) {
        const p1 = project({ x, y: 0, z: minZ });
        const p2 = project({ x, y: 0, z: maxZ });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
    for (let z = minZ; z <= maxZ; z += step) {
        const p1 = project({ x: minX, y: 0, z });
        const p2 = project({ x: maxX, y: 0, z });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
    ctx.restore();
}

// Dibujar tanque vertical
function drawTank(eq) {
    const p = project(eq);
    const w = (eq.diametro / 2) * cam.scale;   // radio en X
    const h = eq.altura * cam.scale;           // altura total en pantalla
    const topY = p.y - h/2;
    const bottomY = p.y + h/2;
    
    ctx.save();
    // Cuerpo cilíndrico
    ctx.beginPath();
    ctx.ellipse(p.x, topY, w, w*0.5, 0, 0, 2*Math.PI);
    ctx.fillStyle = '#3498db';
    ctx.fill();
    ctx.fillRect(p.x - w, topY, w*2, h);
    ctx.beginPath();
    ctx.ellipse(p.x, bottomY, w, w*0.5, 0, 0, 2*Math.PI);
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.stroke();
    
    // Etiqueta
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(12, 14 * cam.scale)}px Arial`;
    ctx.fillText(eq.tag, p.x - 15, topY - 8);
    
    // Punto de conexión (boquilla)
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, 2*Math.PI);
    ctx.fillStyle = '#ffaa33';
    ctx.fill();
    ctx.restore();
}

// Dibujar tubería
function drawPipe(line) {
    if (!line.points3D || line.points3D.length < 2) return;
    ctx.beginPath();
    const proj = line.points3D.map(p => project(p));
    ctx.moveTo(proj[0].x, proj[0].y);
    for (let i=1; i<proj.length; i++) ctx.lineTo(proj[i].x, proj[i].y);
    ctx.strokeStyle = '#58a6ff';
    ctx.lineWidth = Math.max(4, (line.diameter || 4) * cam.scale);
    ctx.stroke();
    
    // Dibujar círculos en los puntos extremos
    for (let p of proj) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, 2*Math.PI);
        ctx.fillStyle = '#ffaa33';
        ctx.fill();
    }
}

// Render principal
function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    
    // Fondo oscuro (opcional)
    ctx.fillStyle = '#0a0f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawGrid();
    drawOrigin();
    
    // Dibujar elementos
    for (let line of db.lines) drawPipe(line);
    for (let eq of db.equipos) drawTank(eq);
    
    ctx.restore();
    
    // Depuración en consola
    console.log(`Render completado. Escala: ${cam.scale}, Pan: (${cam.panX}, ${cam.panY})`);
    console.log(`Tanque en pantalla: ${JSON.stringify(project(db.equipos[0]))}`);
}

// Centrar la vista automáticamente en toda la escena
function autoCenter() {
    if (!canvas) return;
    // Calcular los límites de todos los objetos
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    const allPoints = [];
    db.equipos.forEach(eq => {
        allPoints.push({ x: eq.x, y: eq.y, z: eq.z });
        allPoints.push({ x: eq.x + eq.diametro/2, y: eq.y + eq.altura/2, z: eq.z });
        allPoints.push({ x: eq.x - eq.diametro/2, y: eq.y - eq.altura/2, z: eq.z });
    });
    db.lines.forEach(line => {
        if (line.points3D) line.points3D.forEach(p => allPoints.push(p));
    });
    if (allPoints.length === 0) {
        cam.panX = canvas.width/2;
        cam.panY = canvas.height/2;
        cam.scale = 0.5;
        return;
    }
    // Proyectar cada punto y obtener extremos
    const projPoints = allPoints.map(p => project(p));
    projPoints.forEach(p => {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
    });
    const width = maxX - minX;
    const height = maxY - minY;
    const padding = 50;
    const scaleX = (canvas.width - padding) / width;
    const scaleY = (canvas.height - padding) / height;
    cam.scale = Math.min(scaleX, scaleY, 0.8); // limitar a 0.8 para no quedar demasiado grande
    const centerX = (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;
    cam.panX = canvas.width/2 - centerX * cam.scale;
    cam.panY = canvas.height/2 - centerY * cam.scale;
    render();
}

// Redimensionar canvas
function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    autoCenter();
}

// Eventos de interacción
function initEvents() {
    canvas.addEventListener('mousedown', (e) => {
        dragging = true;
        lastMouse = { x: e.clientX, y: e.clientY };
        canvas.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        cam.panX += dx;
        cam.panY += dy;
        lastMouse = { x: e.clientX, y: e.clientY };
        render();
    });
    window.addEventListener('mouseup', () => {
        dragging = false;
        canvas.style.cursor = 'grab';
    });
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        cam.scale *= delta;
        cam.scale = Math.min(Math.max(0.1, cam.scale), 1.5);
        render();
    });
}

// Notificaciones
function notify(msg) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.display = 'block';
    document.getElementById('statusMsg').textContent = msg;
    setTimeout(() => n.style.display = 'none', 3000);
}

// Inicialización
function init() {
    resizeCanvas();
    initEvents();
    render();
    document.getElementById('btnReset').onclick = autoCenter;
    document.getElementById('btnInfo').onclick = () => {
        notify(`Tanques: ${db.equipos.length}, Tuberías: ${db.lines.length}`);
    };
    notify("Vista centrada. Usa arrastrar y rueda para navegar.");
}

window.addEventListener('resize', () => {
    resizeCanvas();
    render();
});

init();
</script>
</body>
</html>
