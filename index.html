<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartFlow Pro - Código Mejorado</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f8;
}

header{
    background:#0b3d5c;
    color:white;
    padding:12px 20px;
    font-size:20px;
}

#canvasContainer{
    width:100%;
    height:calc(100vh - 60px);
}

canvas{
    width:100%;
    height:100%;
    background:white;
    display:block;
}
</style>
</head>

<body>

<header>SmartFlow Pro – Versión Mejorada</header>

<div id="canvasContainer">
<canvas id="mainCanvas"></canvas>
</div>

<script>
"use strict";

// ==============================
// BASE APPLICATION OBJECT
// ==============================

const App = {
    canvas: null,
    ctx: null,
    db: {
        equipos: [],
        lines: []
    },
    accessibility: {
        voiceRate: 1,
        voicePitch: 1,
        voiceVolume: 1
    }
};

// ==============================
// UTILIDADES
// ==============================

function generateId(prefix="ID"){
    return `${prefix}_${Date.now()}_${Math.floor(Math.random()*10000)}`;
}

function safeHTML(str){
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}

function saveAccessibility(){
    localStorage.setItem(
        "acq_accessibility",
        JSON.stringify(App.accessibility)
    );
}

// ==============================
// CANVAS
// ==============================

function resizeCanvas(){

    const container = document.getElementById("canvasContainer");
    const canvas = App.canvas;
    const ctx = App.ctx;

    const ratio = window.devicePixelRatio || 1;

    canvas.width = container.clientWidth * ratio;
    canvas.height = container.clientHeight * ratio;

    ctx.setTransform(ratio,0,0,ratio,0,0);

    render();
}

window.addEventListener("resize", resizeCanvas);

// ==============================
// RENDER
// ==============================

function drawGrid(){

    const ctx = App.ctx;
    const canvas = App.canvas;

    const grid = 40;

    ctx.strokeStyle = "#e6e6e6";
    ctx.lineWidth = 1;

    for(let x=0; x<canvas.width; x+=grid){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();
    }

    for(let y=0; y<canvas.height; y+=grid){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(canvas.width,y);
        ctx.stroke();
    }
}

function drawEquipment(eq){

    const ctx = App.ctx;

    ctx.fillStyle = "#2b7cff";
    ctx.fillRect(eq.x, eq.y, 60, 40);

    ctx.fillStyle = "white";
    ctx.font = "12px Arial";
    ctx.fillText(eq.tag, eq.x+5, eq.y+20);
}

function drawLine(line){

    const ctx = App.ctx;

    ctx.strokeStyle = "#333";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(line.x1, line.y1);
    ctx.lineTo(line.x2, line.y2);
    ctx.stroke();
}

function render(){

    const ctx = App.ctx;
    const canvas = App.canvas;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawGrid();

    App.db.lines.forEach(drawLine);
    App.db.equipos.forEach(drawEquipment);
}

// ==============================
// DEMO DATA
// ==============================

function createDemo(){

    App.db.equipos.push({
        id: generateId("PUMP"),
        tag: "P-101",
        x:200,
        y:200
    });

    App.db.equipos.push({
        id: generateId("TANK"),
        tag: "TK-101",
        x:400,
        y:200
    });

    App.db.lines.push({
        id: generateId("LINE"),
        x1:260,
        y1:220,
        x2:400,
        y2:220
    });

}

// ==============================
// INIT
// ==============================

function initApp(){

    App.canvas = document.getElementById("mainCanvas");
    App.ctx = App.canvas.getContext("2d");

    createDemo();

    resizeCanvas();
}

document.addEventListener("DOMContentLoaded", initApp);

</script>

</body>
</html>
