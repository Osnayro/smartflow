<body>

    <textarea id="commandText" rows="4" placeholder="Ejemplos:&#10;crea 6 tanques en paralelo de 2380 mm diametro y 2900 mm altura&#10;line L-COLECTOR diameter 4 material PPR schedule 40 points (10000,1500,1000) (8000,1500,1000) ...&#10;component valve V-101 at L-101 param 0.5&#10;resumen"></textarea>
    <div class="command-buttons"><button id="runCommands" class="btn-primary">Ejecutar</button><button id="clearCommand">Limpiar</button></div>
</div>
<div id="notification" class="notification"></div>
<div class="status-bar" id="statusMsg">SmartFlow Pro v8.1 - Realismo visual completo | Profundidad activada</div>

<script>
// ==================== CONFIGURACIÓN GLOBAL ====================
let db = { equipos: [], lines: [] };
let cam = { scale: 0.5, panX: 0, panY: 0 };
let dragging = false, lastPos = { x: 0, y: 0 };
let selectedElement = null;
let voiceEnabled = true;
let history = { past: [], future: [], maxSize: 30 };

const canvas = document.getElementById('isoCanvas');
const ctx = canvas.getContext('2d');

// ==================== FUNCIONES AUXILIARES ====================
function notify(msg, isErr = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.backgroundColor = isErr ? '#da3633' : '#238636';
    n.style.display = 'block';
    document.getElementById('statusMsg').innerHTML = msg;
    if (voiceEnabled && window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        setTimeout(() => window.speechSynthesis.speak(u), 50);
    }
    setTimeout(() => n.style.display = 'none', 4000);
}

function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}
function undo() {
    if (history.past.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.future.push(current);
    const prev = history.past.pop();
    db.equipos = prev.equipos;
    db.lines = prev.lines;
    selectedElement = null;
    render();
    notify("↩️ Deshecho");
}
function redo() {
    if (history.future.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos;
    db.lines = next.lines;
    selectedElement = null;
    render();
    notify("↪️ Rehecho");
}

// ==================== PROYECCIÓN ISOMÉTRICA ====================
function project(p) {
    const cos30 = Math.cos(30 * Math.PI / 180);
    const sin30 = Math.sin(30 * Math.PI / 180);
    const x = (p.x - p.z) * cos30;
    const y = (p.x + p.z) * sin30 - p.y;
    return { x: x * cam.scale + cam.panX, y: y * cam.scale + cam.panY };
}

// ==================== DIBUJO DE ELEMENTOS INDIVIDUALES (MEJORADOS) ====================
function drawGrid() {
    const step = 1000;
    const minX = -8000, maxX = 20000, minZ = -8000, maxZ = 15000;
    ctx.beginPath();
    ctx.strokeStyle = '#2a4a6a';
    ctx.lineWidth = 1;
    for (let x = minX; x <= maxX; x += step) {
        const p1 = project({ x, y: 0, z: minZ });
        const p2 = project({ x, y: 0, z: maxZ });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
    for (let z = minZ; z <= maxZ; z += step) {
        const p1 = project({ x: minX, y: 0, z });
        const p2 = project({ x: maxX, y: 0, z });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
}

function drawOrigin() {
    const o = project({ x: 0, y: 0, z: 0 });
    ctx.beginPath();
    ctx.moveTo(o.x - 20, o.y);
    ctx.lineTo(o.x + 20, o.y);
    ctx.moveTo(o.x, o.y - 20);
    ctx.lineTo(o.x, o.y + 20);
    ctx.strokeStyle = '#ff8888';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ff8888';
    ctx.font = '14px monospace';
    ctx.fillText('ORIGEN (0,0,0)', o.x + 15, o.y - 8);
}

// Tanque con sombreado lateral y volumen (mejorado)
function drawTank(eq) {
    const p = project(eq);
    const w = (eq.diametro / 2) * cam.scale;
    const h = eq.altura * cam.scale;
    const topY = p.y - h/2;
    const bottomY = p.y + h/2;
    ctx.save();
    // Sombra lateral (lado izquierdo más oscuro)
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(p.x - w, topY, w, h);
    // Lado derecho más claro (efecto de luz)
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(p.x, topY, w, h);
    // Tapa superior (elipse más brillante)
    ctx.beginPath();
    ctx.ellipse(p.x, topY, w, w * 0.5, 0, 0, 2 * Math.PI);
    ctx.fillStyle = '#60a5fa';
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.stroke();
    // Tapa inferior (base)
    ctx.beginPath();
    ctx.ellipse(p.x, bottomY, w, w * 0.5, 0, 0, 2 * Math.PI);
    ctx.fillStyle = '#2563eb';
    ctx.fill();
    ctx.stroke();
    // Etiqueta
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(12, 14 * cam.scale)}px Arial`;
    ctx.fillText(eq.tag, p.x - 18, topY - 10);
    // Punto de conexión (boquilla)
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, 2 * Math.PI);
    ctx.fillStyle = '#ff8800';
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.stroke();
    ctx.restore();
}

// Bomba con gradiente radial y efecto metálico
function drawBomba(eq) {
    const p = project(eq);
    const rad = 12 * cam.scale;
    const grad = ctx.createRadialGradient(p.x - 3, p.y - 3, 2, p.x, p.y, rad);
    grad.addColorStop(0, '#f39c12');
    grad.addColorStop(1, '#b85c00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, rad, 0, 2 * Math.PI);
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.stroke();
    // Línea del impulsor
    ctx.beginPath();
    ctx.moveTo(p.x - rad, p.y);
    ctx.lineTo(p.x + rad, p.y);
    ctx.strokeStyle = '#e67e22';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.font = `${Math.max(10, 12 * cam.scale)}px Arial`;
    ctx.fillText(eq.tag, p.x + 15, p.y - 5);
}

// Tubería con efecto 3D (sombra desplazada + brillo)
function drawPipeSegment(line, segIndex) {
    if (!line.points3D || line.points3D.length < 2 || segIndex >= line.points3D.length-1) return;
    const p1 = line.points3D[segIndex];
    const p2 = line.points3D[segIndex+1];
    const proj1 = project(p1);
    const proj2 = project(p2);
    const angle = Math.atan2(proj2.y - proj1.y, proj2.x - proj1.x);
    const perpX = Math.sin(angle) * 2;
    const perpY = -Math.cos(angle) * 2;
    
    // Sombra (más oscura, desplazada)
    ctx.beginPath();
    ctx.moveTo(proj1.x + perpX, proj1.y + perpY);
    ctx.lineTo(proj2.x + perpX, proj2.y + perpY);
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = Math.max(6, (line.diameter || 4) * cam.scale);
    ctx.stroke();
    
    // Línea principal (color base)
    ctx.beginPath();
    ctx.moveTo(proj1.x, proj1.y);
    ctx.lineTo(proj2.x, proj2.y);
    ctx.strokeStyle = '#facc15';
    ctx.lineWidth = Math.max(4, (line.diameter || 4) * cam.scale);
    ctx.stroke();
    
    // Brillo (línea blanca tenue en el centro)
    ctx.beginPath();
    ctx.moveTo(proj1.x, proj1.y);
    ctx.lineTo(proj2.x, proj2.y);
    ctx.strokeStyle = 'rgba(255,255,200,0.6)';
    ctx.lineWidth = Math.max(2, (line.diameter || 4) * cam.scale / 3);
    ctx.stroke();
}

// Componentes mejorados (válvulas, codos, adaptadores)
function drawComponent(comp, line) {
    const pos = getPositionOnLine(line, comp.param);
    if (!pos) return;
    const p = project(pos);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.beginPath();
    switch (comp.type) {
        case 'VALVE':
            const grad = ctx.createLinearGradient(-6, -4, 6, 4);
            grad.addColorStop(0, '#ffcc66');
            grad.addColorStop(1, '#cc9900');
            ctx.fillStyle = grad;
            ctx.moveTo(-6, -4); ctx.lineTo(0,0); ctx.lineTo(6,-4); ctx.lineTo(0,6); ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.stroke();
            // Pequeño brillo
            ctx.beginPath();
            ctx.moveTo(-3, -2); ctx.lineTo(0,1); ctx.lineTo(3,-2);
            ctx.strokeStyle = 'rgba(255,255,200,0.8)';
            ctx.stroke();
            break;
        case 'ELBOW':
            const gradElbow = ctx.createLinearGradient(0, -6, 6, 0);
            gradElbow.addColorStop(0, '#88aaff');
            gradElbow.addColorStop(1, '#3366cc');
            ctx.fillStyle = gradElbow;
            ctx.arc(0,0,6,0,Math.PI/2);
            ctx.lineTo(6,0);
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.stroke();
            break;
        case 'ADAPTADOR':
            ctx.fillStyle = '#bbaa88';
            ctx.fillRect(-5,-3,10,6);
            ctx.fillStyle = '#8a7a5a';
            ctx.fillRect(-5,-3,5,6);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(-5,-3,10,6);
            break;
        case 'SOPORTE':
            ctx.fillStyle = '#ffaa33';
            ctx.fillRect(-4,-2,8,4);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(-4,-2,8,4);
            break;
        default:
            ctx.fillStyle = '#88aaff';
            ctx.fillRect(-4,-3,8,6);
            ctx.stroke();
    }
    if (comp.skey) {
        ctx.font = '7px monospace';
        ctx.fillStyle = 'white';
        ctx.fillText(comp.skey, -6, -6);
    }
    ctx.restore();
}

function getPositionOnLine(line, t) {
    const pts = line.points3D;
    if (!pts || pts.length < 2) return null;
    if (t <= 0) return pts[0];
    if (t >= 1) return pts[pts.length-1];
    const idx = Math.floor(t * (pts.length-1));
    const seg = t * (pts.length-1) - idx;
    const p1 = pts[idx], p2 = pts[idx+1];
    return { x: p1.x + seg*(p2.x-p1.x), y: p1.y + seg*(p2.y-p1.y), z: p1.z + seg*(p2.z-p1.z) };
}

// ==================== RENDER CON ORDENAMIENTO POR PROFUNDIDAD ====================
function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    drawGrid();
    drawOrigin();
    
    // Recolectar todos los elementos con su profundidad (x+y+z)
    let drawList = [];
    
    // Tuberías: cada segmento por separado
    for (let line of db.lines) {
        if (!line.points3D || line.points3D.length < 2) continue;
        for (let i = 0; i < line.points3D.length - 1; i++) {
            const p1 = line.points3D[i];
            const p2 = line.points3D[i+1];
            const mid = { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2, z: (p1.z + p2.z)/2 };
            const depth = mid.x + mid.y + mid.z;
            drawList.push({ type: 'pipe', data: { line, segIndex: i }, depth });
        }
    }
    
    // Componentes
    for (let line of db.lines) {
        if (line.components) {
            for (let comp of line.components) {
                const pos = getPositionOnLine(line, comp.param);
                if (pos) {
                    const depth = pos.x + pos.y + pos.z;
                    drawList.push({ type: 'component', data: { line, comp }, depth });
                }
            }
        }
    }
    
    // Equipos (tanques y bombas)
    for (let eq of db.equipos) {
        const depth = eq.x + eq.y + eq.z;
        drawList.push({ type: 'equipment', data: eq, depth });
    }
    
    // Ordenar por profundidad ascendente (los más lejanos primero)
    drawList.sort((a, b) => a.depth - b.depth);
    
    // Dibujar en orden
    for (let item of drawList) {
        if (item.type === 'pipe') {
            drawPipeSegment(item.data.line, item.data.segIndex);
        } else if (item.type === 'component') {
            drawComponent(item.data.comp, item.data.line);
        } else if (item.type === 'equipment') {
            if (item.data.tipo === 'tanque_v') drawTank(item.data);
            else if (item.data.tipo === 'bomba') drawBomba(item.data);
            else drawTank(item.data); // fallback
        }
    }
    
    // Resaltar elemento seleccionado (se dibuja encima de todo)
    if (selectedElement) {
        if (selectedElement.type === 'equipment') {
            const eq = selectedElement.obj;
            const p = project(eq);
            const w = (eq.diametro/2)*cam.scale;
            const h = eq.altura*cam.scale;
            ctx.beginPath();
            ctx.ellipse(p.x, p.y - h/2, w+3, (w+3)*0.5, 0, 0, 2*Math.PI);
            ctx.strokeStyle = '#facc15';
            ctx.lineWidth = 3;
            ctx.stroke();
        } else if (selectedElement.type === 'line') {
            const line = selectedElement.obj;
            if (line.points3D && line.points3D.length >= 2) {
                ctx.beginPath();
                const proj = line.points3D.map(p => project(p));
                ctx.moveTo(proj[0].x, proj[0].y);
                for (let i=1; i<proj.length; i++) ctx.lineTo(proj[i].x, proj[i].y);
                ctx.strokeStyle = '#facc15';
                ctx.lineWidth = Math.max(6, (line.diameter||4)*cam.scale);
                ctx.stroke();
            }
        }
    }
    
    ctx.restore();
}

// ==================== autoCenter MEJORADA ====================
function autoCenter() {
    if (!canvas) return;
    let points = [];
    db.equipos.forEach(eq => {
        const r = (eq.diametro || 1000) / 2;
        const h = (eq.altura || 2000);
        points.push({ x: eq.x, y: eq.y, z: eq.z });
        points.push({ x: eq.x, y: eq.y + h/2, z: eq.z });
        points.push({ x: eq.x, y: eq.y - h/2, z: eq.z });
        points.push({ x: eq.x + r, y: eq.y, z: eq.z });
        points.push({ x: eq.x - r, y: eq.y, z: eq.z });
        points.push({ x: eq.x, y: eq.y, z: eq.z + r });
        points.push({ x: eq.x, y: eq.y, z: eq.z - r });
    });
    db.lines.forEach(line => {
        if (line.points3D) points.push(...line.points3D);
    });
    if (points.length === 0) points = [{ x: -2000, y: 0, z: -2000 }, { x: 2000, y: 2000, z: 2000 }];
    const cos30 = Math.cos(30 * Math.PI / 180);
    const sin30 = Math.sin(30 * Math.PI / 180);
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    points.forEach(p => {
        const rawX = (p.x - p.z) * cos30;
        const rawY = (p.x + p.z) * sin30 - p.y;
        if (rawX < minX) minX = rawX;
        if (rawX > maxX) maxX = rawX;
        if (rawY < minY) minY = rawY;
        if (rawY > maxY) maxY = rawY;
    });
    const marginX = (maxX - minX) * 0.15;
    const marginY = (maxY - minY) * 0.15;
    minX -= marginX;
    maxX += marginX;
    minY -= marginY;
    maxY += marginY;
    const worldW = maxX - minX;
    const worldH = maxY - minY;
    const padding = Math.min(Math.max(canvas.width * 0.1, 20), 80);
    const scaleX = (canvas.width - padding) / worldW;
    const scaleY = (canvas.height - padding) / worldH;
    let newScale = Math.min(scaleX, scaleY);
    newScale = Math.min(newScale, 0.6);
    newScale = Math.max(newScale, 0.12);
    cam.scale = newScale;
    const worldCenterX = (minX + maxX) / 2;
    const worldCenterY = (minY + maxY) / 2;
    cam.panX = canvas.width / 2 - worldCenterX * cam.scale;
    cam.panY = canvas.height / 2 - worldCenterY * cam.scale;
    render();
}

// ==================== MANIPULACIÓN DE DATOS ====================
function addEquipment(tipo, tagBase, diam = 2400, alt = 2500) {
    const tag = `${tagBase}-${(db.equipos.filter(e=>e.tipo===tipo).length+1).toString().padStart(2,'0')}`;
    let x = 0, z = 0;
    const last = db.equipos.filter(e=>e.tipo===tipo).pop();
    if (last) { x = last.x + 2000; z = last.z; }
    const y = (tipo==='tanque_v') ? alt/2 : 600;
    const newEq = { type:'equipment', tag, x, y, z, tipo, diametro: diam, altura: alt };
    db.equipos.push(newEq);
    notify(`Equipo ${tag} creado`);
    saveState();
    render();
    autoCenter();
}

function addPipe(tag, diam, material, points) {
    const newLine = { tag, diameter: diam, material, points3D: points, components: [] };
    db.lines.push(newLine);
    notify(`Tubería ${tag} creada`);
    saveState();
    render();
    autoCenter();
}

function addComponent(lineTag, compType, compTag, param, extra = {}) {
    const line = db.lines.find(l => l.tag === lineTag);
    if (!line) { notify(`Línea ${lineTag} no encontrada`, true); return; }
    if (!line.components) line.components = [];
    const comp = { type: compType, tag: compTag, param, ...extra };
    line.components.push(comp);
    notify(`Componente ${compTag} añadido a ${lineTag}`);
    render();
    saveState();
}

// ==================== PARSER CLÁSICO (line, component, equipment) ====================
function parseClassic(cmd) {
    const parts = cmd.trim().split(/\s+/);
    if (parts.length === 0) return null;
    const command = parts[0].toLowerCase();
    if (command === 'line') {
        let tag = parts[1];
        let diam = null, material = 'PPR', schedule = '40';
        let points = [];
        for (let i = 2; i < parts.length; i++) {
            if (parts[i] === 'diameter') diam = parseFloat(parts[++i]);
            else if (parts[i] === 'material') material = parts[++i].toUpperCase();
            else if (parts[i] === 'schedule') schedule = parts[++i];
            else if (parts[i] === 'points') {
                let j = i+1;
                while (j < parts.length) {
                    const match = parts[j].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
                    if (match) {
                        points.push({ x: parseFloat(match[1]), y: parseFloat(match[2]), z: parseFloat(match[3]) });
                        j++;
                    } else break;
                }
                break;
            }
        }
        if (tag && diam && points.length >= 2) {
            addPipe(tag, diam, material, points);
            return true;
        }
    }
    else if (command === 'component') {
        let type = parts[1].toUpperCase();
        let tag = parts[2];
        let atIdx = parts.indexOf('at');
        if (atIdx === -1) return false;
        let lineTag = parts[atIdx+1];
        let paramIdx = parts.indexOf('param');
        if (paramIdx === -1) return false;
        let param = parseFloat(parts[paramIdx+1]);
        if (isNaN(param)) return false;
        let extra = {};
        for (let i = paramIdx+2; i < parts.length; i++) {
            let key = parts[i];
            if (i+1 >= parts.length) break;
            let val = parts[++i];
            if (key === 'angle') extra.angle = parseFloat(val);
            else if (key === 'radius') extra.radius = parseFloat(val);
            else if (key === 'size') extra.size = parseFloat(val);
            else if (key === 'rating') extra.rating = val;
            else if (key === 'type') extra.subtype = val;
            else extra[key] = val;
        }
        addComponent(lineTag, type, tag, param, extra);
        return true;
    }
    else if (command === 'equipment') {
        let tag = parts[1];
        let atIdx = parts.indexOf('at');
        if (atIdx === -1) return false;
        let coords = parts[atIdx+1].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
        if (!coords) return false;
        let x = parseFloat(coords[1]), y = parseFloat(coords[2]), z = parseFloat(coords[3]);
        let tipo = 'tanque_v';
        if (cmd.toLowerCase().includes('bomba')) tipo = 'bomba';
        let diam = 2400, alt = 2500;
        if (tipo === 'bomba') { diam = 800; alt = 800; }
        db.equipos.push({ type:'equipment', tag, x, y, z, tipo, diametro: diam, altura: alt });
        notify(`Equipo ${tag} creado`);
        render();
        autoCenter();
        return true;
    }
    return false;
}

// ==================== COMANDOS DE LENGUAJE NATURAL ====================
function parseNatural(cmd) {
    const lower = cmd.toLowerCase().trim();
    if (lower === 'dime' || lower.includes('resumen') || lower.includes('qué hay') || lower.includes('listar') || lower.includes('estado')) {
        const tanques = db.equipos.filter(e => e.tipo === 'tanque_v');
        const bombas = db.equipos.filter(e => e.tipo === 'bomba');
        const tuberias = db.lines;
        let totalComponentes = 0, longitudTotal = 0;
        tuberias.forEach(l => {
            longitudTotal += calcularLongitud(l) / 1000;
            totalComponentes += l.components ? l.components.length : 0;
        });
        let mensaje = `El proyecto tiene ${tanques.length} tanques. `;
        if (tanques.length > 0) mensaje += `Nombres: ${tanques.map(t => t.tag).join(", ")}. `;
        mensaje += `${bombas.length} bombas. `;
        if (bombas.length > 0) mensaje += `Nombres: ${bombas.map(b => b.tag).join(", ")}. `;
        mensaje += `${tuberias.length} tuberías, con una longitud total de ${longitudTotal.toFixed(1)} metros. `;
        if (totalComponentes > 0) mensaje += `Además, hay ${totalComponentes} componentes instalados. `;
        else mensaje += `No hay componentes adicionales. `;
        notify(mensaje);
        return true;
    }
    if (lower.includes('crea') && (lower.includes('tanque') || lower.includes('tanques'))) {
        let cant = 1;
        const m = lower.match(/(\d+)\s+tanques?/);
        if (m) cant = parseInt(m[1]);
        let diam = 2400, alt = 2900;
        const d = lower.match(/di[áa]metro\s+de\s+(\d+)/);
        if (d) diam = parseInt(d[1]);
        const a = lower.match(/altura\s+de\s+(\d+)/);
        if (a) alt = parseInt(a[1]);
        for (let i=0; i<cant; i++) addEquipment('tanque_v', 'TK', diam, alt);
        return true;
    }
    if (lower.includes('crea') && (lower.includes('bomba') || lower.includes('bombas'))) {
        let cant = 1;
        const m = lower.match(/(\d+)\s+bombas?/);
        if (m) cant = parseInt(m[1]);
        for (let i=0; i<cant; i++) addEquipment('bomba', 'B', 800, 800);
        return true;
    }
    if (lower.includes('conecta')) {
        const tags = [...cmd.matchAll(/([A-Z0-9-]+)/g)].map(m=>m[1]);
        if (tags.length >= 2) {
            const e1 = db.equipos.find(e=>e.tag===tags[0]);
            const e2 = db.equipos.find(e=>e.tag===tags[1]);
            if (e1 && e2) {
                let diam = 4;
                const d = lower.match(/(\d+)\s+pulgadas/);
                if (d) diam = parseInt(d[1]);
                const points = [
                    { x: e1.x, y: e1.y + 300, z: e1.z },
                    { x: (e1.x+e2.x)/2, y: e1.y + 500, z: (e1.z+e2.z)/2 },
                    { x: e2.x, y: e2.y + 300, z: e2.z }
                ];
                addPipe(`L-${tags[0]}-${tags[1]}`, diam, 'PPR', points);
                return true;
            } else notify("Equipo no encontrado", true);
        }
        return false;
    }
    if (lower.includes('aplicar normas')) { aplicarNormas(); return true; }
    if (lower.includes('auditar planta')) { auditarPlanta(); return true; }
    if (lower.includes('exportar mto')) { exportarMTO(); return true; }
    if (lower.includes('estimar recursos')) { estimarRecursos(); return true; }
    return false;
}

// ==================== FUNCIONES DE APOYO ====================
function calcularLongitud(line) {
    if (!line.points3D || line.points3D.length<2) return 0;
    let len=0;
    for (let i=0;i<line.points3D.length-1;i++) len += Math.hypot(line.points3D[i+1].x-line.points3D[i].x, line.points3D[i+1].y-line.points3D[i].y, line.points3D[i+1].z-line.points3D[i].z);
    return len;
}

function aplicarNormas() {
    let cambios = 0;
    for (let line of db.lines) {
        const diamMM = (line.diameter || 4) * 25.4;
        if (diamMM >= 110) {
            const long = calcularLongitud(line);
            const necesarios = Math.max(1, Math.floor(long / 1500));
            const actuales = line.components?.filter(c=>c.type==='SOPORTE').length || 0;
            for (let i=actuales; i<necesarios; i++) {
                if (!line.components) line.components = [];
                line.components.push({ type:'SOPORTE', tag:`SUP-${line.tag}-${i+1}`, param: (i+1)/(necesarios+1) });
                cambios++;
            }
        }
    }
    for (let bomba of db.equipos.filter(e=>e.tipo==='bomba')) {
        const lineasConectadas = db.lines.filter(l => l.points3D?.some(p => Math.hypot(p.x-bomba.x, p.y-bomba.y, p.z-bomba.z) < 500));
        for (let line of lineasConectadas) {
            if (!line.components) line.components = [];
            const tieneCheck = line.components.some(c=>c.type==='VALVE' && c.skey==='VCHK');
            if (!tieneCheck) {
                line.components.push({ type:'VALVE', tag:`CHK-${bomba.tag}`, param:0.85, skey:'VCHK', size:line.diameter });
                cambios++;
            }
        }
    }
    if (cambios) { notify(`Normas aplicadas: ${cambios} elementos añadidos`); render(); }
    else notify("La planta ya cumple las normas");
}

function auditarPlanta() {
    let alertas = [];
    for (let bomba of db.equipos.filter(e=>e.tipo==='bomba')) {
        const lineas = db.lines.filter(l => l.points3D?.some(p => Math.hypot(p.x-bomba.x, p.y-bomba.y, p.z-bomba.z) < 500));
        const tieneCheck = lineas.some(l => l.components?.some(c=>c.type==='VALVE' && c.skey==='VCHK'));
        if (!tieneCheck) alertas.push(`Bomba ${bomba.tag} sin válvula check`);
    }
    for (let line of db.lines) {
        const diamMM = (line.diameter||4)*25.4;
        if (diamMM >= 110) {
            const long = calcularLongitud(line);
            const necesarios = Math.max(1, Math.floor(long/1500));
            const actuales = line.components?.filter(c=>c.type==='SOPORTE').length || 0;
            if (actuales < necesarios) alertas.push(`Línea ${line.tag}: necesita ${necesarios} soportes, tiene ${actuales}`);
        }
    }
    if (alertas.length === 0) notify("✅ Auditoría: sin observaciones");
    else { alertas.forEach(a=>notify(a,true)); notify(`⚠️ ${alertas.length} observaciones`,true); }
}

function estimarRecursos() {
    let totalMetros = db.lines.reduce((s,l)=>s+(calcularLongitud(l)/1000),0);
    if (totalMetros===0) { notify("No hay líneas para estimar", true); return; }
    let hh = totalMetros * 4.1;
    let dias = Math.ceil(hh/40);
    let costo = hh * 18;
    let reporte = `📊 ESTIMACIÓN DE RECURSOS\n\n📏 Metraje: ${totalMetros.toFixed(1)} m\n👷 Horas-Hombre: ${hh.toFixed(0)}\n📅 Días: ${dias}\n💰 Costo estimado: USD ${costo.toLocaleString()}`;
    mostrarReporte(reporte);
}

function exportarMTO() {
    let items = [];
    for (let eq of db.equipos) {
        let desc = eq.tipo==='tanque_v' ? `Tanque vertical Ø${(eq.diametro/1000).toFixed(1)}m x H${(eq.altura/1000).toFixed(1)}m` : (eq.tipo==='bomba' ? `Bomba centrífuga` : `Equipo ${eq.tipo}`);
        items.push([eq.tag, desc, "Und", 1]);
    }
    for (let line of db.lines) {
        let long = (calcularLongitud(line)/1000).toFixed(2);
        items.push([line.tag, `Tubería ${line.material} ${line.diameter}"`, "m", parseFloat(long)]);
        if (line.components) {
            for (let comp of line.components) {
                items.push([comp.tag, `${comp.type} ${comp.skey||''}`, "Und", 1]);
            }
        }
    }
    if (items.length===0) { notify("No hay elementos", true); return; }
    const ws = XLSX.utils.aoa_to_sheet([["Tag","Descripción","Unidad","Cantidad"], ...items]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "MTO");
    XLSX.writeFile(wb, `MTO_${Date.now()}.xlsx`);
    notify("MTO exportado");
}

function mostrarReporte(texto) {
    const modal = document.createElement('div');
    modal.className = 'modal-reporte';
    modal.innerHTML = `<div><button class="modal-close">✖</button></div><pre>${texto}</pre>`;
    document.body.appendChild(modal);
    modal.querySelector('.modal-close').onclick = () => modal.remove();
}

// ==================== INTERACCIÓN Y SELECCIÓN ====================
function pickElement(mouse) {
    for (let eq of db.equipos) {
        const p = project(eq);
        const w = (eq.diametro/2)*cam.scale;
        const dist = Math.hypot(mouse.x - p.x, mouse.y - p.y);
        if (dist < w+5) return { type:'equipment', obj:eq };
    }
    for (let line of db.lines) {
        if (!line.points3D) continue;
        const proj = line.points3D.map(p => project(p));
        for (let i=0; i<proj.length-1; i++) {
            const dist = pointToSegmentDistance(mouse, proj[i], proj[i+1]);
            if (dist < 10) return { type:'line', obj:line };
        }
    }
    return null;
}
function pointToSegmentDistance(p, a, b) {
    const ax = p.x-a.x, ay = p.y-a.y;
    const bx = b.x-a.x, by = b.y-a.y;
    const dot = ax*bx + ay*by;
    const len2 = bx*bx + by*by;
    if (len2===0) return Math.hypot(ax,ay);
    let t = dot/len2;
    t = Math.max(0, Math.min(1,t));
    const projX = a.x + t*bx;
    const projY = a.y + t*by;
    return Math.hypot(p.x-projX, p.y-projY);
}

function initCanvasEvents() {
    canvas.addEventListener('mousedown', (e) => {
        dragging = true;
        lastPos = { x: e.clientX, y: e.clientY };
        canvas.style.cursor = 'grabbing';
        const rect = canvas.getBoundingClientRect();
        const mouseCanvas = { x: (e.clientX - rect.left) * canvas.width / rect.width, y: (e.clientY - rect.top) * canvas.height / rect.height };
        const picked = pickElement(mouseCanvas);
        if (picked) selectedElement = picked;
        else selectedElement = null;
        render();
        e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - lastPos.x;
        const dy = e.clientY - lastPos.y;
        cam.panX += dx;
        cam.panY += dy;
        lastPos = { x: e.clientX, y: e.clientY };
        render();
    });
    window.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        cam.scale *= delta;
        cam.scale = Math.min(Math.max(0.1, cam.scale), 1.5);
        render();
    });
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (e.touches.length === 1) {
            dragging = true;
            lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            const rect = canvas.getBoundingClientRect();
            const touchCanvas = { x: (e.touches[0].clientX - rect.left) * canvas.width / rect.width, y: (e.touches[0].clientY - rect.top) * canvas.height / rect.height };
            const picked = pickElement(touchCanvas);
            if (picked) selectedElement = picked;
            else selectedElement = null;
            render();
        }
    });
    window.addEventListener('touchmove', (e) => {
        if (!dragging || e.touches.length !== 1) return;
        const dx = e.touches[0].clientX - lastPos.x;
        const dy = e.touches[0].clientY - lastPos.y;
        cam.panX += dx;
        cam.panY += dy;
        lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        render();
    });
    window.addEventListener('touchend', () => { dragging = false; });
}

// ==================== PERSISTENCIA Y EXPORTACIÓN ====================
function guardarProyecto() {
    localStorage.setItem('smartflow_pro', JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    notify("Proyecto guardado");
}
function cargarProyecto() {
    const data = localStorage.getItem('smartflow_pro');
    if (data) {
        const p = JSON.parse(data);
        db.equipos = p.equipos || [];
        db.lines = p.lines || [];
        selectedElement = null;
        render();
        autoCenter();
        notify("Proyecto cargado");
    } else notify("No hay proyecto guardado", true);
}
function nuevoProyecto() {
    if (confirm("¿Borrar todo?")) {
        db = { equipos: [], lines: [] };
        selectedElement = null;
        render();
        autoCenter();
        notify("Nuevo proyecto");
        saveState();
    }
}
function exportPCF() {
    let pcf = `!PCF v8.1 - SmartFlow Pro\nUNITS MM\n`;
    for (let line of db.lines) {
        if (!line.points3D) continue;
        pcf += `PIPE\n    COMPONENT-IDENTIFIER ${line.tag}\n    DIAMETER ${(line.diameter*25.4).toFixed(2)} MM\n`;
        line.points3D.forEach(p=>pcf+=`    POINT ${p.x.toFixed(1)} ${p.y.toFixed(1)} ${p.z.toFixed(1)}\n`);
        pcf += `ENDPIPE\n`;
    }
    const blob = new Blob([pcf], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `proyecto.pcf`;
    a.click();
    URL.revokeObjectURL(a.href);
    notify("PCF exportado");
}
function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    const imgData = canvas.toDataURL('image/png');
    doc.addImage(imgData, 'PNG', 10, 10, 277, 150);
    doc.setFontSize(16);
    doc.text("SmartFlow Pro - Reporte Isométrico", 10, 175);
    doc.text(`Fecha: ${new Date().toLocaleString()}`, 10, 185);
    doc.save(`isometrico_${Date.now()}.pdf`);
    notify("PDF generado");
}
function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    const btn = document.getElementById('btnVoice');
    btn.textContent = voiceEnabled ? "🔊 Voz ON" : "🔇 Voz OFF";
    notify(voiceEnabled ? "Voz activada" : "Voz desactivada");
}

// ==================== INICIALIZACIÓN ====================
function init() {
    resizeCanvas();
    initCanvasEvents();
    // Datos de ejemplo (un tanque y una tubería)
    db.equipos.push({ tag: 'TK-01', tipo: 'tanque_v', x: 2000, y: 1250, z: 0, diametro: 2400, altura: 2500 });
    db.lines.push({ tag: 'L-101', diameter: 4, material: 'PPR', points3D: [{x:2000, y:1500, z:0}, {x:5000, y:1500, z:0}], components: [] });
    render();
    autoCenter();
    saveState();

    // Eventos de UI
    document.getElementById('btnNew').onclick = nuevoProyecto;
    document.getElementById('btnOpen').onclick = cargarProyecto;
    document.getElementById('btnSave').onclick = guardarProyecto;
    document.getElementById('btnReset').onclick = autoCenter;
    document.getElementById('btnCommand').onclick = () => document.getElementById('commandPanel').style.display = 'block';
    document.getElementById('closeCommand').onclick = () => document.getElementById('commandPanel').style.display = 'none';
    document.getElementById('runCommands').onclick = () => {
        const text = document.getElementById('commandText').value;
        const lines = text.split('\n');
        for (let raw of lines) {
            let cmd = raw.trim();
            if (!cmd || cmd.startsWith('//')) continue;
            saveState();
            if (!parseNatural(cmd) && !parseClassic(cmd)) {
                notify(`❌ No entendí: "${cmd.substring(0,50)}..."`, true);
            }
        }
        document.getElementById('commandPanel').style.display = 'none';
        render();
        autoCenter();
    };
    document.getElementById('clearCommand').onclick = () => document.getElementById('commandText').value = '';
    document.getElementById('btnAddTank').onclick = () => addEquipment('tanque_v', 'TK');
    document.getElementById('btnAddPump').onclick = () => addEquipment('bomba', 'B');
    document.getElementById('btnAddPipe').onclick = () => {
        const tag = prompt("Tag tubería:", `L-${db.lines.length+1}`);
        if (!tag) return;
        const diam = parseFloat(prompt("Diámetro (pulg):", "4"));
        const mat = prompt("Material (PPR/CS/SS):", "PPR");
        const puntos = [];
        let cont = true;
        while (cont) {
            let x = parseFloat(prompt("X (mm):", puntos.length===0?"0":puntos[puntos.length-1].x+1000));
            let y = parseFloat(prompt("Y (mm):", "0"));
            let z = parseFloat(prompt("Z (mm):", "0"));
            puntos.push({x,y,z});
            cont = confirm("¿Agregar otro punto?");
        }
        if (puntos.length >= 2) addPipe(tag, diam, mat, puntos);
        else notify("Se necesitan al menos 2 puntos", true);
    };
    document.getElementById('btnMTO').onclick = exportarMTO;
    document.getElementById('btnPDF').onclick = exportPDF;
    document.getElementById('btnUndo').onclick = undo;
    document.getElementById('btnRedo').onclick = redo;
    document.getElementById('btnVoice').onclick = toggleVoice;
    document.getElementById('btnApplyNorm').onclick = aplicarNormas;
    document.getElementById('btnSpeakSummary').onclick = () => parseNatural('resumen');

    window.addEventListener('resize', () => { resizeCanvas(); autoCenter(); });
    notify("SmartFlow Pro v8.1 - Listo | Realismo visual completo | Profundidad activada");
}

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    autoCenter();
}

init();
