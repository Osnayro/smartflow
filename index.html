<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --primary:#00d4ff;
    --primary-dark:#0099cc;
    --success:#10b981;
    --warning:#f59e0b;
    --danger:#ef4444;
    --info:#3b82f6;
    --dark-bg:#0a192f;
    --card-bg:#112240;
    --border:#1e3a5f;
    --text:#e0e0e0;
    --text-muted:#8892b0;
}
body{
    background:linear-gradient(135deg,#0a0f1a 0%,#0a192f 100%);
    color:var(--text);
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    font-family:'Segoe UI',Roboto,sans-serif;
}
.toolbar{
    background:var(--dark-bg);
    padding:8px 12px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    border-bottom:1px solid var(--border);
    z-index:10;
}
button{
    background:rgba(255,255,255,0.1);
    border:1px solid var(--border);
    color:var(--text);
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    display:inline-flex;
    align-items:center;
    gap:4px;
    transition:all 0.2s;
}
button:hover{background:var(--primary);color:#0a192f;transform:translateY(-1px);}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#0a192f;border:none}
.btn-warning{background:rgba(245,158,11,0.2);border-color:var(--warning);color:var(--warning)}
.btn-danger{background:rgba(239,68,68,0.2);border-color:var(--danger);color:var(--danger)}
.canvas-container{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%;cursor:crosshair}

/* Barra flotante de edición */
#editFloatingBar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--card-bg);
    border:2px solid var(--primary);
    border-radius:48px;
    padding:8px 16px;
    display:none;
    gap:8px;
    z-index:1000;
    backdrop-filter:blur(10px);
    flex-wrap:wrap;
    justify-content:center;
}
.separator{width:1px;height:30px;background:var(--border);margin:0 4px}

/* Paneles */
#pointsPanel, #propertyPanel{
    position:fixed;
    right:20px;
    top:80px;
    width:320px;
    background:var(--card-bg);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    z-index:900;
    display:none;
    max-height:70vh;
    overflow-y:auto;
}
.point-item{
    background:rgba(255,255,255,0.05);
    padding:8px;
    margin:6px 0;
    border-radius:6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    font-family:monospace;
}
.property-row{margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.property-label{width:90px;font-size:12px;color:var(--text-muted)}
.property-value{flex:1}
.property-value input,.property-value select{
    width:100%;padding:6px 8px;
    background:rgba(10,25,47,0.9);
    border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-size:12px
}

/* Comandos */
#commandPanel{
    position:fixed;
    left:20px;
    bottom:20px;
    width:90%;
    max-width:600px;
    background:var(--card-bg);
    border-radius:12px;
    border:1px solid var(--border);
    z-index:1000;
    display:none;
}
textarea{
    width:calc(100% - 24px);
    margin:12px;
    background:rgba(10,25,47,0.9);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    color:white;
    font-family:monospace;
    font-size:13px;
    resize:vertical;
}
.notification-container{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:2000;
    display:flex;
    flex-direction:column;
    gap:10px;
    pointer-events:none;
}
.notification{
    background:var(--success);
    padding:12px 24px;
    border-radius:40px;
    font-size:13px;
    font-weight:500;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
    pointer-events:auto;
    opacity:0;
    transform:translateY(-10px);
    transition:all 0.3s ease;
}
.notification.error{background:var(--danger)}
.status-bar{
    background:var(--dark-bg);
    padding:6px 16px;
    font-size:11px;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
}
.coords{font-family:monospace;color:var(--primary)}
.voice-indicator{
    position:fixed;
    bottom:20px;
    left:20px;
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--success);
    z-index:3000;
}
.voice-indicator.active{background:var(--warning);animation:pulse 1s infinite}
@keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.5;transform:scale(1.3)}
}
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(5px);
    z-index:10000;
    display:flex;
    align-items:center;
    justify-content:center;
}
.modal-content{
    background:var(--card-bg);
    border-radius:16px;
    padding:24px;
    max-width:450px;
    width:90%;
    border:1px solid var(--border);
}
.modal-content input{
    width:100%;padding:10px;margin:10px 0;
    background:rgba(10,25,47,0.9);
    border:1px solid var(--border);border-radius:6px;
    color:white;
}
.coord-input-group{display:flex;gap:10px;margin:10px 0}
.coord-input-group input{flex:1;padding:8px}
@media (max-width:768px){
    button{padding:4px 8px;font-size:10px}
    #editFloatingBar{padding:6px 12px}
    #propertyPanel{width:280px;right:10px}
}

<script>
// ==================== SISTEMA DE VOZ ====================
let speechQueue = [];
let isSpeaking = false;
let voiceEnabled = true;

function speakText(text, isUrgent) {
    if (!voiceEnabled) return;
    if (!text) return;
    if (!window.speechSynthesis) return;
    
    if (isUrgent) {
        try { window.speechSynthesis.cancel(); } catch(e) {}
        speechQueue = [];
        isSpeaking = false;
    }
    speechQueue.push(text);
    processSpeechQueue();
}

function processSpeechQueue() {
    if (isSpeaking || speechQueue.length === 0) return;
    if (!window.speechSynthesis) return;
    isSpeaking = true;
    let text = speechQueue.shift();
    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-ES';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    const indicator = document.getElementById('voiceIndicator');
    if (indicator) indicator.classList.add('active');
    utterance.onend = () => { isSpeaking = false; if(indicator) indicator.classList.remove('active'); processSpeechQueue(); };
    utterance.onerror = () => { isSpeaking = false; if(indicator) indicator.classList.remove('active'); processSpeechQueue(); };
    try { window.speechSynthesis.speak(utterance); } catch(e) { isSpeaking = false; processSpeechQueue(); }
}

function notify(msg, isError = false) {
    const container = document.getElementById('notificationContainer');
    const notif = document.createElement('div');
    notif.className = 'notification' + (isError ? ' error' : '');
    notif.textContent = msg;
    container.appendChild(notif);
    document.getElementById('statusMsg').textContent = msg;
    if (voiceEnabled && window.speechSynthesis) speakText(msg, isError);
    setTimeout(() => { notif.style.opacity = '1'; notif.style.transform = 'translateY(0)'; }, 10);
    setTimeout(() => { notif.style.opacity = '0'; notif.style.transform = 'translateY(-10px)'; setTimeout(() => notif.remove(), 300); }, 4000);
}

// ==================== CONFIGURACIÓN GLOBAL ====================
let db = { equipos: [], lines: [] };
let cam = { scale: 0.5, panX: 0, panY: 0 };
let dragging = false, lastPos = { x: 0, y: 0 };
let selectedElement = null;
let selectedPointIndex = -1;
let editModeActive = false;
let measuringMode = false;
let snapEnabled = true;
let tempMeasurePoint = null;
let currentCursor = { x: 0, y: 0, z: 0 };
let history = { past: [], future: [], maxSize: 30 };
let renderRequested = false;
let proyectoData = { nombre: '', autor: '', fecha: '', cliente: '' };

const canvas = document.getElementById('isoCanvas');
const ctx = canvas.getContext('2d');

// ==================== HISTORIAL ====================
function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}
function undo() {
    if (history.past.length === 0) { notify("Nada que deshacer", true); return; }
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.future.push(current);
    const prev = history.past.pop();
    db.equipos = prev.equipos || [];
    db.lines = prev.lines || [];
    selectedElement = null; selectedPointIndex = -1;
    document.getElementById('propertyPanel').style.display = 'none';
    document.getElementById('pointsPanel').style.display = 'none';
    requestRender(); 
    safeAutoCenter();
    notify("Deshecho");
}
function redo() {
    if (history.future.length === 0) { notify("Nada que rehacer", true); return; }
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos || [];
    db.lines = next.lines || [];
    selectedElement = null;
    requestRender(); 
    safeAutoCenter();
    notify("Rehecho");
}

// ==================== RENDERIZADO ====================
function requestRender() {
    if (!renderRequested) {
        renderRequested = true;
        requestAnimationFrame(() => { render(); renderRequested = false; });
    }
}
function project(p) {
    const c30 = 0.866, s30 = 0.5;
    const x = (p.x - p.z) * c30;
    const y = (p.x + p.z) * s30 - (p.y || 0);
    return { x: x * cam.scale + cam.panX, y: y * cam.scale + cam.panY };
}
function drawGrid() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    for (let i = -20000; i <= 20000; i += 1000) {
        const p1 = project({ x: i, y: 0, z: -20000 });
        const p2 = project({ x: i, y: 0, z: 20000 });
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        const p3 = project({ x: -20000, y: 0, z: i });
        const p4 = project({ x: 20000, y: 0, z: i });
        ctx.beginPath(); ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.stroke();
    }
    ctx.restore();
}
function getMaterialColor(mat) {
    const c = { 'Acero Carbono':'#475569', 'CS':'#475569', 'Acero Inoxidable':'#94a3b8', 'SS':'#94a3b8', 'PPR':'#22c55e', 'HDPE':'#10b981', 'PVC':'#e2e8f0', 'FRP':'#2dd4bf' };
    return c[mat] || c[mat?.split(' ')[0]] || '#3b82f6';
}
function drawEquipment(e) {
    const p = project(e);
    const r = ((e.diametro || 2000) / 2) * cam.scale;
    const h = (e.altura || 3000) * cam.scale;
    
    ctx.fillStyle = getMaterialColor(e.material || 'Acero Carbono');
    ctx.fillRect(p.x - r, p.y - h, r * 2, h);
    
    // Borde blanco semitransparente para depuración (se puede quitar luego)
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x - r, p.y - h, r * 2, h);
    
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - h, r, r * 0.5, 0, 0, 2 * Math.PI);
    ctx.fill();
    
    if (selectedElement?.obj === e && selectedElement?.type === 'equipment') {
        ctx.strokeStyle = 'var(--primary)';
        ctx.lineWidth = 3;
        ctx.strokeRect(p.x - r - 8, p.y - h - 8, r * 2 + 16, h + 16);
    }
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(10, 12 * cam.scale)}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillText(e.tag, p.x, p.y - h - 10);
    if (e.servicio) {
        ctx.font = `${Math.max(8, 10 * cam.scale)}px 'Segoe UI'`;
        ctx.fillStyle = 'var(--text-muted)';
        ctx.fillText(e.servicio, p.x, p.y - h - 25);
    }
    if (e.potencia) {
        ctx.font = `${Math.max(8, 10 * cam.scale)}px 'Segoe UI'`;
        ctx.fillStyle = '#ffaa00';
        ctx.fillText(`${e.potencia} HP`, p.x, p.y - h - 40);
    }
}
function drawLine(l) {
    if (!l.points3D || l.points3D.length < 2) return;
    ctx.beginPath();
    const start = project(l.points3D[0]);
    ctx.moveTo(start.x, start.y);
    for (let i = 1; i < l.points3D.length; i++) {
        const pt = project(l.points3D[i]);
        ctx.lineTo(pt.x, pt.y);
    }
    ctx.strokeStyle = getMaterialColor(l.material || 'Acero Carbono');
    ctx.lineWidth = Math.max(2, (l.diametro || 4) * 1.5);
    ctx.stroke();
    if (selectedElement?.obj === l && selectedElement?.type === 'line') {
        ctx.strokeStyle = 'var(--primary)';
        ctx.lineWidth = Math.max(2, (l.diametro || 4) * 1.5) + 2;
        ctx.stroke();
        l.points3D.forEach((pt, idx) => {
            const p = project(pt);
            ctx.fillStyle = idx === selectedPointIndex ? 'var(--warning)' : 'var(--primary)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '10px monospace';
            ctx.fillText(idx, p.x - 3, p.y - 4);
        });
    }
    if (l.componentes) {
        l.componentes.forEach(c => {
            if (c.posicion !== undefined && l.points3D.length >= 2) {
                const idx = Math.min(Math.floor(c.posicion * (l.points3D.length - 1)), l.points3D.length - 1);
                const pos = project(l.points3D[idx]);
                if (c.type === 'VALVE') {
                    ctx.fillStyle = '#f59e0b';
                    ctx.beginPath(); ctx.rect(pos.x - 6, pos.y - 4, 12, 8); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = '8px monospace';
                    ctx.fillText(c.skey || 'VLV', pos.x - 5, pos.y - 6);
                } else if (c.type === 'ELBOW') {
                    ctx.fillStyle = '#10b981';
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, 5, 0, 2 * Math.PI); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = '7px monospace';
                    ctx.fillText(c.skey || 'EL', pos.x - 4, pos.y - 3);
                } else if (c.type === 'INSTRUMENT') {
                    ctx.fillStyle = '#3b82f6';
                    ctx.beginPath(); ctx.rect(pos.x - 5, pos.y - 5, 10, 10); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = '7px monospace';
                    ctx.fillText(c.skey || 'INST', pos.x - 6, pos.y - 4);
                } else if (c.type === 'SUPPORT') {
                    ctx.fillStyle = '#a855f7';
                    ctx.beginPath(); ctx.rect(pos.x - 4, pos.y - 2, 8, 4); ctx.fill();
                }
            }
        });
    }
}
function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    db.lines.forEach(l => drawLine(l));
    db.equipos.forEach(e => drawEquipment(e));
    if (tempMeasurePoint) {
        const p1 = project(tempMeasurePoint);
        const p2 = project(currentCursor);
        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = 'var(--warning)'; ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
        ctx.stroke(); ctx.setLineDash([]);
    }
    document.getElementById('coords').innerHTML = `X:${Math.round(currentCursor.x)} Z:${Math.round(currentCursor.z)}`;
}

// ==================== AUTO CENTER MEJORADO (con proyección real de bounding box) ====================
function safeAutoCenter() {
    // Espera a que el canvas tenga dimensiones
    if (!canvas.width || !canvas.height) {
        setTimeout(() => safeAutoCenter(), 50);
        return;
    }
    autoCenter();
}

function autoCenter() {
    if (db.equipos.length === 0 && db.lines.length === 0) {
        cam.panX = canvas.width / 2;
        cam.panY = canvas.height / 2;
        cam.scale = 0.6;
        requestRender();
        return;
    }
    
    // Recopilar todos los puntos significativos (equipos y puntos de líneas)
    let points = [];
    db.equipos.forEach(e => {
        // Consideramos las esquinas del bounding box del equipo (simplificado como su posición central)
        // Para un mejor ajuste, tomamos el centro y los extremos en XZ
        const w = (e.diametro || 2000) / 2;
        const d = (e.altura || 3000); // no afecta XZ, pero lo dejamos
        points.push({ x: e.x - w, y: e.y || 0, z: e.z - w });
        points.push({ x: e.x + w, y: e.y || 0, z: e.z + w });
    });
    db.lines.forEach(l => {
        if (l.points3D) {
            l.points3D.forEach(p => points.push({ x: p.x, y: p.y || 0, z: p.z }));
        }
    });
    
    if (points.length === 0) {
        cam.panX = canvas.width / 2;
        cam.panY = canvas.height / 2;
        cam.scale = 0.6;
        requestRender();
        return;
    }
    
    // Encontrar bounding box en coordenadas de mundo
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
    points.forEach(p => {
        minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
        minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
        minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z);
    });
    
    // Agregar margen (20%)
    const marginX = Math.max((maxX - minX) * 0.2, 2000);
    const marginZ = Math.max((maxZ - minZ) * 0.2, 2000);
    minX -= marginX; maxX += marginX;
    minZ -= marginZ; maxZ += marginZ;
    
    // Calcular las 8 esquinas del bounding box 3D
    const corners = [
        { x: minX, y: minY, z: minZ }, { x: maxX, y: minY, z: minZ },
        { x: minX, y: maxY, z: minZ }, { x: maxX, y: maxY, z: minZ },
        { x: minX, y: minY, z: maxZ }, { x: maxX, y: minY, z: maxZ },
        { x: minX, y: maxY, z: maxZ }, { x: maxX, y: maxY, z: maxZ }
    ];
    
    // Proyectar las esquinas con escala = 1.0 y pan = 0 para medir extensión en píxeles
    const proj = corners.map(c => {
        const c30 = 0.866, s30 = 0.5;
        const x = (c.x - c.z) * c30;
        const y = (c.x + c.z) * s30 - c.y;
        return { x, y };
    });
    
    let minProjX = Infinity, maxProjX = -Infinity, minProjY = Infinity, maxProjY = -Infinity;
    proj.forEach(p => {
        minProjX = Math.min(minProjX, p.x); maxProjX = Math.max(maxProjX, p.x);
        minProjY = Math.min(minProjY, p.y); maxProjY = Math.max(maxProjY, p.y);
    });
    
    const projWidth = maxProjX - minProjX;
    const projHeight = maxProjY - minProjY;
    
    // Calcular escala para que quepa en el canvas con un margen del 5%
    const scaleX = (canvas.width * 0.9) / projWidth;
    const scaleY = (canvas.height * 0.9) / projHeight;
    let newScale = Math.min(scaleX, scaleY, 1.5); // máximo 1.5 para no exagerar zoom in
    newScale = Math.max(newScale, 0.1); // mínimo 0.1
    
    cam.scale = newScale;
    
    // Calcular el centro del bounding box en proyección
    const centerProj = {
        x: (minProjX + maxProjX) / 2,
        y: (minProjY + maxProjY) / 2
    };
    
    // Ajustar pan para que el centro proyectado quede en el centro del canvas
    cam.panX = canvas.width / 2 - centerProj.x * cam.scale;
    cam.panY = canvas.height / 2 - centerProj.y * cam.scale;
    
    console.log(`AutoCenter: bounding world X[${minX.toFixed(0)}, ${maxX.toFixed(0)}] Z[${minZ.toFixed(0)}, ${maxZ.toFixed(0)}]`);
    console.log(`Proj size: ${projWidth.toFixed(0)} x ${projHeight.toFixed(0)}, scale=${cam.scale.toFixed(4)}`);
    
    requestRender();
}

// ==================== CREACIÓN DE EQUIPOS ====================
function generarTag(prefix) {
    let num = 1;
    while (db.equipos.some(e => e.tag === `${prefix}-${String(num).padStart(2, '0')}`)) num++;
    return `${prefix}-${String(num).padStart(2, '0')}`;
}
function generarTagLinea() {
    let num = 1;
    while (db.lines.some(l => l.tag === `L-${String(num).padStart(3, '0')}`)) num++;
    return `L-${String(num).padStart(3, '0')}`;
}
function calcularLongitudLinea(line) {
    if (!line.points3D || line.points3D.length < 2) return 0;
    let total = 0;
    for (let i = 1; i < line.points3D.length; i++) {
        const p1 = line.points3D[i-1], p2 = line.points3D[i];
        total += Math.hypot(p2.x - p1.x, p2.y - p1.y, p2.z - p1.z);
    }
    return total;
}

function crearTanque(diametro, altura, material, servicio) {
    saveState();
    const tag = generarTag('TK');
    db.equipos.push({ type: 'equipment', tag, x: db.equipos.length * 4000, y: 0, z: 0, tipo: 'tanque', diametro: diametro || 2400, altura: altura || 4000, material: material || 'Acero Carbono', servicio: servicio || 'Almacenamiento', presion: 1, temperatura: 50 });
    notify(`Tanque ${tag}: ${diametro || 2400}mm x ${altura || 4000}mm ${material || 'Acero Carbono'} - ${servicio || 'Almacenamiento'}`);
    requestRender(); 
    safeAutoCenter();
}

function crearBomba(potencia, caudal, material, servicio, subTipo) {
    saveState();
    const tag = generarTag('P');
    db.equipos.push({ type: 'equipment', tag, x: db.equipos.length * 3500, y: 0, z: 0, tipo: 'bomba', subTipo: subTipo || 'centrifuga', diametro: 600, altura: 800, potencia: potencia || 75, caudal: caudal || 500, material: material || 'Acero Carbono', servicio: servicio || 'Bombeo', presion: 10, temperatura: 60 });
    notify(`Bomba ${tag}: ${potencia || 75}HP, ${caudal || 500}m³/h - ${servicio || 'Bombeo'}`);
    requestRender(); 
    safeAutoCenter();
}

function crearEquiposMasivos(tipo, cantidad, parametros, configuracion, separacion) {
    if (cantidad < 2) { notify("La creación masiva requiere al menos 2 equipos", true); return; }
    saveState();
    const inicioX = db.equipos.length * 4000;
    const inicioZ = 0;
    const sep = separacion || 5000;
    for (let i = 0; i < cantidad; i++) {
        let x = inicioX, z = inicioZ;
        if (configuracion === 'serie') { x = inicioX + (i * sep); z = inicioZ; }
        else if (configuracion === 'paralelo') { x = inicioX; z = inicioZ + (i * sep); }
        else if (configuracion === 'matriz') { const cols = Math.ceil(Math.sqrt(cantidad)); x = inicioX + ((i % cols) * sep); z = inicioZ + (Math.floor(i / cols) * sep); }
        const tag = generarTag(tipo === 'tanque' ? 'TK' : (tipo === 'bomba' ? 'P' : 'EQ'));
        const equipo = { type: 'equipment', tag, x, y: 0, z, tipo: tipo };
        Object.assign(equipo, parametros);
        db.equipos.push(equipo);
    }
    notify(`Creados ${cantidad} ${tipo}s en configuración ${configuracion}, separación ${sep/1000}m`);
    requestRender(); 
    // Pequeño retraso para asegurar que el canvas esté listo
    setTimeout(() => safeAutoCenter(), 50);
}

function crearLinea(diametroPulgadas, material, servicio) {
    saveState();
    const tag = generarTagLinea();
    const puntos = [{ x: 0, y: 500, z: 0 }, { x: 3000, y: 500, z: 2000 }];
    db.lines.push({ tag, diametro: diametroPulgadas || 4, material: material || 'Acero Carbono', servicio: servicio || 'Proceso', puntos3D: puntos, componentes: [] });
    notify(`Línea ${tag} creada (${diametroPulgadas || 4}" ${material || 'Acero Carbono'})`);
    requestRender(); 
    safeAutoCenter();
}

function conectarEquipos(diametroPulgadas, material, tagOrigen, tagDestino) {
    const e1 = db.equipos.find(e => e.tag === tagOrigen);
    const e2 = db.equipos.find(e => e.tag === tagDestino);
    if (!e1 || !e2) { notify(`Equipos no encontrados: ${tagOrigen} o ${tagDestino}`, true); return; }
    saveState();
    const tag = generarTagLinea();
    const p1 = { x: e1.x + (e1.diametro || 2000)/2 + 500, y: 500, z: e1.z };
    const p2 = { x: e2.x - (e2.diametro || 2000)/2 - 500, y: 500, z: e2.z };
    db.lines.push({ tag, diametro: diametroPulgadas || 4, material: material || 'Acero Carbono', servicio: `Conexión ${tagOrigen}-${tagDestino}`, puntos3D: [p1, p2], componentes: [], presion: 10, temperatura: 100 });
    notify(`Conexión ${tagOrigen}-${tagDestino} creada (${diametroPulgadas || 4}" ${material || 'Acero Carbono'})`);
    requestRender(); 
    safeAutoCenter();
}

function agregarValvula(lineaTag, tipo, posicion) {
    const line = db.lines.find(l => l.tag === lineaTag);
    if (!line) { notify(`Línea ${lineaTag} no encontrada`, true); return; }
    saveState();
    if (!line.componentes) line.componentes = [];
    const skeyMap = { 'bola': 'VBAL', 'check': 'VCHK', 'compuerta': 'VGAT', 'globo': 'VGLB', 'mariposa': 'VBUT' };
    line.componentes.push({ type: 'VALVE', tag: `VLV-${line.componentes.length+1}`, skey: skeyMap[tipo] || 'VBAL', posicion: posicion || 0.5 });
    notify(`Válvula ${tipo || 'bola'} añadida en ${lineaTag} posición ${Math.round((posicion||0.5)*100)}%`);
    requestRender();
}

function generarResumenCompleto() {
    let resumen = `=== RESUMEN COMPLETO DEL PROYECTO ===\n`;
    resumen += `Proyecto: ${proyectoData.nombre || 'Sin nombre'}\n`;
    resumen += `Ingeniero: ${proyectoData.autor || 'No especificado'}\n`;
    resumen += `Cliente: ${proyectoData.cliente || 'No especificado'}\n`;
    resumen += `Fecha: ${proyectoData.fecha || new Date().toLocaleDateString()}\n\n`;
    resumen += `📦 EQUIPOS (${db.equipos.length}):\n`;
    db.equipos.forEach(e => { resumen += `  • ${e.tag}: ${e.tipo} ${e.diametro || '?'}mm x ${e.altura || '?'}mm, ${e.material || 'CS'}, ${e.servicio || 'Proceso'}\n`; });
    resumen += `\n📏 LÍNEAS (${db.lines.length}):\n`;
    let longitudTotal = 0;
    db.lines.forEach(l => { const long = calcularLongitudLinea(l); longitudTotal += long; resumen += `  • ${l.tag}: ${l.diametro || 4}" ${l.material || 'CS'}, ${l.servicio || 'Proceso'}, longitud ${(long/1000).toFixed(2)}m\n`; });
    resumen += `\n📐 LONGITUD TOTAL TUBERÍA: ${(longitudTotal/1000).toFixed(2)} metros\n`;
    let totalValvulas = 0, totalCodos = 0, totalInstrumentos = 0, totalSoportes = 0;
    db.lines.forEach(l => { if(l.componentes){ l.componentes.forEach(c => { if(c.type==='VALVE') totalValvulas++; else if(c.type==='ELBOW') totalCodos++; else if(c.type==='INSTRUMENT') totalInstrumentos++; else if(c.type==='SUPPORT') totalSoportes++; }); } });
    resumen += `\n🔧 COMPONENTES: Válvulas:${totalValvulas}, Codos:${totalCodos}, Instrumentos:${totalInstrumentos}, Soportes:${totalSoportes}\n`;
    notify(resumen);
    return resumen;
}

function verificarNormasASME() {
    let resultados = [];
    let cumple = true;
    for (const line of db.lines) {
        const longitud = calcularLongitudLinea(line);
        const numSoportes = line.componentes?.filter(c => c.type === 'SUPPORT').length || 0;
        const soportesNecesarios = Math.max(2, Math.floor(longitud / 4000) + 1);
        if (numSoportes < soportesNecesarios) {
            resultados.push(`❌ ${line.tag}: Faltan ${soportesNecesarios - numSoportes} soportes (requiere ${soportesNecesarios})`);
            cumple = false;
        } else { resultados.push(`✅ ${line.tag}: ${numSoportes} soportes - OK`); }
        if (line.temperatura > 200 && line.material === 'PPR') { resultados.push(`⚠️ ${line.tag}: PPR no recomendado para ${line.temperatura}°C`); cumple = false; }
        if (line.temperatura > 400 && line.material === 'Acero Carbono') { resultados.push(`⚠️ ${line.tag}: Acero Carbono límite 400°C`); cumple = false; }
    }
    const resumen = `=== VERIFICACIÓN ASME B31.3 ===\n${resultados.join('\n')}\n${cumple ? '✅ El proyecto cumple con los requisitos mínimos' : '❌ Se requieren correcciones'}`;
    notify(resumen, !cumple);
    return cumple;
}

        pcf += `PIPE\n    COMPONENT-IDENTIFIER ${l.tag}\n    DIAMETER ${(l.diametro * 25.4).toFixed(2)} MM\n    MATERIAL ${l.material === 'Acero Carbono' ? 'CS' : (l.material === 'Acero Inoxidable' ? 'SS' : l.material)}\n    SCHEDULE ${l.diametro >= 6 ? '80' : '40'}\n`;

        if (l.componentes) {
            l.componentes.forEach(c => {
                pcf += `    ${c.type === 'VALVE' ? 'VALVE' : (c.type === 'ELBOW' ? 'ELBOW' : 'COMPONENT')}\n        COMPONENT-IDENTIFIER ${c.tag}\n        SKEY ${c.skey || 'GEN'}\n        END-POINT 0 0 0\n    END${c.type === 'VALVE' ? 'VALVE' : (c.type === 'ELBOW' ? 'ELBOW' : 'COMPONENT')}\n`;
            });

    });
    db.equipos.forEach(e => {

    });
    const blob = new Blob([pcf], { type: 'text/plain' });

    a.download = `${(proyectoData.nombre || 'proyecto').replace(/[^a-z0-9]/gi, '_')}_${Date.now()}.pcf`;
    a.click();

}

function importarPCF() {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.pcf';
    inp.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            const text = ev.target.result;
            const linesTemp = [];
            let curPipe = null, curPoints = [];
            const todas = text.split('\n');
            for (let linea of todas) {
                const l = linea.trim();
                if (l === '' || l.startsWith('!')) continue;
                if (l === 'PIPE') {
                    if (curPipe) { curPipe.points3D = curPoints; linesTemp.push(curPipe); }
                    curPipe = { componentes: [], points3D: [], tag: '', diametro: 4, material: 'CS' };
                    curPoints = [];
                } else if (l === 'ENDPIPE') {
                    if (curPipe) { curPipe.points3D = curPoints; linesTemp.push(curPipe); }
                    curPipe = null;
                } else if (curPipe) {
                    if (l.startsWith('COMPONENT-IDENTIFIER')) curPipe.tag = l.split(/\s+/)[1];
                    else if (l.startsWith('DIAMETER')) curPipe.diametro = parseFloat(l.split(/\s+/)[1]) / 25.4;
                    else if (l.startsWith('MATERIAL')) curPipe.material = l.split(/\s+/)[1] === 'CS' ? 'Acero Carbono' : 'Acero Inoxidable';
                    else if (l.startsWith('POINT')) {
                        const m = l.match(/POINT\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/i);
                        if (m) curPoints.push({ x: parseFloat(m[1]), y: parseFloat(m[2]), z: parseFloat(m[3]) });
                    }
                }
            }
            db.lines = linesTemp;
            requestRender(); 
            safeAutoCenter();
            notify(`PCF importado: ${linesTemp.length} tuberías`);
            saveState();
        };
        reader.readAsText(file);
    };
    inp.click();
}

// ==================== PROCESAR COMANDO ====================
function procesarComando(comando) {
    const c = comando.toLowerCase();
    notify(`Procesando: "${comando}"...`);
    
    const extraerMedida = (texto, palabraClave, defecto) => {
        const regex = new RegExp(`(?:${palabraClave})\\s*(?:de)?\\s*(\\d+(?:\\.\\d+)?)\\s*(mm|cm|m|hp|pulgadas?|")?|(\\d+(?:\\.\\d+)?)\\s*(mm|cm|m|hp|pulgadas?|")?\\s*(?:de)?\\s*(?:${palabraClave})`, "i");
        const match = texto.match(regex);
        if (match) {
            let valor = parseFloat(match[1] || match[3]);
            let unidad = (match[2] || match[4] || "").toLowerCase();
            if (unidad.startsWith("m") && !unidad.includes("mm")) valor *= 1000;
            if (unidad === "cm") valor *= 10;
            return valor;
        }
        return defecto;
    };

    let cantidad = 1;
    const cantMatch = c.match(/(\d+)\s+(?:tanque|bomba|intercambiador|filtro|torre)/);
    if (cantMatch) cantidad = parseInt(cantMatch[1]);

    const esParalelo = c.includes("paralelo");
    const esSerie = c.includes("serie");
    const configuracion = esSerie ? "serie" : "paralelo";

    let material = "Acero Carbono";
    if (c.includes("ppr") || c.includes("polipropileno")) material = "PPR";
    else if (c.includes("inox") || c.includes("inoxidable")) material = "Acero Inoxidable";
    else if (c.includes("hdpe")) material = "HDPE";

    if (c.includes("tanque")) {
        const d = extraerMedida(c, "diametro", 2400);
        const h = extraerMedida(c, "altura", 4000);
        const sep = extraerMedida(c, "separacion", (d + 800));
        if (cantidad > 1) {
            crearEquiposMasivos('tanque', cantidad, { diametro: d, altura: h, material }, configuracion, sep);
            speakText(`Instalados ${cantidad} tanques en ${configuracion} con separación de ${sep} milímetros.`);
        } else {
            crearTanque(d, h, material, "Proceso");
            speakText(`Tanque único de ${d}mm diámetro y ${h}mm altura creado.`);
        }
        return;
    }

    if (c.includes("bomba")) {
        const potencia = extraerMedida(c, "hp", 75);
        const sepBombas = extraerMedida(c, "separacion", 2000);
        if (cantidad > 1) {
            crearEquiposMasivos('bomba', cantidad, { potencia: potencia, material: material, diametro: 600, altura: 800 }, configuracion, sepBombas);
            speakText(`Configuradas ${cantidad} bombas de ${potencia} HP en ${configuracion} con separación de ${sepBombas/1000} metros.`);
        } else {
            crearBomba(potencia, 500, material, "Bombeo");
            speakText(`Bomba de ${potencia} HP creada.`);
        }
        return;
    }

    if (c.includes("linea") || c.includes("tuberia") || c.includes("cañeria")) {
        const pulg = c.match(/(\d+(?:\.\d+)?)\s*(?:pulgadas?|pulg|")/i);
        const diam = pulg ? parseFloat(pulg[1]) : 4;
        crearLinea(diam, material, "Proceso");
        speakText(`Línea de ${diam} pulgadas material ${material} creada.`);
        return;
    }

    if (c.includes("conectar")) {
        const tags = c.match(/[A-Z]{2,3}-\d{2,3}/gi);
        const diam = extraerMedida(c, "pulgadas", 4);
        if (tags && tags.length >= 2) {
            conectarEquipos(diam, material, tags[0].toUpperCase(), tags[1].toUpperCase());
            speakText(`Conexión ${tags[0]} con ${tags[1]} de ${diam}" ${material} creada.`);
        } else {
            notify("Indica dos tags, ej: 'conectar TK-01 con B-01'", true);
        }
        return;
    }

    if (c.includes("resumen")) { generarResumenCompleto(); return; }
    if (c.includes("pcf")) { exportarPCF(); return; }
    if (c.includes("normas")) { verificarNormasASME(); return; }
    if (c.includes("limpiar") || c.includes("nuevo")) { if(confirm("¿Borrar todo?")){ db={equipos:[], lines:[]}; requestRender(); safeAutoCenter(); saveState(); notify("Nuevo proyecto"); speakText("Proyecto limpiado"); } return; }

    notify(`Comando no reconocido: "${comando}"`, true);
    speakText(`Lo siento, no entendí el comando: ${comando}`);
}

// ==================== EVENTOS DEL CANVAS (sin cambios) ====================
function pointToSegmentDistance(p, a, b) {
    const ax = p.x - a.x, ay = p.y - a.y;
    const bx = b.x - a.x, by = b.y - a.y;
    const dot = ax * bx + ay * by;
    const len2 = bx * bx + by * by;
    if (len2 === 0) return Math.hypot(ax, ay);
    let t = dot / len2;
    t = Math.max(0, Math.min(1, t));
    const px = a.x + t * bx, py = a.y + t * by;
    return Math.hypot(p.x - px, p.y - py);
}

function initCanvasEvents() {
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const c30 = 0.866, s30 = 0.5;
        const xc = (mx - cam.panX) / cam.scale, yc = (my - cam.panY) / cam.scale;
        const z = (xc / c30 - yc / s30) / 2;
        const xw = (xc / c30 + yc / s30) / 2;
        currentCursor = { x: xw, y: 0, z: z };
        requestRender();
    });
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        dragging = true;
        lastPos = { x: e.clientX, y: e.clientY };
        if (measuringMode) {
            if (!tempMeasurePoint) { tempMeasurePoint = currentCursor; notify("Punto A marcado"); requestRender(); }
            else { const d = Math.hypot(currentCursor.x - tempMeasurePoint.x, currentCursor.z - tempMeasurePoint.z); notify(`Distancia: ${d >= 1000 ? (d/1000).toFixed(2)+'m' : d.toFixed(0)+'mm'}`); tempMeasurePoint = null; requestRender(); }
            return;
        }
        let hit = false;
        for (let eq of db.equipos) {
            const p = project(eq);
            const r = ((eq.diametro || 2000) / 2) * cam.scale;
            const h = (eq.altura || 3000) * cam.scale;
            if (mx > p.x - r && mx < p.x + r && my > p.y - h && my < p.y) {
                selectedElement = { type: 'equipment', obj: eq };
                hit = true; notify(`${eq.tag} seleccionado`); requestRender(); break;
            }
        }
        if (!hit) {
            for (let line of db.lines) {
                if (!line.points3D) continue;
                let minD = Infinity, bestIdx = -1;
                for (let i = 0; i < line.points3D.length - 1; i++) {
                    const p1 = project(line.points3D[i]);
                    const p2 = project(line.points3D[i+1]);
                    const d = pointToSegmentDistance({ x: mx, y: my }, p1, p2);
                    if (d < minD) { minD = d; bestIdx = i; }
                }
                if (minD < 10) {
                    selectedElement = { type: 'line', obj: line };
                    selectedPointIndex = -1;
                    hit = true; notify(`${line.tag} seleccionada`); requestRender(); break;
                }
            }
        }
        if (!hit) { selectedElement = null; selectedPointIndex = -1; requestRender(); }
    });
    window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        if (selectedElement && selectedElement.type === 'equipment' && editModeActive) {
            const dx = (e.clientX - lastPos.x) / cam.scale;
            const dy = (e.clientY - lastPos.y) / cam.scale;
            selectedElement.obj.x += dx;
            selectedElement.obj.z += dy;
            if (snapEnabled) { 
                selectedElement.obj.x = Math.round(selectedElement.obj.x / 500) * 500;
                selectedElement.obj.z = Math.round(selectedElement.obj.z / 500) * 500;
            }
            requestRender();
        } else if (!selectedElement || !editModeActive) {
            cam.panX += e.clientX - lastPos.x;
            cam.panY += e.clientY - lastPos.y;
            requestRender();
        }
        lastPos = { x: e.clientX, y: e.clientY };
    });
    
    window.addEventListener('mouseup', () => {
        if (dragging && selectedElement) saveState();
        dragging = false;
    });
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        cam.scale = Math.min(Math.max(cam.scale * (e.deltaY > 0 ? 0.9 : 1.1), 0.2), 1.5);
        requestRender();
    }, { passive: false });
    
    canvas.addEventListener('click', (e) => {
        if (!selectedElement || selectedElement.type !== 'line') return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const line = selectedElement.obj;
        let minD = Infinity, bestIdx = -1;
        line.points3D.forEach((pt, idx) => {
            const p = project(pt);
            const d = Math.hypot(mx - p.x, my - p.y);
            if (d < minD && d < 15) { minD = d; bestIdx = idx; }
        });
        if (bestIdx !== -1) {
            selectedPointIndex = bestIdx;
            notify(`Punto ${bestIdx} seleccionado en ${line.tag}`);
            updatePointsPanel();
            requestRender();
        }
    });
}

// ==================== PANEL DE PUNTOS Y PROPIEDADES (sin cambios) ====================
function updatePointsPanel() {
    const panel = document.getElementById('pointsPanel');
    if (!selectedElement || selectedElement.type !== 'line') {
        panel.style.display = 'none';
        return;
    }
    const line = selectedElement.obj;
    const container = document.getElementById('pointsList');
    container.innerHTML = '';
    line.points3D.forEach((pt, idx) => {
        const div = document.createElement('div');
        div.className = 'point-item';
        div.innerHTML = `<span><strong>${idx}</strong> | X:${Math.round(pt.x)} Y:${Math.round(pt.y || 0)} Z:${Math.round(pt.z)}</span>
            <div><button class="selectPointBtn" data-idx="${idx}" style="padding:2px 6px">📌</button>
            <button class="editPointBtn" data-idx="${idx}" style="padding:2px 6px">✏️</button></div>`;
        container.appendChild(div);
    });
    document.querySelectorAll('.selectPointBtn').forEach(btn => {
        btn.onclick = () => { selectedPointIndex = parseInt(btn.dataset.idx); notify(`Punto ${selectedPointIndex} seleccionado`); requestRender(); };
    });
    document.querySelectorAll('.editPointBtn').forEach(btn => {
        btn.onclick = () => { editPointCoordinates(parseInt(btn.dataset.idx)); };
    });
    panel.style.display = 'block';
}

function editPointCoordinates(idx) {
    if (!selectedElement || selectedElement.type !== 'line') return;
    const pt = selectedElement.obj.points3D[idx];
    let modal = document.getElementById('coordModal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'coordModal';
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>✏️ Editar Punto ${idx}</h3>
                <div class="coord-input-group"><label>X:</label><input type="number" id="coordX" step="100"></div>
                <div class="coord-input-group"><label>Y:</label><input type="number" id="coordY" step="100"></div>
                <div class="coord-input-group"><label>Z:</label><input type="number" id="coordZ" step="100"></div>
                <div style="display:flex;gap:12px;margin-top:20px">
                    <button id="confirmCoordBtn" class="btn-primary">✅ Aceptar</button>
                    <button id="cancelCoordBtn">❌ Cancelar</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
    }
    document.getElementById('coordX').value = pt.x;
    document.getElementById('coordY').value = pt.y || 0;
    document.getElementById('coordZ').value = pt.z;
    modal.style.display = 'flex';
    const confirmBtn = document.getElementById('confirmCoordBtn');
    const newConfirm = confirmBtn.cloneNode(true);
    confirmBtn.parentNode.replaceChild(newConfirm, confirmBtn);
    newConfirm.onclick = () => {
        saveState();
        pt.x = parseInt(document.getElementById('coordX').value) || pt.x;
        pt.y = parseInt(document.getElementById('coordY').value) || pt.y;
        pt.z = parseInt(document.getElementById('coordZ').value) || pt.z;
        modal.style.display = 'none';
        updatePointsPanel();
        requestRender();
        notify(`Punto ${idx} actualizado`);
    };
    document.getElementById('cancelCoordBtn').onclick = () => { modal.style.display = 'none'; };
}

function insertPointInLine() {
    if (!selectedElement || selectedElement.type !== 'line') { notify("Seleccione una línea", true); return; }
    if (selectedPointIndex < 0) { notify("Seleccione un punto de referencia", true); return; }
    saveState();
    const line = selectedElement.obj;
    const newPoint = { ...line.points3D[selectedPointIndex] };
    line.points3D.splice(selectedPointIndex + 1, 0, newPoint);
    notify(`Punto insertado después del punto ${selectedPointIndex}`);
    updatePointsPanel();
    requestRender();
}

function deleteSelectedPoint() {
    if (!selectedElement || selectedElement.type !== 'line') { notify("Seleccione una línea", true); return; }
    const line = selectedElement.obj;
    if (line.points3D.length <= 2) { notify("La línea debe tener al menos 2 puntos", true); return; }
    if (selectedPointIndex < 0 || selectedPointIndex >= line.points3D.length) { notify("Seleccione un punto válido", true); return; }
    saveState();
    line.points3D.splice(selectedPointIndex, 1);
    selectedPointIndex = Math.min(selectedPointIndex, line.points3D.length - 1);
    notify(`Punto eliminado`);
    updatePointsPanel();
    requestRender();
}

function addPointAtEnd() {
    if (!selectedElement || selectedElement.type !== 'line') { notify("Seleccione una línea", true); return; }
    saveState();
    const line = selectedElement.obj;
    const last = line.points3D[line.points3D.length - 1];
    const newPoint = { x: last.x + 1000, y: last.y, z: last.z };
    line.points3D.push(newPoint);
    notify(`Punto añadido al final`);
    updatePointsPanel();
    requestRender();
}

function showProperties() {
    if (!selectedElement) { notify("Seleccione un elemento primero", true); return; }
    const panel = document.getElementById('propertyPanel');
    if (selectedElement.type === 'equipment') {
        const eq = selectedElement.obj;
        document.getElementById('propTag').innerHTML = `Equipo: ${eq.tag}`;
        document.getElementById('propDiamSlider').value = eq.diametro || 2000;
        document.getElementById('propDiamNum').value = eq.diametro || 2000;
        document.getElementById('propAltSlider').value = eq.altura || 3000;
        document.getElementById('propAltNum').value = eq.altura || 3000;
        document.getElementById('propMaterial').value = eq.material || 'Acero Carbono';
        document.getElementById('propServicio').value = eq.servicio || '';
        document.getElementById('propPresion').value = eq.presion || 10;
        document.getElementById('propTemp').value = eq.temperatura || 100;
        panel.style.display = 'block';
    } else if (selectedElement.type === 'line') {
        const line = selectedElement.obj;
        document.getElementById('propTag').innerHTML = `Línea: ${line.tag}`;
        panel.style.display = 'block';
    }
}

function applyProperties() {
    if (!selectedElement) return;
    saveState();
    if (selectedElement.type === 'equipment') {
        const eq = selectedElement.obj;
        eq.diametro = parseInt(document.getElementById('propDiamNum').value);
        eq.altura = parseInt(document.getElementById('propAltNum').value);
        eq.material = document.getElementById('propMaterial').value;
        eq.servicio = document.getElementById('propServicio').value;
        eq.presion = parseInt(document.getElementById('propPresion').value);
        eq.temperatura = parseInt(document.getElementById('propTemp').value);
        notify(`Propiedades de ${eq.tag} actualizadas`);
    }
    requestRender();
    document.getElementById('propertyPanel').style.display = 'none';
}

function duplicateElement() {
    if (!selectedElement) { notify("Seleccione un elemento para duplicar", true); return; }
    saveState();
    if (selectedElement.type === 'equipment') {
        const orig = selectedElement.obj;
        const newTag = generarTag(orig.tag.substring(0, 2));
        const newEq = JSON.parse(JSON.stringify(orig));
        newEq.tag = newTag;
        newEq.x = orig.x + 3000;
        db.equipos.push(newEq);
        notify(`${orig.tag} duplicado como ${newTag}`);
    } else if (selectedElement.type === 'line') {
        const orig = selectedElement.obj;
        const newTag = generarTagLinea();
        const newLine = JSON.parse(JSON.stringify(orig));
        newLine.tag = newTag;
        db.lines.push(newLine);
        notify(`${orig.tag} duplicada como ${newTag}`);
    }
    requestRender(); 
    safeAutoCenter();
}

function readElement() {
    if (!selectedElement) { notify("No hay elemento seleccionado", true); return; }
    if (selectedElement.type === 'equipment') {
        const eq = selectedElement.obj;
        const msg = `${eq.tag}, ${eq.tipo}, diámetro ${eq.diametro || 2000} milímetros, altura ${eq.altura || 3000} milímetros, material ${eq.material || 'Acero Carbono'}, servicio ${eq.servicio || 'Proceso'}`;
        notify(msg);
        speakText(msg, false);
    } else if (selectedElement.type === 'line') {
        const line = selectedElement.obj;
        const longitud = calcularLongitudLinea(line);
        const msg = `${line.tag}, diámetro ${line.diametro || 4} pulgadas, material ${line.material || 'Acero Carbono'}, servicio ${line.servicio || 'Proceso'}, longitud ${(longitud/1000).toFixed(2)} metros`;
        notify(msg);
        speakText(msg, false);
    }
}

function deleteSelected() {
    if (!selectedElement) { notify("No hay elemento seleccionado", true); return; }
    saveState();
    if (selectedElement.type === 'equipment') {
        db.equipos = db.equipos.filter(e => e !== selectedElement.obj);
        notify(`${selectedElement.obj.tag} eliminado`);
    } else if (selectedElement.type === 'line') {
        db.lines = db.lines.filter(l => l !== selectedElement.obj);
        notify(`${selectedElement.obj.tag} eliminada`);
    }
    selectedElement = null;
    selectedPointIndex = -1;
    document.getElementById('propertyPanel').style.display = 'none';
    document.getElementById('pointsPanel').style.display = 'none';
    requestRender(); 
    safeAutoCenter();
}

// ==================== MODAL DEL PROYECTO ====================

    const modal = document.getElementById('modalProyecto');
    document.getElementById('proyectoFecha').value = new Date().toISOString().slice(0,10);
    modal.style.display = 'flex';
    document.getElementById('guardarProyectoBtn').onclick = () => {

        notify("Proyecto temporal iniciado");
        speakText("Proyecto temporal iniciado");
    };
}

// ==================== INICIALIZACIÓN ====================
function initHotkeys() {
    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') { undo(); e.preventDefault(); }
        if (e.ctrlKey && e.key === 'y') { redo(); e.preventDefault(); }
        if (e.ctrlKey && e.key === 's') { localStorage.setItem('acquablue_save', JSON.stringify(db)); notify("Guardado"); e.preventDefault(); }
        if (e.key === 'Delete' && selectedElement) { deleteSelected(); e.preventDefault(); }
        if (editModeActive && selectedElement && selectedElement.type === 'equipment') {
            const step = e.shiftKey ? 100 : 500;
            if (e.key === 'ArrowLeft') { selectedElement.obj.x -= step; if(snapEnabled) selectedElement.obj.x = Math.round(selectedElement.obj.x/500)*500; requestRender(); saveState(); e.preventDefault(); }
            if (e.key === 'ArrowRight') { selectedElement.obj.x += step; if(snapEnabled) selectedElement.obj.x = Math.round(selectedElement.obj.x/500)*500; requestRender(); saveState(); e.preventDefault(); }
            if (e.key === 'ArrowUp') { selectedElement.obj.z -= step; if(snapEnabled) selectedElement.obj.z = Math.round(selectedElement.obj.z/500)*500; requestRender(); saveState(); e.preventDefault(); }
            if (e.key === 'ArrowDown') { selectedElement.obj.z += step; if(snapEnabled) selectedElement.obj.z = Math.round(selectedElement.obj.z/500)*500; requestRender(); saveState(); e.preventDefault(); }
        }
    });
}

function initToolbar() {
    document.getElementById('btnNew').onclick = () => { if(confirm("¿Borrar todo?")){ db={equipos:[], lines:[]}; requestRender(); safeAutoCenter(); saveState(); notify("Nuevo proyecto"); speakText("Proyecto nuevo creado"); } };
    document.getElementById('btnOpen').onclick = () => { const data=localStorage.getItem('acquablue_save'); if(data){ db=JSON.parse(data); requestRender(); safeAutoCenter(); notify("Cargado"); speakText("Proyecto cargado"); } else notify("No hay guardado",true); };
    document.getElementById('btnSave').onclick = () => { localStorage.setItem('acquablue_save',JSON.stringify(db)); notify("Guardado"); speakText("Proyecto guardado"); };
    document.getElementById('btnReset').onclick = () => { safeAutoCenter(); notify("Vista centrada"); };
    document.getElementById('btnUndo').onclick = () => undo();
    document.getElementById('btnRedo').onclick = () => redo();
    document.getElementById('btnMTO').onclick = () => exportarMTO();
    document.getElementById('btnPDF').onclick = () => exportarPDF();
    document.getElementById('btnExportPCF').onclick = () => exportarPCF();
    document.getElementById('btnImportPCF').onclick = () => importarPCF();
    document.getElementById('btnMeasure').onclick = () => { measuringMode = !measuringMode; tempMeasurePoint = null; notify(measuringMode ? "Modo medición activado - Click dos puntos" : "Modo medición desactivado"); };
    document.getElementById('btnSnap').onclick = () => { snapEnabled = !snapEnabled; document.getElementById('btnSnap').textContent = snapEnabled ? "🔲 Snap ON" : "🔲 Snap OFF"; notify(`Snap ${snapEnabled ? 'activado' : 'desactivado'}`); };
    document.getElementById('btnVoice').onclick = () => { 
        voiceEnabled = !voiceEnabled; 
        document.getElementById('btnVoice').textContent = voiceEnabled ? "🎙️ Voz ON" : "🔇 Voz OFF";
        notify(voiceEnabled ? "Voz activada" : "Voz desactivada");
        if (voiceEnabled && window.speechSynthesis) {
            let testMsg = new SpeechSynthesisUtterance("Voz activada");
            testMsg.lang = 'es-ES';
            try { window.speechSynthesis.speak(testMsg); } catch(e) {}
        }
    };
    document.getElementById('btnReadElement').onclick = () => readElement();
    document.getElementById('btnApplyNorm').onclick = () => verificarNormasASME();
    document.getElementById('btnAddValve').onclick = () => { if(selectedElement?.type === 'line') agregarValvula(selectedElement.obj.tag, 'bola', 0.5); else notify("Seleccione una línea primero", true); };
    document.getElementById('btnCommand').onclick = () => { document.getElementById('commandPanel').style.display = 'block'; document.getElementById('commandText').focus(); };
    document.getElementById('closeCommand').onclick = () => { document.getElementById('commandPanel').style.display = 'none'; };
    document.getElementById('runCommands').onclick = () => { 
        const text = document.getElementById('commandText').value; 
        if(text.trim()) {
            const lineas = text.split('\n');
            for(let linea of lineas) {
                if(linea.trim()) procesarComando(linea.trim());
            }
        }
    };
    document.getElementById('clearCommand').onclick = () => { document.getElementById('commandText').value = ''; };
    
    const editBar = document.getElementById('editFloatingBar');
    document.getElementById('editModeBtn').onclick = () => { editModeActive = !editModeActive; editBar.style.display = editModeActive ? 'flex' : 'none'; notify(editModeActive ? "Modo edición activado" : "Modo edición desactivado"); };
    document.getElementById('closeEditBtn').onclick = () => { editModeActive = false; editBar.style.display = 'none'; };
    document.getElementById('moveUpBtn').onclick = () => { if(selectedElement?.type === 'equipment'){ selectedElement.obj.z -= 500; if(snapEnabled) selectedElement.obj.z = Math.round(selectedElement.obj.z/500)*500; requestRender(); saveState(); } };
    document.getElementById('moveDownBtn').onclick = () => { if(selectedElement?.type === 'equipment'){ selectedElement.obj.z += 500; if(snapEnabled) selectedElement.obj.z = Math.round(selectedElement.obj.z/500)*500; requestRender(); saveState(); } };
    document.getElementById('moveLeftBtn').onclick = () => { if(selectedElement?.type === 'equipment'){ selectedElement.obj.x -= 500; if(snapEnabled) selectedElement.obj.x = Math.round(selectedElement.obj.x/500)*500; requestRender(); saveState(); } };
    document.getElementById('moveRightBtn').onclick = () => { if(selectedElement?.type === 'equipment'){ selectedElement.obj.x += 500; if(snapEnabled) selectedElement.obj.x = Math.round(selectedElement.obj.x/500)*500; requestRender(); saveState(); } };
    document.getElementById('editPointsBtn').onclick = () => { if(selectedElement?.type === 'line') updatePointsPanel(); else notify("Seleccione una línea", true); };
    document.getElementById('insertPointBtn').onclick = () => insertPointInLine();
    document.getElementById('deletePointBtn').onclick = () => deleteSelectedPoint();
    document.getElementById('addPointAtEndBtn').onclick = () => addPointAtEnd();
    document.getElementById('propertiesBtn').onclick = () => showProperties();
    document.getElementById('applyPropsBtn').onclick = () => applyProperties();
    document.getElementById('duplicateBtn').onclick = () => duplicateElement();
    document.getElementById('deleteElemBtn').onclick = () => deleteSelected();
    
    const diamSlider = document.getElementById('propDiamSlider');
    const diamNum = document.getElementById('propDiamNum');
    diamSlider.oninput = () => { diamNum.value = diamSlider.value; };
    diamNum.onchange = () => { diamSlider.value = diamNum.value; };
    const altSlider = document.getElementById('propAltSlider');
    const altNum = document.getElementById('propAltNum');
    altSlider.oninput = () => { altNum.value = altSlider.value; };
    altNum.onchange = () => { altSlider.value = altNum.value; };
}

function init() {
    const resizeAndCenter = () => {
        const container = canvas.parentElement;
        if (container.clientWidth > 0 && container.clientHeight > 0) {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            safeAutoCenter();
            requestRender();
        }
    };
    
    setTimeout(resizeAndCenter, 50);
    
    window.addEventListener('resize', () => {
        setTimeout(resizeAndCenter, 10);
    });
    
    initCanvasEvents();
    initHotkeys();
    initToolbar();
    
    saveState();
    mostrarModalProyecto();
    notify("SmartFlow Industrial v10.0 - Listo (v2)");
    speakText("Aplicación lista. Use el botón comandos para empezar.", false);
}

setTimeout(init, 30);
