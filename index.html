<script>
// ==================== CONSTANTES ====================
const UNIDADES = { interno: 'mm', visual: 'mm' };
function pulgadasToMM(pulg) { return pulg * 25.4; }
function mmToPulgadas(mm) { return mm / 25.4; }

// ==================== NORMAS DE INGENIERÍA ====================
const AGENTE_NORMAS = {
    sectores: {
        PETROLEO: { nombre: "Petróleo & Gas", codigo: "API 650", factores: { productividad_hh_m: 5.2, costo_hh_usd: 22, factor_accesorios: 1.35 } },
        PETROQUIMICA: { nombre: "Petroquímica", codigo: "ASME B31.3", factores: { productividad_hh_m: 5.8, costo_hh_usd: 24, factor_accesorios: 1.40 } },
        ALIMENTOS: { nombre: "Alimentos", codigo: "FDA 3-A", factores: { productividad_hh_m: 4.2, costo_hh_usd: 18, factor_accesorios: 1.25 } },
        AGUA_POTABLE: { nombre: "Agua Potable", codigo: "NSF/AWWA", factores: { productividad_hh_m: 3.5, costo_hh_usd: 15, factor_accesorios: 1.20 } },
        AGUA_RESIDUAL: { nombre: "Aguas Residuales", codigo: "ASTM", factores: { productividad_hh_m: 3.8, costo_hh_usd: 16, factor_accesorios: 1.22 } },
        FARMACEUTICA: { nombre: "Farmacéutica", codigo: "GMP/FDA", factores: { productividad_hh_m: 6.5, costo_hh_usd: 28, factor_accesorios: 1.50 } },
        HVAC: { nombre: "Climatización", codigo: "ASHRAE", factores: { productividad_hh_m: 3.2, costo_hh_usd: 17, factor_accesorios: 1.18 } },
        MINERIA: { nombre: "Minería", codigo: "ANSI", factores: { productividad_hh_m: 4.5, costo_hh_usd: 20, factor_accesorios: 1.30 } }
    },
    materiales: {
        CS: { nombre: "Acero Carbono", soporte_max: 3000 },
        ACERO_INOX: { nombre: "Acero Inoxidable", soporte_max: 3500 },
        PPR: { nombre: "PPR", soporte_max: 1500 },
        PVC: { nombre: "PVC", soporte_max: 1200 },
        HDPE: { nombre: "HDPE", soporte_max: 2000 }
    },
    layout: { base: { entre_tanques: 3000, h_colector: 400, h_salida_tk: 1450, h_bomba: 600 } },
    
    getConfig: function(n, sector, tipo, espec = {}) {
        let config = { dColector: 90, dBajante: 63, material: "PPR" };
        if (sector === "PETROLEO" || sector === "PETROQUIMICA") config.material = n >= 4 ? "ACERO_INOX" : "CS";
        else if (sector === "ALIMENTOS" || sector === "FARMACEUTICA") config.material = "ACERO_INOX";
        else if (sector === "AGUA_POTABLE") config.material = n >= 4 ? "HDPE" : "PPR";
        
        if (tipo === "tanque") {
            if (n >= 6) { config.dColector = 160; config.dBajante = 110; }
            else if (n >= 4) { config.dColector = 110; config.dBajante = 90; }
            else if (n >= 2) { config.dColector = 90; config.dBajante = 63; }
        }
        if (espec.colector) config.dColector = espec.colector * 25.4;
        if (espec.salida_fondo) config.dBajante = espec.salida_fondo * 25.4;
        if (espec.material) config.material = espec.material;
        return config;
    }
};

// ==================== HISTORIAL (UNDO/REDO) ====================
let history = { past: [], future: [], maxSize: 50 };
function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
    updateUndoRedoButtons();
}
function undo() {
    if (history.past.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.future.push(current);
    const previous = history.past.pop();
    db.equipos = previous.equipos;
    db.lines = previous.lines;
    render();
    notify("↩️ Deshecho");
    updateUndoRedoButtons();
}
function redo() {
    if (history.future.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos;
    db.lines = next.lines;
    render();
    notify("↪️ Rehecho");
    updateUndoRedoButtons();
}
function updateUndoRedoButtons() {
    const btnUndo = document.getElementById('btnUndo');
    const btnRedo = document.getElementById('btnRedo');
    if (btnUndo) btnUndo.disabled = history.past.length === 0;
    if (btnRedo) btnRedo.disabled = history.future.length === 0;
}

// ==================== SUGERENCIAS Y AUTOCOMPLETADO ====================
const SUGERENCIAS = [
    "crea 6 tanques en paralelo con salida de 2\" y colector de 3\"",
    "crea tanque vertical de 2400mm diametro por 2900mm altura llamado TK-01",
    "diseña estación de bombeo con 3 bombas",
    "auditar planta",
    "explicar proceso",
    "estimar recursos",
    "dime TK-01",
    "eliminar TK-01",
    "inicia recorrido",
    "conecta TK-01 con B-01 con tubo de 6 pulgadas"
];
let currentSuggestions = [];

function mostrarSugerencias(input) {
    const panel = document.getElementById('suggestionPanel');
    if (!input || input.length < 2) { panel.style.display = 'none'; return; }
    const matches = SUGERENCIAS.filter(s => s.toLowerCase().includes(input.toLowerCase())).slice(0, 5);
    if (matches.length === 0) { panel.style.display = 'none'; return; }
    panel.innerHTML = matches.map(s => `<div class="suggestion-item" onclick="aplicarSugerencia('${s.replace(/'/g, "\\'")}')">💡 ${s}</div>`).join('');
    panel.style.display = 'block';
}
function aplicarSugerencia(texto) {
    document.getElementById('commandText').value = texto;
    document.getElementById('suggestionPanel').style.display = 'none';
}

// ==================== MENSAJES DE ERROR MEJORADOS ====================
function mostrarErrorConSugerencia(comando, error) {
    const similar = SUGERENCIAS.filter(s => 
        s.toLowerCase().split(' ').some(word => comando.toLowerCase().includes(word) && word.length > 3)
    ).slice(0, 3);
    let msg = `❌ Error: ${error}`;
    if (similar.length > 0) msg += `\n💡 ¿Quizás quiso decir: ${similar[0]}?`;
    notify(msg, true);
}

// ==================== BASE DE DATOS Y ESTADO ====================
let db = { lines: [], equipos: [] };
let cam = { scale: 0.15, panX: 0, panY: 0 };
let drag = false, last = { x: 0, y: 0 };
let canvas, ctx;
let selectedEq = null, selectedLine = null, selectedComponent = null, selectedComponentLine = null;
let isDraggingEq = false, dragOffset = { x: 0, y: 0 };
let voiceEnabled = true;
let minimapEnabled = false;

// ==================== FUNCIONES DE RENDERIZADO ====================
function proj(p) {
    let c30 = 0.866, s30 = 0.5;
    return { x: (p.x - p.z) * c30 * cam.scale + cam.panX, y: (p.x + p.z) * s30 * cam.scale - p.y * cam.scale + cam.panY };
}

function getPos(line, t) {
    let pts = line.points3D;
    if (!pts || pts.length < 2) return null;
    if (t <= 0) return pts[0];
    if (t >= 1) return pts[pts.length - 1];
    let idx = Math.floor(t * (pts.length - 1));
    let seg = t * (pts.length - 1) - idx;
    let p1 = pts[idx], p2 = pts[idx + 1];
    return { x: p1.x + seg * (p2.x - p1.x), y: p1.y + seg * (p2.y - p1.y), z: p1.z + seg * (p2.z - p1.z) };
}

function getDirection(line, t) {
    let pts = line.points3D;
    if (!pts || pts.length < 2) return 0;
    let idx = Math.min(Math.floor(t * (pts.length - 1)), pts.length - 2);
    let p1 = pts[idx], p2 = pts[idx + 1];
    return Math.atan2(p2.y - p1.y, p2.x - p1.x);
}

function calcularLongitudLinea(line) {
    if (!line.points3D || line.points3D.length < 2) return 0;
    let length = 0;
    for (let i = 0; i < line.points3D.length - 1; i++) {
        const p1 = line.points3D[i], p2 = line.points3D[i + 1];
        length += Math.hypot(p2.x - p1.x, p2.y - p1.y, p2.z - p1.z);
    }
    return length;
}

function detectAndAddElbows(line) {
    let pts = line.points3D;
    if (!pts || pts.length < 3) return;
    for (let i = 1; i < pts.length - 1; i++) {
        let p1 = pts[i - 1], p2 = pts[i], p3 = pts[i + 1];
        let v1 = { x: p2.x - p1.x, y: p2.y - p1.y, z: p2.z - p1.z };
        let v2 = { x: p3.x - p2.x, y: p3.y - p2.y, z: p3.z - p2.z };
        let dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
        let m1 = Math.hypot(v1.x, v1.y, v1.z), m2 = Math.hypot(v2.x, v2.y, v2.z);
        if (m1 > 0 && m2 > 0) {
            let ang = Math.acos(Math.min(1, Math.max(-1, dot / (m1 * m2)))) * 180 / Math.PI;
            if (ang > 15 && ang < 175) {
                let param = i / (pts.length - 1), skey = ang > 80 ? 'EL90' : 'EL45';
                if (!line.components?.some(c => c.type === 'ELBOW' && Math.abs(c.param - param) < 0.05)) {
                    if (!line.components) line.components = [];
                    line.components.push({ type: 'ELBOW', tag: `EL-${line.tag}-${i}`, skey: skey, param: param, angle: ang });
                }
            }
        }
    }
}

function drawCompass() {
    let s = 70, x = canvas.width - s - 20, y = 20;
    ctx.save();
    ctx.beginPath();
    ctx.arc(x + s / 2, y + s / 2, s / 2, 0, 2 * Math.PI);
    ctx.strokeStyle = '#3a6ea5';
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + s / 2, y + 8);
    ctx.lineTo(x + s / 2 - 6, y + 22);
    ctx.lineTo(x + s / 2 + 6, y + 22);
    ctx.fillStyle = '#ff4444';
    ctx.fill();
    ctx.fillStyle = 'white';
    ctx.fillText('N', x + s / 2 - 4, y + 20);
    ctx.fillStyle = '#44ff44';
    ctx.fillText('S', x + s / 2 - 4, y + s - 8);
    ctx.fillStyle = '#4444ff';
    ctx.fillText('E', x + s - 15, y + s / 2 + 4);
    ctx.fillStyle = '#ffaa44';
    ctx.fillText('O', x + 8, y + s / 2 + 4);
    ctx.restore();
}

function drawWatermark() {
    ctx.save();
    ctx.font = '9px monospace';
    ctx.fillStyle = 'rgba(100,100,100,0.3)';
    ctx.fillText('Acquablue Corp | Ing. Osnay Romero', canvas.width - 210, canvas.height - 8);
    ctx.restore();
}

function drawElevationGuides() {
    let step = 1000;
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = '#2a4a6a';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([5, 5]);
    for (let y = 0; y < 10000; y += step) {
        let p1 = proj({ x: 0, y: y, z: 0 }), p2 = proj({ x: 10000, y: y, z: 0 });
        if (p1.x >= 0 && p1.x <= canvas.width && p2.x >= 0 && p2.x <= canvas.width) {
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            ctx.fillStyle = '#3a6ea5';
            ctx.font = '9px monospace';
            ctx.fillText(`${y / 1000}m`, p1.x + 5, p1.y - 3);
        }
    }
    ctx.setLineDash([]);
    ctx.restore();
}

function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    drawElevationGuides();
    
    for (let l of db.lines) {
        if (!l.points3D || l.points3D.length < 2) continue;
        ctx.beginPath();
        let pr = l.points3D.map(p => proj(p));
        ctx.moveTo(pr[0].x, pr[0].y);
        for (let i = 1; i < pr.length; i++) ctx.lineTo(pr[i].x, pr[i].y);
        ctx.strokeStyle = '#58a6ff';
        ctx.lineWidth = Math.max(2, (l.diameter || 6) * cam.scale / 6);
        ctx.stroke();
        
        if (l.components) {
            for (let c of l.components) {
                let pos = getPos(l, c.param);
                if (pos) {
                    let p = proj(pos);
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    let ang = getDirection(l, c.param);
                    ctx.rotate(ang);
                    ctx.beginPath();
                    if (c.type === 'VALVE') { ctx.moveTo(-8, -5); ctx.lineTo(0, 0); ctx.lineTo(8, -5); ctx.lineTo(0, 8); ctx.closePath(); ctx.fillStyle = '#ffaa33'; ctx.fill(); ctx.stroke(); }
                    else if (c.type === 'FLANGE') { ctx.rect(-6, -4, 12, 8); ctx.fillStyle = '#cccc99'; ctx.fill(); ctx.stroke(); }
                    else if (c.type === 'ELBOW') { ctx.arc(0, 0, 8, 0, Math.PI / 2); ctx.lineTo(8, 0); ctx.fillStyle = '#88aaff'; ctx.fill(); ctx.stroke(); }
                    else if (c.type === 'REDUCER') { ctx.moveTo(-8, -4); ctx.lineTo(0, -2); ctx.lineTo(0, 2); ctx.lineTo(-8, 4); ctx.closePath(); ctx.fillStyle = '#bb9966'; ctx.fill(); ctx.stroke(); }
                    if (c.skey) { ctx.font = '7px monospace'; ctx.fillStyle = 'white'; ctx.fillText(c.skey, -6, -6); }
                    ctx.restore();
                }
            }
        }
    }
    
    for (let e of db.equipos) {
        let p = proj(e);
        let d = (e.diametro || 1000) * cam.scale / 10;
        let h = (e.altura || 2000) * cam.scale / 10;
        ctx.beginPath();
        ctx.lineWidth = (selectedEq === e) ? 4 : 2;
        ctx.strokeStyle = (selectedEq === e) ? '#ffcc00' : '#58a6ff';
        switch (e.tipo) {
            case 'tanque_v':
                ctx.ellipse(p.x, p.y - h / 2, d / 2, d / 4, 0, 0, 2 * Math.PI);
                ctx.rect(p.x - d / 2, p.y - h / 2, d, h);
                ctx.ellipse(p.x, p.y + h / 2, d / 2, d / 4, 0, 0, 2 * Math.PI);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.stroke();
                break;
            case 'bomba':
                ctx.arc(p.x, p.y, 12 * cam.scale, 0, 2 * Math.PI);
                ctx.moveTo(p.x - 12 * cam.scale, p.y);
                ctx.lineTo(p.x + 12 * cam.scale, p.y);
                ctx.fillStyle = '#e67e22';
                ctx.fill();
                ctx.stroke();
                break;
            default:
                ctx.arc(p.x, p.y, 12 * cam.scale, 0, 2 * Math.PI);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.stroke();
        }
        ctx.fillStyle = 'white';
        ctx.font = `${Math.max(10, 12 * cam.scale)}px Arial`;
        ctx.fillText(e.tag, p.x + d / 2 + 5, p.y);
    }
    
    drawCompass();
    drawWatermark();
    ctx.restore();
    actualizarMinimap();
}

// ==================== MINI-MAPA ====================
function actualizarMinimap() {
    if (!minimapEnabled) return;
    const minimapCanvas = document.getElementById('minimapCanvas');
    if (!minimapCanvas) return;
    const mCtx = minimapCanvas.getContext('2d');
    const w = minimapCanvas.width, h = minimapCanvas.height;
    mCtx.fillStyle = '#0a0f1a';
    mCtx.fillRect(0, 0, w, h);
    
    // Encontrar límites
    let minX = Infinity, maxX = -Infinity, minZ = Infinity, maxZ = -Infinity;
    db.equipos.forEach(e => { minX = Math.min(minX, e.x); maxX = Math.max(maxX, e.x); minZ = Math.min(minZ, e.z); maxZ = Math.max(maxZ, e.z); });
    db.lines.forEach(l => { l.points3D?.forEach(p => { minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); minZ = Math.min(minZ, p.z); maxZ = Math.max(maxZ, p.z); }); });
    if (minX === Infinity) { minX = -5000; maxX = 5000; minZ = -5000; maxZ = 5000; }
    const rangeX = maxX - minX, rangeZ = maxZ - minZ;
    const scaleX = w / rangeX, scaleZ = h / rangeZ;
    
    db.lines.forEach(l => {
        if (!l.points3D) return;
        mCtx.beginPath();
        l.points3D.forEach((p, i) => {
            const x = (p.x - minX) * scaleX;
            const z = (p.z - minZ) * scaleZ;
            if (i === 0) mCtx.moveTo(x, z);
            else mCtx.lineTo(x, z);
        });
        mCtx.strokeStyle = '#58a6ff';
        mCtx.lineWidth = 1;
        mCtx.stroke();
    });
    
    db.equipos.forEach(e => {
        const x = (e.x - minX) * scaleX;
        const z = (e.z - minZ) * scaleZ;
        mCtx.fillStyle = '#ffaa33';
        mCtx.beginPath();
        mCtx.arc(x, z, 3, 0, 2 * Math.PI);
        mCtx.fill();
    });
}

// ==================== PÉRDIDAS DE CARGA ====================
function calcularPerdidasCarga(linea, caudal_lps = 10, fluido = "agua") {
    const L = calcularLongitudLinea(linea) / 1000; // metros
    const D = (linea.diameter || 4) * 0.0254; // metros (convertir pulgadas a metros)
    const area = Math.PI * Math.pow(D / 2, 2);
    const caudal_m3s = caudal_lps / 1000;
    const v = caudal_m3s / area;
    
    // Factor de fricción (fórmula simplificada para agua)
    let f = 0.02;
    if (fluido === "agua") f = 0.018 + (0.002 / Math.pow(D, 0.5));
    
    // Darcy-Weisbach: hf = f * (L/D) * (v²/2g)
    const g = 9.81;
    const hf = f * (L / D) * (Math.pow(v, 2) / (2 * g));
    
    return {
        perdida_metros: hf.toFixed(2),
        perdida_bar: (hf * 0.0981).toFixed(2),
        velocidad_ms: v.toFixed(2),
        caudal_lps: caudal_lps,
        longitud_m: L.toFixed(2)
    };
}

// ==================== AGENTE ESPECIALISTA ====================
const AgenteEspecialista = {
    auditarPlanta: function() {
        let alertas = [];
        notify("🔍 Iniciando auditoría técnica...");
        
        db.equipos.filter(e => e.tipo === "bomba").forEach(b => {
            const lineasConectadas = findConnectedLines(b);
            const tieneCheck = lineasConectadas.some(linea => linea.components?.some(c => c.skey === "VCHK"));
            if (!tieneCheck) alertas.push(`⚠️ BOMBA ${b.tag}: Sin válvula Check. Riesgo de golpe de ariete.`);
        });
        
        db.lines.forEach(l => {
            const diametroMM = (l.diameter || 4) * 25.4;
            if (diametroMM >= 110) {
                const longitudMM = calcularLongitudLinea(l);
                const soportesNecesarios = Math.max(1, Math.floor(longitudMM / 1500));
                const soportesActuales = l.components?.filter(c => c.type === "SOPORTE").length || 0;
                if (soportesActuales < soportesNecesarios) {
                    alertas.push(`⚠️ LÍNEA ${l.tag}: Requiere ${soportesNecesarios} soportes, tiene ${soportesActuales}.`);
                }
            }
        });
        
        if (alertas.length === 0) notify("✅ Planta validada: 100% cumplimiento.");
        else { alertas.forEach(a => notify(a, true)); notify(`⚠️ ${alertas.length} observaciones.`, true); }
        return alertas;
    },
    
    explicarProceso: function() {
        let relato = "═══════════════════════════════════════\n";
        relato += "     RECORRIDO TÉCNICO DE INSTALACIÓN\n";
        relato += "═══════════════════════════════════════\n\n";
        
        const tanques = db.equipos.filter(e => e.tipo?.includes("tanque"));
        if (tanques.length > 0) {
            relato += `🏭 ALMACENAMIENTO: ${tanques.length} tanques\n`;
            tanques.forEach(t => relato += `   • ${t.tag}: Ø${(t.diametro/1000).toFixed(1)}m x H${(t.altura/1000).toFixed(1)}m\n`);

        const valvulas = db.lines.reduce((sum, l) => sum + (l.components?.filter(c => c.type === "VALVE").length || 0), 0);

        relato += `\n📊 TOTAL: ${db.equipos.length} equipos, ${db.lines.length} líneas\n`;

// ==================== AGENTE CREADOR ====================
function extraerIntencionTecnica(comando) {
    const cmd = comando.toLowerCase();
    const intencion = {
        esTanque: false, esBomba: false,
        especificaciones: { cantidad: 1, diametro_tanque: null, altura_tanque: null, salida_fondo: null, colector: null, material: null }
    };
    
    if (cmd.includes("tanque")) intencion.esTanque = true;
    if (cmd.includes("bomba")) intencion.esBomba = true;
    
    const cantMatch = cmd.match(/(\d+|seis|siete|ocho|nueve|diez)\s+tanques?/i);
    if (cantMatch) {
        const nums = { seis: 6, siete: 7, ocho: 8, nueve: 9, diez: 10 };
        intencion.especificaciones.cantidad = nums[cantMatch[1]] || parseInt(cantMatch[1]);
    }
    
    const diamMatch = cmd.match(/diámetro\s+de\s+(\d+)\s*mm/i);
    if (diamMatch) intencion.especificaciones.diametro_tanque = parseInt(diamMatch[1]);
    
    const altMatch = cmd.match(/alto\s+de\s+(\d+)\s*mm/i);
    if (altMatch) intencion.especificaciones.altura_tanque = parseInt(altMatch[1]);
    
    const salidaMatch = cmd.match(/salida\s+de\s+fondo\s+de\s+(\d+)\s*pulgadas?/i);
    if (salidaMatch) intencion.especificaciones.salida_fondo = parseInt(salidaMatch[1]);
    
    const colectorMatch = cmd.match(/colector\s+de\s+(\d+)\s*pulgadas?/i);
    if (colectorMatch) intencion.especificaciones.colector = parseInt(colectorMatch[1]);
    
    return intencion;
}

function aplicarRutaIncremental(cmd) {
    let diamMatch = cmd.match(/(\d+)\s+pulgadas/);
    let diam = diamMatch ? parseFloat(diamMatch[1]) : 4;
    let start = db.equipos[db.equipos.length - 1] || { x: 0, y: 0, z: 0 };
    let pts = [{ ...start }], cur = { ...start };
    let moves = cmd.matchAll(/(\d+)\s+metros\s+(horizontal|vertical|fondo|sube|baja|izquierda|derecha)/g);
    for (let m of moves) {
        let d = parseInt(m[1]) * 1000;
        let dir = m[2];
        if (dir === "horizontal" || dir === "derecha") cur.x += d;
        else if (dir === "izquierda") cur.x -= d;
        else if (dir === "vertical" || dir === "sube") cur.y += d;
        else if (dir === "baja") cur.y -= d;
        else if (dir === "fondo") cur.z += d;
        pts.push({ ...cur });
    }
    if (pts.length > 1) {
        applyCommand({ type: 'line', tag: `L-${db.lines.length + 1}`, diameter: diam, material: 'CS', schedule: '40', points3D: pts, components: [] });
        return true;
    }
    return false;
}

function crearEquipoParametrico(cmd, tipo) {
    let diamMatch = cmd.match(/(\d+)\s+(?:de\s+)?diametro/);
    let altMatch = cmd.match(/(\d+)\s+(?:de\s+)?altura/);
    let diam = diamMatch ? parseInt(diamMatch[1]) : 2000;
    let alt = altMatch ? parseInt(altMatch[1]) : 2500;
    let tagMatch = cmd.match(/(?:llamado|tag)\s+(\S+)/i) || cmd.match(/\s([A-Z0-9-]+)$/i);
    let tag = tagMatch ? tagMatch[1].toUpperCase() : `${tipo.toUpperCase()}-${db.equipos.length + 1}`;
    let ref = db.equipos[db.equipos.length - 1];
    let x = ref ? ref.x + 2000 : 0;
    let y = (tipo === 'tanque_v' || tipo === 'tanque_h') ? alt / 2 : 0;
    applyCommand({ type: 'equipment', tag: tag, x: x, y: y, z: 0, tipo: tipo, diametro: diam, altura: alt });
    return true;
}

function procesarComandoComponente(cmd, raw) {
    if (cmd.includes("valvula") || cmd.includes("válvula")) {
        let tagMatch = raw.match(/(?:llamada|tag)\s+(\S+)/i) || raw.match(/\s([A-Z0-9-]+)$/i);
        let tag = tagMatch ? tagMatch[1].toUpperCase() : `V-${Math.floor(Math.random() * 1000)}`;
        let lineaMatch = raw.match(/(?:en|sobre)\s+(\S+)/i);
        let lineaTag = lineaMatch ? lineaMatch[1].toUpperCase() : null;
        let paramMatch = raw.match(/(?:posicion|posición)\s+(\d+(?:\.\d+)?)/i);
        let param = paramMatch ? parseFloat(paramMatch[1]) : 0.5;
        if (lineaTag) {
            let comp = { type: 'VALVE', tag: tag, param: param, skey: 'VBAL', material: 'CS' };
            applyCommand({ type: 'component', comp: comp, lineTag: lineaTag });
            return true;
        }
    }
    if (cmd.includes("codo")) {
        let tagMatch = raw.match(/(?:llamado|tag)\s+(\S+)/i) || raw.match(/\s([A-Z0-9-]+)$/i);
        let tag = tagMatch ? tagMatch[1].toUpperCase() : `EL-${Math.floor(Math.random() * 1000)}`;
        let lineaMatch = raw.match(/(?:en|sobre)\s+(\S+)/i);
        let lineaTag = lineaMatch ? lineaMatch[1].toUpperCase() : null;
        let paramMatch = raw.match(/(?:posicion|posición)\s+(\d+(?:\.\d+)?)/i);
        let param = paramMatch ? parseFloat(paramMatch[1]) : 0.5;
        if (lineaTag) {
            let comp = { type: 'ELBOW', tag: tag, param: param, skey: 'EL90', material: 'PPR' };
            applyCommand({ type: 'component', comp: comp, lineTag: lineaTag });
            return true;
        }
    }
    return false;
}

function parseTechnicalCommands(raw) {
    let m = raw.match(/line\s+(\S+)\s+diameter\s+(\d+(?:\.\d+)?)\s+points\s+\((-?\d+),(-?\d+),(-?\d+)\)\s+\((-?\d+),(-?\d+),(-?\d+)\)/i);
    if (m) {
        applyCommand({ type: 'line', tag: m[1], diameter: parseFloat(m[2]), material: 'CS', schedule: '40', points3D: [{ x: parseFloat(m[3]), y: parseFloat(m[4]), z: parseFloat(m[5]) }, { x: parseFloat(m[6]), y: parseFloat(m[7]), z: parseFloat(m[8]) }], components: [] });
        return;
    }
    throw new Error("Formato no reconocido");
}

// ==================== COMANDOS PRINCIPALES ====================
function parseCommands(text) {
    let lines = text.split('\n');
    for (let raw of lines) {
        let cmd = raw.trim().toLowerCase();
        if (!cmd || cmd.startsWith('//')) continue;
        
        // Guardar estado antes de ejecutar comando
        saveState();
        
        // Comandos del Agente Especialista
        if (cmd.includes("auditar") || cmd.includes("auditoria")) { AgenteEspecialista.auditarPlanta(); continue; }
        if (cmd.includes("explicar proceso") || cmd.includes("recorrido")) { AgenteEspecialista.explicarProceso(); continue; }
        
        // Comandos del Consultor de Obra
        if (cmd.includes("estimar recursos") || cmd.includes("presupuesto")) { ConsultorObra.estimarRecursos(); continue; }
        
        // Comandos de recorrido automático
        if (cmd.includes("recorrido") || cmd.includes("inspeccion")) { iniciarRecorrido(); continue; }
        
        // Componentes
        if (procesarComandoComponente(cmd, raw)) continue;
        
        // Crear equipos
        let tipo = "";
        if (cmd.includes("tanque vertical")) tipo = "tanque_v";
        else if (cmd.includes("tanque horizontal")) tipo = "tanque_h";
        else if (cmd.includes("bomba")) tipo = "bomba";
        else if (cmd.includes("intercambiador")) tipo = "intercambiador";
        else if (cmd.includes("torre")) tipo = "torre_enfriamiento";
        
        if (tipo !== "") { crearEquipoParametrico(raw, tipo); continue; }
        
        // Ruta incremental
        if (cmd.includes("camina") || cmd.includes("sube")) { if (aplicarRutaIncremental(cmd)) continue; }
        
        // Conectar equipos
        if (cmd.includes("conecta") || cmd.includes("une")) {
            let enc = db.equipos.filter(e => cmd.includes(e.tag.toLowerCase()));
            if (enc.length >= 2) {
                let e1 = enc[0], e2 = enc[1];
                let dMatch = cmd.match(/(\d+)\s+pulgadas/);
                let diam = dMatch ? parseFloat(dMatch[1]) : 4;
                let pts = [{ x: e1.x, y: e1.y, z: e1.z }, { x: e2.x, y: e1.y, z: e1.z }, { x: e2.x, y: e1.y, z: e2.z }, { x: e2.x, y: e2.y, z: e2.z }];
                applyCommand({ type: 'line', tag: `L-${e1.tag}-${e2.tag}`, diameter: diam, material: 'CS', schedule: '40', points3D: pts, components: [] });
                continue;
            }
        }
        
        // Dime detalles
        if (cmd.includes("dime") || cmd.includes("detalles")) {
            let tagMatch = raw.match(/(?:dime|detalles)\s+(\S+)/i);
            let target = tagMatch ? tagMatch[1].toUpperCase() : null;
            if (target) {
                let eq = db.equipos.find(e => e.tag === target);
                if (eq) notify(`Equipo ${eq.tag}: ${eq.tipo}, Ø${(eq.diametro / 1000).toFixed(1)}m x H${(eq.altura / 1000).toFixed(1)}m`);
                else notify(`No encontrado: ${target}`, true);
            } else {
                notify(`Resumen: ${db.equipos.length} equipos, ${db.lines.length} líneas`);
            }
            continue;
        }
        
        // Eliminar elementos
        if (cmd.includes("elimina") || cmd.includes("borra")) {
            let tagMatch = raw.match(/(?:elimina|borra)\s+(\S+)/i);
            if (tagMatch) {
                let target = tagMatch[1].toUpperCase();
                let antesEq = db.equipos.length;
                db.equipos = db.equipos.filter(e => e.tag !== target);
                db.lines = db.lines.filter(l => l.tag !== target);
                if (db.equipos.length < antesEq) notify(`Elemento ${target} eliminado`);
                else notify(`No se encontró ${target}`, true);
                render();
            }
            continue;
        }
        
        // Formato técnico
        try { parseTechnicalCommands(raw); } catch(e) { mostrarErrorConSugerencia(raw, e.message); }
    }
    render();
}

// ==================== RECORRIDO AUTOMÁTICO ====================
async function iniciarRecorrido() {
    if (db.equipos.length === 0) { notify("No hay equipos para recorrer.", true); return; }
    notify("Iniciando recorrido técnico...");
    const originalScale = cam.scale, originalPanX = cam.panX, originalPanY = cam.panY;
    for (let eq of db.equipos) {
        selectedEq = eq;
        let eqPos = proj(eq);
        cam.panX = canvas.width / 2 - eqPos.x;
        cam.panY = canvas.height / 2 - eqPos.y;
        cam.scale = 0.25;
        render();
        notify(`Inspeccionando ${eq.tag} - ${eq.tipo || 'EQUIPO'}`);
        await new Promise(resolve => setTimeout(resolve, 3000));
    }
    selectedEq = null;
    cam.scale = originalScale;
    cam.panX = originalPanX;
    cam.panY = originalPanY;
    render();
    notify("Recorrido finalizado.");
}

// ==================== FUNCIONES DE APOYO ====================
function findConnectedLines(equipo) {
    return db.lines.filter(line => {
        if (!line.points3D) return false;
        const inicio = line.points3D[0], fin = line.points3D[line.points3D.length - 1];
        return Math.hypot(inicio.x - equipo.x, inicio.y - equipo.y, inicio.z - equipo.z) < 500 ||
               Math.hypot(fin.x - equipo.x, fin.y - equipo.y, fin.z - equipo.z) < 500;
    });
}

function applyCommand(cmd) {
    if (cmd.type === 'line') { db.lines.push(cmd); detectAndAddElbows(cmd); render(); notify("Línea " + cmd.tag + " creada"); }
    else if (cmd.type === 'equipment') { db.equipos.push(cmd); render(); notify(`Equipo ${cmd.tag} creado`); }
    else if (cmd.type === 'component') {
        let line = db.lines.find(l => l.tag === cmd.lineTag);
        if (line) { if (!line.components) line.components = []; line.components.push(cmd.comp); render(); notify("Componente " + cmd.comp.tag + " agregado"); }
        else notify("Línea no encontrada", true);
    }
    guardarProyecto();
}

function notify(msg, isErr = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.display = 'block';
    n.style.backgroundColor = isErr ? '#da3633' : '#238636';
    document.getElementById('statusMsg').textContent = msg.substring(0, 80);
    if (voiceEnabled) {
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'es-ES';
            window.speechSynthesis.speak(utterance);
        }, 50);
    }
    setTimeout(() => { n.style.display = 'none'; }, 4000);
}

function mostrarReporteDetallado(texto) {
    const modal = document.createElement('div');
    modal.className = 'modal-reporte';
    modal.innerHTML = `<div class="modal-header"><strong>🔍 REPORTE TÉCNICO</strong><button class="modal-close">✖</button></div><pre style="color:#e0e0e0;margin:0;white-space:pre-wrap;">${texto}</pre>`;
    document.body.appendChild(modal);
    modal.querySelector('.modal-close').onclick = () => modal.remove();
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}

function guardarProyecto() {
    try {
        const proyecto = {
            equipos: db.equipos, lines: db.lines,
            proyecto: document.getElementById('inputProyecto').value,
            autor: document.getElementById('inputAutor').value,
            sector: document.getElementById('selectSector').value,
            fecha: new Date().toISOString()
        };
        localStorage.setItem('acquablue_proyecto', JSON.stringify(proyecto));
    } catch(e) { console.warn("Error guardando:", e); }
}

function cargarProyecto() {
    try {
        const guardado = localStorage.getItem('acquablue_proyecto');
        if (guardado) {
            const p = JSON.parse(guardado);
            db.equipos = p.equipos || [];
            db.lines = p.lines || [];
            document.getElementById('inputProyecto').value = p.proyecto || "PLANTA MARACAIBO";
            document.getElementById('inputAutor').value = p.autor || "ING. OSNAY ROMERO";
            if (p.sector) document.getElementById('selectSector').value = p.sector;
            render();
            notify("📁 Proyecto cargado");
        }
    } catch(e) { console.warn("Error cargando:", e); }
}

function resetView() { cam.scale = 0.15; cam.panX = canvas.width / 2; cam.panY = canvas.height / 2; render(); }
function nuevoProyecto() { if (confirm('¿Borrar todo?')) { db = { lines: [], equipos: [] }; selectedEq = null; render(); notify('Nuevo proyecto'); saveState(); } }

function exportToPCF() {
    const nombreProyecto = document.getElementById('inputProyecto').value;
    let pcf = `!PCF v7.2 - ACQUABLUE CORP\n!PROJECT "${nombreProyecto}"\n!UNITS MM\n`;
    for (let l of db.lines) {
        if (!l.points3D) continue;
        pcf += `PIPE\n    COMPONENT-IDENTIFIER ${l.tag}\n    DIAMETER ${(l.diameter * 25.4).toFixed(3)} MM\n`;
        l.points3D.forEach(p => pcf += `    POINT ${p.x.toFixed(3)} ${p.y.toFixed(3)} ${p.z.toFixed(3)}\n`);
        pcf += `ENDPIPE\n`;
    }
    const blob = new Blob([pcf], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${nombreProyecto.replace(/\s/g, '_')}.pcf`;
    a.click();
    URL.revokeObjectURL(a.href);
    notify("PCF exportado");
}

function importPCFFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
        const text = e.target.result;
        const lines = [];
        let curPipe = null, curPoints = [];
        text.split('\n').forEach(line => {
            const l = line.trim();
            if (l === 'PIPE') { if (curPipe) { curPipe.points3D = curPoints; lines.push(curPipe); } curPipe = { components: [], points3D: [] }; curPoints = []; }
            else if (l === 'ENDPIPE') { if (curPipe) { curPipe.points3D = curPoints; lines.push(curPipe); } curPipe = null; }
            else if (curPipe && l.startsWith('COMPONENT-IDENTIFIER')) curPipe.tag = l.split(/\s+/)[1];
            else if (curPipe && l.startsWith('DIAMETER')) curPipe.diameter = parseFloat(l.split(/\s+/)[1]) / 25.4;
            else if (curPipe && l.startsWith('POINT')) {
                const m = l.match(/POINT\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/i);
                if (m) curPoints.push({ x: parseFloat(m[1]), y: parseFloat(m[2]), z: parseFloat(m[3]) });
            }
        });
        db.lines = lines;
        render();
        notify(`PCF importado: ${lines.length} líneas`);
    };
    reader.readAsText(file);
}

function exportarMTO() {
    const data = db.lines.map(l => ({ Tag: l.tag, Diametro_pulg: l.diameter, Material: l.material || 'CS', Componentes: l.components?.length || 0 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Tuberias');
    XLSX.writeFile(wb, `MTO_${Date.now()}.xlsx`);
    notify("MTO exportado");
}

async function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    const imgData = canvas.toDataURL('image/png');
    doc.addImage(imgData, 'PNG', 10, 10, 277, 150);
    doc.setFontSize(16);
    doc.text("ACQUABLUE CORP - REPORTE", 10, 175);
    doc.text(`Proyecto: ${document.getElementById('inputProyecto').value}`, 10, 185);
    doc.text(`Autor: ${document.getElementById('inputAutor').value}`, 10, 192);
    doc.save(`Reporte_${Date.now()}.pdf`);
    notify("PDF generado");
}

// ==================== INICIALIZACIÓN ====================
function init() {
    canvas = document.getElementById('isoCanvas');
    ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 140;
        resetView();
    }
    window.addEventListener('resize', resize);
    resize();
    
    // Eventos del canvas
    canvas.addEventListener('mousedown', (e) => { drag = true; last = { x: e.clientX, y: e.clientY }; canvas.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', (e) => {
        if (drag) {
            let dx = e.clientX - last.x, dy = e.clientY - last.y;
            cam.panX += dx; cam.panY += dy;
            last = { x: e.clientX, y: e.clientY };
            render();
        }
    });
    window.addEventListener('mouseup', () => { drag = false; canvas.style.cursor = 'grab'; });
    canvas.addEventListener('wheel', (e) => { e.preventDefault(); cam.scale *= e.deltaY > 0 ? 0.9 : 1.1; cam.scale = Math.min(Math.max(0.02, cam.scale), 0.8); render(); });
    
    // Teclado - CORREGIDO: no se activa en campos de texto
    window.addEventListener('keydown', (e) => {
        const activeElement = document.activeElement;
        const isTextInput = activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA';
        if ((e.key === "Delete" || e.key === "Backspace") && !isTextInput) {
            if (selectedEq) {
                if (confirm(`¿Eliminar ${selectedEq.tag}?`)) {
                    db.equipos = db.equipos.filter(eq => eq !== selectedEq);
                    selectedEq = null;
                    render();
                    notify("Equipo eliminado");
                }
                e.preventDefault();
            }
        }
    });
    
    // Botones
    document.getElementById('btnNew').onclick = nuevoProyecto;
    document.getElementById('btnExportPCF').onclick = exportToPCF;
    document.getElementById('btnImportPCF').onclick = () => { const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.pcf'; inp.onchange = e => importPCFFile(e.target.files[0]); inp.click(); };
    document.getElementById('btnCommand').onclick = () => document.getElementById('commandPanel').style.display = 'block';
    document.getElementById('closeCommand').onclick = () => document.getElementById('commandPanel').style.display = 'none';
    document.getElementById('runCommands').onclick = () => {
        parseCommands(document.getElementById('commandText').value);
        document.getElementById('commandPanel').style.display = 'none';
        document.getElementById('commandText').value = '';
    };
    document.getElementById('btnMTO').onclick = exportarMTO;
    document.getElementById('btnPDF').onclick = exportPDF;
    document.getElementById('btnReset').onclick = resetView;
    document.getElementById('btnUndo').onclick = undo;
    document.getElementById('btnRedo').onclick = redo;
    document.getElementById('btnVoice').onclick = () => { voiceEnabled = !voiceEnabled; const btn = document.getElementById('btnVoice'); btn.textContent = voiceEnabled ? "🔊 Voz: ON" : "🔇 Voz: OFF"; btn.className = voiceEnabled ? "btn-voice-on" : "btn-voice-off"; notify(voiceEnabled ? "Voz activada" : "Voz desactivada"); };
    document.getElementById('btnProperties').onclick = () => { const p = document.getElementById('propertyPanel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; };
    document.getElementById('btnMinimap').onclick = () => { minimapEnabled = !minimapEnabled; document.getElementById('minimap').style.display = minimapEnabled ? 'block' : 'none'; actualizarMinimap(); };
    
    // Panel colapsable
    document.getElementById('projectHeader').onclick = () => { const panel = document.getElementById('projectPanel'); panel.classList.toggle('collapsed'); document.getElementById('projectToggle').textContent = panel.classList.contains('collapsed') ? '▼' : '▲'; };
    
    // Autocompletado
    const textarea = document.getElementById('commandText');
    textarea.addEventListener('input', (e) => mostrarSugerencias(e.target.value));
    textarea.addEventListener('keydown', (e) => { if (e.key === 'Tab') { e.preventDefault(); if (currentSuggestions.length) aplicarSugerencia(currentSuggestions[0]); } });
    
    // Datos de ejemplo
    db.equipos.push({ tag: 'TK-01', x: 2000, y: 1250, z: 0, tipo: 'tanque_v', diametro: 2400, altura: 2500 });
    db.lines.push({ tag: 'L-001', diameter: 4, material: 'CS', points3D: [{ x: 0, y: 0, z: 0 }, { x: 5000, y: 0, z: 0 }], components: [] });
    
    render();
    cargarProyecto();
    saveState();
    notify("SmartFlow Pro v7.2 - Listo");
}

init();
</script>
