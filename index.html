// ==================== FUNCIONES AUXILIARES ====================
function notify(msg, isErr = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.backgroundColor = isErr ? '#da3633' : '#238636';
    n.style.display = 'block';
    document.getElementById('statusMsg').innerHTML = msg;
    if (voiceEnabled && window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        setTimeout(() => window.speechSynthesis.speak(u), 50);
    }
    setTimeout(() => n.style.display = 'none', 4000);
}

function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}
function undo() {
    if (history.past.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.future.push(current);
    const prev = history.past.pop();
    db.equipos = prev.equipos;
    db.lines = prev.lines;
    selectedElement = null;
    render();
    notify("↩️ Deshecho");
}
function redo() {
    if (history.future.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos;
    db.lines = next.lines;
    selectedElement = null;
    render();
    notify("↪️ Rehecho");
}

// ==================== PROYECCIÓN ISOMÉTRICA ====================
function project(p) {
    const cos30 = Math.cos(30 * Math.PI / 180);
    const sin30 = Math.sin(30 * Math.PI / 180);
    const x = (p.x - p.z) * cos30;
    const y = (p.x + p.z) * sin30 - p.y;
    return { x: x * cam.scale + cam.panX, y: y * cam.scale + cam.panY };
}

// ==================== FUNCIONES DE CREACIÓN Y EDICIÓN ====================
function crearEquipo(tipo, tag, x, y, z, params = {}) {
    const tmpl = EquiposCatalogo[tipo];
    if (!tmpl) { notify(`Tipo desconocido: ${tipo}`, true); return null; }
    let diam = params.diametro || (tipo.includes('tanque') ? 2400 : 1000);
    let alt = params.altura || (tipo.includes('tanque') ? 2500 : 1500);
    let largo = params.largo || diam;
    let material = params.material || 'CS';
    let puertoDiams = {};
    for (let key in params) {
        if (key.startsWith('puerto_') || ['N1','N2','SUC','DESC','IN','OUT','FEED','TOP','GAS','LIQ'].includes(key)) {
            let puertoId = key.replace('puerto_', '');
            puertoDiams[puertoId] = params[key];
        }
    }
    let equipoBase = { tag, tipo, x, y, z, diametro: diam, altura: alt, largo, material, puertoDiams };
    let puertos = tmpl.puertos(equipoBase);
    const equipo = { ...equipoBase, puertos };
    db.equipos.push(equipo);
    notify(`Equipo ${tag} (${tmpl.nombre}) creado`);
    saveState();
    render();
    autoCenter();
    return equipo;
}

// ==================== NUEVO: Configuración Avanzada de Puertos ====================
function configurarPuerto(equipTag, puertoId, cambios = {}) {
    const eq = db.equipos.find(e => e.tag === equipTag);
    if (!eq) { notify(`Equipo ${equipTag} no encontrado`, true); return false; }
    const puerto = eq.puertos?.find(p => p.id === puertoId);
    if (!puerto) { notify(`Puerto ${puertoId} no encontrado`, true); return false; }

    // Aplicar cambios de dimensión, posición o dirección
    if (cambios.diametro !== undefined) puerto.diametro = cambios.diametro;
    if (cambios.pos) {
        puerto.relX = cambios.pos.x;
        puerto.relY = cambios.pos.y;
        puerto.relZ = cambios.pos.z;
    }
    if (cambios.dir) {
        let { dx, dy, dz } = cambios.dir;
        // Normalizar el vector de dirección
        const len = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if (len > 0) {
            puerto.orientacion = { dx: dx/len, dy: dy/len, dz: dz/len };
        } else {
            puerto.orientacion = { dx: 1, dy: 0, dz: 0 };
        }
    }

    actualizarTuberiasConectadas(equipTag);
    saveState();
    render();
    
    let msg = `Puerto ${puertoId} de ${equipTag} actualizado`;
    if (cambios.pos) msg += ` | Pos: (${cambios.pos.x.toFixed(0)}, ${cambios.pos.y.toFixed(0)}, ${cambios.pos.z.toFixed(0)})`;
    if (cambios.dir) msg += ` | Dir: (${puerto.orientacion.dx.toFixed(3)}, ${puerto.orientacion.dy.toFixed(3)}, ${puerto.orientacion.dz.toFixed(3)})`;
    if (cambios.diametro) msg += ` | Diam: ${cambios.diametro}"`;
    notify(msg);
    return true;
}

// Compatibilidad con versión anterior
function actualizarPuertoEquipo(equipTag, puertoId, nuevoDiametro) {
    return configurarPuerto(equipTag, puertoId, { diametro: nuevoDiametro });
}

function crearColector(tag, x, y, z, numEntradas, spacing, outputPos, diametro, material) {
    const puertos = [];
    for (let i = 0; i < numEntradas; i++) {
        puertos.push({ id: `IN${i+1}`, label: `Entrada ${i+1}`, relX: i*spacing, relY:0, relZ:0, diametro, tipoConexion:'Flange', orientacion:{dx:0, dy:-1, dz:0}, material });
    }
    let salidaRelX = outputPos==='left' ? 0 : (outputPos==='right' ? (numEntradas-1)*spacing : (numEntradas-1)*spacing/2);
    puertos.push({ 
        id:'OUT', 
        label:'Salida', 
        relX:salidaRelX, 
        relY:0, 
        relZ:0, 
        diametro, 
        tipoConexion:'Flange', 
        orientacion:{dx:1, dy:0, dz:0}, 
        material 
    });
    const colector = { tag, tipo:'colector', x, y, z, diametro, altura:0, largo: (numEntradas-1)*spacing, material, puertos };
    db.equipos.push(colector);
    notify(`Colector ${tag} creado con ${numEntradas} entradas y salida ${outputPos}`);
    render();
    autoCenter();
    return colector;
}

// ==================== FUNCIONES DE PUERTOS Y ENRUTAMIENTO ====================
function obtenerPosicionPuerto(equipTag, nozzleId) {
    const eq = db.equipos.find(e => e.tag === equipTag);
    if (!eq) return null;
    const nz = eq.puertos?.find(n => n.id === nozzleId);
    if (!nz) return null;
    return { x: eq.x + nz.relX, y: eq.y + nz.relY, z: eq.z + nz.relZ };
}

function obtenerDireccionSalida(nozzle) {
    if (nozzle?.orientacion) {
        const { dx, dy, dz } = nozzle.orientacion;
        return { dx, dy, dz };
    }
    return { dx: 1, dy: 0, dz: 0 };
}

// ==================== NUEVO: Enrutamiento con Curvas Bézier ====================
function esDireccionOrtogonal(dir) {
    // Una dirección es ortogonal si solo un componente es ±1 y los otros 0
    const comps = [Math.abs(dir.dx), Math.abs(dir.dy), Math.abs(dir.dz)];
    const unos = comps.filter(c => Math.abs(c - 1) < 0.001).length;
    const ceros = comps.filter(c => Math.abs(c) < 0.001).length;
    return unos === 1 && ceros === 2;
}

function calcularRutaOrtogonalConRespeto(p1, p2, nozzleStart, nozzleEnd, offsetSalida = 400) {
    let puntos = [{ ...p1 }];
    
    // Gestión de salida con posible curva
    if (nozzleStart) {
        const dir = obtenerDireccionSalida(nozzleStart);
        const cp = { 
            x: p1.x + dir.dx * offsetSalida, 
            y: p1.y + dir.dy * offsetSalida, 
            z: p1.z + dir.dz * offsetSalida 
        };
        
        // Si la dirección no es puramente ortogonal, marcamos como punto de control para curva Bézier
        const esOblicuo = !esDireccionOrtogonal(dir);
        
        if (esOblicuo) {
            puntos.push({ ...cp, isControlPoint: true });
        } else {
            puntos.push(cp);
        }
    }
    
    let cur = puntos[puntos.length-1];
    
    // Puntos intermedios para ruta ortogonal
    if (Math.abs(cur.y - p2.y) > 1) {
        const p = { x: cur.x, y: p2.y, z: cur.z };
        if (p.x !== cur.x || p.y !== cur.y || p.z !== cur.z) puntos.push(p);
        cur = p;
    }
    if (Math.abs(cur.x - p2.x) > 1) {
        const p = { x: p2.x, y: cur.y, z: cur.z };
        if (p.x !== cur.x || p.y !== cur.y || p.z !== cur.z) puntos.push(p);
        cur = p;
    }
    if (Math.abs(cur.z - p2.z) > 1) {
        const p = { x: cur.x, y: cur.y, z: p2.z };
        if (p.x !== cur.x || p.y !== cur.y || p.z !== cur.z) puntos.push(p);
    }
    
    // Gestión de llegada con posible curva
    if (nozzleEnd) {
        const dirEnd = obtenerDireccionSalida(nozzleEnd);
        const llegada = { 
            x: p2.x - dirEnd.dx * offsetSalida, 
            y: p2.y - dirEnd.dy * offsetSalida, 
            z: p2.z - dirEnd.dz * offsetSalida 
        };
        
        const esOblicuoEnd = !esDireccionOrtogonal(dirEnd);
        
        if (esOblicuoEnd) {
            // Insertar como punto de control antes del último punto
            const lastIdx = puntos.length - 1;
            puntos.splice(lastIdx, 0, { ...llegada, isControlPoint: true });
        } else {
            // Verificar si ya existe un punto similar
            const last = puntos[puntos.length-1];
            if (Math.abs(last.x - llegada.x) > 1 || Math.abs(last.y - llegada.y) > 1 || Math.abs(last.z - llegada.z) > 1) {
                puntos.push(llegada);
            }
        }
    }
    
    // Añadir punto final
    if (nozzleEnd) {
        const last = puntos[puntos.length-1];
        if (Math.abs(last.x - p2.x) > 1 || Math.abs(last.y - p2.y) > 1 || Math.abs(last.z - p2.z) > 1) {
            puntos.push({ ...p2 });
        }
    } else {
        puntos.push({ ...p2 });
    }
    
    // Limpiar puntos duplicados
    const clean = [];
    for (let i = 0; i < puntos.length; i++) {
        if (i === 0) {
            clean.push(puntos[i]);
        } else {
            const prev = clean[clean.length-1];
            const curr = puntos[i];
            // Mantener puntos de control aunque estén cerca
            if (curr.isControlPoint || 
                Math.abs(prev.x - curr.x) > 1 || 
                Math.abs(prev.y - curr.y) > 1 || 
                Math.abs(prev.z - curr.z) > 1) {
                clean.push(curr);
            }
        }
    }
    
    return clean;
}

function actualizarTuberiasConectadas(equipTag) {
    db.lines.forEach(line => {
        if (line.anchors && (line.anchors.start.equipTag === equipTag || line.anchors.end.equipTag === equipTag)) {
            const p1 = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
            const p2 = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
            if (p1 && p2) {
                const eqStart = db.equipos.find(e => e.tag === line.anchors.start.equipTag);
                const nozzleStart = eqStart?.puertos?.find(n => n.id === line.anchors.start.nozzleId);
                const eqEnd = db.equipos.find(e => e.tag === line.anchors.end.equipTag);
                const nozzleEnd = eqEnd?.puertos?.find(n => n.id === line.anchors.end.nozzleId);
                let puntos;
                if (line.waypoints && line.waypoints.length > 0) {
                    puntos = [p1, ...line.waypoints, p2];
                } else {
                    puntos = calcularRutaOrtogonalConRespeto(p1, p2, nozzleStart, nozzleEnd, 400);
                }
                line._cachedPoints = puntos;
                // Contar codos (puntos que no son de control)
                line.codos = puntos.filter(p => !p.isControlPoint).length - 2;
            }
        }
    });
    checkCollisions();
}

function recalcularTodo() {
    db.lines.forEach(line => {
        if (line.anchors) {
            const p1 = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
            const p2 = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
            if (p1 && p2) {
                const eqStart = db.equipos.find(e => e.tag === line.anchors.start.equipTag);
                const nozzleStart = eqStart?.puertos?.find(n => n.id === line.anchors.start.nozzleId);
                const eqEnd = db.equipos.find(e => e.tag === line.anchors.end.equipTag);
                const nozzleEnd = eqEnd?.puertos?.find(n => n.id === line.anchors.end.nozzleId);
                let puntos;
                if (line.waypoints && line.waypoints.length > 0) {
                    puntos = [p1, ...line.waypoints, p2];
                } else {
                    puntos = calcularRutaOrtogonalConRespeto(p1, p2, nozzleStart, nozzleEnd, 400);
                }
                line._cachedPoints = puntos;
                line.codos = puntos.filter(p => !p.isControlPoint).length - 2;
            }
        }
    });
    checkCollisions();
    render();
}

function pointInBox(p, box) {
    return p.x >= box.xMin && p.x <= box.xMax && p.y >= box.yMin && p.y <= box.yMax && p.z >= box.zMin && p.z <= box.zMax;
}

function segmentIntersectsBox(p1, p2, box) {
    if (pointInBox(p1, box) || pointInBox(p2, box)) return true;
    return false;
}

function checkCollisions() {
    db.lines.forEach(line => {
        line.hasClash = false;
        const points = line._cachedPoints || line.points3D;
        if (!points || points.length < 2) return;
        db.equipos.forEach(eq => {
            if (line.anchors && (line.anchors.start.equipTag === eq.tag || line.anchors.end.equipTag === eq.tag)) return;
            const halfDiam = eq.diametro / 2;
            const halfAlt = eq.altura / 2;
            const box = {
                xMin: eq.x - halfDiam, xMax: eq.x + halfDiam,
                yMin: eq.y - halfAlt,  yMax: eq.y + halfAlt,
                zMin: eq.z - halfDiam, zMax: eq.z + halfDiam
            };
            for (let i = 0; i < points.length - 1; i++) {
                if (segmentIntersectsBox(points[i], points[i+1], box)) {
                    line.hasClash = true;
                    break;
                }
            }
        });
    });
}

// ==================== FUNCIONES DE DIBUJO ====================
function drawGrid(elevation = 0) {
    const step = 1000;
    const minX = -8000, maxX = 20000, minZ = -8000, maxZ = 15000;
    ctx.beginPath();
    ctx.strokeStyle = (elevation === currentElevation) ? '#4ade80' : '#1e293b';
    ctx.lineWidth = 1;
    for (let x = minX; x <= maxX; x += step) {
        const p1 = project({ x, y: elevation, z: minZ });
        const p2 = project({ x, y: elevation, z: maxZ });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
    }
    for (let z = minZ; z <= maxZ; z += step) {
        const p1 = project({ x: minX, y: elevation, z });
        const p2 = project({ x: maxX, y: elevation, z });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
}

function drawOrigin() {
    const o = project({ x: 0, y: currentElevation, z: 0 });
    ctx.beginPath();
    ctx.moveTo(o.x - 20, o.y);
    ctx.lineTo(o.x + 20, o.y);
    ctx.moveTo(o.x, o.y - 20);
    ctx.lineTo(o.x, o.y + 20);
    ctx.strokeStyle = '#ff8888';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ff8888';
    ctx.font = '14px monospace';
    ctx.fillText(`ORIGEN (0,${currentElevation/1000}m,0)`, o.x + 15, o.y - 8);
}

function drawTank(eq) {
    const p = project(eq);
    const w = (eq.diametro / 2) * cam.scale;
    const h = eq.altura * cam.scale;
    const topY = p.y - h/2;
    const bottomY = p.y + h/2;
    
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(p.x - w, topY, w, h);
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(p.x, topY, w, h);
    
    ctx.beginPath(); 
    ctx.ellipse(p.x, topY, w, w*0.5, 0, 0, 2*Math.PI); 
    ctx.fillStyle = '#60a5fa'; 
    ctx.fill(); 
    ctx.strokeStyle = '#fff';
    ctx.stroke();
    
    ctx.beginPath(); 
    ctx.ellipse(p.x, bottomY, w, w*0.5, 0, 0, 2*Math.PI); 
    ctx.fillStyle = '#2563eb'; 
    ctx.fill(); 
    ctx.stroke();
    
    ctx.fillStyle = 'white'; 
    ctx.font = `bold ${Math.max(12, 14*cam.scale)}px Arial`; 
    ctx.fillText(eq.tag, p.x-18, topY-10);
    
    if(eq.puertos) eq.puertos.forEach(nz => {
        const pos = { x: eq.x + nz.relX, y: eq.y + nz.relY, z: eq.z + nz.relZ };
        const proj = project(pos);
        
        // Dibujar dirección del puerto (flecha)
        if (nz.orientacion) {
            const dir = nz.orientacion;
            const endPos = {
                x: pos.x + dir.dx * 300,
                y: pos.y + dir.dy * 300,
                z: pos.z + dir.dz * 300
            };
            const projEnd = project(endPos);
            ctx.beginPath();
            ctx.moveTo(proj.x, proj.y);
            ctx.lineTo(projEnd.x, projEnd.y);
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Cabeza de flecha
            const angle = Math.atan2(projEnd.y - proj.y, projEnd.x - proj.x);
            const arrowSize = 10;
            ctx.beginPath();
            ctx.moveTo(projEnd.x, projEnd.y);
            ctx.lineTo(projEnd.x - arrowSize * Math.cos(angle - 0.5), projEnd.y - arrowSize * Math.sin(angle - 0.5));
            ctx.lineTo(projEnd.x - arrowSize * Math.cos(angle + 0.5), projEnd.y - arrowSize * Math.sin(angle + 0.5));
            ctx.closePath();
            ctx.fillStyle = '#ffaa00';
            ctx.fill();
        }
        
        ctx.beginPath(); 
        ctx.arc(proj.x, proj.y, 6, 0, 2*Math.PI); 
        ctx.fillStyle = '#ff8800'; 
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = 'white'; 
        ctx.font = '9px monospace'; 
        ctx.fillText(`${nz.id} ${nz.diametro}"`, proj.x-12, proj.y-6);
    });
}

// ==================== NUEVO: Dibujo de Tuberías con Curvas Bézier ====================
function drawPipeWithElbows(line) {
    const pts = line._cachedPoints || line.points3D;
    if (!pts || pts.length < 2) return;
    
    ctx.beginPath();
    let start = project(pts[0]);
    ctx.moveTo(start.x, start.y);
    
    for (let i = 1; i < pts.length; i++) {
        const p = pts[i];
        if (p.isControlPoint && i + 1 < pts.length) {
            const cp = project(p);
            const nextP = project(pts[i + 1]);
            ctx.quadraticCurveTo(cp.x, cp.y, nextP.x, nextP.y);
            i++; // Saltamos el punto final de la curva ya procesado
        } else {
            const proj = project(p);
            ctx.lineTo(proj.x, proj.y);
        }
    }
    
    if(line.hasClash) { 
        ctx.strokeStyle = '#ff0000'; 
        ctx.lineWidth = Math.max(6, (line.diameter || 4) * cam.scale * 1.5); 
        if(!line._notifiedClash) { 
            notify(`⚠️ COLISIÓN: ${line.tag} interfiere`, true); 
            line._notifiedClash = true; 
        } 
    } else { 
        ctx.strokeStyle = '#facc15'; 
        ctx.lineWidth = Math.max(4, (line.diameter || 4) * cam.scale); 
        if(line._notifiedClash) line._notifiedClash = false; 
    }
    ctx.stroke();
}

function drawPipeComponents(line) {
    const pts = line._cachedPoints || line.points3D;
    if (!pts || pts.length < 2 || !line.components) return;
    let lengths = [], totalLen = 0;
    for (let i = 0; i < pts.length - 1; i++) {
        let d = Math.hypot(pts[i+1].x - pts[i].x, pts[i+1].y - pts[i].y, pts[i+1].z - pts[i].z);
        lengths.push(d); 
        totalLen += d;
    }
    if (totalLen === 0) return;
    line.components.forEach(comp => {
        let targetLen = totalLen * Math.min(1, Math.max(0, comp.param));
        let currentAccum = 0, p1, p2, t = 0;
        for (let i = 0; i < lengths.length; i++) {
            if (currentAccum + lengths[i] >= targetLen || i === lengths.length - 1) {
                p1 = pts[i]; 
                p2 = pts[i+1];
                let segLen = lengths[i];
                if (segLen > 0) t = (targetLen - currentAccum) / segLen;
                else t = 0;
                t = Math.min(1, Math.max(0, t));
                break;
            }
            currentAccum += lengths[i];
        }
        if (!p1 || !p2) return;
        const pos3D = { x: p1.x + (p2.x - p1.x) * t, y: p1.y + (p2.y - p1.y) * t, z: p1.z + (p2.z - p1.z) * t };
        const proj = project(pos3D);
        const projP1 = project(p1), projP2 = project(p2);
        const angle = Math.atan2(projP2.y - projP1.y, projP2.x - projP1.x);
        drawSymbol(proj.x, proj.y, angle, comp);
    });
}

function drawSymbol(x, y, angle, comp) {
    ctx.save(); 
    ctx.translate(x, y); 
    ctx.rotate(angle); 
    ctx.strokeStyle = '#fff'; 
    ctx.lineWidth = 2; 
    ctx.fillStyle = '#1e1e2e'; 
    const s = 8;
    switch (comp.type) {
        case 'VALVE': 
            ctx.beginPath(); 
            ctx.moveTo(-s,-s); 
            ctx.lineTo(s,s); 
            ctx.lineTo(s,-s); 
            ctx.lineTo(-s,s); 
            ctx.closePath(); 
            ctx.fill(); 
            ctx.stroke();
            if (comp.subtype === 'bola') { 
                ctx.beginPath(); 
                ctx.arc(0,0,3,0,2*Math.PI); 
                ctx.fillStyle='#fff'; 
                ctx.fill(); 
                ctx.stroke(); 
            } else if (comp.subtype === 'check') { 
                ctx.beginPath(); 
                ctx.moveTo(-2,-s); 
                ctx.lineTo(2,0); 
                ctx.lineTo(-2,s); 
                ctx.stroke(); 
            } else if (comp.subtype === 'compuerta') { 
                ctx.fillRect(-2,-s,4,s*2); 
            } 
            break;
        case 'FLANGE': 
            ctx.beginPath(); 
            ctx.moveTo(-2,-s); 
            ctx.lineTo(-2,s); 
            ctx.moveTo(2,-s); 
            ctx.lineTo(2,s); 
            ctx.stroke(); 
            break;
        case 'INSTRUMENT': 
            ctx.beginPath(); 
            ctx.arc(0,-s*2,s,0,2*Math.PI); 
            ctx.fill(); 
            ctx.stroke(); 
            ctx.beginPath(); 
            ctx.moveTo(0,0); 
            ctx.lineTo(0,-s); 
            ctx.stroke(); 
            break;
        case 'REDUCER': 
            ctx.beginPath(); 
            ctx.moveTo(-s,-s); 
            ctx.lineTo(s,-s/2); 
            ctx.lineTo(s,s/2); 
            ctx.lineTo(-s,s); 
            ctx.closePath(); 
            ctx.fill(); 
            ctx.stroke(); 
            break;
        case 'ELBOW':
            ctx.beginPath();
            ctx.arc(0, 0, s, 0, Math.PI/2);
            ctx.stroke();
            break;
        default: 
            ctx.fillRect(-4,-4,8,8); 
            ctx.strokeRect(-4,-4,8,8);
    }
    ctx.restore();
}

function render() {
    if(!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    
    drawGrid(currentElevation);
    drawOrigin();
    
    for(let line of db.lines) { 
        drawPipeWithElbows(line); 
        drawPipeComponents(line); 
    }
    
    for(let eq of db.equipos) {
        if(eq.tipo === 'tanque_v' || eq.tipo === 'torre' || eq.tipo === 'reactor' || eq.tipo === 'separador' || 
           eq.tipo === 'clarificador' || eq.tipo === 'filtro_arena' || eq.tipo === 'tanque_acero') {
            drawTank(eq);
        } else if(eq.tipo === 'tanque_h') {
            drawCilindroHorizontal(eq, '#3b82f6');
        } else if(eq.tipo === 'bomba' || eq.tipo === 'bomba_sumergible') {
            drawBomba(eq);
        } else if(eq.tipo === 'colector') {
            drawColector(eq);
        } else if(eq.tipo === 'intercambiador' || eq.tipo === 'caldera' || eq.tipo === 'compresor' ||
                  eq.tipo === 'osmosis' || eq.tipo === 'pasteurizador' || eq.tipo === 'homogeneizador' ||
                  eq.tipo === 'bomba_dosificacion') {
            drawRectEquip(eq, '#3b82f6');
        } else {
            drawRectEquip(eq, '#3b82f6');
        }
    }
    
    if(selectedElement) {
        if(selectedElement.type === 'equipment') {
            const eq = selectedElement.obj;
            if(eq.tipo === 'colector') {
                const ancho = eq.largo, pIzq = project({x: eq.x, y: eq.y, z: eq.z}), pDer = project({x: eq.x+ancho, y: eq.y, z: eq.z});
                ctx.beginPath(); 
                ctx.moveTo(pIzq.x, pIzq.y); 
                ctx.lineTo(pDer.x, pDer.y); 
                ctx.strokeStyle = '#facc15'; 
                ctx.lineWidth = 6; 
                ctx.stroke();
            } else {
                const p = project(eq), w = (eq.diametro/2) * cam.scale, h = eq.altura * cam.scale;
                ctx.beginPath(); 
                ctx.ellipse(p.x, p.y-h/2, w+3, (w+3)*0.5, 0, 0, 2*Math.PI); 
                ctx.strokeStyle = '#facc15'; 
                ctx.lineWidth = 3; 
                ctx.stroke();
            }
        } else if(selectedElement.type === 'line') {
            const line = selectedElement.obj, pts = line._cachedPoints || line.points3D;
            if(pts && pts.length) { 
                ctx.beginPath(); 
                const proj = pts.map(p => project(p)); 
                ctx.moveTo(proj[0].x, proj[0].y); 
                for(let i=1; i<proj.length; i++) ctx.lineTo(proj[i].x, proj[i].y); 
                ctx.strokeStyle = '#facc15'; 
                ctx.lineWidth = 6; 
                ctx.stroke(); 
            }
        }
    }
    ctx.restore();
}

// ==================== COMANDOS ====================
function parseCreate(cmd) {
    const parts = cmd.split(/\s+/);
    if (parts[0] !== 'create') return false;
    const tipo = parts[1];
    const tag = parts[2];
    if (parts[3] !== 'at') return false;
    const coords = parts[4].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
    if (!coords) return false;
    const x = parseFloat(coords[1]), y = parseFloat(coords[2]), z = parseFloat(coords[3]);
    let params = {};
    for (let i = 5; i < parts.length; i++) {
        let key = parts[i];
        if (key === 'diam') params.diametro = parseFloat(parts[++i]) * 1000;
        else if (key === 'height') params.altura = parseFloat(parts[++i]) * 1000;
        else if (key === 'largo') params.largo = parseFloat(parts[++i]) * 1000;
        else if (key === 'material') params.material = parts[++i].toUpperCase();
        else if (key.includes('=')) {
            let [k, v] = key.split('=');
            params[k] = parseFloat(v);
        }
    }
    if (EquiposCatalogo[tipo]) crearEquipo(tipo, tag, x, y, z, params);
    else notify(`Tipo de equipo desconocido: ${tipo}`, true);
    return true;
}

function parseConnect(cmd) {
    const parts = cmd.split(/\s+/);
    if (parts[0] !== 'connect') return false;
    const fromEquip = parts[1], fromNozzle = parts[2];
    if (parts[3] !== 'to') return false;
    const toEquip = parts[4], toNozzle = parts[5];
    let diameter = 4, material = 'PPR';
    for (let i = 6; i < parts.length; i++) {
        if (parts[i] === 'diameter') diameter = parseFloat(parts[++i]);
        else if (parts[i] === 'material') material = parts[++i].toUpperCase();
    }
    const eqFrom = db.equipos.find(e => e.tag === fromEquip);
    const eqTo = db.equipos.find(e => e.tag === toEquip);
    if (!eqFrom || !eqTo) { notify("Equipo no encontrado", true); return true; }
    const nzFrom = eqFrom.puertos?.find(n => n.id === fromNozzle);
    const nzTo = eqTo.puertos?.find(n => n.id === toNozzle);
    if (!nzFrom || !nzTo) { notify("Puerto no encontrado", true); return true; }
    if (nzFrom.diametro !== nzTo.diametro && diameter !== nzFrom.diametro) {
        notify(`Diámetros incompatibles: ${nzFrom.diametro}" vs ${nzTo.diametro}"`, true);
        return true;
    }
    const tag = `L-${db.lines.length+1}`;
    db.lines.push({ tag, diameter, material, anchors: { start: { equipTag: fromEquip, nozzleId: fromNozzle }, end: { equipTag: toEquip, nozzleId: toNozzle } }, waypoints: [], _cachedPoints: null });
    actualizarTuberiasConectadas(fromEquip);
    actualizarTuberiasConectadas(toEquip);
    saveState(); 
    render();
    notify(`Conectado ${fromEquip}.${fromNozzle} con ${toEquip}.${toNozzle} (${tag})`);
    return true;
}

function parseCreateManifold(cmd) {
    const parts = cmd.split(/\s+/);
    if (parts[0] !== 'create' || parts[1] !== 'manifold') return false;
    let idx = 2;
    const tag = parts[idx++];
    if (parts[idx] !== 'at') return false;
    idx++;
    const coords = parts[idx++].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
    if (!coords) return false;
    const x = parseFloat(coords[1]), y = parseFloat(coords[2]), z = parseFloat(coords[3]);
    let numEntradas = 2, spacing = 3000, outputPos = 'center', diametro = 4, material = 'PPR';
    while (idx < parts.length) {
        const key = parts[idx++].toLowerCase();
        if (key === 'entries') numEntradas = parseInt(parts[idx++]);
        else if (key === 'spacing') spacing = parseFloat(parts[idx++]);
        else if (key === 'output') outputPos = parts[idx++].toLowerCase();
        else if (key === 'diameter') diametro = parseFloat(parts[idx++]);
        else if (key === 'material') material = parts[idx++].toUpperCase();
    }
    crearColector(tag, x, y, z, numEntradas, spacing, outputPos, diametro, material);
    return true;
}

// ==================== NUEVO: Parser Extendido para pos y dir ====================
function parseEditCommand(cmd) {
    const parts = cmd.split(/\s+/);
    if (parts[0] !== 'edit') return false;
    if (parts[1] === 'equipment') {
        const tag = parts[2];
        const action = parts[3];
        if (action === 'move') {
            const coords = parts[4] === 'to' ? parts[5] : parts[4];
            const m = coords.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
            if (m) {
                const eq = db.equipos.find(e => e.tag === tag);
                if (!eq) { notify(`Equipo ${tag} no encontrado`, true); return true; }
                eq.x = parseFloat(m[1]); eq.y = parseFloat(m[2]); eq.z = parseFloat(m[3]);
                actualizarTuberiasConectadas(tag);
                saveState(); 
                render();
                notify(`Equipo ${tag} movido a (${eq.x},${eq.y},${eq.z})`);
                return true;
            }
        } else if (action === 'set' && parts[4] === 'puerto') {
            const puertoId = parts[5];
            const subParam = parts[6]; // 'diam', 'pos' o 'dir'
            const valor = parts[7];
            
            if (subParam === 'diam') {
                const nuevoDiam = parseFloat(valor);
                if (!isNaN(nuevoDiam)) {
                    configurarPuerto(tag, puertoId, { diametro: nuevoDiam });
                    return true;
                }
            } 
            else if (subParam === 'pos' || subParam === 'dir') {
                // Buscar coordenadas en el resto del comando
                let coordStr = '';
                for (let i = 7; i < parts.length; i++) {
                    coordStr += parts[i];
                }
                const m = coordStr.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
                if (m) {
                    const x = parseFloat(m[1]), y = parseFloat(m[2]), z = parseFloat(m[3]);
                    
                    if (subParam === 'pos') {
                        configurarPuerto(tag, puertoId, { pos: { x, y, z } });
                    } else {
                        configurarPuerto(tag, puertoId, { dir: { dx: x, dy: y, dz: z } });
                    }
                    return true;
                }
            }
            notify(`Formato: edit equipment TAG set puerto ID pos (x,y,z) o dir (dx,dy,dz) o diam N`, true);
            return true;
        }
    } else if (parts[1] === 'line') {
        const tag = parts[2];
        const line = db.lines.find(l => l.tag === tag);
        if (!line) { notify(`Línea ${tag} no encontrada`, true); return true; }
        const action = parts[3];
        if (action === 'add' && parts[4] === 'waypoint') {
            let coordStr = '';
            for (let i = 5; i < parts.length; i++) {
                coordStr += parts[i];
            }
            const m = coordStr.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
            if (m) {
                const wp = { x: parseFloat(m[1]), y: parseFloat(m[2]), z: parseFloat(m[3]) };
                let after = null;
                const afterIdx = parts.indexOf('after');
                if (afterIdx !== -1) after = parseInt(parts[afterIdx + 1]);
                if (!line.waypoints) line.waypoints = [];
                if (after !== null && !isNaN(after) && after >= 0 && after < line.waypoints.length) {
                    line.waypoints.splice(after + 1, 0, wp);
                } else {
                    line.waypoints.push(wp);
                }
                actualizarTuberiasConectadas(line.anchors.start.equipTag);
                saveState(); 
                render(); 
                notify(`Waypoint añadido a ${tag}`); 
                return true;
            }
        } else if (action === 'remove' && parts[4] === 'waypoint') {
            const idx = parseInt(parts[5]) - 1;
            if (line.waypoints && idx >= 0 && idx < line.waypoints.length) {
                line.waypoints.splice(idx, 1);
                actualizarTuberiasConectadas(line.anchors.start.equipTag);
                saveState(); 
                render(); 
                notify(`Waypoint eliminado de ${tag}`); 
                return true;
            }
        }
    }
    return false;
}

function exportarMTO() {

function autoCenter() {
    if (!canvas) return;
    let points = [];
    db.equipos.forEach(eq => points.push({ x: eq.x, y: eq.y, z: eq.z }));
    db.lines.forEach(line => { if (line._cachedPoints) points.push(...line._cachedPoints); });
    if (points.length === 0) points = [{ x: -2000, y: 0, z: -2000 }, { x: 2000, y: 2000, z: 2000 }];
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    points.forEach(p => { 
        const rx = (p.x - p.z) * 0.866, ry = (p.x + p.z) * 0.5 - p.y; 
        if (rx < minX) minX = rx; 
        if (rx > maxX) maxX = rx; 
        if (ry < minY) minY = ry; 
        if (ry > maxY) maxY = ry; 
    });
    const mx = (maxX - minX) * 0.15, my = (maxY - minY) * 0.15;
    minX -= mx; maxX += mx; minY -= my; maxY += my;
    const worldW = maxX - minX, worldH = maxY - minY;
    const padding = Math.min(Math.max(canvas.width * 0.1, 20), 80);
    let sc = Math.min((canvas.width - padding) / worldW, (canvas.height - padding) / worldH, 0.6, 0.12);
    cam.scale = sc;
    cam.panX = canvas.width / 2 - ((minX + maxX) / 2) * sc;
    cam.panY = canvas.height / 2 - ((minY + maxY) / 2) * sc;
    render();
}

// ==================== PANEL FLOTANTE DE CATÁLOGO ====================
function buildCatalogPanel() {
    const categorias = {
        'petrolera': ['tanque_v', 'tanque_h', 'bomba', 'intercambiador', 'torre', 'reactor', 'caldera', 'compresor', 'separador'],
        'agua': ['clarificador', 'filtro_arena', 'osmosis', 'bomba_sumergible'],
        'alimentos': ['tanque_acero', 'pasteurizador', 'homogeneizador'],
        'quimica': ['reactor', 'bomba_dosificacion'],
        'otros': ['colector']
    };
    let html = '';
    for (let [cat, tipos] of Object.entries(categorias)) {
        let titulo = cat === 'petrolera' ? '🛢️ Petrolera/Petroquímica' : 
                    (cat === 'agua' ? '💧 Tratamiento de Agua' : 
                    (cat === 'alimentos' ? '🍎 Alimentos' : 
                    (cat === 'quimica' ? '🧪 Industria Química' : '📌 Otros')));
        html += `<div class="catalog-category"><h4>${titulo}</h4><div class="catalog-buttons">`;
        for (let tipo of tipos) {
            const nombre = EquiposCatalogo[tipo]?.nombre || tipo;
            html += `<button onclick="crearEquipoDesdePanel('${tipo}')">${nombre}</button>`;
        }
        html += `</div></div>`;
    }
    html += `<div class="catalog-category"><h4>🔧 Válvulas y Accesorios</h4><div class="catalog-buttons">
        <button onclick="crearComponente('VALVE','bola')">Válvula Bola</button>
        <button onclick="crearComponente('VALVE','compuerta')">Válvula Compuerta</button>
        <button onclick="crearComponente('VALVE','mariposa')">Válvula Mariposa</button>
        <button onclick="crearComponente('VALVE','check')">Válvula Check</button>
        <button onclick="crearComponente('ELBOW')">Codo 90°</button>
        <button onclick="crearComponente('FLANGE')">Brida</button>
        <button onclick="crearComponente('REDUCER')">Reductor</button>
        <button onclick="crearComponente('INSTRUMENT','presostato')">Presostato</button>
        <button onclick="crearComponente('INSTRUMENT','termometro')">Termómetro</button>
        <button onclick="crearComponente('INSTRUMENT','caudalimetro')">Caudalímetro</button>
        <button onclick="crearComponente('SOPORTE')">Soporte</button>
    </div></div>`;
    document.getElementById('catalogContent').innerHTML = html;
}

function crearEquipoDesdePanel(tipo) {
    let tag = `${tipo.toUpperCase()}-${db.equipos.filter(e => e.tipo === tipo).length+1}`;
    let x = 0, z = 0;
    const ult = db.equipos[db.equipos.length-1];
    if (ult) { x = ult.x + 3000; z = ult.z; }
    let y = 1250, params = {};
    if (tipo === 'tanque_v') { params.diametro = 2400; params.altura = 2500; y = 1250; }
    else if (tipo === 'tanque_h') { params.diametro = 2000; params.altura = 2000; params.largo = 4000; y = 1000; }
    else if (tipo === 'bomba') { params.diametro = 800; params.altura = 800; y = 800; }
    else if (tipo === 'torre') { params.diametro = 3000; params.altura = 6000; y = 3000; }
    else if (tipo === 'reactor') { params.diametro = 2500; params.altura = 4000; y = 2000; }
    else if (tipo === 'intercambiador') { params.diametro = 1500; params.altura = 2000; params.largo = 4000; y = 1000; }
    else if (tipo === 'bomba_dosificacion') { params.diametro = 500; params.altura = 600; y = 600; }
    else if (tipo === 'bomba_sumergible') { params.diametro = 600; params.altura = 800; y = 400; }
    else if (tipo === 'colector') { crearColector(tag, x, y, 2000, 4, 3000, 'center', 4, 'PPR'); return; }
    else { params.diametro = 2000; params.altura = 3000; params.largo = 4000; y = 1500; }
    crearEquipo(tipo, tag, x, y, z, params);
}

function crearComponente(tipo, subtipo = null) {
    if (!selectedElement || selectedElement.type !== 'line') { 
        notify("Selecciona una tubería primero", true); 
        return; 
    }
    const line = selectedElement.obj;
    const tag = `${tipo}-${Date.now().toString().slice(-6)}`;
    const param = parseFloat(prompt("Posición en la tubería (0-1):", "0.5"));
    if (isNaN(param) || param < 0 || param > 1) { notify("Posición inválida", true); return; }
    const comp = { type: tipo, tag: tag, param: param, size: line.diameter };
    if (tipo === 'VALVE' && subtipo) comp.subtype = subtipo;
    if (tipo === 'INSTRUMENT' && subtipo) comp.subtype = subtipo;
    if (!line.components) line.components = [];
    line.components.push(comp);
    saveState(); 
    render();
    notify(`Componente ${tag} añadido a ${line.tag}`);
}

    let html = `<h4 style="margin-bottom:8px;">${eq.tag} (${EquiposCatalogo[eq.tipo]?.nombre || eq.tipo})</h4>`;
    html += `<p style="font-size:11px; color:#aaa; margin-bottom:10px;">Posición: (${eq.x.toFixed(0)}, ${eq.y.toFixed(0)}, ${eq.z.toFixed(0)}) mm</p>`;
    
    eq.puertos.forEach(p => {
        const dir = p.orientacion || {dx:1, dy:0, dz:0};
        html += `<div class="puerto-section">`;
        html += `<div class="puerto-title">🔌 Puerto ${p.id} <span style="color:#aaa;font-size:11px;">${p.label}</span></div>`;
        
        // Diámetro
        html += `<div class="property-row">
            <label>Diámetro:</label>
            <input type="number" step="0.5" value="${p.diametro}" data-puerto="${p.id}" data-field="diam" style="width:80px;"> pulg
        </div>`;
        
        // Posición relativa
        html += `<div class="property-row">
            <label>Posición (mm):</label>
            <div class="coord-group">
                <input type="number" value="${p.relX.toFixed(0)}" data-puerto="${p.id}" data-field="relX" placeholder="X" step="10">
                <input type="number" value="${p.relY.toFixed(0)}" data-puerto="${p.id}" data-field="relY" placeholder="Y" step="10">
                <input type="number" value="${p.relZ.toFixed(0)}" data-puerto="${p.id}" data-field="relZ" placeholder="Z" step="10">
            </div>
        </div>`;
        
        // Dirección
        html += `<div class="property-row">
            <label>Dirección:</label>
            <div class="coord-group">
                <input type="number" value="${dir.dx.toFixed(3)}" data-puerto="${p.id}" data-field="dx" placeholder="dX" step="0.1" min="-1" max="1">
                <input type="number" value="${dir.dy.toFixed(3)}" data-puerto="${p.id}" data-field="dy" placeholder="dY" step="0.1" min="-1" max="1">
                <input type="number" value="${dir.dz.toFixed(3)}" data-puerto="${p.id}" data-field="dz" placeholder="dZ" step="0.1" min="-1" max="1">
            </div>
        </div>`;
        
        // Presets de dirección
        html += `<div class="preset-buttons">
            <button onclick="applyDirPreset('${eq.tag}', '${p.id}', 0,-1,0)">↓ Abajo</button>
            <button onclick="applyDirPreset('${eq.tag}', '${p.id}', 0,1,0)">↑ Arriba</button>
            <button onclick="applyDirPreset('${eq.tag}', '${p.id}', -1,0,0)">← Izq</button>
            <button onclick="applyDirPreset('${eq.tag}', '${p.id}', 1,0,0)">→ Der</button>
            <button onclick="applyDirPreset('${eq.tag}', '${p.id}', 0,0,-1)">↙ Frente</button>
            <button onclick="applyDirPreset('${eq.tag}', '${p.id}', 0,0,1)">↗ Atrás</button>
            <button onclick="applyDirPreset('${eq.tag}', '${p.id}', 0.707,0,0.707)">↘ 45°</button>
        </div>`;
        
        // Si es tanque vertical, mostrar opción de salida lateral de fondo
        if (eq.tipo === 'tanque_v' && p.id === 'N1') {
            const radio = eq.diametro / 2;
            const fondo = -eq.altura / 2;
            html += `<div class="preset-buttons" style="margin-top:5px;">
                <button onclick="setLateralFondo('${eq.tag}', '${p.id}', 0)">→ Lateral Der</button>
                <button onclick="setLateralFondo('${eq.tag}', '${p.id}', 90)">↗ Lateral 90°</button>
                <button onclick="setLateralFondo('${eq.tag}', '${p.id}', 180)">← Lateral Izq</button>
                <button onclick="setLateralFondo('${eq.tag}', '${p.id}', 45)">↘ Lateral 45°</button>
            </div>`;
            html += `<div class="angle-control">
                <label>Altura/fondo:</label>
                <input type="number" id="alturaFondo_${p.id}" value="200" style="width:70px;"> mm
                <button onclick="setLateralFondoCustom('${eq.tag}', '${p.id}')">Aplicar</button>
            </div>`;
        }
        
        html += `</div>`;
    });
    
    html += `<button id="applyPuertos" class="btn-primary" style="margin-top:10px; width:100%;">Aplicar todos los cambios</button>`;
    content.innerHTML = html;
    panel.style.display = 'flex';
    
    document.getElementById('applyPuertos').onclick = () => {
        const sections = document.querySelectorAll('.puerto-section');
        eq.puertos.forEach((p, idx) => {
            const section = sections[idx];
            if (!section) return;
            
            const diamInput = section.querySelector('[data-field="diam"]');
            const relXInput = section.querySelector('[data-field="relX"]');
            const relYInput = section.querySelector('[data-field="relY"]');
            const relZInput = section.querySelector('[data-field="relZ"]');
            const dxInput = section.querySelector('[data-field="dx"]');
            const dyInput = section.querySelector('[data-field="dy"]');
            const dzInput = section.querySelector('[data-field="dz"]');
            
            const nuevoDiam = diamInput ? parseFloat(diamInput.value) : null;
            const nuevaPos = relXInput ? { 
                x: parseFloat(relXInput.value), 
                y: parseFloat(relYInput.value), 
                z: parseFloat(relZInput.value) 
            } : null;
            const nuevaDir = dxInput ? { 
                dx: parseFloat(dxInput.value), 
                dy: parseFloat(dyInput.value), 
                dz: parseFloat(dzInput.value) 
            } : null;
            
            if (nuevoDiam && !isNaN(nuevoDiam) && nuevoDiam > 0) {
                p.diametro = nuevoDiam;
            }
            if (nuevaPos && !isNaN(nuevaPos.x) && !isNaN(nuevaPos.y) && !isNaN(nuevaPos.z)) {
                p.relX = nuevaPos.x;
                p.relY = nuevaPos.y;
                p.relZ = nuevaPos.z;
            }
            if (nuevaDir && !isNaN(nuevaDir.dx) && !isNaN(nuevaDir.dy) && !isNaN(nuevaDir.dz)) {
                const len = Math.sqrt(nuevaDir.dx**2 + nuevaDir.dy**2 + nuevaDir.dz**2);
                if (len > 0) {
                    p.orientacion = { 
                        dx: nuevaDir.dx/len, 
                        dy: nuevaDir.dy/len, 
                        dz: nuevaDir.dz/len 
                    };
                }
            }
        });
        actualizarTuberiasConectadas(eq.tag);
        saveState();
        render();
        panel.style.display = 'none';
        notify(`Propiedades de ${eq.tag} actualizadas`);
    };
}

// Funciones helper para el panel
function applyDirPreset(equipTag, puertoId, dx, dy, dz) {
    configurarPuerto(equipTag, puertoId, { dir: { dx, dy, dz } });
    const eq = db.equipos.find(e => e.tag === equipTag);
    if (eq) showPropertyPanel(eq);
}

function setLateralFondo(equipTag, puertoId, anguloGrados) {
    const eq = db.equipos.find(e => e.tag === equipTag);
    if (!eq) return;
    const radio = eq.diametro / 2;
    const fondo = -eq.altura / 2;
    const alturaSobreFondo = 200;
    const angulo = anguloGrados * Math.PI / 180;
    const posX = radio * Math.cos(angulo);
    const posZ = radio * Math.sin(angulo);
    const posY = fondo + alturaSobreFondo;
    
    configurarPuerto(equipTag, puertoId, { 
        pos: { x: posX, y: posY, z: posZ },
        dir: { dx: Math.cos(angulo), dy: 0, dz: Math.sin(angulo) }
    });
    if (eq) showPropertyPanel(eq);
}

function setLateralFondoCustom(equipTag, puertoId) {
    const eq = db.equipos.find(e => e.tag === equipTag);
    if (!eq) return;
    const alturaInput = document.getElementById(`alturaFondo_${puertoId}`);
    const alturaSobreFondo = alturaInput ? parseFloat(alturaInput.value) : 200;
    const radio = eq.diametro / 2;
    const fondo = -eq.altura / 2;
    
    // Por defecto, dirección derecha (0°)
    const posX = radio;
    const posZ = 0;
    const posY = fondo + alturaSobreFondo;
    
    configurarPuerto(equipTag, puertoId, { 
        pos: { x: posX, y: posY, z: posZ },
        dir: { dx: 1, dy: 0, dz: 0 }
    });
    if (eq) showPropertyPanel(eq);
}

function closePropertyPanel() {
    document.getElementById('propertyPanel').style.display = 'none';
}

// ==================== INTERACCIÓN Y SELECCIÓN ====================
function pointToSegmentDistance(p, a, b) {
    const ax = p.x - a.x, ay = p.y - a.y;
    const bx = b.x - a.x, by = b.y - a.y;
    const dot = ax * bx + ay * by;
    const len2 = bx * bx + by * by;
    if (len2 === 0) return Math.hypot(ax, ay);
    let t = dot / len2;
    t = Math.max(0, Math.min(1, t));
    const projX = a.x + t * bx;
    const projY = a.y + t * by;
    return Math.hypot(p.x - projX, p.y - projY);
}

function pickElement(mouseCanvas) {
    for (let eq of db.equipos) {
        const p = project(eq);
        if (eq.tipo === 'colector') {
            const ancho = eq.largo;
            const pIzq = project({ x: eq.x, y: eq.y, z: eq.z });
            const pDer = project({ x: eq.x + ancho, y: eq.y, z: eq.z });
            if (pointToSegmentDistance(mouseCanvas, pIzq, pDer) < 15) return { type: 'equipment', obj: eq };
        } else {
            const w = (eq.diametro / 2) * cam.scale;
            if (Math.hypot(mouseCanvas.x - p.x, mouseCanvas.y - p.y) < w + 10) return { type: 'equipment', obj: eq };
        }
    }
    for (let line of db.lines) {
        const pts = line._cachedPoints;
        if (!pts) continue;
        const proj = pts.map(p => project(p));
        for (let i = 0; i < proj.length - 1; i++) {
            if (pointToSegmentDistance(mouseCanvas, proj[i], proj[i+1]) < 12) return { type: 'line', obj: line };
        }
    }
    return null;
}

function initCanvasEvents() {
    let panLocal = false, panStartLocal = { x: 0, y: 0 };
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouse = { x: (e.clientX - rect.left) * canvas.width / rect.width, y: (e.clientY - rect.top) * canvas.height / rect.height };
        const picked = pickElement(mouse);
        if (toolMode === 'select') {
            if (picked) {
                selectedElement = picked;
                if (picked.type === 'equipment') {
                    showPropertyPanel(picked.obj);
                } else {
                    closePropertyPanel();
                }
            } else {
                selectedElement = null;
                closePropertyPanel();
            }
            render();
        } else if (toolMode === 'moveEq' && picked?.type === 'equipment') {
            draggingEquipment = true;
            draggedEquip = picked.obj;
            dragLastPos = { x: e.clientX, y: e.clientY };
            canvas.style.cursor = 'grabbing';
            e.preventDefault();
        } else if (toolMode === 'addPoint' && picked?.type === 'line') {
            const line = picked.obj;
            const pts = line._cachedPoints;
            if (pts) {
                let minDist = Infinity, bestSeg = 0, bestParam = 0;
                const proj = pts.map(p => project(p));
                for (let i = 0; i < proj.length - 1; i++) {
                    const a = proj[i], b = proj[i+1];
                    const ax = mouse.x - a.x, ay = mouse.y - a.y;
                    const bx = b.x - a.x, by = b.y - a.y;
                    const dot = ax*bx + ay*by, len2 = bx*bx + by*by;
                    if (len2 === 0) continue;
                    let t = dot / len2;
                    t = Math.max(0, Math.min(1, t));
                    const projX = a.x + t*bx, projY = a.y + t*by;
                    const dist = Math.hypot(mouse.x - projX, mouse.y - projY);
                    if (dist < minDist) { minDist = dist; bestSeg = i; bestParam = t; }
                }
                if (minDist < 20) {
                    const p1 = pts[bestSeg], p2 = pts[bestSeg+1];
                    const newPoint = { 
                        x: p1.x + bestParam * (p2.x - p1.x), 
                        y: p1.y + bestParam * (p2.y - p1.y), 
                        z: p1.z + bestParam * (p2.z - p1.z) 
                    };
                    if (!line.waypoints) line.waypoints = [];
                    line.waypoints.push(newPoint);
                    const pStart = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
                    const pEnd = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
                    let puntos = [pStart];
                    if (line.waypoints) puntos.push(...line.waypoints);
                    puntos.push(pEnd);
                    line._cachedPoints = puntos;
                    line.codos = puntos.filter(p => !p.isControlPoint).length - 2;
                    saveState(); 
                    render();
                    notify("Waypoint añadido");
                }
            }
        } else {
            panLocal = true;
            panStartLocal = { x: e.clientX, y: e.clientY };
            canvas.style.cursor = 'grabbing';
            e.preventDefault();
        }
    });
    
    window.addEventListener('mousemove', (e) => {
        if (draggingEquipment && draggedEquip) {
            const dx = (e.clientX - dragLastPos.x) / cam.scale;
            const dy = (e.clientY - dragLastPos.y) / cam.scale;
            draggedEquip.x += dx;
            draggedEquip.z += dy;
            actualizarTuberiasConectadas(draggedEquip.tag);
            dragLastPos = { x: e.clientX, y: e.clientY };
            render();
        } else if (panLocal) {
            const dx = e.clientX - panStartLocal.x;
            const dy = e.clientY - panStartLocal.y;
            cam.panX += dx;
            cam.panY += dy;
            panStartLocal = { x: e.clientX, y: e.clientY };
            render();
        }
    });
    
    window.addEventListener('mouseup', () => { 
        if (draggingEquipment) saveState();
        draggingEquipment = false; 
        panLocal = false; 
        canvas.style.cursor = 'grab'; 
    });
    
    canvas.addEventListener('wheel', (e) => { 
        e.preventDefault(); 
        cam.scale *= e.deltaY > 0 ? 0.9 : 1.1; 
        cam.scale = Math.min(Math.max(0.05, cam.scale), 1.5); 
        render(); 
    });
    
    document.querySelector('#propertyPanel .property-header').onclick = () => closePropertyPanel();
}

function resizeCanvas() { 
    const container = canvas.parentElement; 
    canvas.width = container.clientWidth; 
    canvas.height = container.clientHeight; 
    autoCenter(); 
}

                },

            });
            actualizarTuberiasConectadas('TK-01');
            actualizarTuberiasConectadas('B-01');
        }
        render();
        autoCenter();
    }, 100);
    
    render(); 
    autoCenter(); 
    saveState();

    document.getElementById('btnOpen').onclick = cargarProyecto;
    document.getElementById('btnSave').onclick = guardarProyecto;
    document.getElementById('btnReset').onclick = autoCenter;
    document.getElementById('btnCommand').onclick = () => document.getElementById('commandPanel').style.display = 'block';
    document.getElementById('closeCommand').onclick = () => document.getElementById('commandPanel').style.display = 'none';
    document.getElementById('runCommands').onclick = () => {
        const text = document.getElementById('commandText').value;
        const lines = text.split('\n');
        for (let raw of lines) {
            let cmd = raw.trim();
            if (!cmd || cmd.startsWith('//')) continue;
            saveState();
            if (!parseCreateManifold(cmd) && !parseCreate(cmd) && !parseConnect(cmd) && !parseEditCommand(cmd) && !parseHelp(cmd)) {
                notify(`❌ No entendí: "${cmd.substring(0,50)}..."`, true);
            }
        }
        document.getElementById('commandPanel').style.display = 'none';
        render();
    };
    document.getElementById('clearCommand').onclick = () => document.getElementById('commandText').value = '';
    document.getElementById('btnAddTank').onclick = () => {
        const tag = `TK-${db.equipos.filter(e => e.tipo === 'tanque_v').length+1}`;
        const ult = db.equipos[db.equipos.length-1];
        let x = ult ? ult.x + 3000 : 0;
        crearEquipo('tanque_v', tag, x, 1250, 0, { diametro: 2400, altura: 2500 });
    };
    document.getElementById('btnAddPump').onclick = () => {
        const tag = `B-${db.equipos.filter(e => e.tipo.includes('bomba')).length+1}`;
        const ult = db.equipos[db.equipos.length-1];
        let x = ult ? ult.x + 3000 : 5000;
        crearEquipo('bomba', tag, x, 800, 0, { diametro: 800, altura: 800 });
    };
    document.getElementById('btnMTO').onclick = exportarMTO;
    document.getElementById('btnPDF').onclick = exportPDF;
    document.getElementById('btnUndo').onclick = undo;
    document.getElementById('btnRedo').onclick = redo;
    document.getElementById('btnVoice').onclick = toggleVoice;
    document.getElementById('btnApplyNorm').onclick = aplicarNormas;
    document.getElementById('btnSpeakSummary').onclick = resumenProyecto;
    document.getElementById('btnRecalc').onclick = recalcularTodo;
    document.getElementById('btnToggleCatalog').onclick = () => {
        const panel = document.getElementById('catalogPanel');
        panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    };
    document.querySelector('#catalogPanel .catalog-header').onclick = () => {
        const content = document.querySelector('#catalogPanel .catalog-content');
        content.style.display = content.style.display === 'none' ? 'flex' : 'none';
    };
    document.getElementById('btnSetElev').onclick = () => { 
        const val = parseInt(document.getElementById('customElev').value); 
        if (!isNaN(val)) setElevation(val); 
    };
    
    const setTool = (mode) => {
        toolMode = mode;
        document.querySelectorAll('#toolsPanel button').forEach(btn => btn.classList.remove('active'));
        if (mode === 'select') document.getElementById('toolSelect').classList.add('active');
        else if (mode === 'moveEq') document.getElementById('toolMoveEq').classList.add('active');
        else if (mode === 'editPipe') document.getElementById('toolEditPipe').classList.add('active');
        else if (mode === 'addPoint') document.getElementById('toolAddPoint').classList.add('active');
    };
    document.getElementById('toolSelect').onclick = () => setTool('select');
    document.getElementById('toolMoveEq').onclick = () => setTool('moveEq');
    document.getElementById('toolEditPipe').onclick = () => setTool('editPipe');
    document.getElementById('toolAddPoint').onclick = () => setTool('addPoint');
    
    window.addEventListener('resize', () => { resizeCanvas(); autoCenter(); });
    notify("SmartFlow Pro v10.7 - ¡Puertos Avanzados! Ejemplo: TK-01 con salida lateral derecha a 200mm del fondo.");
}

// Exponer funciones globales
window.setElevation = setElevation;
window.crearEquipoDesdePanel = crearEquipoDesdePanel;
window.crearComponente = crearComponente;
window.applyDirPreset = applyDirPreset;
window.setLateralFondo = setLateralFondo;
window.setLateralFondoCustom = setLateralFondoCustom;

init();
</script>
</body>
