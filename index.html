    <script>
        // ============================================
        // CONFIGURACIÃN INICIAL Y ACCESIBILIDAD
        // ============================================
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        // Sistema de accesibilidad
        let accessibility = {
            enabled: true,
            voiceRate: 1.0,
            voicePitch: 1.0,
            voiceVolume: 1.0,
            voiceLanguage: 'es-ES',
            autoAnnounce: true,
            announcePositions: true,
            highContrast: false,
            lastAnnouncement: '',
            announcementQueue: [],
            isSpeaking: false
        };

        // Cargar preferencias guardadas
        try {
            const saved = localStorage.getItem('acq_accessibility');
            if (saved) {
                const parsed = JSON.parse(saved);
                accessibility = { ...accessibility, ...parsed };
            }
        } catch (e) {
            console.log('No se pudieron cargar preferencias');
        }

        // Sistema de anuncios accesibles mejorado
        class AccessibilityAnnouncer {
            constructor() {
                this.announcer = document.createElement('div');
                this.announcer.setAttribute('role', 'status');
                this.announcer.setAttribute('aria-live', 'polite');
                this.announcer.setAttribute('aria-atomic', 'true');
                this.announcer.className = 'sr-only';
                document.body.appendChild(this.announcer);
                
                this.alertAnnouncer = document.createElement('div');
                this.alertAnnouncer.setAttribute('role', 'alert');
                this.alertAnnouncer.setAttribute('aria-live', 'assertive');
                this.alertAnnouncer.className = 'sr-only';
                document.body.appendChild(this.alertAnnouncer);
                
                this.speechSynthesis = window.speechSynthesis;
                this.voices = [];
                this.loadVoices();
                
                // Cargar voces disponibles
                if (this.speechSynthesis) {
                    this.speechSynthesis.onvoiceschanged = () => this.loadVoices();
                }
            }
            
            loadVoices() {
                if (this.speechSynthesis) {
                    this.voices = this.speechSynthesis.getVoices();
                }
            }
            
            getVoiceForLanguage(lang) {
                return this.voices.find(v => v.lang === lang) || 
                       this.voices.find(v => v.lang.startsWith(lang.substring(0,2))) ||
                       this.voices[0];
            }
            
            announce(message, isUrgent = false) {
                if (!accessibility.enabled) return;
                
                // Anunciar para lectores de pantalla
                const target = isUrgent ? this.alertAnnouncer : this.announcer;
                target.textContent = '';
                setTimeout(() => {
                    target.textContent = message;
                }, 50);
                
                // TambiÃĐn usar sÃ­ntesis de voz si estÃĄ disponible
                this.speak(message, isUrgent);
            }
            
            speak(text, isUrgent = false) {
                if (!accessibility.enabled || !this.speechSynthesis) return;
                
                // Cancelar anuncios anteriores si es urgente
                if (isUrgent) {
                    this.speechSynthesis.cancel();
                }
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = accessibility.voiceLanguage;
                utterance.rate = accessibility.voiceRate;
                utterance.pitch = accessibility.voicePitch;
                utterance.volume = accessibility.voiceVolume;
                
                const voice = this.getVoiceForLanguage(accessibility.voiceLanguage);
                if (voice) utterance.voice = voice;
                
                this.speechSynthesis.speak(utterance);
            }
            
            announceElementSelected(element) {
                if (!accessibility.autoAnnounce) return;
                
                if (element.tag) {
                    let message = `${element.tag} seleccionado. `;
                    message += `Tipo: ${this.getEquipmentTypeName(element.type)}. `;
                    
                    if (element.flow) message += `Caudal: ${element.flow} metros cÃšbicos por hora. `;
                    if (element.press) message += `PresiÃģn: ${element.press} bar. `;
                    if (element.temp) message += `Temperatura: ${element.temp} grados Celsius. `;
                    
                    if (element.connections) {
                        const inCount = element.connections.inlet?.length || 0;
                        const outCount = element.connections.outlet?.length || 0;
                        message += `${inCount} conexiones de entrada, ${outCount} conexiones de salida. `;
                    }
                    
                    this.announce(message);
                }
            }
            
            announcePosition(element) {
                if (!accessibility.announcePositions) return;
                if (element && element.tag) {
                    this.announce(`${element.tag} en posiciÃģn horizontal ${Math.round(element.x)} y vertical ${Math.round(element.y)}`);
                }
            }
            
            getEquipmentTypeName(type) {
                const names = {
                    'PUMP': 'bomba centrÃ­fuga',
                    'TANK': 'tanque de almacenamiento',
                    'HEAT_EXCHANGER': 'intercambiador de calor',
                    'CONTROL_VALVE': 'vÃĄlvula de control',
                    'GATE': 'vÃĄlvula de compuerta',
                    'GLOBE': 'vÃĄlvula globo',
                    'BALL': 'vÃĄlvula de bola',
                    'BUTTERFLY': 'vÃĄlvula mariposa',
                    'CHECK': 'vÃĄlvula check',
                    'BATTERY_LIMIT': 'lÃ­mite de baterÃ­a',
                    'TIC': 'controlador indicador de temperatura',
                    'PIC': 'controlador indicador de presiÃģn',
                    'FIC': 'controlador indicador de flujo',
                    'LIC': 'controlador indicador de nivel',

        // ============================================
        // FUNCIONES DE DIBUJO
        // ============================================
        function drawGrid() {
            ctx.save(); ctx.strokeStyle = '#f0f0f0'; ctx.lineWidth = 0.5;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
            ctx.restore();
        }
        
        function getSegments(line) {
            const segs = [];
            for (let i = 0; i < line.path.length - 1; i++) {
                const p1 = line.path[i], p2 = line.path[i+1];
                segs.push({ x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, horizontal: (p1.y === p2.y), lineId: line.id });
            }
            return segs;
        }
        
        function findIntersections(seg, otherSegs) {
            const intersections = [];
            for (let other of otherSegs) {
                if (seg.horizontal === other.horizontal) continue;
                let hSeg, vSeg;
                if (seg.horizontal) { hSeg = seg; vSeg = other; } else { hSeg = other; vSeg = seg; }
                const x = vSeg.x1; const y = hSeg.y1;
                if (x >= Math.min(hSeg.x1, hSeg.x2) && x <= Math.max(hSeg.x1, hSeg.x2) &&
                    y >= Math.min(vSeg.y1, vSeg.y2) && y <= Math.max(vSeg.y1, vSeg.y2)) {
                    intersections.push({ x, y });
                }
            }
            return intersections;
        }
        
        function drawLineWithJumps(line) {
            ctx.save(); ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
            const otherSegments = [];
            db.lines.forEach(l => { if (l.id !== line.id) otherSegments.push(...getSegments(l)); });
            const points = line.path;
            if (points.length < 2) return;
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for (let i = 0; i < points.length - 1; i++) {
                const p1 = points[i], p2 = points[i+1];
                const seg = { x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, horizontal: (p1.y === p2.y) };
                const intersections = findIntersections(seg, otherSegments);
                if (intersections.length > 0) {
                    if (seg.horizontal) intersections.sort((a, b) => a.x - b.x);
                    else intersections.sort((a, b) => a.y - b.y);
                    for (let inter of intersections) {
                        ctx.lineTo(inter.x, inter.y);
                        ctx.moveTo(inter.x - 5, inter.y - 5); ctx.lineTo(inter.x + 5, inter.y + 5);
                        ctx.moveTo(inter.x - 5, inter.y + 5); ctx.lineTo(inter.x + 5, inter.y - 5);
                        ctx.moveTo(inter.x, inter.y);
                        ctx.lineTo(p2.x, p2.y);
                    }
                } else {
                    ctx.lineTo(p2.x, p2.y);
                }
            }
            ctx.stroke(); ctx.restore();
        }
        
        function drawArrow(x1, y1, x2, y2) {
            const angle = Math.atan2(y2 - y1, x2 - x1);
            ctx.save(); ctx.translate(x2, y2); ctx.rotate(angle);
            ctx.beginPath(); ctx.moveTo(-15, -7.5); ctx.lineTo(0, 0); ctx.lineTo(-15, 7.5);
            ctx.fillStyle = '#000'; ctx.fill(); ctx.restore();
        }
        
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            db.lines.forEach(line => {
                drawLineWithJumps(line);
                if (line.path.length >= 2) {
                    const last = line.path.length - 1;
                    drawArrow(line.path[last-1].x, line.path[last-1].y, line.path[last].x, line.path[last].y);
                }
            });
            db.equipos.forEach(eq => {
                const symbol = symbolLibrary[eq.type] || symbolLibrary.TANK;
                symbol.draw(ctx, eq.x, eq.y, db.selected && db.selected.id === eq.id);
                ctx.fillStyle = '#000'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                ctx.fillText(eq.tag, eq.x, eq.y - 35);
            });
        }

        // ============================================
        // GENERADOR DESDE EXCEL (PRONTUARIO)
        // ============================================
        class PFDFromProntuario {
            constructor(db) { this.db = db; }
            
            loadFromExcel(file) {
                showNotification('ð Leyendo prontuario...');
                announcer.announce('Leyendo archivo de prontuario', true);
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                        this.processData(jsonData);
                    } catch (error) { 
                        showNotification('â Error: ' + error.message, true);
                        announcer.announce('Error al leer el archivo: ' + error.message, true);
                    }
                };
                reader.readAsArrayBuffer(file);
            }
            
            processData(data) {
                this.db.equipos = []; this.db.lines = [];
                const equipmentMap = new Map();
                data.forEach((row, index) => {
                    if (!row.TAG || !row.TIPO) return;
                    const equipo = {
                        id: `${row.TAG}_${Date.now()}_${index}`,
                        type: row.TIPO, tag: row.TAG,
                        x: row.X || 200 + (index * 150), y: row.Y || 200,
                        flow: parseFloat(row.CAUDAL) || 100, press: parseFloat(row.PRESION) || 1, temp: parseFloat(row.TEMP) || 25,
                        connections: { inlet: row.CORRIENTE_ENTRADA || null, outlet: row.CORRIENTE_SALIDA || null }
                    };
                    this.db.equipos.push(equipo); equipmentMap.set(row.TAG, equipo);
                });
                this.db.equipos.forEach(eq => {
                    if (eq.connections.inlet && equipmentMap.has(eq.connections.inlet)) this.createLine(equipmentMap.get(eq.connections.inlet), eq);
                    if (eq.connections.outlet && equipmentMap.has(eq.connections.outlet)) this.createLine(eq, equipmentMap.get(eq.connections.outlet));
                });
                render(); 
                showNotification(`â Diagrama generado: ${this.db.equipos.length} equipos`);
                announcer.announce(`Diagrama generado con ${this.db.equipos.length} equipos`, true);
            }
            
            createLine(fromEq, toEq) {
                const path = [
                    { x: fromEq.x, y: fromEq.y },
                    { x: (fromEq.x + toEq.x) / 2, y: fromEq.y },
                    { x: (fromEq.x + toEq.x) / 2, y: toEq.y },
                    { x: toEq.x, y: toEq.y }
                ];
                this.db.lines.push({
                    id: `LINE_${Date.now()}_${Math.random()}`,
                    tag: `${fromEq.tag}_TO_${toEq.tag}`,
                    from: fromEq.id, to: toEq.id, path,
                    flow: fromEq.flow || 100, diameter: 6, temp: fromEq.temp || 25, fluid: 'water'
                });
            }
        }

        class PFDFromText {
            constructor(db) {
                this.db = db;
                this.keywords = { 
                    'tanque': 'TANK', 'bomba': 'PUMP', 'intercambiador': 'HEAT_EXCHANGER', 
                    'enfriador': 'HEAT_EXCHANGER', 'calentador': 'HEAT_EXCHANGER', 
                    'vÃĄlvula': 'CONTROL_VALVE', 'valvula': 'CONTROL_VALVE', 
                    'limite': 'BATTERY_LIMIT', 'lÃ­mite': 'BATTERY_LIMIT', 
                    'baterÃ­a': 'BATTERY_LIMIT', 'bateria': 'BATTERY_LIMIT' 
                };
                this.relations = { 
                    'envÃ­a': 'TO', 'envian': 'TO', 'alimenta': 'TO', 'va': 'TO', 
                    'sale': 'TO', 'descarga': 'TO', 'recibe': 'FROM', 'viene': 'FROM', 
                    'desde': 'FROM', 'a': 'TO', 'de': 'FROM' 
                };
            }
            
            processText(text) {
                showNotification('ð Analizando texto...');
                announcer.announce('Analizando descripciÃģn de texto', true);
                
                this.db.equipos = []; this.db.lines = []; this.db.tagCounter = {};
                const words = text.toLowerCase().replace(/[.,;:()]/g, ' ').replace(/\s+/g, ' ').split(' ');
                let currentEquipment = null, lastTag = null;
                
                for (let i = 0; i < words.length; i++) {
                    const word = words[i];

                    if (tagMatch) {

            processDTIText(text) {

                this.db.equipos = []; this.db.lines = []; this.db.instruments = []; this.db.controlLoops = [];

            parseInstrument(line) {

                const ratingMatch = line.match(/(\d{3})#|class (\d{3})/i);

                const actuatorMatch = line.match(/(neumÃĄtica|elÃĐctrica|manual|hidrÃĄulica)/i);
                if (actuatorMatch) specs.actuator = actuatorMatch[1].toUpperCase();
                return specs;

            extractInsulation(line) { return null; }

            determineConnectionType(text) {

        class MassEnergyBalance {
            constructor(db) {
                this.db = db;
                this.results = {
                    massBalance: [],
                    energyBalance: [],
                    inconsistencies: [],
                    summary: {}
                };
                this.fluidProperties = {
                    water: { cp: 4.18, rho: 1000 }, // kJ/kgÂ°C, kg/mÂģ
                    crude: { cp: 2.1, rho: 850 },
                    lng: { cp: 3.4, rho: 422 },
                    steam: { cp: 2.1, rho: 0.6 },
                    air: { cp: 1.005, rho: 1.225 }
                };
            }

            calculateBalance() {
                showNotification('âïļ Calculando balance de masa y energÃ­a...');
                announcer.announce('Calculando balance de masa y energÃ­a', true);
                
                this.results = {
                    massBalance: [],
                    energyBalance: [],
                    inconsistencies: [],
                    summary: {}
                };

                this.identifyStreams();
                this.calculateEquipmentBalance();
                this.calculateGlobalBalance();
                this.detectInconsistencies();
                this.generateBalanceReport();                 
                showNotification('â Balance de masa y energÃ­a completado');
                announcer.announce('Balance de masa y energÃ­a completado', true);
                
                return this.results;
            }

            identifyStreams() {
                const streams = {};
                
                this.db.equipos.forEach(eq => {
                    streams[eq.id] = {
                        tag: eq.tag,
                        type: eq.type,
                        in: [],
                        out: []
                    };
                });
                
                this.db.lines.forEach(line => {
                    const fromEq = this.db.equipos.find(e => e.id === line.from);
                    const toEq = this.db.equipos.find(e => e.id === line.to);
                    
                    if (fromEq && toEq) {
                        if (!streams[fromEq.id].out.includes(line.id)) {
                            streams[fromEq.id].out.push(line.id);
                        }
                        if (!streams[toEq.id].in.includes(line.id)) {
                            streams[toEq.id].in.push(line.id);
                        }
                    }
                });
                
                this.streams = streams;
            }

            calculateEquipmentBalance() {
                this.db.equipos.forEach(eq => {
                    const inletStreams = this.streams[eq.id].in;
                    const outletStreams = this.streams[eq.id].out;
                    
                    let massIn = 0;
                    let energyIn = 0;
                    inletStreams.forEach(lineId => {
                        const line = this.db.lines.find(l => l.id === lineId);
                        if (line) {
                            const flow = line.flow || 0;
                            const temp = line.temp || 25;
                            const fluid = line.fluid || 'water';
                            const cp = this.fluidProperties[fluid]?.cp || 4.18;
                            
                            massIn += flow;
                            energyIn += flow * this.fluidProperties[fluid]?.rho * cp * temp / 3600;
                        }
                    });
                    
                    let massOut = 0;
                    let energyOut = 0;
                    outletStreams.forEach(lineId => {
                        const line = this.db.lines.find(l => l.id === lineId);
                        if (line) {
                            const flow = line.flow || 0;
                            const temp = line.temp || 25;
                            const fluid = line.fluid || 'water';
                            const cp = this.fluidProperties[fluid]?.cp || 4.18;
                            
                            massOut += flow;
                            energyOut += flow * this.fluidProperties[fluid]?.rho * cp * temp / 3600;
                        }
                    });
                    
                    let massGen = 0;
                    let energyGen = 0;
                    
                    if (eq.type === 'PUMP') {
                        const dp = eq.press || 1;
                        energyGen = massIn * dp * 100 / 3600;
                    } else if (eq.type === 'HEAT_EXCHANGER') {
                        energyGen = (energyOut - energyIn) || 0;
                    } else if (eq.type === 'VALVE' || eq.type.includes('VALVE')) {
                        energyGen = -Math.abs(energyIn * 0.05);

            calculateGlobalBalance() {
                let totalMassIn = 0;
                let totalMassOut = 0;
                let totalEnergyIn = 0;
                let totalEnergyOut = 0;
                
                this.db.lines.forEach(line => {
                    const fromEq = this.db.equipos.find(e => e.id === line.from);
                    const toEq = this.db.equipos.find(e => e.id === line.to);
                    
                    if (!fromEq && toEq) {
                        totalMassIn += line.flow || 0;
                        totalEnergyIn += (line.flow || 0) * (this.fluidProperties[line.fluid || 'water']?.cp || 4.18) * (line.temp || 25);
                    }
                    if (fromEq && !toEq) {
                        totalMassOut += line.flow || 0;
                        totalEnergyOut += (line.flow || 0) * (this.fluidProperties[line.fluid || 'water']?.cp || 4.18) * (line.temp || 25);
                    }
                });
                
                this.results.summary = {
                    totalMassIn: totalMassIn.toFixed(2),
                    totalMassOut: totalMassOut.toFixed(2),
                    massBalanceGlobal: (totalMassIn - totalMassOut).toFixed(2),
                    massBalancePercent: totalMassIn > 0 ? ((totalMassIn - totalMassOut) / totalMassIn * 100).toFixed(2) : 0,
                    totalEnergyIn: totalEnergyIn.toFixed(2),
                    totalEnergyOut: totalEnergyOut.toFixed(2),

        class IsometricGenerator {
            constructor(db) {
                this.db = db;
                this.materials = {
                    pipes: [], fittings: [], valves: [], instruments: [], flanges: [],
                    bolts: null, gaskets: null
                };
            }

            generateIsometric() {
                showNotification('ð Generando isomÃĐtrico y lista de materiales...');
                announcer.announce('Generando vista isomÃĐtrica y lista de materiales', true);
                
                this.resetMaterials();
                this.db.lines.forEach(line => {
                    if (line.type === 'PROC' || line.type === 'SERVICE' || !line.type) {
                        this.processPipeLine(line);
                    }
                });
                this.processInlineComponents();
                this.calculateFittings();
                this.drawIsometric();
                this.generateMaterialReport();
                
                showNotification('â IsomÃĐtrico y lista de materiales generados');
            }

            processPipeLine(line) {
                const length = this.calculatePipeLength(line);
                const diameter = line.diameter || 6;
                this.materials.pipes.push({
                    lineNumber: line.tag || 'LÃ­nea',
                    diameter: diameter,
                    length: length.toFixed(2),
                    weight: this.calculatePipeWeight(diameter, length)
                });
                line.isometricData = {
                    points: this.convertToIsometric(line.path),
                    diameter: diameter
                };
            }

            convertToIsometric(points) {
                const isoPoints = []; let z = 0;
                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    if (i > 0 && Math.abs(p.y - points[i-1].y) > 10) z += 30;
                    isoPoints.push({
                        x: p.x - p.y * 0.5,
                        y: (p.x * 0.5 + p.y * 0.5) - z * 0.3,
                        original: p
                    });
                }
                return isoPoints;
            }

            calculatePipeLength(line) {
                let length = 0;
                for (let i = 0; i < line.path.length - 1; i++) {
                    const p1 = line.path[i], p2 = line.path[i+1];
                    length += Math.hypot(p2.x - p1.x, p2.y - p1.y);
                }
                return length / 10;
            }

            processInlineComponents() {
                this.db.equipos.forEach(eq => {
                    if (eq.type.includes('VALVE') || ['FCV','PCV','LCV','PSV','GATE','GLOBE','BALL','BUTTERFLY','CHECK'].includes(eq.type)) {
                        this.materials.valves.push({ 
                            tag: eq.tag, 
                            type: eq.type, 
                            size: eq.valveData?.size || 6,
                            rating: eq.valveData?.rating || '150#',
                            quantity: 1 
                        });
                    }
                });
                if (this.db.instruments) {
                    this.db.instruments.forEach(inst => {
                        this.materials.instruments.push({ 
                            tag: inst.tag, 
                            type: inst.type,
                            service: inst.service || 'General',
                            range: inst.range || '0-100%',
                            signal: inst.signal || '4-20mA'
                        });
                    });
                }
            }

            calculateFittings() {
                this.db.lines.forEach(line => {
                    if (!line.path || line.path.length < 3) return;
                    for (let i = 1; i < line.path.length - 1; i++) {
                        const prev = line.path[i-1], curr = line.path[i], next = line.path[i+1];
                        const dir1 = { x: Math.sign(curr.x - prev.x), y: Math.sign(curr.y - prev.y) };
                        const dir2 = { x: Math.sign(next.x - curr.x), y: Math.sign(next.y - curr.y) };
                        if (dir1.x !== dir2.x || dir1.y !== dir2.y) {
                            this.materials.fittings.push({ 
                                type: 'ELBOW', 
                                size: line.diameter || 6, 
                                angle: 90, 
                                lineNumber: line.tag || 'LÃ­nea sin tag',
                                material: line.material || 'CS',
                                schedule: line.schedule || '40'
                            });
                        }
                    }
                });
                this.calculateFlanges();
            }

            calculateFlanges() {
                this.db.lines.forEach(line => {
                    const fromEq = this.db.equipos.find(e => e.id === line.from);
                    const toEq = this.db.equipos.find(e => e.id === line.to);
                    
                    if (fromEq) {
                        this.materials.flanges.push({ 
                            type: 'WELD_NECK_FLANGE',
                            size: line.diameter || 6, 
                            rating: '150#',
                            material: line.material || 'CS',
                            connection: `${line.tag || 'LÃ­nea'} â ${fromEq.tag}`
                        });
                    }
                    if (toEq) {
                        this.materials.flanges.push({ 
                            type: 'WELD_NECK_FLANGE',
                            size: line.diameter || 6, 
                            rating: '150#',
                            material: line.material || 'CS',
                            connection: `${line.tag || 'LÃ­nea'} â ${toEq.tag}`
                        });
                    }
                });
                
                if (this.materials.flanges.length > 0) {
                    this.materials.bolts = {
                        type: 'STUD_BOLT',
                        size: '3/4"',
                        length: '4"',
                        material: 'A193-B7',
                        quantity: this.materials.flanges.length * 4
                    };
                    this.materials.gaskets = {
                        type: 'SPIRAL_WOUND',
                        size: 'Variable',
                        material: '316SS/GRAPHITE',
                        quantity: this.materials.flanges.length
                    };
                }
            }

            drawIsometric() {
                const isoCanvas = document.createElement('canvas');
                isoCanvas.width = 800; 
                isoCanvas.height = 600;
                isoCanvas.style.border = '2px solid #58a6ff';
                isoCanvas.style.backgroundColor = '#f9f9f9';
                isoCanvas.style.borderRadius = '8px';
                
                const isoCtx = isoCanvas.getContext('2d');
                isoCtx.clearRect(0, 0, isoCanvas.width, isoCanvas.height);
                isoCtx.translate(200, 100);
                
                this.db.lines.forEach(line => {
                    if (line.isometricData) {
                        const points = line.isometricData.points;
                        
                        isoCtx.beginPath();
                        isoCtx.strokeStyle = '#0066cc';
                        isoCtx.lineWidth = 3;
                        isoCtx.moveTo(points[0].x, points[0].y);
                        
                        for (let i = 1; i < points.length; i++) {
                            isoCtx.lineTo(points[i].x, points[i].y);
                        }
                        isoCtx.stroke();
                    }
                });
                
                this.showIsometricModal(isoCanvas);
            }

            showIsometricModal(isoCanvas) {
                const overlay = document.createElement('div'); 
                overlay.className = 'overlay';
                overlay.onclick = () => { overlay.remove(); modal.remove(); };
                
                const modal = document.createElement('div'); 
                modal.className = 'modal';
                modal.style.width = '900px';
                modal.style.maxWidth = '95vw';
                modal.style.maxHeight = '80vh';
                modal.style.overflowY = 'auto';
                
                modal.innerHTML = `
                    <h2 style="color:#58a6ff; margin-bottom:15px;">Vista IsomÃĐtrica</h2>
                    <div style="text-align:center; margin:15px 0; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                        <button class="btn-primary" onclick="generateMaterialList()">ð Ver Lista de Materiales</button>
                        <button class="btn-success" onclick="exportMaterialList()">ð Exportar a Excel</button>
                        <button class="btn-warning" onclick="closeTextDialog()">Cerrar</button>
                    </div>
                `;
                
                modal.insertBefore(isoCanvas, modal.firstChild.nextSibling);
                document.body.appendChild(overlay); 
                document.body.appendChild(modal);
                
                // Anunciar para accesibilidad
                if (accessibility.enabled) {
                    setTimeout(() => {
                        announcer.announce('Vista isomÃĐtrica generada. Use los botones para ver la lista de materiales o exportar.', true);
                    }, 500);
                }
            }

            generateMaterialReport() {
                const totalPipeLength = this.materials.pipes.reduce((s,p) => s + parseFloat(p.length), 0).toFixed(2);
                const totalValves = this.materials.valves.length;
                const totalFittings = this.materials.fittings.length;
                const totalFlanges = this.materials.flanges.length;
                
                let totalWeight = 0;
                this.materials.pipes.forEach(p => totalWeight += parseFloat(p.weight || 0));
                totalWeight += totalValves * 15;
                totalWeight += totalFittings * 5;
                totalWeight += totalFlanges * 8;
                
                db.mto = this.materials;
                db.mto.summary = {
                    totalPipeLength: totalPipeLength,
                    totalValves: totalValves,
                    totalInstruments: this.materials.instruments.length,
                    totalFittings: totalFittings,
                    totalFlanges: totalFlanges,
                    totalBolts: this.materials.bolts ? this.materials.bolts.quantity : 0,
                    totalGaskets: this.materials.gaskets ? this.materials.gaskets.quantity : 0,
                    estimatedWeight: totalWeight.toFixed(0)
                };
                
                const message = `ðĶ MTO: ${totalPipeLength}m tuberÃ­a, ${totalValves} vÃĄlvulas, ${db.mto.summary.estimatedWeight}kg`;
                showNotification(message);
                
                if (accessibility.enabled) {
                    announcer.announce(`Lista de materiales generada: ${totalPipeLength} metros de tuberÃ­a, ${totalValves} vÃĄlvulas, peso total estimado ${db.mto.summary.estimatedWeight} kilogramos`, true);
                }
                
                return this.materials;
            }

            calculatePipeWeight(diameter, length) {
                const weightPerMeter = { 2:5.44, 3:11.29, 4:16.07, 6:28.26, 8:43.21, 10:60.31, 12:73.76 }[diameter] || 28.26;
                return (weightPerMeter * length).toFixed(2);
            }

            resetMaterials() {
                this.materials = {
                    pipes: [], fittings: [], valves: [], instruments: [], flanges: [],
                    bolts: null, gaskets: null
                };
            }
        }

        let isDragging = false;

        let offsetX = 0, offsetY = 0;
        let lastAnnouncedPosition = { x: 0, y: 0 };
        
        function findElementAt(x, y) {
            const eq = db.equipos.find(eq => Math.hypot(eq.x - x, eq.y - y) < 30);
            if (eq) return { ...eq, type: 'equipo' };
            
            const line = db.lines.find(l => {
                for (let i = 0; i < l.path.length - 1; i++) {
                    const p1 = l.path[i], p2 = l.path[i+1];
                    if (distanceToSegment(x, y, p1.x, p1.y, p2.x, p2.y) < 20) return true;
                }
                return false;
            });
            if (line) return { ...line, type: 'line' };
            
            return null;
        }

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            const element = findElementAt(mouseX, mouseY);
            
            if (element && element.type === 'equipo') {
                isDragging = true;
                dragElement = db.equipos.find(e => e.id === element.id);
                offsetX = mouseX - dragElement.x;
                offsetY = mouseY - dragElement.y;
                showInspector(dragElement);
                announcer.announceElementSelected(dragElement);
            } else if (element && element.type === 'line') {
                const line = db.lines.find(l => l.id === element.id);
                showLineInspector(line);
                announcer.announce(`LÃ­nea ${line.tag} seleccionada`, true);
            } else {
                closeInspector();
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || !dragElement) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            dragElement.x = mouseX - offsetX;
            dragElement.y = mouseY - offsetY;
            
            // Anunciar posiciÃģn cada cierto umbral
            if (accessibility.enabled && accessibility.announcePositions) {
                const distance = Math.hypot(dragElement.x - lastAnnouncedPosition.x, dragElement.y - lastAnnouncedPosition.y);
                if (distance > 50) {
                    announcer.announcePosition(dragElement);

            db.lines.forEach(line => {

                    line.path[0] = { x: dragElement.x, y: dragElement.y };
                    line.path[1].y = dragElement.y;
                }
                if (line.to === dragElement.id) {
                    const last = line.path.length - 1;
                    line.path[last] = { x: dragElement.x, y: dragElement.y };
                    line.path[last - 1].y = dragElement.y;
                }
            });
            
            render();
        });
        
        canvas.addEventListener('mouseup', () => {

        // Soporte tÃĄctil para iPhone
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();

        function distanceToSegment(px, py, x1, y1, x2, y2) {
            const A = px - x1, B = py - y1, C = x2 - x1, D = y2 - y1;
            const dot = A * C + B * D;
            const len_sq = C * C + D * D;
            let param = len_sq === 0 ? -1 : dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            return Math.hypot(px - xx, py - yy);
        }

        function saveState() {
            if (db.historyIndex < db.history.length - 1) db.history = db.history.slice(0, db.historyIndex + 1);
            const state = JSON.stringify({ 
                equipos: db.equipos, 
                lines: db.lines, 
                instruments: db.instruments,
                controlLoops: db.controlLoops,
                tagCounter: db.tagCounter,
                mto: db.mto
            });
            db.history.push(state);
            if (db.history.length > 30) db.history.shift();
            db.historyIndex = db.history.length - 1;
        }
        
        function undo() {
            if (db.historyIndex > 0) {
                db.historyIndex--;
                const state = JSON.parse(db.history[db.historyIndex]);
                db.equipos = state.equipos; 
                db.lines = state.lines; 
                db.instruments = state.instruments || [];
                db.controlLoops = state.controlLoops || [];
                db.tagCounter = state.tagCounter || {};
                db.mto = state.mto || null;
                render(); 
                showNotification('âĐïļ Deshacer');
                if (accessibility.enabled) announcer.announce('Deshacer');
            }
        }
