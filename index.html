<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ACQ SmartFlow Pro | Edición Profesional Completa + Todas las Mejoras</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        body.theme-dark { background: #0d1117; color: white; }
        body.theme-dark canvas { background: white; }
        body.theme-dark header { background: #161b22; }
        body.theme-dark .modal, body.theme-dark #inspector, body.theme-dark #streamInspector, body.theme-dark #search-panel { background: white; color: black; }
        body.theme-light { background: #f0f2f5; color: #24292e; }
        body.theme-light canvas { background: white; }
        body.theme-light header { background: #ffffff; border-bottom: 1px solid #ddd; }
        body.theme-light .modal, body.theme-light #inspector, body.theme-light #streamInspector, body.theme-light #search-panel { background: white; color: black; }
        body.theme-cad { background: #000000; color: #00ff00; }
        body.theme-cad canvas { background: #000000; }
        body.theme-cad header { background: #111111; border-bottom: 1px solid #00ff00; }
        body.theme-cad .modal, body.theme-cad #inspector, body.theme-cad #streamInspector, body.theme-cad #search-panel { background: #111111; color: #00ff00; border: 1px solid #00ff00; }
        body.theme-cad button { background: #222222; color: #00ff00; border: 1px solid #00ff00; }
        body.high-contrast { background: black; color: yellow; }
        body.high-contrast button { border: 3px solid yellow !important; background: black !important; color: yellow !important; }
        body.high-contrast .modal, body.high-contrast #inspector, body.high-contrast #streamInspector, body.high-contrast #accessibility-panel, body.high-contrast #search-panel { background: black !important; color: yellow !important; border: 3px solid yellow; }
        header { padding: 10px; display: flex; gap: 8px; overflow-x: auto; flex-wrap: wrap; flex-shrink: 0; }
        button { padding: 12px 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; min-height: 44px; min-width: 44px; transition: 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:focus { outline: 4px solid #58a6ff; outline-offset: 2px; }
        .btn-primary { background: #58a6ff; color: black; }
        .btn-success { background: #238636; color: white; }
        .btn-warning { background: #d4af37; color: black; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-accessibility { background: #8957e5; color: white; }
        .btn-theme { background: #6f42c1; color: white; }
        .canvas-container { flex: 1; background: #010409; overflow: hidden; position: relative; cursor: default; }
        canvas { background: white; display: block; width: 100%; height: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        #inspector, #streamInspector { position: fixed; right: 20px; top: 80px; width: 340px; padding: 20px; border-radius: 12px; display: none; z-index: 1000; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #inspector h2, #streamInspector h2 { color: #58a6ff; margin-bottom: 15px; }
        .ins-row { margin-bottom: 15px; }
        .ins-row label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        .ins-row input, .ins-row select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; }
        #notification { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #161b22; color: white; padding: 12px 24px; border-radius: 40px; display: none; border: 2px solid #58a6ff; min-width: 300px; text-align: center; z-index: 10000; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 30px; border-radius: 12px; z-index: 10000; width: 600px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        #accessibility-panel { position: fixed; left: 20px; top: 80px; width: 300px; padding: 20px; border-radius: 12px; display: none; z-index: 1000; }
        .accessibility-option { margin-bottom: 15px; }
        #search-panel { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); width: 400px; padding: 15px; border-radius: 12px; display: none; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #search-results { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .search-result-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
        .search-result-item:hover { background: #58a6ff; color: white; }
        .mto-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 12px; }
        .mto-table th { background: #58a6ff; color: white; padding: 8px; }
        .mto-table td { border: 1px solid #ddd; padding: 6px; text-align: center; }
        .port-highlight { filter: drop-shadow(0 0 8px gold); }
        .port-valid { filter: drop-shadow(0 0 8px #4caf50); }
        .port-invalid { opacity: 0.3; }
        #zoom-controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 5px; z-index: 100; }
        .zoom-btn { width: 44px; height: 44px; border-radius: 22px; background: #161b22; color: white; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .selected-multiple { outline: 3px solid #58a6ff; outline-offset: 3px; }
        .tooltip { position: absolute; background: #161b22; color: white; padding: 8px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 1000; border: 1px solid #58a6ff; }
        .flow-arrow { pointer-events: none; }
    </style>
</head>
<body class="theme-dark">
    <div id="start-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white;">
        <h1 style="font-size:3rem; color:#58a6ff;">ACQ SmartFlow Pro</h1>
        <p style="font-size:1.2rem; margin-bottom:2rem;">Edición Profesional - TODAS LAS MEJORAS IMPLEMENTADAS</p>
        <div style="display:flex; gap:20px; flex-wrap: wrap; justify-content: center;">
            <button id="btn-nuevo" style="padding:15px 30px; background:#238636; border-radius:8px;">📄 Nuevo proyecto</button>
            <button id="btn-abrir" style="padding:15px 30px; background:#58a6ff; border-radius:8px;">📂 Abrir proyecto</button>
            <button id="btn-ejemplo" style="padding:15px 30px; background:#d4af37; border-radius:8px;">🔧 Cargar ejemplo</button>
        </div>
    </div>

    <header>
        <button class="btn-primary" onclick="App.addEquipmentFromCatalog('PUMP')">➕ BOMBA</button>
        <button class="btn-primary" onclick="App.addEquipmentFromCatalog('TANK')">➕ TANQUE</button>
        <button class="btn-primary" onclick="App.addEquipmentFromCatalog('HEAT_EXCHANGER')">➕ INTERCAMBIADOR</button>
        <button class="btn-warning" onclick="App.showValveCatalog()">➕ VÁLVULA</button>
        <button class="btn-warning" onclick="App.showInstrumentCatalog()">📊 INSTRUMENTO</button>
        <button class="btn-success" id="connectBtn" onclick="App.toggleConnectMode()">🔌 CONECTAR</button>
        <button class="btn-primary" onclick="App.recalculateJumps()">🔄 SALTOS</button>
        <button class="btn-primary" onclick="App.toggleFlowArrows()">➡️ FLUJO</button>
        <button class="btn-nlp" onclick="App.showTextInputDialog('PFD')">📝 TEXTO → PFD</button>
        <button class="btn-dti" onclick="App.showTextInputDialog('DTI')">📝 TEXTO → DTI</button>
        <button class="btn-excel" onclick="App.exportToExcel()">📤 EXCEL</button>
        <button class="btn-excel" onclick="App.importFromExcel()">📥 EXCEL</button>
        <button class="btn-hmb" onclick="App.calculateHMB()">⚖️ H&MB</button>
        <button class="btn-success" onclick="App.exportHMBToExcel()">📊 EXPORTAR H&MB</button>
        <button class="btn-sim" onclick="App.exportToPCF()">📄 PCF</button>
        <button class="btn-sim" onclick="App.importPCF()">📂 PCF</button>
        <button class="btn-iso" onclick="App.generateIsometric()">📐 ISOMÉTRICO</button>
        <button class="btn-iso" onclick="App.generateMTO()">📋 MTO</button>
        <button class="btn-iso" onclick="App.generateSpools()">🔧 SPOOLS</button>
        <button class="btn-danger" onclick="App.exportToPDF()">📄 PDF</button>
        <button class="btn-sim" onclick="App.exportToAspen()">🌍 ASPEN</button>
        <button class="btn-sim" onclick="App.exportToImage()">🖼️ PNG/SVG</button>
        <button class="btn-sim" onclick="App.exportToDWG()">📐 DWG</button>
        <button class="btn-accessibility" id="accessibilityToggle" onclick="App.toggleAccessibility()">🔊 ACC: ON</button>
        <button class="btn-theme" onclick="App.cycleTheme()">🎨 TEMA</button>
        <button class="btn-warning" onclick="App.showAccessibilityPanel()">⚙️ AJUSTES</button>
        <button class="btn-success" onclick="App.guardarProyecto()">💾 GUARDAR</button>
        <button class="btn-success" onclick="document.getElementById('cargarArchivo').click()">📂 CARGAR</button>
        <button class="btn-primary" onclick="App.showSearchPanel()">🔍 BUSCAR (Ctrl+F)</button>
        <input type="file" id="cargarArchivo" style="display:none" accept=".json" onchange="App.cargarProyecto(event)">
    </header>

    <main class="canvas-container" id="canvasContainer">
        <canvas id="mainCanvas" tabindex="0"></canvas>
    </main>

    <div id="zoom-controls">
        <button class="zoom-btn" onclick="App.zoomIn()">+</button>
        <button class="zoom-btn" onclick="App.zoomOut()">-</button>
        <button class="zoom-btn" onclick="App.fitToScreen()">⤢</button>
    </div>

    <div id="inspector">
        <h2 id="inspectorTitle">Propiedades del Equipo</h2>
        <div id="inspectorFields"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-primary" onclick="App.saveEquipmentInspector()">Guardar</button>
            <button class="btn-warning" onclick="App.closeInspector()">Cerrar</button>
        </div>
    </div>

    <div id="streamInspector">
        <h2 id="streamInspectorTitle">Propiedades de Corriente</h2>
        <div id="streamInspectorFields"></div>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-primary" onclick="App.saveStreamInspector()">Guardar</button>
            <button class="btn-warning" onclick="App.closeStreamInspector()">Cerrar</button>
        </div>
    </div>

    <div id="search-panel" style="background: white; color: black;">
        <h3 style="color:#58a6ff;">🔍 Buscar equipos</h3>
        <input type="text" id="search-input" placeholder="Tag o tipo..." style="width:100%; padding:8px;">
        <div id="search-results"></div>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="btn-primary" onclick="App.searchEquipos()">Buscar</button>
            <button class="btn-warning" onclick="App.closeSearchPanel()">Cerrar</button>
        </div>
    </div>

    <div id="accessibility-panel">
        <h3 style="color:#58a6ff;">Ajustes de voz</h3>
        <div class="accessibility-option">
            <label>Velocidad</label>
            <input type="range" id="voiceRate" min="0.5" max="2" step="0.1" value="1" oninput="App.updateVoiceRate(this.value)">
        </div>
        <div class="accessibility-option">
            <label>Tono</label>
            <input type="range" id="voicePitch" min="0.5" max="2" step="0.1" value="1" oninput="App.updateVoicePitch(this.value)">
        </div>
        <div class="accessibility-option">
            <label>Volumen</label>
            <input type="range" id="voiceVolume" min="0" max="1" step="0.1" value="1" oninput="App.updateVoiceVolume(this.value)">
        </div>
        <div class="accessibility-option">
            <label>Idioma</label>
            <select id="voiceLanguage" onchange="App.updateVoiceLanguage(this.value)">
                <option value="es-ES">Español</option>
                <option value="en-US">English</option>
            </select>
        </div>
        <div class="accessibility-option">
            <label><input type="checkbox" id="autoAnnounce" checked onchange="App.toggleAutoAnnounce(this.checked)"> Anunciar automático</label>
        </div>
        <div class="accessibility-option">
            <label><input type="checkbox" id="highContrast" onchange="App.toggleHighContrast(this.checked)"> Alto contraste</label>
        </div>
        <button class="btn-primary" onclick="App.testVoice()">Probar voz</button>
        <button class="btn-warning" onclick="App.closeAccessibilityPanel()">Cerrar</button>
    </div>

    <div id="notification"></div>

    <script>
        // ============================================
        // ESCALA GLOBAL
        // ============================================
        const SCALE = 10;
        const MM_PER_PX = 1 / SCALE;
        const M_PER_PX = MM_PER_PX / 1000;

        // ============================================
        // CATÁLOGO DE COMPONENTES
        // ============================================
        const CATALOGO = {
            bombas: {
                familia: 'Bomba centrífuga',
                tipos: [
                    { id: 'OH2', descripcion: 'Horizontal, voluta, pie', flujo_min: 10, flujo_max: 500, head_max: 200, rpm: 3600, peso_base: 200 },
                    { id: 'BB1', descripcion: 'Entre cojinetes, 1 etapa', flujo_min: 100, flujo_max: 2000, head_max: 300, rpm: 1800, peso_base: 800 }
                ],
                materiales: ['Hierro fundido', 'Acero al carbono', 'Acero inoxidable 316'],

            },

                    { id: 'HORIZONTAL', descripcion: 'Horizontal', diam_min: 1, diam_max: 5, longitud_max: 15 }
                ],

            },
            intercambiadores: {

                tipos: [
                    { id: 'BEM', descripcion: 'Cabezal fijo, haz extraíble', area_max: 500 },
                    { id: 'AES', descripcion: 'Cabezal flotante', area_max: 1000 }
                ],
                materiales_carcasa: ['Acero al carbono', 'Acero inoxidable'],
                materiales_tubos: ['Acero inoxidable 304', 'Acero inoxidable 316']
            },
            válvulas: {
                familia: 'Válvula',
                tipos: [
                    { id: 'GATE', descripcion: 'Compuerta', diametros: [2,3,4,6,8,10,12], ratings: ['150#','300#'], peso_por_pulg: 5, extremos: ['bridado', 'soldado'] },
                    { id: 'GLOBE', descripcion: 'Globo', diametros: [2,3,4,6,8], ratings: ['150#','300#'], peso_por_pulg: 6, extremos: ['bridado', 'soldado'] },
                    { id: 'BALL', descripcion: 'Bola', diametros: [2,3,4,6,8,10,12], ratings: ['150#','300#','600#'], peso_por_pulg: 4, extremos: ['bridado'] },
                    { id: 'BUTTERFLY', descripcion: 'Mariposa', diametros: [2,3,4,6,8,10,12,14,16,18,20], ratings: ['150#'], peso_por_pulg: 3, extremos: ['wafer', 'lug'] },
                    { id: 'CHECK', descripcion: 'Check', diametros: [2,3,4,6,8,10,12], ratings: ['150#','300#'], peso_por_pulg: 4.5, extremos: ['bridado'] }
                ],
                materiales: ['WCB', 'CF8M', 'Bronce']
            },
            instrumentos: {
                familia: 'Instrumento',
                tipos: [
                    { id: 'TT', descripcion: 'Transmisor temperatura', señal: '4-20mA', simbolo: 'TT' },
                    { id: 'PT', descripcion: 'Transmisor presión', señal: '4-20mA', simbolo: 'PT' },
                    { id: 'FT', descripcion: 'Transmisor flujo', señal: '4-20mA', simbolo: 'FT' },
                    { id: 'LT', descripcion: 'Transmisor nivel', señal: '4-20mA', simbolo: 'LT' },
                    { id: 'TIC', descripcion: 'Controlador temperatura', señal: '4-20mA', simbolo: 'TIC' },
                    { id: 'PIC', descripcion: 'Controlador presión', señal: '4-20mA', simbolo: 'PIC' },
                    { id: 'FIC', descripcion: 'Controlador flujo', señal: '4-20mA', simbolo: 'FIC' },
                    { id: 'LIC', descripcion: 'Controlador nivel', señal: '4-20mA', simbolo: 'LIC' },
                    { id: 'TI', descripcion: 'Indicador temperatura', señal: 'Local', simbolo: 'TI' },
                    { id: 'PI', descripcion: 'Indicador presión', señal: 'Local', simbolo: 'PI' },
                    { id: 'FI', descripcion: 'Indicador flujo', señal: 'Local', simbolo: 'FI' },
                    { id: 'LI', descripcion: 'Indicador nivel', señal: 'Local', simbolo: 'LI' }
                ],
                ubicaciones: ['Campo', 'Panel', 'Local']
            },
            tuberias: {
                diametros: [2,3,4,6,8,10,12,14,16,18,20,24],
                cedulas: ['40', '80', '160'],
                materiales: ['Acero al carbono A53', 'Acero inoxidable 304', 'Acero inoxidable 316', 'PPR', 'COBRE'],
                pesos_kg_m: {
                    '2':  { '40': 5.44, '80': 7.48, '160': 11.0 },
                    '3':  { '40': 8.63, '80': 12.5, '160': 18.5 },
                    '4':  { '40': 16.07, '80': 22.85, '160': 33.5 },
                    '6':  { '40': 28.26, '80': 39.27, '160': 58.9 },
                    '8':  { '40': 43.21, '80': 58.55, '160': 87.8 },
                    '10': { '40': 60.0, '80': 83.5, '160': 125.0 },
                    '12': { '40': 79.0, '80': 112.0, '160': 168.0 }
                }
            }
        };

        // ============================================
        // APLICACIÓN PRINCIPAL
        // ============================================
        const App = {
            canvas: document.getElementById('mainCanvas'),
            ctx: null,
            db: {
                equipos: [],
                streams: [],
                lines: [],
                controlLoops: [],
                tagCounter: { P:0, T:0, E:0, V:0, S:0, INST:100, VALVE:100, LOOP:1 },
                mto: null,
                settings: { 
                    engineerName: 'Ing. Usuario', 
                    companyName: 'ACQ', 
                    projectName: 'Proyecto ACQ',
                    snapToGrid: true,
                    gridSize: 25,
                    showFlowArrows: true,
                    theme: 'dark'
                },
                history: [],
                historyIndex: -1
            },
            accessibility: {
                enabled: true,
                voiceRate: 1.0,
                voicePitch: 1.0,
                voiceVolume: 1.0,
                voiceLanguage: 'es-ES',
                autoAnnounce: true,
                announcePositions: true,
                highContrast: false
            },
            connectMode: false,
            pendingConnection: null,
            selectedEquipment: null,
            selectedEquipments: [],
            selectedStream: null,
            isDragging: false,
            isPanning: false,
            dragElement: null,
            dragElements: [],
            offsetX: 0, offsetY: 0,
            panStartX: 0, panStartY: 0,
            viewTransform: { x: 0, y: 0, scale: 1 },
            lastAnnouncedPosition: { x:0, y:0 },
            renderPending: false,
            validTargetPorts: new Set(),
            multiSelectMode: false,
            tooltip: { visible: false, x: 0, y: 0, text: '' },
            searchPanelVisible: false,
            showFlowArrows: true,
            themes: ['dark', 'light', 'cad'],
            currentThemeIndex: 0,
            dragStartState: null,

            init: function() {
                this.ctx = this.canvas.getContext('2d');
                this.announcer = new AccessibilityAnnouncer(this);
                this.loadAccessibility();
                this.loadSettings();
                this.setupEvents();
                this.resizeCanvas();
                this.saveState();
                this.setupStartScreen();
                this.restoreLast();
                this.render();
                this.updateAllLineJumps();
                window.addEventListener('resize', () => this.resizeCanvas());
                document.addEventListener('keydown', (e) => this.onGlobalKeyDown(e));
            },

            loadSettings: function() {
                try {
                    const saved = localStorage.getItem('acq_settings');
                    if (saved) {
                        const settings = JSON.parse(saved);
                        this.db.settings = { ...this.db.settings, ...settings };
                        this.currentThemeIndex = this.themes.indexOf(this.db.settings.theme);
                        if (this.currentThemeIndex === -1) this.currentThemeIndex = 0;
                        document.body.className = `theme-${this.themes[this.currentThemeIndex]}`;
                        this.showFlowArrows = this.db.settings.showFlowArrows;
                    }
                } catch(e) {}
            },

            saveSettings: function() {
                localStorage.setItem('acq_settings', JSON.stringify(this.db.settings));
            },

            cycleTheme: function() {
                this.currentThemeIndex = (this.currentThemeIndex + 1) % this.themes.length;
                const theme = this.themes[this.currentThemeIndex];
                document.body.className = `theme-${theme}`;
                this.db.settings.theme = theme;
                this.saveSettings();
                this.render();
                this.showNotification(`🎨 Tema: ${theme}`);
            },

            resizeCanvas: function() {
                const container = document.getElementById('canvasContainer');
                const rect = container.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                this.canvas.style.width = rect.width + 'px';
                this.canvas.style.height = rect.height + 'px';
                this.canvas.width = rect.width * dpr;
                this.canvas.height = rect.height * dpr;
                this.ctx.scale(dpr, dpr);
                this.applyTransform();
                this.render();
            },

            applyTransform: function() {
                this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                this.ctx.translate(this.viewTransform.x, this.viewTransform.y);
                this.ctx.scale(this.viewTransform.scale, this.viewTransform.scale);
            },

            zoomIn: function() {
                this.viewTransform.scale *= 1.2;
                this.applyTransform();
                this.render();
            },

            zoomOut: function() {
                this.viewTransform.scale /= 1.2;
                this.applyTransform();
                this.render();
            },

            fitToScreen: function() {
                if (this.db.equipos.length === 0) return;
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                this.db.equipos.forEach(eq => {
                    minX = Math.min(minX, eq.x);
                    minY = Math.min(minY, eq.y);
                    maxX = Math.max(maxX, eq.x);
                    maxY = Math.max(maxY, eq.y);
                });
                const container = document.getElementById('canvasContainer');
                const rect = container.getBoundingClientRect();
                const margin = 50;
                const scaleX = (rect.width - margin * 2) / (maxX - minX + 100);
                const scaleY = (rect.height - margin * 2) / (maxY - minY + 100);
                this.viewTransform.scale = Math.min(scaleX, scaleY, 2);
                this.viewTransform.x = margin - minX * this.viewTransform.scale;
                this.viewTransform.y = margin - minY * this.viewTransform.scale;
                this.applyTransform();
                this.render();
            },

            loadAccessibility: function() {
                try {
                    const saved = localStorage.getItem('acq_accessibility');
                    if (saved) Object.assign(this.accessibility, JSON.parse(saved));
                } catch(e){}
                document.getElementById('accessibilityToggle').textContent = this.accessibility.enabled ? '🔊 ACC: ON' : '🔇 ACC: OFF';
                document.body.classList.toggle('high-contrast', this.accessibility.highContrast);
            },

            setupEvents: function() {
                this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.canvas.addEventListener('mouseup', () => this.onMouseUp());
                this.canvas.addEventListener('wheel', (e) => this.onWheel(e), { passive: false });
                this.canvas.addEventListener('mouseleave', () => this.onMouseLeave());
                this.canvas.addEventListener('touchstart', (e) => this.onTouchStart(e), { passive: false });
                this.canvas.addEventListener('touchmove', (e) => this.onTouchMove(e), { passive: false });
                this.canvas.addEventListener('touchend', (e) => this.onTouchEnd(e));
                this.canvas.addEventListener('dblclick', (e) => this.onDoubleClick(e));
                this.canvas.addEventListener('mousemove', (e) => this.onMouseMoveTooltip(e));
            },

            onGlobalKeyDown: function(e) {
                if (e.ctrlKey && e.key === 'f') {
                    e.preventDefault();
                    this.showSearchPanel();
                }
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); this.undo(); }
                if (e.ctrlKey && e.key === 'y') { e.preventDefault(); this.redo(); }
                if (e.key === 'Shift') this.multiSelectMode = true;
                if (e.key === 'Escape') {
                    this.connectMode = false;
                    this.pendingConnection = null;
                    this.validTargetPorts.clear();
                    document.getElementById('connectBtn').style.background = '#238636';
                    this.closeSearchPanel();
                    this.render();
                }
            },

            onMouseLeave: function() {
                this.tooltip.visible = false;
                this.render();
            },

            onMouseMoveTooltip: function(e) {
                if (!this.db.settings.showTooltips) return;
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const canvasX = (e.clientX - rect.left) * scaleX;
                const canvasY = (e.clientY - rect.top) * scaleY;
                const worldX = (canvasX - this.viewTransform.x) / this.viewTransform.scale;
                const worldY = (canvasY - this.viewTransform.y) / this.viewTransform.scale;
                const hit = this.findElementAt(worldX, worldY);
                if (hit) {
                    if (hit.type === 'equipo') {
                        this.tooltip = { visible: true, x: canvasX + 10, y: canvasY + 10, text: this.getEquipmentTooltipText(hit.data) };
                    } else if (hit.type === 'stream') {
                        this.tooltip = { visible: true, x: canvasX + 10, y: canvasY + 10, text: this.getStreamTooltipText(hit.data) };
                    } else if (hit.type === 'port') {
                        this.tooltip = { visible: true, x: canvasX + 10, y: canvasY + 10, text: `Puerto: ${hit.data.port.name} (${hit.data.port.direction})` };
                    } else {
                        this.tooltip.visible = false;
                    }
                } else {
                    this.tooltip.visible = false;
                }
                this.render();
            },

            getEquipmentTooltipText: function(eq) {
                let text = `${eq.tag} (${eq.type})\n`;
                if (eq.designParams) {
                    if (eq.designParams.size) text += `Tamaño: ${eq.designParams.size}"\n`;
                    if (eq.designParams.rating) text += `Rating: ${eq.designParams.rating}\n`;
                    if (eq.designParams.material) text += `Material: ${eq.designParams.material}\n`;
                    if (eq.designParams.flow) text += `Caudal: ${eq.designParams.flow} m³/h\n`;
                    if (eq.designParams.pressure) text += `Presión: ${eq.designParams.pressure} bar\n`;
                    if (eq.designParams.temperature) text += `Temp: ${eq.designParams.temperature} °C\n`;
                }
                return text;
            },

            getStreamTooltipText: function(stream) {
                let text = `${stream.name} (${stream.lineType})\n`;
                if (stream.lineType === 'process') {
                    text += `Diámetro: ${stream.diameter}"\nMaterial: ${stream.material}\nCédula: ${stream.schedule}\n`;
                    if (stream.fluid) {
                        text += `Fluido: ${stream.fluid.components?.[0]?.name || 'N/A'}\nT: ${stream.fluid.temperature}°C, P: ${stream.fluid.pressure} bar\nCaudal: ${stream.fluid.flow} m³/h`;
                    }
                }
                return text;
            },

            setupStartScreen: function() {
                document.getElementById('btn-nuevo').onclick = () => this.nuevoProyecto();
                document.getElementById('btn-abrir').onclick = () => this.abrirProyecto();
                document.getElementById('btn-ejemplo').onclick = () => this.cargarEjemplo();
            },

            cargarEjemplo: function() {
                this.nuevoProyecto();
                const tanque = { id: this.generateId(), tag: 'T-100', type: 'TANK', x: 300, y: 250, ports: this.getDefaultPorts('TANK'), designParams: { material: 'Acero inoxidable', volumen: 50, nivel: 2.5 }, catalogRef: null };
                const bomba = { id: this.generateId(), tag: 'P-101', type: 'PUMP', x: 500, y: 250, ports: this.getDefaultPorts('PUMP'), designParams: { material: 'Acero', flow: 150, pressure: 5, temperature: 30 }, catalogRef: null };
                const intercambiador = { id: this.generateId(), tag: 'E-201', type: 'HEAT_EXCHANGER', x: 700, y: 250, ports: this.getDefaultPorts('HEAT_EXCHANGER'), designParams: { material: 'Acero inoxidable', area: 120, temperature: 120 }, catalogRef: null };
                const valvula = { id: this.generateId(), tag: 'V-301', type: 'GATE', x: 600, y: 400, ports: this.getDefaultPorts('CONTROL_VALVE'), designParams: { size: 6, rating: '150#', material: 'WCB' }, catalogRef: null };
                const instrumento = { id: this.generateId(), tag: 'TT-101', type: 'TT', x: 450, y: 150, ports: [], designParams: { location: 'Campo', range: '0-100°C', signal: '4-20mA' }, catalogRef: null };
                this.db.equipos.push(tanque, bomba, intercambiador, valvula, instrumento);
                setTimeout(() => {
                    const fromPort = bomba.ports.find(p => p.direction === 'out');
                    const toPort = intercambiador.ports.find(p => p.direction === 'in');
                    if (fromPort && toPort) this.connectPorts(bomba, fromPort, intercambiador, toPort, 'process');
                    const fromPort2 = tanque.ports.find(p => p.direction === 'out');
                    const toPort2 = bomba.ports.find(p => p.direction === 'in');
                    if (fromPort2 && toPort2) this.connectPorts(tanque, fromPort2, bomba, toPort2, 'process');
                }, 100);
                this.saveState();
                this.ocultarInicio();
                this.fitToScreen();
                this.showNotification('✅ Proyecto de ejemplo cargado');
            },

            restoreLast: function() {
                try {
                    let guardado = localStorage.getItem('acqProyecto');
                    if (guardado) {
                        if (!guardado.startsWith('{') && window.LZString) guardado = LZString.decompress(guardado);
                        if (guardado && confirm('¿Restaurar último proyecto?')) {
                            this.db = this.mergeWithDefaults(JSON.parse(guardado));
                            this.render();
                            this.ocultarInicio();
                            this.updateAllLineJumps();
                        }
                    }
                } catch(e){}
            },

            ocultarInicio: function() {
                document.getElementById('start-screen').style.display = 'none';
            },

            toggleConnectMode: function() {
                this.connectMode = !this.connectMode;
                this.pendingConnection = null;
                this.validTargetPorts.clear();
                document.getElementById('connectBtn').style.background = this.connectMode ? '#e74c3c' : '#238636';
                this.showNotification(this.connectMode ? 'Modo conexión activado - Selecciona puerto de salida' : 'Modo conexión desactivado');
                this.render();
            },

            toggleFlowArrows: function() {
                this.showFlowArrows = !this.showFlowArrows;
                this.db.settings.showFlowArrows = this.showFlowArrows;
                this.saveSettings();
                this.render();
                this.showNotification(this.showFlowArrows ? '➡️ Flechas de flujo activadas' : '➡️ Flechas de flujo desactivadas');
            },

            // ========== ACCESIBILIDAD ==========
            toggleAccessibility: function() {
                this.accessibility.enabled = !this.accessibility.enabled;
                document.getElementById('accessibilityToggle').textContent = this.accessibility.enabled ? '🔊 ACC: ON' : '🔇 ACC: OFF';
                localStorage.setItem('acq_accessibility', JSON.stringify(this.accessibility));
                if (this.accessibility.enabled) this.announcer.announce('Modo accesibilidad activado');
            },
            showAccessibilityPanel: function() {
                document.getElementById('accessibility-panel').style.display = 'block';
                this.updateAccessibilityUI();
            },
            closeAccessibilityPanel: function() {
                document.getElementById('accessibility-panel').style.display = 'none';
            },
            updateAccessibilityUI: function() {
                document.getElementById('voiceRate').value = this.accessibility.voiceRate;
                document.getElementById('voicePitch').value = this.accessibility.voicePitch;
                document.getElementById('voiceVolume').value = this.accessibility.voiceVolume;
                document.getElementById('voiceLanguage').value = this.accessibility.voiceLanguage;
                document.getElementById('autoAnnounce').checked = this.accessibility.autoAnnounce;
                document.getElementById('highContrast').checked = this.accessibility.highContrast;
            },
            updateVoiceRate: function(v) { this.accessibility.voiceRate = parseFloat(v); this.saveAccessibility(); },
            updateVoicePitch: function(v) { this.accessibility.voicePitch = parseFloat(v); this.saveAccessibility(); },
            updateVoiceVolume: function(v) { this.accessibility.voiceVolume = parseFloat(v); this.saveAccessibility(); },
            updateVoiceLanguage: function(v) { this.accessibility.voiceLanguage = v; this.saveAccessibility(); },
            toggleAutoAnnounce: function(c) { this.accessibility.autoAnnounce = c; this.saveAccessibility(); },
            toggleHighContrast: function(c) { 
                this.accessibility.highContrast = c; 
                document.body.classList.toggle('high-contrast', c);
                this.saveAccessibility();
                this.render();
            },
            testVoice: function() { this.announcer.speak('Prueba de voz'); },
            saveAccessibility: function() { localStorage.setItem('acq_accessibility', JSON.stringify(this.accessibility)); },

            // ========== BÚSQUEDA ==========
            showSearchPanel: function() {
                this.searchPanelVisible = true;
                document.getElementById('search-panel').style.display = 'block';
                document.getElementById('search-input').focus();
            },
            closeSearchPanel: function() {
                this.searchPanelVisible = false;
                document.getElementById('search-panel').style.display = 'none';
            },
            searchEquipos: function() {
                const query = document.getElementById('search-input').value.toLowerCase();
                if (!query) return;
                const results = this.db.equipos.filter(e => e.tag.toLowerCase().includes(query) || e.type.toLowerCase().includes(query));
                let html = '';
                results.forEach(eq => html += `<div class="search-result-item" onclick="App.goToEquipment('${eq.id}')">${eq.tag} - ${eq.type}</div>`);
                if (results.length === 0) html = '<div>No se encontraron resultados</div>';
                document.getElementById('search-results').innerHTML = html;
            },
            goToEquipment: function(id) {
                const eq = this.db.equipos.find(e => e.id === id);
                if (eq) {
                    this.viewTransform.x = -eq.x * this.viewTransform.scale + 400;
                    this.viewTransform.y = -eq.y * this.viewTransform.scale + 300;
                    this.applyTransform();
                    this.render();
                    this.selectedEquipment = eq;
                    this.selectedEquipments = [eq];
                    this.closeSearchPanel();
                    this.announcer?.announce(`Enfocado en ${eq.tag}`);
                }
            },

            // ========== NOTIFICACIONES ==========
            showNotification: function(msg, isError = false, isHTML = false) {
                const n = document.getElementById('notification');
                if (isHTML) n.innerHTML = msg; else n.textContent = msg;
                n.style.display = 'block';
                n.style.background = isError ? '#e74c3c' : '#161b22';
                setTimeout(() => n.style.display = 'none', 5000);
            },

            // ========== RENDERIZADO ==========
            render: function() {
                if (this.renderPending) return;
                this.renderPending = true;
                requestAnimationFrame(() => {
                    const dpr = window.devicePixelRatio || 1;
                    this.ctx.clearRect(0, 0, this.canvas.width / dpr, this.canvas.height / dpr);
                    this.ctx.save();
                    this.applyTransform();
                    this.drawGrid();
                    this.db.lines.forEach(line => this.drawLine(line));
                    if (this.showFlowArrows) this.db.lines.forEach(line => this.drawFlowArrows(line));
                    this.db.equipos.forEach(eq => {
                        const isSelected = this.selectedEquipment === eq || this.selectedEquipments.includes(eq);
                        const sym = this.getSymbol(eq.type);
                        sym.draw(this.ctx, eq.x, eq.y, isSelected);
                        this.ctx.fillStyle = this.accessibility.highContrast ? 'yellow' : '#000';
                        this.ctx.font = 'bold 12px Arial';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText(eq.tag, eq.x, eq.y - 35);
                        if (eq.ports) {
                            eq.ports.forEach((port, idx) => {
                                const portX = eq.x - 15 + idx*15;
                                const portY = eq.y - 15;
                                if (this.connectMode && this.pendingConnection && port.direction === 'in') {
                                    const portId = `${eq.id}-${idx}`;
                                    this.ctx.fillStyle = this.validTargetPorts.has(portId) ? '#4caf50' : '#ccc';
                                } else {
                                    this.ctx.fillStyle = port.direction === 'in' ? '#4caf50' : (port.direction === 'out' ? '#f44336' : '#2196f3');
                                }
                                this.ctx.beginPath();
                                this.ctx.arc(portX, portY, 6, 0, 2*Math.PI);
                                this.ctx.fill();
                                if (port.highlighted) {
                                    this.ctx.strokeStyle = 'gold';
                                    this.ctx.lineWidth = 3;
                                    this.ctx.stroke();
                                }
                            });
                        }
                    });
                    if (this.selectedStream) {
                        const line = this.db.lines.find(l => l.streamId === this.selectedStream.id);
                        if (line) {
                            this.ctx.save();
                            this.ctx.strokeStyle = '#58a6ff';
                            this.ctx.lineWidth = 4;
                            this.drawLinePath(line.path);
                            this.ctx.restore();
                        }
                    }
                    this.ctx.restore();
                    if (this.tooltip.visible) {
                        this.ctx.save();
                        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                        this.ctx.fillStyle = '#161b22';
                        this.ctx.shadowColor = 'rgba(0,0,0,0.5)';
                        this.ctx.shadowBlur = 10;
                        this.ctx.beginPath();
                        this.ctx.roundRect(this.tooltip.x, this.tooltip.y, 200, 80, 5);
                        this.ctx.fill();
                        this.ctx.shadowBlur = 0;
                        this.ctx.fillStyle = 'white';
                        this.ctx.font = '12px Arial';
                        this.tooltip.text.split('\n').forEach((line, i) => {
                            this.ctx.fillText(line, this.tooltip.x + 10, this.tooltip.y + 20 + i * 15);
                        });
                        this.ctx.restore();
                    }
                    this.renderPending = false;
                });
            },

            drawGrid: function() {
                this.ctx.save(); 
                this.ctx.strokeStyle = this.accessibility.highContrast ? '#333' : (this.db.settings.theme === 'cad' ? '#003300' : '#f0f0f0'); 
                this.ctx.lineWidth = 0.5;
                const step = this.db.settings.gridSize || 50;
                const width = this.canvas.width / this.viewTransform.scale;
                const height = this.canvas.height / this.viewTransform.scale;
                const startX = -this.viewTransform.x / this.viewTransform.scale;
                const startY = -this.viewTransform.y / this.viewTransform.scale;
                for (let i = 0; i < width; i += step) { 
                    this.ctx.beginPath(); 
                    this.ctx.moveTo(startX + i, startY); 
                    this.ctx.lineTo(startX + i, startY + height); 
                    this.ctx.stroke(); 
                }
                for (let i = 0; i < height; i += step) { 
                    this.ctx.beginPath(); 
                    this.ctx.moveTo(startX, startY + i); 
                    this.ctx.lineTo(startX + width, startY + i); 
                    this.ctx.stroke(); 
                }
                this.ctx.restore();
            },

            drawFlowArrows: function(line) {
                const stream = this.db.streams.find(s => s.id === line.streamId);
                if (!stream || stream.lineType !== 'process') return;
                const path = line.path;
                const arrowSize = 10;
                const spacing = 100;
                for (let i = 0; i < path.length - 1; i++) {
                    const p1 = path[i];
                    const p2 = path[i+1];
                    const segLength = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                    for (let d = spacing; d < segLength; d += spacing) {
                        const t = d / segLength;
                        const x = p1.x + (p2.x - p1.x) * t;
                        const y = p1.y + (p2.y - p1.y) * t;
                        this.ctx.save();
                        this.ctx.translate(x, y);
                        this.ctx.rotate(Math.atan2(p2.y - p1.y, p2.x - p1.x));
                        this.ctx.fillStyle = stream.fluid?.phase === 'vapor' ? '#00a' : '#000';
                        this.ctx.beginPath();
                        this.ctx.moveTo(0, 0);
                        this.ctx.lineTo(-arrowSize, -arrowSize/2);
                        this.ctx.lineTo(-arrowSize, arrowSize/2);
                        this.ctx.closePath();
                        this.ctx.fill();
                        this.ctx.restore();
                    }
                }
            },

            getSymbol: function(type) {
                const symbols = {
                    PUMP: { draw: (ctx, x, y, sel) => {
                        ctx.strokeStyle = sel ? '#58a6ff' : '#000'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.arc(x, y, 20, 0, 2*Math.PI); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x-15, y+15); ctx.lineTo(x+15, y+15); ctx.stroke();
                    }},
                    TANK: { draw: (ctx, x, y, sel) => {
                        ctx.strokeStyle = sel ? '#58a6ff' : '#000'; ctx.lineWidth = 2;
                        ctx.strokeRect(x-25, y-30, 50, 60);
                        ctx.beginPath(); ctx.moveTo(x-15, y-20); ctx.lineTo(x+15, y-20);
                        ctx.moveTo(x-15, y+10); ctx.lineTo(x+15, y+10); ctx.stroke();
                    }},
                    HEAT_EXCHANGER: { draw: (ctx, x, y, sel) => {
                        ctx.strokeStyle = sel ? '#58a6ff' : '#000'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.arc(x, y, 25, 0, 2*Math.PI); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x-17, y+17); ctx.lineTo(x+17, y-17); ctx.stroke();
                    }},
                    CONTROL_VALVE: { draw: (ctx, x, y, sel) => {
                        ctx.strokeStyle = sel ? '#58a6ff' : '#000'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(x-15, y-10); ctx.lineTo(x+15, y+10);
                        ctx.lineTo(x+15, y-10); ctx.lineTo(x-15, y+10); ctx.closePath(); ctx.stroke();
                    }},
                    INSTRUMENT: { draw: (ctx, x, y, sel) => {
                        ctx.strokeStyle = sel ? '#58a6ff' : '#000'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(x, y, 15, 10, 0, 0, 2*Math.PI); ctx.stroke();
                        ctx.font = 'bold 12px Arial'; ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.fillText('I', x, y+4);
                    }}
                };
                if (type === 'TT' || type === 'PT' || type === 'FT' || type === 'LT') {
                    return { draw: (ctx, x, y, sel) => {
                        ctx.strokeStyle = sel ? '#58a6ff' : '#000'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(x, y, 15, 10, 0, 0, 2*Math.PI); ctx.stroke();
                        ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.fillText(type, x, y+4);
                    }};
                }
                if (type === 'TIC' || type === 'PIC' || type === 'FIC' || type === 'LIC') {
                    return { draw: (ctx, x, y, sel) => {
                        ctx.strokeStyle = sel ? '#58a6ff' : '#000'; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.ellipse(x, y, 15, 10, 0, 0, 2*Math.PI); ctx.stroke();
                        ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.fillText(type, x, y+4);
                        ctx.beginPath(); ctx.moveTo(x-5, y-8); ctx.lineTo(x+5, y-15); ctx.stroke();
                    }};
                }
                return symbols[type] || symbols.INSTRUMENT;
            },

            drawLine: function(line) {
                const stream = this.db.streams.find(s => s.id === line.streamId);
                if (!stream) return;
                this.ctx.save();
                if (stream.lineType === 'signal') {
                    this.ctx.strokeStyle = '#f00';
                    this.ctx.setLineDash([5, 3]);
                } else {
                    this.ctx.strokeStyle = stream.fluid?.phase === 'vapor' ? '#00a' : '#000';
                    this.ctx.setLineDash([]);
                }
                this.ctx.lineWidth = 2;
                if (line.jumps && line.jumps.length > 0) this.drawLineWithJumps(line);
                else this.drawLinePath(line.path);
                this.ctx.restore();
            },

            drawLinePath: function(path) {
                if (path.length < 2) return;
                this.ctx.beginPath();
                this.ctx.moveTo(path[0].x, path[0].y);
                for (let i = 1; i < path.length; i++) this.ctx.lineTo(path[i].x, path[i].y);
                this.ctx.stroke();
            },

            drawLineWithJumps: function(line) {
                const jumps = line.jumps || [];
                const path = line.path;
                for (let i = 0; i < path.length - 1; i++) {
                    const start = path[i];
                    const end = path[i+1];
                    const segmentJumps = jumps.filter(j => j.segmentIndex === i);
                    if (segmentJumps.length === 0) {
                        this.ctx.beginPath();
                        this.ctx.moveTo(start.x, start.y);
                        this.ctx.lineTo(end.x, end.y);
                        this.ctx.stroke();
                    } else {
                        let currentStart = start;
                        segmentJumps.sort((a,b) => a.t - b.t);
                        for (const jump of segmentJumps) {
                            if (jump.isJumping) {
                                this.ctx.beginPath();
                                this.ctx.moveTo(currentStart.x, currentStart.y);
                                this.ctx.lineTo(jump.start.x, jump.start.y);
                                this.ctx.stroke();
                                this.ctx.beginPath();
                                this.ctx.quadraticCurveTo(jump.control.x, jump.control.y, jump.end.x, jump.end.y);
                                this.ctx.stroke();
                                currentStart = jump.end;
                            }
                        }
                        if (currentStart !== end) {
                            this.ctx.beginPath();
                            this.ctx.moveTo(currentStart.x, currentStart.y);
                            this.ctx.lineTo(end.x, end.y);
                            this.ctx.stroke();
                        }
                    }
                }
            },

            // ========== LÍNEAS ORTOGONALES ==========
            generateOrthogonalPath: function(fromX, fromY, toX, toY, fromDir = 'out', toDir = 'in') {
                const points = [{ x: fromX, y: fromY }];
                const midX = (fromX + toX) / 2;
                const midY = (fromY + toY) / 2;
                if (Math.abs(fromX - toX) > Math.abs(fromY - toY)) {
                    points.push({ x: midX, y: fromY });
                    points.push({ x: midX, y: toY });
                } else {
                    points.push({ x: fromX, y: midY });
                    points.push({ x: toX, y: midY });
                }
                points.push({ x: toX, y: toY });
                return this.optimizePath(points);
            },

            optimizePath: function(points) {
                if (points.length < 3) return points;
                const optimized = [points[0]];
                for (let i = 1; i < points.length - 1; i++) {
                    const prev = optimized[optimized.length-1];
                    const curr = points[i];
                    const next = points[i+1];
                    const sameX = (prev.x === curr.x && curr.x === next.x);
                    const sameY = (prev.y === curr.y && curr.y === next.y);
                    if (!sameX && !sameY) optimized.push(curr);
                }
                optimized.push(points[points.length-1]);
                return optimized;
            },

            // ========== ROUTING AVANZADO ==========
            findPathAvoidingObstacles: function(fromX, fromY, toX, toY) {
                const path = this.generateOrthogonalPath(fromX, fromY, toX, toY);
                if (!this.checkPathCollision(path)) return path;
                const midX1 = fromX, midY1 = fromY + (toY - fromY) * 0.3;
                const midX2 = toX, midY2 = fromY + (toY - fromY) * 0.7;
                const detour = [
                    { x: fromX, y: fromY },
                    { x: fromX, y: midY1 },
                    { x: toX, y: midY2 },
                    { x: toX, y: toY }
                ];
                return this.optimizePath(detour);
            },

            checkPathCollision: function(path) {
                for (let i = 0; i < path.length-1; i++) {
                    const p1 = path[i], p2 = path[i+1];
                    for (const eq of this.db.equipos) {
                        if (this.distanceToSegment(eq.x, eq.y, p1.x, p1.y, p2.x, p2.y) < 40) return true;
                    }
                }
                return false;
            },

            // ========== LINE JUMPS ==========
            checkLineIntersections: function() {
                this.db.lines.forEach(line => line.jumps = []);
                for (let i = 0; i < this.db.lines.length; i++) {
                    for (let j = i+1; j < this.db.lines.length; j++) {
                        const line1 = this.db.lines[i];
                        const line2 = this.db.lines[j];
                        const s1 = this.db.streams.find(s => s.id === line1.streamId);
                        const s2 = this.db.streams.find(s => s.id === line2.streamId);
                        if (s1?.lineType !== 'process' || s2?.lineType !== 'process') continue;
                        this.findIntersectionsBetweenLines(line1, line2);
                    }
                }
            },

            findIntersectionsBetweenLines: function(line1, line2) {
                for (let i = 0; i < line1.path.length-1; i++) {
                    const p1 = line1.path[i], p2 = line1.path[i+1];
                    for (let j = 0; j < line2.path.length-1; j++) {
                        const p3 = line2.path[j], p4 = line2.path[j+1];
                        const inter = this.getLineIntersection(p1.x,p1.y,p2.x,p2.y,p3.x,p3.y,p4.x,p4.y);
                        if (inter) {
                            const s1 = this.db.streams.find(s => s.id === line1.streamId);
                            const s2 = this.db.streams.find(s => s.id === line2.streamId);
                            const p1 = this.getLinePriority(s1);
                            const p2 = this.getLinePriority(s2);
                            if (p1 > p2) this.addLineJump(line2, inter, j, true);
                            else if (p2 > p1) this.addLineJump(line1, inter, i, true);
                            else this.addLineJump((i+j)%2===0 ? line1 : line2, inter, (i+j)%2===0 ? i : j, true);
                        }
                    }
                }
            },

            getLinePriority: function(stream) {
                if (!stream) return 0;
                if (stream.lineType === 'process') return 3;
                if (stream.lineType === 'signal') return 2;
                if (stream.lineType === 'electrical') return 1;
                return 0;
            },

            getLineIntersection: function(x1,y1,x2,y2,x3,y3,x4,y4) {
                const det = (x2-x1)*(y4-y3) - (x4-x3)*(y2-y1);
                if (Math.abs(det) < 1e-10) return null;
                const t = ((x3-x1)*(y4-y3) - (y3-y1)*(x4-x3)) / det;
                const u = ((x3-x1)*(y2-y1) - (y3-y1)*(x2-x1)) / det;
                if (t>=0 && t<=1 && u>=0 && u<=1) {
                    return {
                        x: x1 + t*(x2-x1),
                        y: y1 + t*(y2-y1),
                        t: t, u: u,
                        seg1: { start:{x:x1,y:y1}, end:{x:x2,y:y2} },
                        seg2: { start:{x:x3,y:y3}, end:{x:x4,y:y4} }
                    };
                }
                return null;
            },

            addLineJump: function(line, intersection, segmentIndex, isJumping = true) {
                if (!line.jumps) line.jumps = [];
                const seg = line.path[segmentIndex];
                const next = line.path[segmentIndex+1];
                const angle = Math.atan2(next.y - seg.y, next.x - seg.x);
                const jumpSize = 12;
                const perpAngle = angle + Math.PI/2;
                const start = { x: intersection.x - Math.cos(angle)*jumpSize/2, y: intersection.y - Math.sin(angle)*jumpSize/2 };
                const end = { x: intersection.x + Math.cos(angle)*jumpSize/2, y: intersection.y + Math.sin(angle)*jumpSize/2 };
                const control = { x: intersection.x + Math.cos(perpAngle)*jumpSize/2, y: intersection.y + Math.sin(perpAngle)*jumpSize/2 };
                line.jumps.push({ x: intersection.x, y: intersection.y, segmentIndex, isJumping, start, end, control, angle, t: intersection.t });
            },

            updateAllLineJumps: function() {
                this.checkLineIntersections();
                this.render();
            },

            recalculateJumps: function() {
                this.updateAllLineJumps();
                this.showNotification('🔄 Saltos de línea recalculados');
            },

            generateTag: function(prefix) {
                if (!this.db.tagCounter[prefix]) this.db.tagCounter[prefix] = 1;
                else this.db.tagCounter[prefix]++;
                return `${prefix}-${String(this.db.tagCounter[prefix]).padStart(3, '0')}`;
            },

            generateId: function() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,9); },

            getDefaultPorts: function(type) {
                if (type === 'PUMP') return [{ id:this.generateId(), name:'succión', direction:'in' }, { id:this.generateId(), name:'descarga', direction:'out' }];
                if (type === 'TANK') return [{ id:this.generateId(), name:'entrada', direction:'in' }, { id:this.generateId(), name:'salida', direction:'out' }];
                if (type === 'HEAT_EXCHANGER') return [
                    { id:this.generateId(), name:'entrada caliente', direction:'in' }, { id:this.generateId(), name:'salida caliente', direction:'out' },
                    { id:this.generateId(), name:'entrada fría', direction:'in' }, { id:this.generateId(), name:'salida fría', direction:'out' }
                ];
                return [{ id:this.generateId(), name:'entrada', direction:'in' }, { id:this.generateId(), name:'salida', direction:'out' }];
            },

            validateConnection: function(fromEq, fromPort, toEq, toPort, lineType, silent=false) {
                if (lineType !== 'process') return true;
                let warnings = [];
                if (fromEq.designParams?.size !== undefined && toEq.designParams?.size !== undefined && fromEq.designParams.size !== toEq.designParams.size) warnings.push(`Los diámetros no coinciden (${fromEq.designParams.size}" vs ${toEq.designParams.size}")`);
                if (fromEq.designParams?.rating !== undefined && toEq.designParams?.rating !== undefined && fromEq.designParams.rating !== toEq.designParams.rating) warnings.push(`Los ratings no coinciden (${fromEq.designParams.rating} vs ${toEq.designParams.rating})`);
                if (fromEq.designParams?.material !== undefined && toEq.designParams?.material !== undefined && fromEq.designParams.material !== toEq.designParams.material) warnings.push(`Los materiales no coinciden (${fromEq.designParams.material} vs ${toEq.designParams.material})`);
                if (!silent && warnings.length > 0) {
                    const msg = warnings.join('\n');
                    if (!confirm(`Advertencias de compatibilidad:\n${msg}\n¿Conectar de todas formas?`)) return false;
                }
                return warnings.length === 0;
            },

            connectPorts: function(fromEq, fromPort, toEq, toPort, lineType='process') {
                if (fromPort.direction !== 'out' || toPort.direction !== 'in') { this.showNotification('Error: La conexión debe ser desde salida a entrada', true); return false; }
                if (!this.validateConnection(fromEq, fromPort, toEq, toPort, lineType)) return false;
                let streamTag = this.generateTag('S');
                let path = this.generateOrthogonalPath(fromEq.x, fromEq.y, toEq.x, toEq.y, fromPort.direction, toPort.direction);
                let components = [];
                const pipeLength = this.calcPathLength(path) * M_PER_PX;
                components.push({ type:'PIPE', bore: fromEq.designParams?.size||6, schedule:'40', material: fromEq.designParams?.material||'ACERO', length: pipeLength, points: path.map(p=>({ x:p.x*MM_PER_PX, y:p.y*MM_PER_PX, z:0 })) });
                let stream = { id: this.generateId(), name: streamTag, lineType, fluid: lineType==='process' ? { components:[{ name:'agua', fraction:1.0 }], phase:'liquid', temperature:25, pressure:1, flow:100, enthalpy:0 } : null, source:{ equipmentId:fromEq.id, portId:fromPort.id }, target:{ equipmentId:toEq.id, portId:toPort.id }, lineId:null, diameter: fromEq.designParams?.size||6, material: fromEq.designParams?.material||'ACERO', schedule:'40', components };
                let line = { id: this.generateId(), streamId: stream.id, path };
                stream.lineId = line.id;
                this.db.streams.push(stream); this.db.lines.push(line);
                this.saveState(); this.updateAllLineJumps(); this.render();
                this.showNotification(`Conectados ${fromEq.tag} → ${toEq.tag} como ${streamTag} (${lineType})`);
                return true;
            },

            calcPathLength: function(path) {
                let len = 0;
                for (let i=0; i<path.length-1; i++) len += Math.hypot(path[i+1].x - path[i].x, path[i+1].y - path[i].y);
                return len;
            },

            updateLineOnEquipmentMove: function(equipo) {
                this.db.streams.forEach(stream => {
                    if (stream.source.equipmentId === equipo.id || stream.target.equipmentId === equipo.id) {
                        const line = this.db.lines.find(l=>l.streamId===stream.id);
                        if (!line) return;
                        const sourceEq = this.db.equipos.find(e=>e.id===stream.source.equipmentId);
                        const targetEq = this.db.equipos.find(e=>e.id===stream.target.equipmentId);
                        const sourcePort = sourceEq?.ports.find(p=>p.id===stream.source.portId);
                        const targetPort = targetEq?.ports.find(p=>p.id===stream.target.portId);
                        if (sourceEq && targetEq && sourcePort && targetPort) {
                            line.path = this.generateOrthogonalPath(sourceEq.x, sourceEq.y, targetEq.x, targetEq.y, sourcePort.direction, targetPort.direction);
                            stream.components.forEach(comp => {
                                if (comp.type === 'PIPE') {
                                    comp.points = line.path.map(p=>({ x:p.x*MM_PER_PX, y:p.y*MM_PER_PX, z:0 }));
                                    comp.length = this.calcPathLength(line.path) * M_PER_PX;
                                }
                            });
                        }
                    }
                });
            },
