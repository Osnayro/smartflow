body{background:#000;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}

<script>
let db={equipos:[],lines:[]},cam={scale:0.5,panX:0,panY:0},selectedElement=null,voiceEnabled=true,history={past:[],future:[],maxSize:30},toolMode='select';
let draggingEquipment=false,draggedEquip=null,dragLastPos={x:0,y:0},panning=false,panStart={x:0,y:0};
const canvas=document.getElementById('isoCanvas'),ctx=canvas.getContext('2d');
function notify(msg,isErr=false){const n=document.getElementById('notification');n.textContent=msg;n.style.backgroundColor=isErr?'#da3633':'#238636';n.style.display='block';document.getElementById('statusMsg').innerHTML=msg;if(voiceEnabled&&window.speechSynthesis){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(msg);u.lang='es-ES';setTimeout(()=>window.speechSynthesis.speak(u),50);}setTimeout(()=>n.style.display='none',4000);}
function saveState(){const state=JSON.parse(JSON.stringify({equipos:db.equipos,lines:db.lines}));history.past.push(state);if(history.past.length>history.maxSize)history.past.shift();history.future=[];}
function undo(){if(history.past.length===0)return;const current=JSON.parse(JSON.stringify({equipos:db.equipos,lines:db.lines}));history.future.push(current);const prev=history.past.pop();db.equipos=prev.equipos;db.lines=prev.lines;selectedElement=null;render();notify("↩️ Deshecho");}
function redo(){if(history.future.length===0)return;const current=JSON.parse(JSON.stringify({equipos:db.equipos,lines:db.lines}));history.past.push(current);const next=history.future.pop();db.equipos=next.equipos;db.lines=next.lines;selectedElement=null;render();notify("↪️ Rehecho");}
function project(p){const cos30=0.866,sin30=0.5;return{x:(p.x-p.z)*cos30*cam.scale+cam.panX,y:(p.x+p.z)*sin30*cam.scale-p.y*cam.scale+cam.panY};}
function inverseProject(sx,sy){const X=(sx-cam.panX)/cam.scale,Y=(sy-cam.panY)/cam.scale,A=X/0.866,B=Y/0.5;return{x:(A+B)/2,y:0,z:(B-A)/2};}
const EquiposCatalogo={tanque_v:{nombre:'Tanque Vertical',puertos:(e)=>[{id:'N1',label:'Salida fondo',relX:0,relY:-e.altura/2,relZ:0,diametro:4,tipoConexion:'NPT',orientacion:{dx:0,dy:-1,dz:0},material:e.material||'CS'},{id:'N2',label:'Entrada superior',relX:0,relY:e.altura/2,relZ:0,diametro:3,tipoConexion:'NPT',orientacion:{dx:0,dy:1,dz:0}}]},tanque_h:{nombre:'Tanque Horizontal',puertos:(e)=>[{id:'N1',label:'Salida',relX:e.diametro/2,relY:0,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:1,dy:0,dz:0}},{id:'N2',label:'Entrada',relX:-e.diametro/2,relY:0,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:-1,dy:0,dz:0}}]},bomba:{nombre:'Bomba',puertos:(e)=>[{id:'SUC',label:'Succión',relX:-500,relY:0,relZ:0,diametro:4,tipoConexion:'NPT',orientacion:{dx:-1,dy:0,dz:0},material:e.material||'SS'},{id:'DESC',label:'Descarga',relX:500,relY:0,relZ:0,diametro:3,tipoConexion:'NPT',orientacion:{dx:1,dy:0,dz:0}}]},intercambiador:{nombre:'Intercambiador',puertos:(e)=>[{id:'E1',label:'Entrada tubos',relX:-e.largo/2,relY:0,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:-1,dy:0,dz:0}},{id:'E2',label:'Salida tubos',relX:e.largo/2,relY:0,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:1,dy:0,dz:0}},{id:'C1',label:'Entrada coraza',relX:0,relY:e.altura/2,relZ:-e.diametro/2,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:1,dz:0}},{id:'C2',label:'Salida coraza',relX:0,relY:-e.altura/2,relZ:e.diametro/2,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:-1,dz:0}}]},torre:{nombre:'Torre',puertos:(e)=>[{id:'FEED',label:'Alimentación',relX:0,relY:e.altura*0.3,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:1,dy:0,dz:0}},{id:'TOPS',label:'Destilado',relX:0,relY:e.altura/2,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:1,dz:0}},{id:'BOT',label:'Fondo',relX:0,relY:-e.altura/2,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:-1,dz:0}}]},reactor:{nombre:'Reactor',puertos:(e)=>[{id:'IN',label:'Entrada',relX:0,relY:e.altura*0.2,relZ:e.diametro/2,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:0,dz:1}},{id:'OUT',label:'Salida',relX:0,relY:-e.altura/2,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:-1,dz:0}}]},caldera:{nombre:'Caldera',puertos:(e)=>[{id:'GAS',label:'Entrada gas',relX:-e.largo/2,relY:0,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:-1,dy:0,dz:0}},{id:'VAPOR',label:'Salida vapor',relX:e.largo/2,relY:e.altura/2,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:1,dy:0,dz:0}}]},compresor:{nombre:'Compresor',puertos:(e)=>[{id:'SUC',label:'Succión',relX:-e.largo/2,relY:0,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:-1,dy:0,dz:0}},{id:'DESC',label:'Descarga',relX:e.largo/2,relY:0,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:1,dy:0,dz:0}}]},separador:{nombre:'Separador',puertos:(e)=>[{id:'IN',label:'Entrada',relX:-e.diametro/2,relY:0,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:-1,dy:0,dz:0}},{id:'GAS',label:'Salida gas',relX:0,relY:e.altura/2,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:1,dz:0}},{id:'LIQ',label:'Salida líquido',relX:0,relY:-e.altura/2,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:0,dy:-1,dz:0}}]},clarificador:{nombre:'Clarificador',puertos:(e)=>[{id:'IN',label:'Entrada',relX:0,relY:e.altura*0.3,relZ:e.diametro/2,diametro:6,tipoConexion:'Flange',orientacion:{dx:0,dy:0,dz:1}},{id:'OUT',label:'Efluente',relX:0,relY:e.altura*0.1,relZ:-e.diametro/2,diametro:6,tipoConexion:'Flange',orientacion:{dx:0,dy:0,dz:-1}}]},filtro_arena:{nombre:'Filtro arena',puertos:(e)=>[{id:'IN',label:'Entrada',relX:0,relY:e.altura/2,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:0,dy:1,dz:0}},{id:'OUT',label:'Salida',relX:0,relY:-e.altura/2,relZ:0,diametro:6,tipoConexion:'Flange',orientacion:{dx:0,dy:-1,dz:0}}]},osmosis:{nombre:'Ósmosis',puertos:(e)=>[{id:'FEED',label:'Alimentación',relX:-e.largo/2,relY:0,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:-1,dy:0,dz:0}},{id:'PERM',label:'Permeado',relX:e.largo/2,relY:0,relZ:0,diametro:4,tipoConexion:'Flange',orientacion:{dx:1,dy:0,dz:0}},{id:'CONC',label:'Concentrado',relX:0,relY:-e.altura/2,relZ:e.largo/2,diametro:3,tipoConexion:'Flange',orientacion:{dx:0,dy:-1,dz:0}}]},tanque_acero:{nombre:'Tanque Acero Inox',puertos:(e)=>[{id:'IN',label:'Entrada',relX:0,relY:e.altura*0.2,relZ:e.diametro/2,diametro:4,tipoConexion:'Clamp',orientacion:{dx:0,dy:0,dz:1},material:'SS304'},{id:'OUT',label:'Salida',relX:0,relY:-e.altura/2,relZ:0,diametro:4,tipoConexion:'Clamp',orientacion:{dx:0,dy:-1,dz:0}}]},pasteurizador:{nombre:'Pasteurizador',puertos:(e)=>[{id:'IN',label:'Producto frío',relX:-e.largo/2,relY:0,relZ:0,diametro:4,tipoConexion:'Clamp',orientacion:{dx:-1,dy:0,dz:0}},{id:'OUT',label:'Producto pasteurizado',relX:e.largo/2,relY:0,relZ:0,diametro:4,tipoConexion:'Clamp',orientacion:{dx:1,dy:0,dz:0}}]},homogeneizador:{nombre:'Homogeneizador',puertos:(e)=>[{id:'IN',label:'Entrada',relX:-300,relY:0,relZ:0,diametro:3,tipoConexion:'Clamp',orientacion:{dx:-1,dy:0,dz:0}},{id:'OUT',label:'Salida',relX:300,relY:0,relZ:0,diametro:3,tipoConexion:'Clamp',orientacion:{dx:1,dy:0,dz:0}}]},colector:{nombre:'Colector',puertos:(e)=>e.puertos}};
function crearEquipo(tipo,tag,x,y,z,params={}){const tmpl=EquiposCatalogo[tipo];if(!tmpl){notify(`Tipo desconocido: ${tipo}`,true);return null;}let diam=params.diametro||(tipo.includes('tanque')?2400:1000),alt=params.altura||(tipo.includes('tanque')?2500:1500),largo=params.largo||diam,material=params.material||'CS',base={tag,tipo,x,y,z,diametro:diam,altura:alt,largo,material};let puertos=tmpl.puertos(base);const eq={...base,puertos};db.equipos.push(eq);notify(`Equipo ${tag} creado`);saveState();render();autoCenter();return eq;}
function crearColector(tag,x,y,z,n,spacing,outPos,diam,material){let puertos=[];for(let i=0;i<n;i++)puertos.push({id:`IN${i+1}`,label:`Entrada ${i+1}`,relX:i*spacing,relY:0,relZ:0,diametro:diam,tipoConexion:'Flange',orientacion:{dx:0,dy:-1,dz:0},material});let salidaX=outPos==='left'?0:(outPos==='right'?(n-1)*spacing:(n-1)*spacing/2);puertos.push({id:'OUT',label:'Salida',relX:salidaX,relY:0,relZ:0,diametro:diam,tipoConexion:'Flange',orientacion:{dx:1,dy:0,dz:0},material});const col={tag,tipo:'colector',x,y,z,diametro:diam,altura:0,largo:(n-1)*spacing,material,puertos};db.equipos.push(col);notify(`Colector ${tag} creado`);render();autoCenter();}
function obtenerPosicionPuerto(equipTag,nozzleId){const eq=db.equipos.find(e=>e.tag===equipTag);if(!eq)return null;const nz=eq.puertos?.find(n=>n.id===nozzleId);if(!nz)return null;return{x:eq.x+nz.relX,y:eq.y+nz.relY,z:eq.z+nz.relZ};}
function obtenerDireccionSalida(nozzle){if(nozzle?.orientacion){const{dx,dy,dz}=nozzle.orientacion;const len=Math.hypot(dx,dy,dz);if(len>0)return{dx:dx/len,dy:dy/len,dz:dz/len};}return{dx:1,dy:0,dz:0};}
function calcularRuta(p1,p2,ns,ne,offset=300){let pts=[p1];if(ns){const dir=obtenerDireccionSalida(ns);pts.push({x:p1.x+dir.dx*offset,y:p1.y+dir.dy*offset,z:p1.z+dir.dz*offset});}let cur=pts[pts.length-1];if(cur.x!==p2.x)pts.push({x:p2.x,y:cur.y,z:cur.z});cur=pts[pts.length-1];if(cur.z!==p2.z)pts.push({x:cur.x,y:cur.y,z:p2.z});cur=pts[pts.length-1];if(cur.y!==p2.y)pts.push({x:cur.x,y:p2.y,z:cur.z});if(ne){const dirEnd=obtenerDireccionSalida(ne);const lleg={x:p2.x-dirEnd.dx*offset,y:p2.y-dirEnd.dy*offset,z:p2.z-dirEnd.dz*offset};pts.splice(pts.length-1,0,lleg);}const clean=[];for(let i=0;i<pts.length;i++)if(i===0||pts[i].x!==pts[i-1].x||pts[i].y!==pts[i-1].y||pts[i].z!==pts[i-1].z)clean.push(pts[i]);return clean;}
function actualizarTuberias(equipTag){db.lines.forEach(line=>{if(line.anchors&&(line.anchors.start.equipTag===equipTag||line.anchors.end.equipTag===equipTag)){const p1=obtenerPosicionPuerto(line.anchors.start.equipTag,line.anchors.start.nozzleId);const p2=obtenerPosicionPuerto(line.anchors.end.equipTag,line.anchors.end.nozzleId);if(p1&&p2){const eqS=db.equipos.find(e=>e.tag===line.anchors.start.equipTag);const ns=eqS?.puertos?.find(n=>n.id===line.anchors.start.nozzleId);const eqE=db.equipos.find(e=>e.tag===line.anchors.end.equipTag);const ne=eqE?.puertos?.find(n=>n.id===line.anchors.end.nozzleId);const puntos=calcularRuta(p1,p2,ns,ne,300);line._cachedPoints=puntos;line.codos=puntos.length-2;}}});}
function recalcularTodo(){db.lines.forEach(line=>{if(line.anchors){const p1=obtenerPosicionPuerto(line.anchors.start.equipTag,line.anchors.start.nozzleId);const p2=obtenerPosicionPuerto(line.anchors.end.equipTag,line.anchors.end.nozzleId);if(p1&&p2){const eqS=db.equipos.find(e=>e.tag===line.anchors.start.equipTag);const ns=eqS?.puertos?.find(n=>n.id===line.anchors.start.nozzleId);const eqE=db.equipos.find(e=>e.tag===line.anchors.end.equipTag);const ne=eqE?.puertos?.find(n=>n.id===line.anchors.end.nozzleId);const puntos=calcularRuta(p1,p2,ns,ne,300);line._cachedPoints=puntos;line.codos=puntos.length-2;}}});render();}
function getPointAtDistance(from,to,dist){const d=Math.hypot(to.x-from.x,to.y-from.y,to.z-from.z);const t=Math.min(dist/d,0.5);return{x:from.x+(to.x-from.x)*t,y:from.y+(to.y-from.y)*t,z:from.z+(to.z-from.z)*t};}
function drawPipe(line){const pts=line._cachedPoints||line.points3D;if(!pts||pts.length<2)return;const radio=Math.min((line.diameter||4)*25.4*1.5,500);ctx.beginPath();let first=project(pts[0]);ctx.moveTo(first.x,first.y);for(let i=1;i<pts.length-1;i++){const pPrev=pts[i-1],pCurr=pts[i],pNext=pts[i+1];const pIn=getPointAtDistance(pCurr,pPrev,radio);const pOut=getPointAtDistance(pCurr,pNext,radio);const projIn=project(pIn),projOut=project(pOut),projCurr=project(pCurr);ctx.lineTo(projIn.x,projIn.y);ctx.quadraticCurveTo(projCurr.x,projCurr.y,projOut.x,projOut.y);}const last=project(pts[pts.length-1]);ctx.lineTo(last.x,last.y);ctx.strokeStyle='#facc15';ctx.lineWidth=Math.max(4,(line.diameter||4)*cam.scale);ctx.stroke();}
function drawTank(eq){const p=project(eq);const w=(eq.diametro/2)*cam.scale;const h=eq.altura*cam.scale;const topY=p.y-h/2,bottomY=p.y+h/2;ctx.fillStyle='#1e40af';ctx.fillRect(p.x-w,topY,w,h);ctx.fillStyle='#3b82f6';ctx.fillRect(p.x,topY,w,h);ctx.beginPath();ctx.ellipse(p.x,topY,w,w*0.5,0,0,2*Math.PI);ctx.fillStyle='#60a5fa';ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(p.x,bottomY,w,w*0.5,0,0,2*Math.PI);ctx.fillStyle='#2563eb';ctx.fill();ctx.stroke();ctx.fillStyle='white';ctx.font=`bold ${12*cam.scale}px Arial`;ctx.fillText(eq.tag,p.x-18,topY-10);if(eq.puertos)eq.puertos.forEach(nz=>{const pos={x:eq.x+nz.relX,y:eq.y+nz.relY,z:eq.z+nz.relZ};const proj=project(pos);ctx.beginPath();ctx.arc(proj.x,proj.y,5,0,2*Math.PI);ctx.fillStyle='#ff8800';ctx.fill();ctx.fillStyle='white';ctx.font='8px monospace';ctx.fillText(nz.id,proj.x-4,proj.y-4);});}

function parseCreate(cmd){const parts=cmd.split(/\s+/);if(parts[0]!=='create')return false;const tipo=parts[1],tag=parts[2];if(parts[3]!=='at')return false;const coords=parts[4].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);if(!coords)return false;const x=parseFloat(coords[1]),y=parseFloat(coords[2]),z=parseFloat(coords[3]);let params={};for(let i=5;i<parts.length;i++){if(parts[i]==='diam')params.diametro=parseFloat(parts[++i])*1000;else if(parts[i]==='height')params.altura=parseFloat(parts[++i])*1000;else if(parts[i]==='material')params.material=parts[++i].toUpperCase();}if(EquiposCatalogo[tipo])crearEquipo(tipo,tag,x,y,z,params);else notify(`Tipo desconocido: ${tipo}`,true);return true;}

function parseConnect(cmd){const parts=cmd.split(/\s+/);if(parts[0]!=='connect')return false;const fromEq=parts[1],fromNz=parts[2];if(parts[3]!=='to')return false;const toEq=parts[4],toNz=parts[5];let diam=4,material='PPR';for(let i=6;i<parts.length;i++){if(parts[i]==='diameter')diam=parseFloat(parts[++i]);else if(parts[i]==='material')material=parts[++i].toUpperCase();}const eqF=db.equipos.find(e=>e.tag===fromEq),eqT=db.equipos.find(e=>e.tag===toEq);if(!eqF||!eqT){notify("Equipo no encontrado",true);return true;}const nzF=eqF.puertos?.find(n=>n.id===fromNz),nzT=eqT.puertos?.find(n=>n.id===toNz);if(!nzF||!nzT){notify("Puerto no encontrado",true);return true;}const tag=`L-${db.lines.length+1}`;db.lines.push({tag,diameter:diam,material,anchors:{start:{equipTag:fromEq,nozzleId:fromNz},end:{equipTag:toEq,nozzleId:toNz}},waypoints:[],_cachedPoints:null});actualizarTuberias(fromEq);actualizarTuberias(toEq);saveState();render();notify(`Conectado ${fromEq}.${fromNz} con ${toEq}.${toNz}`);return true;}
function parseEdit(cmd){const parts=cmd.split(/\s+/);if(parts[0]!=='edit')return false;if(parts[1]==='equipment'){const tag=parts[2],action=parts[3];const eq=db.equipos.find(e=>e.tag===tag);if(!eq){notify(`Equipo ${tag} no encontrado`,true);return true;}if(action==='move'){const coords=parts[4]==='to'?parts[5]:parts[4];const m=coords.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);if(m){eq.x=parseFloat(m[1]);eq.y=parseFloat(m[2]);eq.z=parseFloat(m[3]);actualizarTuberias(tag);saveState();render();notify(`Equipo ${tag} movido`);return true;}}}return false;}

function autoCenter(){if(!canvas)return;let points=[];db.equipos.forEach(e=>points.push({x:e.x,y:e.y,z:e.z}));db.lines.forEach(l=>{if(l._cachedPoints)points.push(...l._cachedPoints);});if(!points.length)points=[{x:-2000,y:0,z:-2000},{x:2000,y:2000,z:2000}];let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;points.forEach(p=>{const rx=(p.x-p.z)*0.866,ry=(p.x+p.z)*0.5-p.y;if(rx<minX)minX=rx;if(rx>maxX)maxX=rx;if(ry<minY)minY=ry;if(ry>maxY)maxY=ry;});const mx=(maxX-minX)*0.15,my=(maxY-minY)*0.15;minX-=mx;maxX+=mx;minY-=my;maxY+=my;const wW=maxX-minX,wH=maxY-minY,padding=Math.min(Math.max(canvas.width*0.1,20),80);let sc=Math.min((canvas.width-padding)/wW,(canvas.height-padding)/wH,0.6,0.12);cam.scale=sc;cam.panX=canvas.width/2-((minX+maxX)/2)*sc;cam.panY=canvas.height/2-((minY+maxY)/2)*sc;render();}

function pointToSegmentDistance(p,a,b){const ax=p.x-a.x,ay=p.y-a.y;const bx=b.x-a.x,by=b.y-a.y;const dot=ax*bx+ay*by;const len2=bx*bx+by*by;if(len2===0)return Math.hypot(ax,ay);let t=dot/len2;t=Math.max(0,Math.min(1,t));const projX=a.x+t*bx,projY=a.y+t*by;return Math.hypot(p.x-projX,p.y-projY);}
function pickElement(mouse){for(let eq of db.equipos){const p=project(eq);if(eq.tipo==='colector'){const ancho=eq.largo,pIzq=project({x:eq.x,y:eq.y,z:eq.z}),pDer=project({x:eq.x+ancho,y:eq.y,z:eq.z});if(pointToSegmentDistance(mouse,pIzq,pDer)<15)return{type:'equipment',obj:eq};}else{const w=(eq.diametro/2)*cam.scale;if(Math.hypot(mouse.x-p.x,mouse.y-p.y)<w+5)return{type:'equipment',obj:eq};}}for(let line of db.lines){const pts=line._cachedPoints;if(!pts)continue;const proj=pts.map(p=>project(p));for(let i=0;i<proj.length-1;i++)if(pointToSegmentDistance(mouse,proj[i],proj[i+1])<10)return{type:'line',obj:line};}return null;}
function initCanvasEvents(){let panLocal=false,panStartLocal={x:0,y:0};canvas.addEventListener('mousedown',(e)=>{const rect=canvas.getBoundingClientRect();const mouse={x:(e.clientX-rect.left)*canvas.width/rect.width,y:(e.clientY-rect.top)*canvas.height/rect.height};const picked=pickElement(mouse);if(toolMode==='select'){if(picked)selectedElement=picked;else selectedElement=null;render();}else if(toolMode==='moveEq'&&picked?.type==='equipment'){draggingEquipment=true;draggedEquip=picked.obj;dragLastPos={x:e.clientX,y:e.clientY};canvas.style.cursor='grabbing';e.preventDefault();}else if(toolMode==='addPoint'&&picked?.type==='line'){const line=picked.obj,pts=line._cachedPoints;if(pts){let minDist=Infinity,bestSeg=0,bestParam=0;const proj=pts.map(p=>project(p));for(let i=0;i<proj.length-1;i++){const a=proj[i],b=proj[i+1];const ax=mouse.x-a.x,ay=mouse.y-a.y;const bx=b.x-a.x,by=b.y-a.y;const dot=ax*bx+ay*by,len2=bx*bx+by*by;if(len2===0)continue;let t=dot/len2;t=Math.max(0,Math.min(1,t));const projX=a.x+t*bx,projY=a.y+t*by;const dist=Math.hypot(mouse.x-projX,mouse.y-projY);if(dist<minDist){minDist=dist;bestSeg=i;bestParam=t;}}if(minDist<15){const p1=pts[bestSeg],p2=pts[bestSeg+1];const newPoint={x:p1.x+bestParam*(p2.x-p1.x),y:p1.y+bestParam*(p2.y-p1.y),z:p1.z+bestParam*(p2.z-p1.z)};if(!line.waypoints)line.waypoints=[];line.waypoints.push(newPoint);const pStart=obtenerPosicionPuerto(line.anchors.start.equipTag,line.anchors.start.nozzleId);const pEnd=obtenerPosicionPuerto(line.anchors.end.equipTag,line.anchors.end.nozzleId);let puntos=[pStart];if(line.waypoints)puntos.push(...line.waypoints);puntos.push(pEnd);line._cachedPoints=puntos;saveState();render();notify("Waypoint añadido");}}}else{panLocal=true;panStartLocal={x:e.clientX,y:e.clientY};canvas.style.cursor='grabbing';e.preventDefault();}});window.addEventListener('mousemove',(e)=>{if(draggingEquipment&&draggedEquip){const dx=(e.clientX-dragLastPos.x)/cam.scale,dy=(e.clientY-dragLastPos.y)/cam.scale;draggedEquip.x+=dx;d function crearEquipoPorTipo(tipo){let tag=`${tipo.toUpperCase()}-${db.equipos.filter(e=>e.tipo===tipo).length+1}`;let x=0,z=0;const ult=db.equipos[db.equipos.length-1];if(ult){x=ult.x+3000;z=ult.z;}let y=1250,params={};if(tipo==='tanque_v'){params.diametro=2400;params.altura=2500;y=1250;}else if(tipo==='tanque_h'){params.diametro=2000;params.altura=2000;params.largo=4000;y=1000;}else if(tipo==='bomba'){params.diametro=800;params.altura=800;y=800;}else if(['intercambiador','torre','reactor','caldera','compresor','separador','clarificador','filtro_arena','osmosis','tanque_acero','pasteurizador','homogeneizador'].includes(tipo)){params.diametro=2000;params.altura=3000;params.largo=4000;y=1500;}else if(tipo==='colector'){crearColector(tag,x,y,2000,4,3000,'center',4,'PPR');return;}crearEquipo(tipo,tag,x,y,z,params);}
function crearComponente(tipo,subtipo){if(!selectedElement||selectedElement.type!=='line'){notify("Selecciona una tubería primero",true);return;}const line=selectedElement.obj;const tag=`${tipo}-${Date.now()}`;const param=parseFloat(prompt("Posición (0-1):","0.5"));if(isNaN(param))return;const comp={type:tipo,tag:tag,param:param,size:line.diameter};if(tipo==='VALVE'&&subtipo)comp.subtype=subtipo;if(!line.components)line.components=[];line.components.push(comp);saveState();render();notify(`Componente ${tag} añadido a ${line.tag}`);}
function init(){resizeCanvas();initCanvasEvents();buildEquipmentPanel();crearEquipo('tanque_v','TK-1',0,1250,0,{diametro:2400,altura:2500});crearEquipo('bomba','B-1',5000,800,0,{diametro:800,altura:800});render();autoCenter();saveState();document.getElementById('btnNew').onclick=nuevo;document.getElementById('btnOpen').onclick=cargar;document.getElementById('btnSave').onclick=guardar;document.getElementById('btnReset').onclick=autoCenter;document.getElementById('btnCommand').onclick=()=>document.getElementById('commandPanel').style.display='block';document.getElementById('closeCommand').onclick=()=>document.getElementById('commandPanel').style.display='none';document.getElementById('runCommands').onclick=()=>{const txt=document.getElementById('commandText').value;const lines=txt.split('\n');for(let raw of lines){let cmd=raw.trim();if(!cmd||cmd.startsWith('//'))continue;saveState();if(!parseCreate(cmd)&&!parseCreateManifold(cmd)&&!parseConnect(cmd)&&!parseEdit(cmd)&&!parseHelp(cmd))notify(`❌ No entendí: "${cmd.substring(0,50)}..."`,true);}document.getElementById('commandPanel').style.display='none';render();};document.getElementById('clearCommand').onclick=()=>document.getElementById('commandText').value='';document.getElementById('btnMTO').onclick=exportarMTO;document.getElementById('btnPDF').onclick=exportPDF;document.getElementById('btnUndo').onclick=undo;document.getElementById('btnRedo').onclick=redo;document.getElementById('btnVoice').onclick=toggleVoice;document.getElementById('btnApplyNorm').onclick=()=>notify("Normas en desarrollo");document.getElementById('btnSpeakSummary').onclick=resumen;document.getElementById('btnRecalc').onclick=recalcularTodo;document.getElementById('btnToggleEqPanel').onclick=()=>{const p=document.getElementById('equipmentPanel');p.style.display=p.style.display==='none'?'flex':'none';};document.querySelector('#equipmentPanel .equipment-panel-header').onclick=()=>{const c=document.querySelector('#equipmentPanel .equipment-panel-content');c.style.display=c.style.display==='none'?'flex':'none';};const setTool=(m)=>{toolMode=m;document.querySelectorAll('#toolsPanel button').forEach(b=>b.classList.remove('active'));if(m==='select')document.getElementById('toolSelect').classList.add('active');else if(m==='moveEq')document.getElementById('toolMoveEq').classList.add('active');else if(m==='editPipe')document.getElementById('toolEditPipe').classList.add('active');else if(m==='addPoint')document.getElementById('toolAddPoint').classList.add('active');};document.getElementById('toolSelect').onclick=()=>setTool('select');document.getElementById('toolMoveEq').onclick=()=>setTool('moveEq');document.getElementById('toolEditPipe').onclick=()=>setTool('editPipe');document.getElementById('toolAddPoint').onclick=()=>setTool('addPoint');window.addEventListener('resize',()=>{resizeCanvas();autoCenter();});notify("SmartFlow Pro v10.2 - Listo. Use 'create manifold' para colectores.");}
function resizeCanvas(){const cont=canvas.parentElement;canvas.width=cont.clientWidth;canvas.height=cont.clientHeight;autoCenter();}
init();
</script>
