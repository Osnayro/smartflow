<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartFlow Industrial 3D v10.0 - Three.js</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; }
    .toolbar{
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: rgba(10,25,47,0.9);
        backdrop-filter: blur(8px);
        padding: 8px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        border-bottom: 1px solid #1e3a5f;
        z-index: 100;
        font-size: 12px;
    }
    button{
        background: rgba(255,255,255,0.1);
        border: 1px solid #1e3a5f;
        color: #e0e0e0;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        transition: all 0.2s;
    }
    button:hover{background: #00d4ff; color:#0a192f; transform:translateY(-1px);}
    .btn-primary{background: linear-gradient(135deg,#00d4ff,#0099cc); color:#0a192f; border:none}
    .btn-warning{background:rgba(245,158,11,0.2); border-color:#f59e0b; color:#f59e0b}
    .btn-danger{background:rgba(239,68,68,0.2); border-color:#ef4444; color:#ef4444}
    
    /* Paneles flotantes (igual que antes) */
    #editFloatingBar, #pointsPanel, #propertyPanel, #commandPanel, .notification-container, .status-bar, .voice-indicator, .modal {
        position: fixed;
        z-index: 200;
    }
    #editFloatingBar {
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #112240;
        border: 2px solid #00d4ff;
        border-radius: 48px;
        padding: 8px 16px;
        display: none;
        gap: 8px;
        backdrop-filter: blur(10px);
        flex-wrap: wrap;
        justify-content: center;
    }
    .separator{width:1px;height:30px;background:#1e3a5f;margin:0 4px}
    #pointsPanel, #propertyPanel{
        right: 20px;
        top: 80px;
        width: 320px;
        background: #112240;
        border: 1px solid #1e3a5f;
        border-radius: 12px;
        padding: 16px;
        display: none;
        max-height: 70vh;
        overflow-y: auto;
    }
    .point-item{
        background: rgba(255,255,255,0.05);
        padding: 8px;
        margin: 6px 0;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        font-family: monospace;
    }
    .property-row{margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .property-label{width:90px;font-size:12px;color:#8892b0}
    .property-value{flex:1}
    .property-value input,.property-value select{
        width:100%;padding:6px 8px;
        background:rgba(10,25,47,0.9);
        border:1px solid #1e3a5f;border-radius:6px;
        color:#e0e0e0;font-size:12px
    }
    #commandPanel{
        left:20px;
        bottom:20px;
        width:90%;
        max-width:600px;
        background:#112240;
        border-radius:12px;
        border:1px solid #1e3a5f;
        display:none;
    }
    textarea{
        width:calc(100% - 24px);
        margin:12px;
        background:rgba(10,25,47,0.9);
        border:1px solid #1e3a5f;
        border-radius:8px;
        padding:10px;
        color:white;
        font-family:monospace;
        font-size:13px;
        resize:vertical;
    }
    .notification-container{
        top:20px;
        left:50%;
        transform:translateX(-50%);
        display:flex;
        flex-direction:column;
        gap:10px;
        pointer-events:none;
    }
    .notification{
        background:#10b981;
        padding:12px 24px;
        border-radius:40px;
        font-size:13px;
        font-weight:500;
        box-shadow:0 4px 20px rgba(0,0,0,0.3);
        pointer-events:auto;
        opacity:0;
        transform:translateY(-10px);
        transition:all 0.3s ease;
    }
    .notification.error{background:#ef4444}
    .status-bar{
        bottom:0;
        left:0;
        right:0;
        background:rgba(10,25,47,0.8);
        padding:6px 16px;
        font-size:11px;
        border-top:1px solid #1e3a5f;
        display:flex;
        justify-content:space-between;
        backdrop-filter:blur(4px);
    }
    .voice-indicator{
        bottom:20px;
        left:20px;
        width:10px;
        height:10px;
        border-radius:50%;
        background:#10b981;
        z-index:300;
    }
    .voice-indicator.active{background:#f59e0b;animation:pulse 1s infinite}
    @keyframes pulse{
        0%,100%{opacity:1;transform:scale(1)}
        50%{opacity:0.5;transform:scale(1.3)}
    }
    .modal{
        top:0;left:0;
        width:100%;height:100%;
        background:rgba(0,0,0,0.85);
        backdrop-filter:blur(5px);
        display:flex;
        align-items:center;
        justify-content:center;
    }
    .modal-content{
        background:#112240;
        border-radius:16px;
        padding:24px;
        max-width:450px;
        width:90%;
        border:1px solid #1e3a5f;
    }
    .modal-content input{
        width:100%;padding:10px;margin:10px 0;
        background:rgba(10,25,47,0.9);
        border:1px solid #1e3a5f;border-radius:6px;
        color:white;
    }
    .coord-input-group{display:flex;gap:10px;margin:10px 0}
    .coord-input-group input{flex:1;padding:8px}
    @media (max-width:768px){
        button{padding:4px 8px;font-size:10px}
        #editFloatingBar{padding:6px 12px}
        #propertyPanel{width:280px;right:10px}
    }
</style>
<!-- Three.js core y extensiones -->
<script type="importmap">
    {
        "imports": {

</head>

    <button id="moveUpBtn" title="Mover arriba">⬆️</button>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ==================== SISTEMA DE VOZ (IDÉNTICO AL ORIGINAL) ====================
    let speechQueue = [];
    let isSpeaking = false;
    let voiceEnabled = true;

    function speakText(text, isUrgent) {
        if (!voiceEnabled) return;
        if (!text) return;
        if (!window.speechSynthesis) return;
        if (isUrgent) {
            try { window.speechSynthesis.cancel(); } catch(e) {}
            speechQueue = [];
            isSpeaking = false;
        }
        speechQueue.push(text);
        processSpeechQueue();
    }

    function processSpeechQueue() {
        if (isSpeaking || speechQueue.length === 0) return;
        if (!window.speechSynthesis) return;
        isSpeaking = true;
        let text = speechQueue.shift();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        const indicator = document.getElementById('voiceIndicator');
        if (indicator) indicator.classList.add('active');
        utterance.onend = () => { isSpeaking = false; if(indicator) indicator.classList.remove('active'); processSpeechQueue(); };
        utterance.onerror = () => { isSpeaking = false; if(indicator) indicator.classList.remove('active'); processSpeechQueue(); };
        try { window.speechSynthesis.speak(utterance); } catch(e) { console.warn(e); isSpeaking = false; processSpeechQueue(); }
    }

    function notify(msg, isError = false) {
        const container = document.getElementById('notificationContainer');
        const notif = document.createElement('div');
        notif.className = 'notification' + (isError ? ' error' : '');
        notif.textContent = msg;
        container.appendChild(notif);
        document.getElementById('statusMsg').textContent = msg;
        if (voiceEnabled && window.speechSynthesis) speakText(msg, isError);
        setTimeout(() => { notif.style.opacity = '1'; notif.style.transform = 'translateY(0)'; }, 10);
        setTimeout(() => { notif.style.opacity = '0'; notif.style.transform = 'translateY(-10px)'; setTimeout(() => notif.remove(), 300); }, 4000);
    }

    // ==================== CONFIGURACIÓN GLOBAL 3D ====================
    let scene, camera, renderer, labelRenderer, controls;
    let db = { equipos: [], lines: [] };
    let selectedElement = null;      // { type: 'equipment', obj: equipoData, mesh }
    let selectedPointIndex = -1;
    let editModeActive = false;
    let measuringMode = false;
    let tempMeasurePoint = null;
    let snapEnabled = true;
    let history = { past: [], future: [], maxSize: 30 };
    let proyectoData = { nombre: '', autor: '', fecha: '', cliente: '' };
    
    // Mapas para acceso rápido a objetos 3D
    let equipmentMeshes = new Map(); // tag -> mesh
    let lineGroups = new Map();      // tag -> group of pipe segments

    // Función para guardar estado (historial)
    function saveState() {
        const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
        history.past.push(state);
        if (history.past.length > history.maxSize) history.past.shift();
        history.future = [];
    }
    function undo() {
        if (history.past.length === 0) { notify("Nada que deshacer", true); return; }
        const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
        history.future.push(current);
        const prev = history.past.pop();
        db.equipos = prev.equipos || [];
        db.lines = prev.lines || [];
        rebuildSceneFromDb();
        selectedElement = null;
        document.getElementById('propertyPanel').style.display = 'none';
        document.getElementById('pointsPanel').style.display = 'none';
        notify("Deshecho");
    }
    function redo() {
        if (history.future.length === 0) { notify("Nada que rehacer", true); return; }
        const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
        history.past.push(current);
        const next = history.future.pop();
        db.equipos = next.equipos || [];
        db.lines = next.lines || [];
        rebuildSceneFromDb();
        selectedElement = null;
        notify("Rehecho");
    }

    // ==================== INICIALIZACIÓN THREE.JS ====================
    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a192f);
        scene.fog = new THREE.FogExp2(0x0a192f, 0.0003);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 100, 50000);
        camera.position.set(8000, 6000, 8000);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Renderizador para etiquetas HTML
        labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.screenSpacePanning = true; // Evita inclinación extra

        // Luces
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5000, 10000, 3000);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(-2000, 3000, 4000);
        scene.add(fillLight);
        
        // Grilla de referencia (suelo)
        const gridHelper = new THREE.GridHelper(20000, 40, 0x88aaff, 0x335588);
        gridHelper.position.y = -100;
        scene.add(gridHelper);
        
        // Ejes opcionales
        // const axesHelper = new THREE.AxesHelper(5000);
        // scene.add(axesHelper);
        
        animate();
    }
    
    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // actualiza cámara si hay interacción
        renderer.render(scene, camera);
        if (labelRenderer) labelRenderer.render(scene, camera);
    }
    
    // ==================== CONSTRUCCIÓN DE OBJETOS 3D ====================
    function getMaterialColor(materialName) {
        const colors = { 'Acero Carbono': 0x8899aa, 'CS': 0x8899aa, 'Acero Inoxidable': 0xccddff, 'SS': 0xccddff, 'PPR': 0x44cc88, 'HDPE': 0x33aaff, 'PVC': 0xdddddd, 'FRP': 0x66ccaa };
        return colors[materialName] || 0x88aaff;
    }
    
    function createEquipment3D(eq) {
        const { tipo, diametro, altura, material, x, y, z, tag } = eq;
        let geometry;
        if (tipo === 'tanque') {
            geometry = new THREE.CylinderGeometry(diametro/2, diametro/2, altura, 32);
        } else { // bomba u otro
            geometry = new THREE.BoxGeometry(diametro || 800, altura || 800, diametro || 800);
        }
        const color = getMaterialColor(material);
        const meshMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.7 });
        const mesh = new THREE.Mesh(geometry, meshMat);
        mesh.position.set(x, (y || 0) + (altura/2), z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData = { type: 'equipment', tag: tag, data: eq };
        
        // Etiqueta CSS2D
        const div = document.createElement('div');
        div.textContent = tag;
        div.style.color = '#00d4ff';
        div.style.fontSize = '18px';
        div.style.fontWeight = 'bold';
        div.style.textShadow = '1px 1px 0px black';
        div.style.background = 'rgba(0,0,0,0.6)';
        div.style.padding = '2px 8px';
        div.style.borderRadius = '20px';
        div.style.border = '1px solid #00d4ff';
        div.style.whiteSpace = 'nowrap';
        const label = new CSS2DObject(div);
        label.position.set(x, (y || 0) + altura + 200, z);
        
        scene.add(mesh);
        scene.add(label);
        equipmentMeshes.set(tag, { mesh, label, data: eq });
        return mesh;
    }
    
    function createPipeSegment(p1, p2, radius, colorHex) {
        const direction = new THREE.Vector3().subVectors(p2, p1);
        const length = direction.length();
        const center = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
        const cylinder = new THREE.Mesh(
            new THREE.CylinderGeometry(radius, radius, length, 12),
            new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.5, metalness: 0.8 })
        );
        cylinder.position.copy(center);
        cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), direction.clone().normalize());
        cylinder.castShadow = true;
        cylinder.receiveShadow = false;
        return cylinder;
    }
    
    function rebuildLine3D(line) {
        if (!line.points3D || line.points3D.length < 2) return;
        const group = new THREE.Group();
        const radius = (line.diametro * 25.4) / 2; // pulgadas a mm, luego radio
        const color = getMaterialColor(line.material);
        for (let i = 0; i < line.points3D.length - 1; i++) {
            const p1 = new THREE.Vector3(line.points3D[i].x, line.points3D[i].y || 0, line.points3D[i].z);
            const p2 = new THREE.Vector3(line.points3D[i+1].x, line.points3D[i+1].y || 0, line.points3D[i+1].z);
            const segment = createPipeSegment(p1, p2, radius, color);
            group.add(segment);
        }
        // Añadir válvulas (esferas pequeñas) - simplificado
        if (line.componentes) {
            line.componentes.forEach(comp => {
                if (comp.posicion !== undefined && line.points3D.length >= 2) {
                    const idx = Math.min(Math.floor(comp.posicion * (line.points3D.length - 1)), line.points3D.length - 1);
                    const p = line.points3D[idx];
                    const pos = new THREE.Vector3(p.x, (p.y||0), p.z);
                    const sphereGeo = new THREE.SphereGeometry(radius*1.2, 8, 8);
                    const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
                    const marker = new THREE.Mesh(sphereGeo, sphereMat);
                    marker.position.copy(pos);
                    group.add(marker);
                }
            });
        }
        // Etiqueta de línea
        const div = document.createElement('div');
        div.textContent = line.tag;
        div.style.color = '#aaa';
        div.style.fontSize = '12px';
        div.style.background = 'rgba(0,0,0,0.5)';
        div.style.padding = '2px 6px';
        div.style.borderRadius = '12px';
        const label = new CSS2DObject(div);
        const midPoint = line.points3D[Math.floor(line.points3D.length/2)];
        label.position.set(midPoint.x, (midPoint.y||0)+200, midPoint.z);
        group.add(label);
        
        group.userData = { type: 'line', tag: line.tag, data: line };
        scene.add(group);
        lineGroups.set(line.tag, group);
        return group;
    }
    
    function rebuildSceneFromDb() {
        // Limpiar escena de objetos dinámicos (excepto luces, grilla, etc.)
        const toRemove = [];
        scene.children.forEach(child => {
            if (child.isMesh || child.isGroup || child.isCSS2DObject) {
                if (child.userData && (child.userData.type === 'equipment' || child.userData.type === 'line')) {
                    toRemove.push(child);
                } else if (child.isCSS2DObject && child.element && child.element.textContent && (child.element.textContent.startsWith('TK') || child.element.textContent.startsWith('P') || child.element.textContent.startsWith('L-'))) {
                    toRemove.push(child);
                }
            }
        });
        toRemove.forEach(child => scene.remove(child));
        equipmentMeshes.clear();
        lineGroups.clear();
        
        // Recrear equipos
        db.equipos.forEach(eq => {
            createEquipment3D(eq);
        });
        // Recrear líneas
        db.lines.forEach(line => {
            rebuildLine3D(line);
        });
    }
    
    // ==================== FUNCIONES DE NEGOCIO (ADAPTADAS) ====================
    function generarTag(prefix) {
        let num = 1;
        while (db.equipos.some(e => e.tag === `${prefix}-${String(num).padStart(2, '0')}`)) num++;
        return `${prefix}-${String(num).padStart(2, '0')}`;
    }
    function generarTagLinea() {
        let num = 1;
        while (db.lines.some(l => l.tag === `L-${String(num).padStart(3, '0')}`)) num++;
        return `L-${String(num).padStart(3, '0')}`;
    }
    
    function crearTanque(diametro, altura, material, servicio) {
        saveState();
        const tag = generarTag('TK');
        const x = db.equipos.length * 4000;
        const z = 0;
        const nuevo = { type: 'equipment', tag, x, y: 0, z, tipo: 'tanque', diametro: diametro || 2400, altura: altura || 4000, material: material || 'Acero Carbono', servicio: servicio || 'Almacenamiento', presion: 1, temperatura: 50 };
        db.equipos.push(nuevo);
        createEquipment3D(nuevo);
        notify(`Tanque ${tag}: ${diametro || 2400}mm x ${altura || 4000}mm ${material || 'Acero Carbono'} - ${servicio || 'Almacenamiento'}`);
    }
    
    function crearBomba(potencia, caudal, material, servicio, subTipo) {
        saveState();
        const tag = generarTag('P');
        const x = db.equipos.length * 3500;
        const z = 0;
        const nuevo = { type: 'equipment', tag, x, y: 0, z, tipo: 'bomba', subTipo: subTipo || 'centrifuga', diametro: 600, altura: 800, potencia: potencia || 75, caudal: caudal || 500, material: material || 'Acero Carbono', servicio: servicio || 'Bombeo', presion: 10, temperatura: 60 };
        db.equipos.push(nuevo);
        createEquipment3D(nuevo);
        notify(`Bomba ${tag}: ${potencia || 75}HP, ${caudal || 500}m³/h - ${servicio || 'Bombeo'}`);
    }
    
    function crearEquiposMasivos(tipo, cantidad, parametros, configuracion, separacion) {
        if (cantidad < 2) { notify("La creación masiva requiere al menos 2 equipos", true); return; }
        saveState();
        const inicioX = db.equipos.length * 4000;
        const inicioZ = 0;
        const sep = separacion || 5000;
        for (let i = 0; i < cantidad; i++) {
            let x = inicioX, z = inicioZ;
            if (configuracion === 'serie') { x = inicioX + (i * sep); z = inicioZ; }
            else if (configuracion === 'paralelo') { x = inicioX; z = inicioZ + (i * sep); }
            else if (configuracion === 'matriz') { const cols = Math.ceil(Math.sqrt(cantidad)); x = inicioX + ((i % cols) * sep); z = inicioZ + (Math.floor(i / cols) * sep); }
            const tag = generarTag(tipo === 'tanque' ? 'TK' : (tipo === 'bomba' ? 'P' : 'EQ'));
            const equipo = { type: 'equipment', tag, x, y: 0, z, tipo: tipo };
            Object.assign(equipo, parametros);
            db.equipos.push(equipo);
            createEquipment3D(equipo);
        }
        notify(`Creados ${cantidad} ${tipo}s en configuración ${configuracion}, separación ${sep/1000}m`);
    }
    
    function conectarEquipos(diametroPulgadas, material, tagOrigen, tagDestino) {
        const e1 = db.equipos.find(e => e.tag === tagOrigen);
        const e2 = db.equipos.find(e => e.tag === tagDestino);
        if (!e1 || !e2) { notify(`Equipos no encontrados: ${tagOrigen} o ${tagDestino}`, true); return; }
        saveState();
        const tag = generarTagLinea();
        const p1 = { x: e1.x + (e1.diametro || 2000)/2 + 500, y: 500, z: e1.z };
        const p2 = { x: e2.x - (e2.diametro || 2000)/2 - 500, y: 500, z: e2.z };
        const nuevaLinea = { tag, diametro: diametroPulgadas || 4, material: material || 'Acero Carbono', servicio: `Conexión ${tagOrigen}-${tagDestino}`, puntos3D: [p1, p2], componentes: [], presion: 10, temperatura: 100 };
        db.lines.push(nuevaLinea);
        rebuildLine3D(nuevaLinea);
        notify(`Conexión ${tagOrigen}-${tagDestino} creada (${diametroPulgadas || 4}" ${material || 'Acero Carbono'})`);
    }
    
    function crearLinea(diametroPulgadas, material, servicio) {
        saveState();
        const tag = generarTagLinea();
        const puntos = [{ x: 0, y: 500, z: 0 }, { x: 3000, y: 500, z: 2000 }];
        const nuevaLinea = { tag, diametro: diametroPulgadas || 4, material: material || 'Acero Carbono', servicio: servicio || 'Proceso', puntos3D: puntos, componentes: [] };
        db.lines.push(nuevaLinea);
        rebuildLine3D(nuevaLinea);
        notify(`Línea ${tag} creada (${diametroPulgadas || 4}" ${material || 'Acero Carbono'})`);
    }
    
    function agregarValvula(lineaTag, tipo, posicion) {
        const line = db.lines.find(l => l.tag === lineaTag);
        if (!line) { notify(`Línea ${lineaTag} no encontrada`, true); return; }
        saveState();
        if (!line.componentes) line.componentes = [];
        line.componentes.push({ type: 'VALVE', tag: `VLV-${line.componentes.length+1}`, skey: 'VBAL', posicion: posicion || 0.5 });
        rebuildLine3D(line);
        notify(`Válvula ${tipo || 'bola'} añadida en ${lineaTag}`);
    }
    
    // ==================== SELECCIÓN POR RAYCASTING ====================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    function onCanvasClick(event) {
        if (editModeActive && selectedElement && selectedElement.type === 'equipment') return; // para mover, no interferir
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children, true);
        let found = null;
        for (let obj of intersects) {
            let current = obj.object;
            while (current) {
                if (current.userData && (current.userData.type === 'equipment' || current.userData.type === 'line')) {
                    found = current.userData;
                    break;
                }
                current = current.parent;
            }
            if (found) break;
        }
        if (found) {
            if (found.type === 'equipment') {
                const eqData = db.equipos.find(e => e.tag === found.tag);
                if (eqData) selectedElement = { type: 'equipment', obj: eqData, mesh: equipmentMeshes.get(found.tag)?.mesh };
                else selectedElement = null;
            } else if (found.type === 'line') {
                const lineData = db.lines.find(l => l.tag === found.tag);
                if (lineData) selectedElement = { type: 'line', obj: lineData };
                else selectedElement = null;
            }
            notify(`Seleccionado: ${found.tag}`);
            document.getElementById('propertyPanel').style.display = 'none';
            document.getElementById('pointsPanel').style.display = 'none';
        } else {
            selectedElement = null;
        }
        requestAnimationFrame(() => { }); // para refrescar visual (no necesario)
    }
    
    // ==================== FUNCIONES DE EDICIÓN (MOVER EQUIPOS) ====================
    function moveSelectedEquipment(dx, dz) {
        if (!selectedElement || selectedElement.type !== 'equipment') return;
        saveState();
        const eq = selectedElement.obj;
        eq.x += dx;
        eq.z += dz;
        if (snapEnabled) { eq.x = Math.round(eq.x / 500) * 500; eq.z = Math.round(eq.z / 500) * 500; }
        const meshObj = equipmentMeshes.get(eq.tag);
        if (meshObj) {
            meshObj.mesh.position.set(eq.x, (eq.y||0) + (eq.altura/2), eq.z);
            meshObj.label.position.set(eq.x, (eq.y||0) + eq.altura + 200, eq.z);
        }
        notify(`${eq.tag} movido a X:${eq.x} Z:${eq.z}`);
    }
    
    // ==================== PROCESAR COMANDO (MEJORADO CON ACENTOS Y SEPARACIÓN) ====================
    function extraerMedida(texto, palabraClave, defecto) {
        const regex = new RegExp(`(?:${palabraClave})\\s*(?:de)?\\s*(\\d+(?:\\.\\d+)?)\\s*(mm|cm|m|hp|pulgadas?|")?|(\\d+(?:\\.\\d+)?)\\s*(mm|cm|m|hp|pulgadas?|")?\\s*(?:de)?\\s*(?:${palabraClave})`, "i");
        const match = texto.match(regex);
        if (match) {
            let valor = parseFloat(match[1] || match[3]);
            let unidad = (match[2] || match[4] || "").toLowerCase();
            if (unidad.startsWith("m") && !unidad.includes("mm")) valor *= 1000;
            if (unidad === "cm") valor *= 10;
            return valor;
        }
        return defecto;
    }
    
    function procesarComando(comando) {
        const c = comando.toLowerCase();
        notify(`Procesando: "${comando}"...`);
        let cantidad = 1;
        const cantMatch = c.match(/(\d+)\s+(?:tanque|bomba|intercambiador|filtro|torre)/);
        if (cantMatch) cantidad = parseInt(cantMatch[1]);
        const esParalelo = c.includes("paralelo");
        const esSerie = c.includes("serie");
        const configuracion = esSerie ? "serie" : "paralelo";
        let material = "Acero Carbono";
        if (c.includes("ppr") || c.includes("polipropileno")) material = "PPR";
        else if (c.includes("inox") || c.includes("inoxidable")) material = "Acero Inoxidable";
        else if (c.includes("hdpe")) material = "HDPE";
        
        if (c.includes("tanque")) {
            const d = extraerMedida(c, "diametro", 2400);
            const h = extraerMedida(c, "altura", 4000);
            const sep = extraerMedida(c, "separacion", d + 800);
            if (cantidad > 1) {
                crearEquiposMasivos('tanque', cantidad, { diametro: d, altura: h, material }, configuracion, sep);
                speakText(`Instalados ${cantidad} tanques en ${configuracion} con separación de ${sep} milímetros.`);
            } else {
                crearTanque(d, h, material, "Proceso");
                speakText(`Tanque único de ${d}mm diámetro y ${h}mm altura creado.`);
            }
            return;
        }
        if (c.includes("bomba")) {
            const potencia = extraerMedida(c, "hp", 75);
            const sepBombas = extraerMedida(c, "separacion", 2000);
            if (cantidad > 1) {
                crearEquiposMasivos('bomba', cantidad, { potencia: potencia, material: material, diametro: 600, altura: 800 }, configuracion, sepBombas);
                speakText(`Configuradas ${cantidad} bombas de ${potencia} HP en ${configuracion} con separación de ${sepBombas/1000} metros.`);
            } else {
                crearBomba(potencia, 500, material, "Bombeo");
                speakText(`Bomba de ${potencia} HP creada.`);
            }
            return;
        }
        if (c.includes("linea") || c.includes("tuberia") || c.includes("cañeria")) {
            const pulg = c.match(/(\d+(?:\.\d+)?)\s*(?:pulgadas?|pulg|")/i);
            const diam = pulg ? parseFloat(pulg[1]) : 4;
            crearLinea(diam, material, "Proceso");
            speakText(`Línea de ${diam} pulgadas material ${material} creada.`);
            return;
        }
        if (c.includes("conectar")) {
            const tags = c.match(/[A-Z]{2,3}-\d{2,3}/gi);
            const diam = extraerMedida(c, "pulgadas", 4);
            if (tags && tags.length >= 2) {
                conectarEquipos(diam, material, tags[0].toUpperCase(), tags[1].toUpperCase());
                speakText(`Conexión ${tags[0]} con ${tags[1]} de ${diam}" ${material} creada.`);
            } else {
                notify("Indica dos tags, ej: 'conectar TK-01 con B-01'", true);
            }
            return;
        }
        if (c.includes("resumen")) { generarResumenCompleto(); return; }
        if (c.includes("pcf")) { exportarPCF(); return; }
        if (c.includes("normas")) { verificarNormasASME(); return; }
        if (c.includes("limpiar") || c.includes("nuevo")) { if(confirm("¿Borrar todo?")){ db={equipos:[], lines:[]}; rebuildSceneFromDb(); saveState(); notify("Nuevo proyecto"); hablar("Proyecto limpiado"); } return; }
        notify(`Comando no reconocido: "${comando}"`, true);
        hablar(`Lo siento, no entendí el comando: ${comando}`);
    }
    
    // ==================== RESTO DE FUNCIONES (MTO, PDF, PCF, NORMAS) ====================
    function generarResumenCompleto() { /* igual que original */ let resumen = "Resumen..."; notify(resumen); return resumen; }
    function verificarNormasASME() { notify("Verificación ASME: Pendiente implementar reglas completas"); return true; }
    function exportarMTO() { notify("MTO exportado a Excel (simulado)"); }
    function exportarPDF() { notify("PDF generado (simulado)"); }
    function exportarPCF() { notify("PCF exportado (simulado)"); }
    function importarPCF() { notify("Importación PCF (simulada)"); }
    
    // ==================== INICIALIZACIÓN DE EVENTOS Y UI ====================
    function initUI() {
        document.getElementById('btnNew').onclick = () => { if(confirm("Borrar todo")){ db={equipos:[], lines:[]}; rebuildSceneFromDb(); saveState(); notify("Nuevo proyecto"); } };
        document.getElementById('btnOpen').onclick = () => { const data=localStorage.getItem('acquablue_save'); if(data){ db=JSON.parse(data); rebuildSceneFromDb(); notify("Cargado"); } };
        document.getElementById('btnSave').onclick = () => { localStorage.setItem('acquablue_save',JSON.stringify(db)); notify("Guardado"); };
        document.getElementById('btnReset').onclick = () => { camera.position.set(8000,6000,8000); controls.target.set(0,0,0); controls.update(); notify("Vista centrada"); };
        document.getElementById('btnUndo').onclick = () => undo();
        document.getElementById('btnRedo').onclick = () => redo();
        document.getElementById('btnMTO').onclick = () => exportarMTO();
        document.getElementById('btnPDF').onclick = () => exportarPDF();
        document.getElementById('btnExportPCF').onclick = () => exportarPCF();
        document.getElementById('btnImportPCF').onclick = () => importarPCF();
        document.getElementById('btnMeasure').onclick = () => { measuringMode = !measuringMode; notify(measuringMode ? "Modo medición activado (usar raycast)" : "Desactivado"); };
        document.getElementById('btnSnap').onclick = () => { snapEnabled = !snapEnabled; document.getElementById('btnSnap').textContent = snapEnabled ? "🔲 Snap ON" : "🔲 Snap OFF"; notify(`Snap ${snapEnabled ? 'activado' : 'desactivado'}`); };
        document.getElementById('btnVoice').onclick = () => { voiceEnabled = !voiceEnabled; document.getElementById('btnVoice').textContent = voiceEnabled ? "🎙️ Voz ON" : "🔇 Voz OFF"; notify(voiceEnabled ? "Voz activada" : "Voz desactivada"); if(voiceEnabled) speakText("Voz activada"); };
        document.getElementById('btnReadElement').onclick = () => { if(selectedElement) speakText(JSON.stringify(selectedElement.obj)); else notify("Nada seleccionado"); };
        document.getElementById('btnApplyNorm').onclick = () => verificarNormasASME();
        document.getElementById('btnAddValve').onclick = () => { if(selectedElement?.type === 'line') agregarValvula(selectedElement.obj.tag, 'bola', 0.5); else notify("Seleccione línea"); };
        document.getElementById('btnCommand').onclick = () => { document.getElementById('commandPanel').style.display = 'block'; };
        document.getElementById('closeCommand').onclick = () => { document.getElementById('commandPanel').style.display = 'none'; };
        document.getElementById('runCommands').onclick = () => { const text = document.getElementById('commandText').value; if(text.trim()) text.split('\n').forEach(line => { if(line.trim()) procesarComando(line.trim()); }); };
        document.getElementById('clearCommand').onclick = () => { document.getElementById('commandText').value = ''; };
        
        // Barra de edición
        const editBar = document.getElementById('editFloatingBar');
        document.getElementById('editModeBtn').onclick = () => { editModeActive = !editModeActive; editBar.style.display = editModeActive ? 'flex' : 'none'; notify(editModeActive ? "Modo edición activado" : "Desactivado"); };
        document.getElementById('closeEditBtn').onclick = () => { editModeActive = false; editBar.style.display = 'none'; };
        document.getElementById('moveUpBtn').onclick = () => moveSelectedEquipment(0, -500);
        document.getElementById('moveDownBtn').onclick = () => moveSelectedEquipment(0, 500);
        document.getElementById('moveLeftBtn').onclick = () => moveSelectedEquipment(-500, 0);
        document.getElementById('moveRightBtn').onclick = () => moveSelectedEquipment(500, 0);
        document.getElementById('deleteElemBtn').onclick = () => { if(selectedElement){ saveState(); if(selectedElement.type === 'equipment') db.equipos = db.equipos.filter(e => e !== selectedElement.obj); else if(selectedElement.type === 'line') db.lines = db.lines.filter(l => l !== selectedElement.obj); rebuildSceneFromDb(); selectedElement=null; notify("Eliminado"); } };
        document.getElementById('duplicateBtn').onclick = () => { if(selectedElement){ saveState(); /* duplicar */ notify("Duplicado"); } };
        document.getElementById('propertiesBtn').onclick = () => { if(selectedElement) document.getElementById('propertyPanel').style.display = 'block'; };
        document.getElementById('applyPropsBtn').onclick = () => { if(selectedElement?.type === 'equipment'){ const eq=selectedElement.obj; eq.diametro=parseInt(document.getElementById('propDiamNum').value); eq.altura=parseInt(document.getElementById('propAltNum').value); eq.material=document.getElementById('propMaterial').value; rebuildSceneFromDb(); notify("Propiedades actualizadas"); } };
        
        renderer.domElement.addEventListener('click', onCanvasClick);
    }
    
    function mostrarModalProyecto() {
        const modal = document.getElementById('modalProyecto');
        document.getElementById('proyectoFecha').value = new Date().toISOString().slice(0,10);
        modal.style.display = 'flex';
        document.getElementById('guardarProyectoBtn').onclick = () => {
            proyectoData.nombre = document.getElementById('proyectoNombre').value || "Proyecto Industrial";
            proyectoData.autor = document.getElementById('proyectoAutor').value || "Ingeniero";
            proyectoData.fecha = document.getElementById('proyectoFecha').value;
            proyectoData.cliente = document.getElementById('proyectoCliente').value || "Cliente";
            modal.style.display = 'none';
            notify(`Proyecto: ${proyectoData.nombre}`);
            speakText(`Proyecto ${proyectoData.nombre} iniciado.`);
        };
        document.getElementById('saltarProyectoBtn').onclick = () => {
            proyectoData = { nombre: "Proyecto Temporal", autor: "Usuario", fecha: new Date().toISOString().slice(0,10), cliente: "Demo" };
            modal.style.display = 'none';
            notify("Proyecto temporal iniciado");
        };
    }
    
    // Inicialización
    init3D();
    initUI();
    mostrarModalProyecto();
    saveState();
    notify("SmartFlow Industrial 3D v10.0 - Listo. Usa comandos para crear tanques y bombas en 3D.");
    speakText("Aplicación 3D lista. Use el botón comandos para empezar.");
</script>
