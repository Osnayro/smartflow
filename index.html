<html lang="es">
<head>
<meta charset="UTF-8">

<title>SmartFlow Pro v8.0 | Acquablue c.a. - Ingeniería Inteligente</title>
<style>
    :root {
        --primary: #00d4ff;
        --primary-dark: #007791;
        --accent: #7c3aed;
        --bg-dark: #0a0a0f;
        --panel-bg: rgba(20, 20, 35, 0.95);
        --border: #2a2a4a;
        --success: #238636;
        --warning: #d29922;
        --danger: #da3633;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg-dark);color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}

    .header-corp{background:#fff;padding:8px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--primary);}
    .logo-placeholder{color:#1a1a2e;font-weight:900;font-size:22px;letter-spacing:-1px;}
    .logo-placeholder span{color:var(--primary);}

    .toolbar{background:#1a1a2e;padding:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;border-bottom:1px solid #2a2a4a}
    button{background:#2c3e66;border:none;color:white;padding:8px 12px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:12px;transition:0.2s;}
    button:hover{background:#3b5a8c;transform:translateY(-1px);}
    .btn-primary{background:var(--success)}
    .btn-warning{background:var(--warning);color:#1f1f1f}
    .btn-manual{background:var(--primary);color:#000;}

    .canvas-container{flex:1;position:relative;background:radial-gradient(circle,#1a1a2e 0%,#000 100%)}
    canvas{display:block;width:100%;height:100%;cursor:grab}
    canvas:active{cursor:grabbing}

    #edit-toolbar{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);padding:10px 20px;border-radius:30px;border:1px solid var(--primary);display:none;gap:12px;z-index:2000;backdrop-filter:blur(5px);}
    #property-panel{position:absolute;right:15px;top:15px;width:300px;background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;padding:18px;display:none;z-index:1500;box-shadow:-5px 5px 25px rgba(0,0,0,0.6);}
    .prop-group{margin-bottom:15px;}
    .prop-group label{display:block;font-size:10px;color:var(--primary);text-transform:uppercase;margin-bottom:5px;font-weight:bold;}
    .prop-input{width:100%;background:#000;border:1px solid #444;color:#fff;padding:8px;border-radius:4px;font-size:13px;font-family:monospace;}

    .command-panel{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);width:90%;max-width:550px;background:var(--panel-bg);border-radius:15px;border:1px solid var(--accent);z-index:1000;display:none;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
    .command-header{display:flex;justify-content:space-between;padding:12px;background:rgba(0,0,0,0.2);border-bottom:1px solid #3a3a4a}
    textarea{width:100%;border:none;background:#05050a;color:#00ffa3;padding:15px;font-family:'Consolas',monospace;font-size:13px;resize:none;}
    textarea:focus{outline:2px solid var(--primary);}

    .modal-proyecto{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border:2px solid var(--primary);border-radius:20px;padding:30px;z-index:10000;min-width:350px;box-shadow:0 0 50px rgba(0,212,255,0.3);}
    .modal-proyecto h3{color:var(--primary);margin-bottom:20px;}
    .modal-proyecto input{width:100%;padding:12px;margin:10px 0;background:#0a0a0f;border:1px solid var(--border);color:white;border-radius:8px;font-size:14px;}
    .modal-proyecto button{width:100%;margin-top:15px;padding:12px;background:var(--primary);color:#000;font-weight:bold;}

    .btn-proyecto{background:var(--primary);color:#000;margin-left:10px;}
    .notification{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:12px 25px;border-radius:30px;z-index:5000;display:none;font-weight:bold;text-align:center;}
    .status-bar{background:#000;padding:6px 15px;font-size:11px;display:flex;justify-content:space-between;border-top:1px solid var(--border);color:var(--primary)}

    @media (max-width:768px){button{padding:8px;font-size:11px;}#property-panel{width:250px;}}
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<div id="modalProyecto" class="modal-proyecto" style="display:none;">

    <div id="statusMsg">Acquablue SmartFlow Pro | Listo</div>

</div>

<script>
// ==================== SISTEMA DE VOZ SIN INTERRUPCIONES ====================
let speechQueue = [];
let isSpeaking = false;
let voiceEnabled = true;

function speakText(text, isUrgent = false, isSummary = false) {
    if (!voiceEnabled || !text) return;
    if (isUrgent) {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        speechQueue = [];
        isSpeaking = false;
    }
    speechQueue.push({text, isSummary});
    processSpeechQueue();
}

function processSpeechQueue() {
    if (isSpeaking || speechQueue.length === 0) return;
    if (!window.speechSynthesis) return;
    isSpeaking = true;
    const {text, isSummary} = speechQueue.shift();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-ES';
    utterance.rate = isSummary ? 0.8 : 0.9;
    utterance.pitch = isSummary ? 1.1 : 1.0;
    if (isSummary && window.speechSynthesis.getVoices) {
        const voices = window.speechSynthesis.getVoices();
        const spanishVoice = voices.find(v => v.lang === 'es-ES' && v.name.includes('Female'));
        if (spanishVoice) utterance.voice = spanishVoice;
    }
    utterance.onend = () => { isSpeaking = false; processSpeechQueue(); };
    utterance.onerror = () => { isSpeaking = false; processSpeechQueue(); };
    window.speechSynthesis.speak(utterance);
}

function notify(msg, isErr = false, isSummary = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.backgroundColor = isErr ? 'var(--danger)' : 'var(--success)';
    n.style.display = 'block';
    document.getElementById('statusMsg').innerHTML = msg;
    speakText(msg, isErr, isSummary);
    setTimeout(() => { if (n.style.display === 'block') n.style.display = 'none'; }, isSummary ? 6000 : 4000);
}

// ==================== DATOS DEL PROYECTO ====================
let proyectoData = { nombre: 'Proyecto Sin Nombre', autor: 'Ingeniero' };

function mostrarModalProyecto(obligatorio = true) {
    const modal = document.getElementById('modalProyecto');
    modal.style.display = 'block';
    if (!obligatorio) {
        document.getElementById('proyectoNombre').value = proyectoData.nombre;
        document.getElementById('proyectoAutor').value = proyectoData.autor;
    }
}

function guardarProyecto() {
    const nombre = document.getElementById('proyectoNombre').value.trim();
    const autor = document.getElementById('proyectoAutor').value.trim();
    if (nombre) proyectoData.nombre = nombre;
    if (autor) proyectoData.autor = autor;
    document.getElementById('modalProyecto').style.display = 'none';
    notify(`Proyecto: ${proyectoData.nombre} | Ingeniero: ${proyectoData.autor}`);
    speakText(`Bienvenido ${proyectoData.autor}. Proyecto ${proyectoData.nombre} cargado.`);
}

function editarProyecto() { mostrarModalProyecto(false); }

// ==================== CONFIGURACIÓN GLOBAL ====================
let db = { equipos: [], lines: [], puntosLibres: [] };
let cam = { scale: 0.5, panX: 0, panY: 0 };
let dragging = false, lastPos = { x: 0, y: 0 };
let selectedElement = null;
let editMode = false;
let measuringMode = false;
let snapEnabled = true;
let currentCursor = { x: 0, y: 0, z: 0 };
let history = { past: [], future: [], maxSize: 30 };
let asistenteActivo = false;
let asistentePaso = 0;
let asistenteContexto = null;
let asistenteParametros = {};
let tuberiaEnConstruccion = null;

const canvas = document.getElementById('isoCanvas');
const ctx = canvas.getContext('2d');

// ==================== FUNCIONES BÁSICAS ====================
function autoCenter() {
    cam.panX = canvas.width / 2;
    cam.panY = canvas.height / 2;
    cam.scale = 0.5;
    render();
}

function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}

function undo() {
    if (history.past.length === 0) return notify("Nada que deshacer", true);
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.future.push(current);
    const prev = history.past.pop();
    db.equipos = prev.equipos || [];
    db.lines = prev.lines || [];
    selectedElement = null;
    render();
    notify("Acción deshecha");
}

function redo() {
    if (history.future.length === 0) return notify("Nada que rehacer", true);
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos || [];
    db.lines = next.lines || [];
    selectedElement = null;
    render();
    notify("Acción rehecha");
}

function generarTagPorFamilia(prefijo) {
    let numero = 1;
    while (db.equipos.some(eq => eq.tag === `${prefijo}-${String(numero).padStart(3, '0')}`)) numero++;
    return `${prefijo}-${String(numero).padStart(3, '0')}`;
}

function generarTagLinea() {
    let numero = 1;
    while (db.lines.some(l => l.tag === `L-${String(numero).padStart(3, '0')}`)) numero++;
    return `L-${String(numero).padStart(3, '0')}`;
}

function calcularLongitud(line) {
    if (!line.points3D || line.points3D.length < 2) return 0;
    let total = 0;
    for (let i = 1; i < line.points3D.length; i++) {
        const p1 = line.points3D[i-1];
        const p2 = line.points3D[i];
        total += Math.hypot(p2.x - p1.x, p2.y - p1.y, p2.z - p1.z);
    }
    return total;
}

// ==================== MOTOR DE RENDER ====================
function project(p) {
    const cos30 = 0.866, sin30 = 0.5;
    const x = (p.x - p.z) * cos30;
    const y = (p.x + p.z) * sin30 - (p.y || 0);
    return { x: x * cam.scale + cam.panX, y: y * cam.scale + cam.panY };
}

function drawGrid() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = -15000; i <= 15000; i += 1000) {
        const p1 = project({ x: i, y: 0, z: -15000 });
        const p2 = project({ x: i, y: 0, z: 15000 });
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
        const p3 = project({ x: -15000, y: 0, z: i });
        const p4 = project({ x: 15000, y: 0, z: i });
        ctx.beginPath();
        ctx.moveTo(p3.x, p3.y);
        ctx.lineTo(p4.x, p4.y);
        ctx.stroke();
    }
    ctx.restore();
}

function puntoDentroDeElipse(x, y, cx, cy, rx, ry) {
    const dx = (x - cx) / rx;
    const dy = (y - cy) / ry;
    return (dx * dx + dy * dy) <= 1;
}

function drawTank(eq) {
    const p = project(eq);
    let ancho, alto;
    let color = '#3b82f6';
    
    if (eq.familia === 'TANQUE') {
        const r = (eq.diametro / 2) * cam.scale;
        const h = eq.altura * cam.scale;
        if (eq.material === 'Acero Inoxidable') color = '#94a3b8';
        if (eq.material === 'Acero al Carbono') color = '#475569';
        if (eq.material === 'PPR') color = '#22c55e';
        ctx.fillStyle = color;
        ctx.fillRect(p.x - r, p.y - h, r * 2, h);
        ctx.beginPath();
        ctx.ellipse(p.x, p.y - h, r, r * 0.5, 0, 0, 2 * Math.PI);
        ctx.fill();
        ancho = r * 2; alto = h;
    } else if (eq.familia === 'BOMBA') {
        ancho = 40 * cam.scale;
        alto = 30 * cam.scale;
        color = '#f59e0b';
        ctx.fillStyle = color;
        ctx.fillRect(p.x - ancho/2, p.y - alto, ancho, alto);
        ctx.beginPath();
        ctx.arc(p.x, p.y - alto/2, alto/2, 0, 2 * Math.PI);
        ctx.fill();
    } else if (eq.familia === 'COMPRESOR') {
        ancho = 50 * cam.scale;
        alto = 35 * cam.scale;
        color = '#ef4444';
        ctx.fillStyle = color;
        ctx.fillRect(p.x - ancho/2, p.y - alto, ancho, alto);
        ctx.fillRect(p.x - ancho/3, p.y - alto - 10, ancho/3, 10);
    } else if (eq.familia === 'REACTOR') {
        ancho = 45 * cam.scale;
        alto = 50 * cam.scale;
        color = '#8b5cf6';
        ctx.fillStyle = color;
        ctx.fillRect(p.x - ancho/2, p.y - alto, ancho, alto);
        ctx.beginPath();
        ctx.ellipse(p.x, p.y - alto, ancho/2, ancho/3, 0, 0, 2 * Math.PI);
        ctx.fill();
    } else if (eq.familia === 'INTERCAMBIADOR') {
        ancho = 60 * cam.scale;
        alto = 25 * cam.scale;
        color = '#10b981';
        ctx.fillStyle = color;
        ctx.fillRect(p.x - ancho/2, p.y - alto, ancho, alto);
        for(let i = 0; i < 4; i++) {
            ctx.fillRect(p.x - ancho/2 + i*12, p.y - alto + 5, 8, alto - 10);
        }
    } else if (eq.familia === 'TORRE') {
        ancho = 40 * cam.scale;
        alto = 70 * cam.scale;
        color = '#ec489a';
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(p.x - ancho/2, p.y);
        ctx.lineTo(p.x + ancho/2, p.y);
        ctx.lineTo(p.x + ancho/3, p.y - alto);
        ctx.lineTo(p.x - ancho/3, p.y - alto);
        ctx.fill();
    } else {
        ancho = 30 * cam.scale;
        alto = 30 * cam.scale;
        ctx.fillStyle = '#6b7280';
        ctx.fillRect(p.x - ancho/2, p.y - alto, ancho, alto);
    }
    
    if (selectedElement && selectedElement.obj === eq) {
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(p.x - ancho/2 - 5, p.y - alto - 5, ancho + 10, alto + 10);
    }
    
    ctx.fillStyle = 'white';
    ctx.font = `bold ${12 * cam.scale}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillText(eq.tag, p.x, p.y - alto - 10);
    if (eq.potencia) {
        ctx.fillStyle = '#ffaa00';
        ctx.font = `9px 'Segoe UI'`;
        ctx.fillText(`${eq.potencia} HP`, p.x, p.y - alto - 22);
    }
    if (eq.diametro) {
        ctx.fillStyle = '#a0a0a0';
        ctx.font = `8px 'Segoe UI'`;
        ctx.fillText(`${eq.diametro}mm`, p.x, p.y + 5);
    }
}

function drawPipe(line) {
    if (!line.points3D || line.points3D.length < 2) return;
    ctx.beginPath();
    const start = project(line.points3D[0]);
    ctx.moveTo(start.x, start.y);
    for (let i = 1; i < line.points3D.length; i++) {
        const p = project(line.points3D[i]);
        ctx.lineTo(p.x, p.y);
    }
    let color = '#94a3b8';
    if (line.material === 'PPR') color = '#22c55e';
    if (line.material === 'HDPE') color = '#10b981';
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(3, (line.diameter || 4) * 1.5);
    ctx.stroke();
    
    if (selectedElement && selectedElement.obj === line) {
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = Math.max(3, (line.diameter || 4) * 1.5) + 2;
        ctx.stroke();
    }
    
    if (line.components) {
        line.components.forEach(comp => {
            if (line.points3D && line.points3D.length > 1) {
                const idx = Math.floor(comp.param * (line.points3D.length - 1));
                if (idx < line.points3D.length) {
                    const pos = project(line.points3D[idx]);
                    if (comp.type === 'VALVE') {
                        ctx.fillStyle = '#ffaa00';
                        ctx.beginPath();
                        ctx.rect(pos.x - 8, pos.y - 4, 16, 8);
                        ctx.fill();
                        ctx.fillStyle = 'white';
                        ctx.font = '8px monospace';
                        ctx.fillText(comp.skey || 'VLV', pos.x - 6, pos.y - 6);
                    } else if (comp.type === 'FLANGE') {
                        ctx.fillStyle = '#888888';
                        ctx.beginPath();
                        ctx.rect(pos.x - 10, pos.y - 3, 20, 6);
                        ctx.fill();
                    } else if (comp.type === 'ELBOW') {
                        ctx.fillStyle = '#ff8844';
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, 6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = 'white';
                        ctx.fillText(comp.angulo || '90', pos.x - 3, pos.y + 3);
                    } else if (comp.type === 'INSTRUMENT') {
                        ctx.fillStyle = '#44aaff';
                        ctx.beginPath();
                        ctx.rect(pos.x - 6, pos.y - 6, 12, 12);
                        ctx.fill();
                        ctx.fillStyle = 'white';
                        ctx.font = '7px monospace';
                        ctx.fillText(comp.skey || 'INS', pos.x - 4, pos.y + 2);
                    }
                }
            }
        });
    }
}

function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    for (let line of db.lines) drawPipe(line);
    for (let eq of db.equipos) drawTank(eq);
    if (currentCursor) {
        document.getElementById('coords').innerHTML = `X: ${currentCursor.x.toFixed(0)} | Z: ${currentCursor.z.toFixed(0)}`;
    }
}

function obtenerPuntoConexion(equipo, punto) {
    const tipoEquipo = equipo.tipoEquipo || 'tanque_vertical';
    const puntosEquipo = PUNTOS_CONEXION[tipoEquipo] || PUNTOS_CONEXION['tanque_vertical'];
    const puntoConfig = puntosEquipo[punto.toLowerCase()];
    if (!puntoConfig) return { x: equipo.x, y: equipo.y + 500, z: equipo.z };
    return {
        x: equipo.x + (puntoConfig.x * (equipo.diametro || 2000)),
        y: equipo.y + (puntoConfig.y * (equipo.altura || 3000)),
        z: equipo.z + (puntoConfig.z * (equipo.diametro || 2000))
    };
}

function listarPuntosConexion(tagEquipo) {
    const equipo = db.equipos.find(e => e.tag === tagEquipo);
    if (!equipo) return notify(`Equipo ${tagEquipo} no encontrado`, true);

    const puntos = PUNTOS_CONEXION[tipoEquipo] || PUNTOS_CONEXION['tanque_vertical'];
    let mensaje = `Puntos de conexión para ${tagEquipo} (${tipoEquipo}):\n`;
    for (const [punto, info] of Object.entries(puntos)) {
        mensaje += `• ${punto}: ${info.desc}\n`;

    return puntos;
}

function crearEquipo(tipo, parametros) {
    saveState();
    const info = TIPOS_EQUIPOS[tipo];
    if (!info) { notify(`Tipo de equipo "${tipo}" no reconocido`, true); return null; }
    const tag = generarTagPorFamilia(info.prefijo);
    let x = 0, z = 0;
    if (db.equipos.length > 0) { const ultimo = db.equipos[db.equipos.length - 1]; x = ultimo.x + 4000; z = ultimo.z; }
    const nuevoEquipo = { type: 'equipment', tag, x, y: 0, z, tipoEquipo: tipo, familia: info.familia, subfamilia: info.subfamilia, descripcion: info.desc, material: parametros.material || 'Acero al Carbono', componentes: [] };
    if (parametros.diametro) nuevoEquipo.diametro = parametros.diametro;
    if (parametros.altura) nuevoEquipo.altura = parametros.altura;
    if (parametros.longitud) nuevoEquipo.longitud = parametros.longitud;
    if (parametros.potencia) nuevoEquipo.potencia = parametros.potencia;
    if (parametros.caudal) nuevoEquipo.caudal = parametros.caudal;
    if (parametros.presion) nuevoEquipo.presion = parametros.presion;
    if (parametros.area) nuevoEquipo.area = parametros.area;
    if (parametros.capacidad) nuevoEquipo.capacidad = parametros.capacidad;
    if (parametros.etapas) nuevoEquipo.etapas = parametros.etapas;
    if (parametros.volumen) nuevoEquipo.volumen = parametros.volumen;
    db.equipos.push(nuevoEquipo);
    
    let mensaje = `${info.desc} ${tag} creado. `;
    if (nuevoEquipo.diametro) mensaje += `Diámetro ${nuevoEquipo.diametro} mm. `;
    if (nuevoEquipo.altura) mensaje += `Altura ${nuevoEquipo.altura} mm. `;
    if (nuevoEquipo.potencia) mensaje += `Potencia ${nuevoEquipo.potencia} HP. `;
    mensaje += `Material ${parametros.material || 'Acero al Carbono'}.`;
    notify(mensaje);
    render();
    autoCenter();
    return nuevoEquipo;
}

// ==================== SISTEMA DE CONEXIONES AVANZADAS ====================
function conectarEquiposAvanzado(origenTag, puntoOrigen, destinoTag, puntoDestino, diametro, material, alturaTuberia = 500) {
    const equipoOrigen = db.equipos.find(e => e.tag === origenTag);
    const equipoDestino = db.equipos.find(e => e.tag === destinoTag);
    if (!equipoOrigen || !equipoDestino) return notify("Equipo no encontrado", true);
    const puntoInicio = obtenerPuntoConexion(equipoOrigen, puntoOrigen);
    const puntoFin = obtenerPuntoConexion(equipoDestino, puntoDestino);
    const puntos = [puntoInicio, { x: puntoInicio.x, y: alturaTuberia, z: puntoInicio.z }, { x: puntoFin.x, y: alturaTuberia, z: puntoFin.z }, puntoFin];
    const tagLinea = generarTagLinea();
    const nuevaLinea = { tag: tagLinea, diameter: diametro, material, points3D: puntos, components: [], origen: { tag: origenTag, punto: puntoOrigen }, destino: { tag: destinoTag, punto: puntoDestino } };
    db.lines.push(nuevaLinea);
    saveState();
    render();
    notify(`Conexión ${tagLinea}: ${origenTag} (${puntoOrigen}) → ${destinoTag} (${puntoDestino}). Diámetro ${diametro}", material ${material}`);
    return nuevaLinea;
}

function iniciarTuberia(diametro, material) {
    tuberiaEnConstruccion = { diametro, material, puntos: [], components: [] };
    notify(`Tubería iniciada. Diámetro ${diametro}", material ${material}. Use "ir a" para agregar puntos.`);
}

function agregarPuntoATuberia(x, y, z) {
    if (!tuberiaEnConstruccion) return notify("No hay tubería en construcción. Use 'iniciar tuberia'", true);
    tuberiaEnConstruccion.puntos.push({ x: parseFloat(x), y: parseFloat(y), z: parseFloat(z) });
    notify(`Punto agregado en (${x}, ${y}, ${z})`);
    return true;
}

function finalizarTuberia() {
    if (!tuberiaEnConstruccion || tuberiaEnConstruccion.puntos.length < 2) return notify("No hay tubería válida (mínimo 2 puntos)", true);
    const nuevaLinea = { tag: generarTagLinea(), diameter: tuberiaEnConstruccion.diametro, material: tuberiaEnConstruccion.material, points3D: tuberiaEnConstruccion.puntos, components: tuberiaEnConstruccion.components };
    db.lines.push(nuevaLinea);
    saveState();
    render();
    notify(`Tubería ${nuevaLinea.tag} completada. ${tuberiaEnConstruccion.puntos.length} puntos.`);
    tuberiaEnConstruccion = null;
    return nuevaLinea;
}

// ==================== POSICIONAR EQUIPO RELATIVO ====================
function posicionarEquipo(equipoTag, referenciaTag, direccion, distancia) {
    const equipo = db.equipos.find(e => e.tag === equipoTag);
    const referencia = db.equipos.find(e => e.tag === referenciaTag);
    if (!equipo) return notify(`Equipo ${equipoTag} no encontrado`, true);
    if (!referencia) return notify(`Referencia ${referenciaTag} no encontrada`, true);
    const dist = parseFloat(distancia);
    switch(direccion.toLowerCase()) {
        case 'derecha': equipo.x = referencia.x + dist; break;
        case 'izquierda': equipo.x = referencia.x - dist; break;
        case 'adelante': equipo.z = referencia.z + dist; break;
        case 'atras': equipo.z = referencia.z - dist; break;
    }
    saveState();
    render();
    notify(`${equipoTag} posicionado a ${dist}mm hacia ${direccion} de ${referenciaTag}`);
}

const MATERIALES_COMPATIBILIDAD = {
    'CS': { compatible: ['CS', 'SS'], necesitaAdaptador: false },
    'SS': { compatible: ['SS', 'CS'], necesitaAdaptador: false },
    'PPR': { compatible: ['PPR'], necesitaAdaptador: true, adaptador: 'CS-PPR' },
    'HDPE': { compatible: ['HDPE'], necesitaAdaptador: true, adaptador: 'CS-HDPE' }
};

function detectarTransicion(materialOrigen, materialDestino) {
    if (materialOrigen === materialDestino) return null;
    const matOrigen = MATERIALES_COMPATIBILIDAD[materialOrigen] || MATERIALES_COMPATIBILIDAD['CS'];
    const matDestino = MATERIALES_COMPATIBILIDAD[materialDestino] || MATERIALES_COMPATIBILIDAD['CS'];
    if (matOrigen.necesitaAdaptador || matDestino.necesitaAdaptador) {
        return { necesita: true, adaptador: matOrigen.adaptador || matDestino.adaptador || 'UNIVERSAL' };
    }
    return { necesita: false };
}

function agregarComponentesMantenimiento(equipo, lineaAsociada) {
    let componentes = 0;
    if (equipo.familia === 'BOMBA' && lineaAsociada) {
        if (!lineaAsociada.components) lineaAsociada.components = [];
        lineaAsociada.components.push({ type: 'FILTER', tag: `FLT-${equipo.tag}`, skey: 'STRY', param: 0.1 });
        lineaAsociada.components.push({ type: 'VALVE', tag: `CHK-${equipo.tag}`, skey: 'VCHK', param: 0.9 });
        componentes = 2;
        notify(`Componentes de mantenimiento agregados a bomba ${equipo.tag}`);
    }
    return componentes;
}

// ==================== IMPORTACIÓN PCF CON VOZ ====================
function importarPCF(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const contenido = e.target.result;
            const lineas = contenido.split('\n');
            let nuevoDB = { equipos: [], lines: [], puntosLibres: [] };
            let equipoActual = null, tuberiaActual = null, puntosTuberia = [];
            let contadorEquipos = 0, contadorLineas = 0, contadorComponentes = 0;
            for (let linea of lineas) {
                linea = linea.trim();
                if (linea.startsWith('EQUIP TAG=')) {
                    const match = linea.match(/TAG="([^"]+)"/);
                    if (match) { equipoActual = { type: 'equipment', tag: match[1], components: [] }; nuevoDB.equipos.push(equipoActual); contadorEquipos++; }
                }
                if (linea.startsWith('POSITION') && equipoActual) {
                    const coords = linea.match(/X=([-\d.]+)\s+Y=([-\d.]+)\s+Z=([-\d.]+)/);
                    if (coords) { equipoActual.x = parseFloat(coords[1]); equipoActual.y = parseFloat(coords[2]); equipoActual.z = parseFloat(coords[3]); }
                }
                if (linea.startsWith('DIAMETER') && equipoActual) { equipoActual.diametro = parseFloat(linea.split('=')[1]); }
                if (linea.startsWith('HEIGHT') && equipoActual) { equipoActual.altura = parseFloat(linea.split('=')[1]); }
                if (linea.startsWith('MATERIAL') && equipoActual) { equipoActual.material = linea.match(/"([^"]+)"/)?.[1] || 'CS'; }
                if (linea === 'END EQUIP') { equipoActual = null; }
                if (linea.startsWith('PIPE ID=')) {
                    if (tuberiaActual) { tuberiaActual.points3D = [...puntosTuberia]; nuevoDB.lines.push(tuberiaActual); contadorLineas++; }
                    const match = linea.match(/ID="([^"]+)"/);
                    tuberiaActual = { tag: match[1], components: [], points3D: [] };
                    puntosTuberia = [];
                }
                if (linea.startsWith('SIZE') && tuberiaActual) { tuberiaActual.diameter = parseFloat(linea.split('=')[1]); }
                if (linea.startsWith('MATERIAL') && tuberiaActual) { tuberiaActual.material = linea.match(/"([^"]+)"/)?.[1] || 'CS'; }
                if (linea.startsWith('POINT') && tuberiaActual) {
                    const coords = linea.match(/X=([-\d.]+)\s+Y=([-\d.]+)\s+Z=([-\d.]+)/);
                    if (coords) { puntosTuberia.push({ x: parseFloat(coords[1]), y: parseFloat(coords[2]), z: parseFloat(coords[3]) }); }
                }
                if (linea.startsWith('COMPONENT') && tuberiaActual) { contadorComponentes++; }
                if (linea === 'END PIPE' && tuberiaActual) { tuberiaActual.points3D = [...puntosTuberia]; nuevoDB.lines.push(tuberiaActual); contadorLineas++; tuberiaActual = null; }
            }
            db = nuevoDB;
            saveState();
            render();
            autoCenter();
            let longitudTotal = 0;
            db.lines.forEach(line => { longitudTotal += calcularLongitud(line); });
            let mensajeVoz = `Importación PCF completada . ${contadorEquipos} equipos, ${contadorLineas} tuberías, ${contadorComponentes} componentes. `;
            mensajeVoz += `Longitud total: ${(longitudTotal / 1000).toFixed(1)} metros. `;
            mensajeVoz += `Proyecto ${proyectoData.nombre} actualizado.`;
            notify(mensajeVoz);
        } catch (error) {
            notify(`Error al importar PCF: ${error.message}`, true);
        }
    };
    reader.readAsText(file);
}

function aplicarNormas() {
    let cambios = 0;
    let soportes = 0;
    for (let line of db.lines) {
        const diamMM = (line.diameter || 4) * 25.4;
        if (diamMM >= 110) {
            const long = calcularLongitud(line) || 0;
            const necesarios = Math.max(1, Math.floor(long / 1500));
            const actuales = line.components?.filter(c => c.type === 'SOPORTE').length || 0;
            for (let i = actuales; i < necesarios; i++) {
                if (!line.components) line.components = [];
                line.components.push({ type: 'SOPORTE', tag: `SUP-${line.tag}-${i+1}`, param: (i+1)/(necesarios+1) });
                soportes++;
                cambios++;
            }
        }
    }
    for (let eq of db.equipos) {
        if (eq.familia === 'BOMBA') {
            const lineasConectadas = db.lines.filter(l => l.origen?.tag === eq.tag || l.destino?.tag === eq.tag);
            for (let line of lineasConectadas) {
                if (!line.components.some(c => c.skey === 'VCHK')) {
                    line.components.push({ type: 'VALVE', tag: `CHK-${eq.tag}`, skey: 'VCHK', param: 0.85 });
                    cambios++;
                }
            }
        }
    }
    if (cambios > 0) notify(`Normas aplicadas: ${soportes} soportes, ${cambios - soportes} válvulas check agregadas`);
    else notify("El diseño cumple normas Acquablue");
    render();
}

function autocompletarElementos() {
    let total = 0;
    for (let line of db.lines) {
        if (line.origen && line.destino) {
            const eqOrigen = db.equipos.find(e => e.tag === line.origen.tag);
            const eqDestino = db.equipos.find(e => e.tag === line.destino.tag);
            if (eqOrigen && eqDestino) {
                const transicion = detectarTransicion(eqOrigen.material || 'CS', eqDestino.material || 'CS');
                if (transicion?.necesita && !line.components.some(c => c.type === 'ADAPTADOR')) {
                    if (!line.components) line.components = [];
                    line.components.push({ type: 'ADAPTADOR', tag: `ADP-${line.tag}`, descripcion: `Adaptador ${transicion.adaptador}`, param: 0.5 });
                    total++;
                }
            }
        }
        if ((!line.components || line.components.length === 0) && line.points3D.length > 0) {
            if (!line.components) line.components = [];
            line.components.push({ type: 'UNION', tag: `UNI-${line.tag}`, param: 0.5 });
            total++;
        }
    }
    notify(total > 0 ? `Auto-completado: ${total} elementos agregados (adaptadores/uniciones)` : "No se requieren elementos adicionales");
    render();
}

function iniciarAsistente(comandoBase) {
    const cmdLower = comandoBase.toLowerCase();
    let tipoEncontrado = null;
    for (const [tipo, plantilla] of Object.entries(PLANTILLAS_ASISTENTE)) {
        if (cmdLower.includes(tipo)) { tipoEncontrado = tipo; break; }
    }
    if (!tipoEncontrado) return false;
    asistenteContexto = tipoEncontrado;
    asistenteParametros = {};
    asistentePaso = 0;
    asistenteActivo = true;
    mostrarSiguientePregunta();
    return true;
}

function mostrarSiguientePregunta() {
    const plantilla = PLANTILLAS_ASISTENTE[asistenteContexto];
    if (!plantilla) return;
    if (asistentePaso >= plantilla.preguntas.length) {
        ejecutarComandoAsistente();
        return;
    }
    const pregunta = plantilla.preguntas[asistentePaso];
    const textarea = document.getElementById('commandText');
    textarea.placeholder = pregunta.pregunta;
    textarea.value = '';
    textarea.focus();
    speakText(pregunta.pregunta);
    document.getElementById('runCommands').textContent = `📝 RESPONDER (${asistentePaso + 1}/${plantilla.preguntas.length})`;
}

function procesarRespuestaAsistente(respuesta) {
    if (!asistenteActivo) return false;
    const plantilla = PLANTILLAS_ASISTENTE[asistenteContexto];
    if (!plantilla) return false;
    const preguntaActual = plantilla.preguntas[asistentePaso];
    asistenteParametros[preguntaActual.campo] = respuesta.trim();
    asistentePaso++;
    if (asistentePaso < plantilla.preguntas.length) {
        mostrarSiguientePregunta();
    } else {
        ejecutarComandoAsistente();
    }
    return true;
}

function ejecutarComandoAsistente() {
    const plantilla = PLANTILLAS_ASISTENTE[asistenteContexto];
    if (!plantilla) return;
    plantilla.ejecutar(asistenteParametros);
    asistenteActivo = false;
    asistentePaso = 0;
    asistenteContexto = null;
    asistenteParametros = {};
    document.getElementById('commandText').placeholder = "Ejemplos:\ncrear tanque vertical...\nconectar TK-001 con B-001...";
    document.getElementById('runCommands').textContent = "🎤 EJECUTAR";
    speakText("Comando completado exitosamente.");
}

// ==================== PARSER DE COMANDOS COMPLETO ====================
function parseCommand(input) {
    const cmd = input.toLowerCase().trim();
    saveState();
    
    if (asistenteActivo) { procesarRespuestaAsistente(input); return; }
    
    const palabrasClave = ['agregar', 'crear', 'instalar', 'añadir', 'poner', 'colocar'];
    if (palabrasClave.some(p => cmd.startsWith(p)) && !cmd.match(/\d+/g)) {
        if (iniciarAsistente(cmd)) return;
    }
    
    // Comandos de equipos
    if (cmd.includes('tanque vertical')) {
        const diam = parseInt(cmd.match(/(\d+)\s*mm\s*diametro/)?.[1]) || 2500;
        const alt = parseInt(cmd.match(/(\d+)\s*mm\s*altura/)?.[1]) || 3000;
        let mat = "Acero al Carbono";
        if (cmd.includes('inox')) mat = "Acero Inoxidable";
        if (cmd.includes('ppr')) mat = "PPR";
        crearTanqueVertical(diam, alt, mat);
    }
    else if (cmd.includes('tanque horizontal')) {
        const diam = parseInt(cmd.match(/(\d+)\s*mm\s*diametro/)?.[1]) || 2500;
        const long = parseInt(cmd.match(/(\d+)\s*mm\s*longitud/)?.[1]) || 5000;
        let mat = "Acero al Carbono";
        if (cmd.includes('inox')) mat = "Acero Inoxidable";
        crearTanqueHorizontal(diam, long, mat);
    }
    else if (cmd.includes('reactor')) {
        const diam = parseInt(cmd.match(/(\d+)\s*mm\s*diametro/)?.[1]) || 2000;
        const alt = parseInt(cmd.match(/(\d+)\s*mm\s*altura/)?.[1]) || 2500;
        let mat = "Acero Inoxidable";
        if (cmd.includes('carbono')) mat = "Acero al Carbono";
        crearReactor(diam, alt, mat);
    }
    else if (cmd.includes('intercambiador')) {
        const area = parseInt(cmd.match(/(\d+)\s*m2/)?.[1]) || 50;
        let mat = "Acero al Carbono";
        if (cmd.includes('inox')) mat = "Acero Inoxidable";
        crearIntercambiadorCalor(area, mat);
    }
    else if (cmd.includes('bomba centrifuga')) {
        const pot = parseInt(cmd.match(/(\d+)\s*hp/)?.[1]) || 10;
        let mat = "Hierro Fundido";
        if (cmd.includes('inox')) mat = "Acero Inoxidable";
        crearBombaCentrifuga(pot, 100, mat);
    }
    else if (cmd.includes('compresor')) {
        const pot = parseInt(cmd.match(/(\d+)\s*hp/)?.[1]) || 25;
        const pres = parseInt(cmd.match(/(\d+)\s*bar/)?.[1]) || 8;
        let tipo = cmd.includes('piston') ? 'piston' : 'tornillo';
        crearCompresor(pot, pres, tipo);
    }
    else if (cmd.includes('conectar')) {
        const tags = cmd.match(/[A-Z]{2,3}-\d{3}/g);
        const diam = parseInt(cmd.match(/(\d+)\s*pulgadas/)?.[1]) || 4;
        let puntoOrigen = 'salida', puntoDestino = 'entrada';
        if (cmd.includes('succion')) puntoOrigen = 'succion';
        if (cmd.includes('descarga')) puntoOrigen = 'descarga';
        if (tags && tags.length >= 2) {
            conectarEquiposAvanzado(tags[0], puntoOrigen, tags[1], puntoDestino, diam, 'CS');
        } else { notify("Formato: conectar TK-001 con B-001", true); }
    }
    else if (cmd.includes('iniciar tuberia')) {
        const diam = parseInt(cmd.match(/(\d+)\s*pulgadas/)?.[1]) || 4;
        let mat = 'CS';
        if (cmd.includes('ppr')) mat = 'PPR';
        if (cmd.includes('hdpe')) mat = 'HDPE';
        iniciarTuberia(diam, mat);
    }
    else if (cmd.includes('ir a')) {
        const coords = cmd.match(/x\s*(\d+)\s+y\s*(\d+)\s+z\s*(\d+)/i);
        if (coords && tuberiaEnConstruccion) {
            agregarPuntoATuberia(parseInt(coords[1]), parseInt(coords[2]), parseInt(coords[3]));
        } else { notify("Formato: ir a x 1000 y 500 z 2000", true); }
    }
    else if (cmd.includes('finalizar tuberia')) {
        finalizarTuberia();
    }
    else if (cmd.includes('posicionar')) {
        const match = cmd.match(/posicionar\s+(\w+-\d+)\s+a\s+la\s+(\w+)\s+de\s+(\w+-\d+)(?:\s+distancia\s+(\d+))?/i);
        if (match) {
            posicionarEquipo(match[1].toUpperCase(), match[3].toUpperCase(), match[2], match[4] ? parseInt(match[4]) : 1000);
        } else { notify("Formato: posicionar B-002 a la derecha de TK-001 distancia 2000", true); }
    }
    else if (cmd.includes('puntos de')) {
        const tag = cmd.match(/[A-Z]{2,3}-\d{3}/i)?.[0]?.toUpperCase();
        if (tag) listarPuntosConexion(tag);
        else notify("Especifique equipo: puntos de TK-001", true);
    }
    else if (cmd.includes('agregar valvula') || cmd.includes('agregar válvula')) {
        const tagLinea = cmd.match(/[L]-\d{3}/i)?.[0]?.toUpperCase();
        let tipo = 'bola';
        if (cmd.includes('compuerta')) tipo = 'compuerta';
        if (cmd.includes('mariposa')) tipo = 'mariposa';
        if (cmd.includes('check')) tipo = 'check';
        if (tagLinea) agregarValvula(tagLinea, tipo);
        else notify("Especifique tubería: agregar valvula de bola en L-001", true);
    }
    else if (cmd.includes('agregar brida')) {
        const tagLinea = cmd.match(/[L]-\d{3}/i)?.[0]?.toUpperCase();
        let tipo = 'wn';
        if (cmd.includes('ciega')) tipo = 'ciega';
        if (cmd.includes('sanitaria')) tipo = 'sanitaria';
        if (tagLinea) agregarBrida(tagLinea, tipo);
        else notify("Especifique tubería: agregar brida wn en L-001", true);
    }
    else if (cmd.includes('agregar codo')) {
        const tagLinea = cmd.match(/[L]-\d{3}/i)?.[0]?.toUpperCase();
        let angulo = '90';
        if (cmd.includes('45')) angulo = '45';
        if (cmd.includes('180')) angulo = '180';
        if (tagLinea) agregarCodo(tagLinea, angulo);
        else notify("Especifique tubería: agregar codo de 90 grados en L-001", true);
    }
    else if (cmd.includes('agregar instrumento')) {
        const tagLinea = cmd.match(/[L]-\d{3}/i)?.[0]?.toUpperCase();
        let tipo = 'presion';
        if (cmd.includes('temperatura')) tipo = 'temperatura';
        if (cmd.includes('flujo')) tipo = 'flujo';
        if (cmd.includes('nivel')) tipo = 'nivel';
        if (tagLinea) agregarInstrumento(tagLinea, tipo);
        else notify("Especifique tubería: agregar instrumento en L-001", true);
    }
    else if (cmd.includes('resumen')) { generarResumen(); }
    else if (cmd.includes('normas')) { aplicarNormas(); }
    else if (cmd.includes('autocompletar')) { autocompletarElementos(); }
    else if (cmd.includes('importar pcf')) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pcf,.txt';
        input.onchange = (e) => { if (e.target.files[0]) importarPCF(e.target.files[0]); };
        input.click();
    }
    else if (cmd.includes('eliminar')) {
        const tag = cmd.match(/[A-Z]{2,3}-\d{3}/i)?.[0]?.toUpperCase();
        if (tag) {
            db.equipos = db.equipos.filter(e => e.tag !== tag);
            db.lines = db.lines.filter(l => l.tag !== tag);
            notify(`Elemento ${tag} eliminado`);
            render();
        }
    }
    else { notify("Comando no reconocido. Use: crear, conectar, agregar, resumen, normas, autocompletar, puntos de", true); }
}

// ==================== EVENTOS DEL CANVAS ====================
function initCanvasEvents() {
    canvas.addEventListener('mousedown', (e) => {
        dragging = true;
        lastPos = { x: e.clientX, y: e.clientY };
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        for (let eq of db.equipos) {
            const p = project(eq);
            const r = (eq.diametro / 2) * cam.scale;
            const h = eq.altura * cam.scale;
            const dentroCuerpo = (mx > p.x - r && mx < p.x + r && my > p.y - h && my < p.y);
            const dentroTapaSup = puntoDentroDeElipse(mx, my, p.x, p.y - h, r, r * 0.5);
            if (dentroCuerpo || dentroTapaSup) {
                selectedElement = { type: 'equipment', obj: eq };
                if (editMode) {
                    document.getElementById('property-panel').style.display = 'block';
                    document.getElementById('prop-tag').innerHTML = `Equipo: ${eq.tag}`;
                    document.getElementById('prop-diam-slider').value = eq.diametro;
                    document.getElementById('prop-diam-num').value = eq.diametro;
                    document.getElementById('prop-alt-slider').value = eq.altura;
                    document.getElementById('prop-alt-num').value = eq.altura;
                    document.getElementById('prop-mat').value = eq.material === 'Acero Inoxidable' ? 'SS' : (eq.material === 'PPR' ? 'PPR' : 'CS');
                    const hasPotencia = eq.potencia !== undefined;
                    document.getElementById('potencia-group').style.display = hasPotencia ? 'block' : 'none';
                    if (hasPotencia) document.getElementById('prop-potencia').value = eq.potencia;
                }
                render();
                return;
            }
        }
        if (!editMode) selectedElement = null;
        render();
    });
    
    window.addEventListener('mousemove', (e) => {
        if (!dragging) {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const cos30 = 0.866, sin30 = 0.5;
            const x = (mx - cam.panX) / cam.scale;
            const y = (my - cam.panY) / cam.scale;
            const z = (x / cos30 - y / sin30) / 2;
            const xw = (x / cos30 + y / sin30) / 2;
            currentCursor = { x: xw, y: 0, z: z };
            render();
            return;
        }
        if (selectedElement && editMode && selectedElement.type === 'equipment') {
            const dx = (e.clientX - lastPos.x) / cam.scale;
            const dy = (e.clientY - lastPos.y) / cam.scale;
            selectedElement.obj.x += dx;
            selectedElement.obj.z += dy;
            if (snapEnabled) {
                selectedElement.obj.x = Math.round(selectedElement.obj.x / 500) * 500;
                selectedElement.obj.z = Math.round(selectedElement.obj.z / 500) * 500;
            }
            render();
        } else if (!selectedElement || !editMode) {
            cam.panX += e.clientX - lastPos.x;
            cam.panY += e.clientY - lastPos.y;
            render();
        }
        lastPos = { x: e.clientX, y: e.clientY };
    });
    
    window.addEventListener('mouseup', () => { dragging = false; });
    canvas.addEventListener('wheel', (e) => { e.preventDefault(); cam.scale = Math.min(Math.max(cam.scale * (e.deltaY > 0 ? 0.9 : 1.1), 0.2), 1.5); render(); }, { passive: false });
}

function crearEjemplosIniciales() {
    const originalSaveState = saveState;
    saveState = () => {};
    crearTanqueVertical(2500, 3000, "Acero Inoxidable");
    crearBombaCentrifuga(15, 150, "Hierro Fundido");
    conectarEquiposAvanzado("TK-001", "salida", "B-001", "succion", 4, "CS");
    saveState = originalSaveState;
    history.past = [];
    history.future = [];
}

// ==================== INICIALIZACIÓN PRINCIPAL ====================
function init() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    initCanvasEvents();
    
    document.getElementById('btnNew').onclick = () => { db = { equipos: [], lines: [], puntosLibres: [] }; selectedElement = null; render(); notify("Nuevo proyecto"); };
    document.getElementById('btnOpen').onclick = () => { const data = localStorage.getItem('acquablue_save'); if(data){ db = JSON.parse(data); render(); notify("Proyecto cargado"); } else { notify("No hay guardado", true); } };
    document.getElementById('btnSave').onclick = () => { localStorage.setItem('acquablue_save', JSON.stringify(db)); notify(`Proyecto "${proyectoData.nombre}" guardado`); };
    document.getElementById('btnReset').onclick = autoCenter;
    document.getElementById('btnUndo').onclick = undo;
    document.getElementById('btnRedo').onclick = redo;
    document.getElementById('btnMTO').onclick = exportarMTO;
    document.getElementById('btnPDF').onclick = exportarPDF;
    document.getElementById('btnExportPCF').onclick = exportarPCF;
    document.getElementById('btnExportAVEVA').onclick = exportarAVEVA;
    document.getElementById('btnExportAutoCAD').onclick = exportarAutoCAD;
    document.getElementById('btnImportPCF').onclick = () => { const input = document.createElement('input'); input.type = 'file'; input.accept = '.pcf,.txt'; input.onchange = (e) => { if(e.target.files[0]) importarPCF(e.target.files[0]); }; input.click(); };
    document.getElementById('btnApplyNorm').onclick = aplicarNormas;
    document.getElementById('btnVoice').onclick = () => { voiceEnabled = !voiceEnabled; notify(voiceEnabled ? "Voz activada" : "Voz desactivada"); };
    document.getElementById('btnEditProyecto').onclick = editarProyecto;
    
    document.getElementById('btnCommand').onclick = () => { document.getElementById('commandPanel').style.display = 'block'; document.getElementById('commandText').focus(); };
    document.getElementById('closeCommand').onclick = () => { document.getElementById('commandPanel').style.display = 'none'; };
    document.getElementById('runCommands').onclick = () => {
        const text = document.getElementById('commandText').value;
        if (text.trim()) {
            const lines = text.split('\n');
            lines.forEach(line => { if(line.trim()) parseCommand(line.trim()); });
            document.getElementById('commandText').value = '';
        }
    };
    document.getElementById('clearCommand').onclick = () => { document.getElementById('commandText').value = ''; };
    document.getElementById('guardarProyectoBtn').onclick = guardarProyecto;
    
    document.getElementById('btnManual').onclick = () => {
        editMode = !editMode;
        document.getElementById('edit-toolbar').style.display = editMode ? 'flex' : 'none';
        if (!editMode) document.getElementById('property-panel').style.display = 'none';
        notify(editMode ? "Modo manual activado - Puede mover equipos" : "Modo manual desactivado");
    };
    
    const updatePropiedades = () => {
        if (selectedElement && selectedElement.type === 'equipment') {
            const eq = selectedElement.obj;
            eq.diametro = parseInt(document.getElementById('prop-diam-num').value);
            eq.altura = parseInt(document.getElementById('prop-alt-num').value);
            const matSelect = document.getElementById('prop-mat');
            eq.material = matSelect.options[matSelect.selectedIndex].text;
            if (eq.potencia !== undefined) eq.potencia = parseInt(document.getElementById('prop-potencia').value);
            render();
            saveState();
        }
    };
    document.getElementById('prop-diam-slider').oninput = (e) => { document.getElementById('prop-diam-num').value = e.target.value; updatePropiedades(); };
    document.getElementById('prop-diam-num').onchange = updatePropiedades;
    document.getElementById('prop-alt-slider').oninput = (e) => { document.getElementById('prop-alt-num').value = e.target.value; updatePropiedades(); };
    document.getElementById('prop-alt-num').onchange = updatePropiedades;
    document.getElementById('prop-mat').onchange = updatePropiedades;
    document.getElementById('prop-potencia').onchange = updatePropiedades;
    
    crearEjemplosIniciales();
    autoCenter();
    render();
    mostrarModalProyecto(true);
}

window.onload = init;
window.onresize = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; autoCenter(); render(); };
</script>
