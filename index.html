            // ========== INTERACCIÓN CON CANVAS ==========
            findElementAt: function(x,y) {
                for (let eq of this.db.equipos) {
                    if (eq.ports) {
                        for (let i=0; i<eq.ports.length; i++) {
                            const portX = eq.x -15 + i*15;
                            const portY = eq.y -15;
                            if (Math.hypot(portX-x, portY-y) < 8) return { type:'port', data:{ equipment:eq, port:eq.ports[i], index:i } };
                        }
                    }
                }
                for (let eq of this.db.equipos) if (Math.hypot(eq.x-x, eq.y-y) < 30) return { type:'equipo', data:eq };
                for (let line of this.db.lines) {
                    for (let i=0; i<line.path.length-1; i++) {
                        if (this.distanceToSegment(x,y,line.path[i].x,line.path[i].y,line.path[i+1].x,line.path[i+1].y) < 15) {
                            const stream = this.db.streams.find(s=>s.id===line.streamId);
                            return { type:'stream', data:stream };
                        }
                    }
                }
                return null;
            },

            distanceToSegment: function(px,py,x1,y1,x2,y2) {
                const A=px-x1, B=py-y1, C=x2-x1, D=y2-y1;
                const dot = A*C + B*D;
                const len_sq = C*C + D*D;
                let param = len_sq===0 ? -1 : dot/len_sq;
                let xx,yy;
                if (param<0) { xx=x1; yy=y1; }
                else if (param>1) { xx=x2; yy=y2; }
                else { xx=x1+param*C; yy=y1+param*D; }
                return Math.hypot(px-xx, py-yy);
            },

            highlightValidTargets: function(sourcePortInfo) {
                this.validTargetPorts.clear();
                this.db.equipos.forEach(eq => {
                    if (eq.ports) {
                        eq.ports.forEach((port,idx) => {
                            if (port.direction === 'in' && this.validateConnection(sourcePortInfo.eq, sourcePortInfo.port, eq, port, 'process', true)) {
                                this.validTargetPorts.add(`${eq.id}-${idx}`);
                            }
                        });
                    }
                });
                this.render();
            },

            onMouseDown: function(e) {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const canvasX = (e.clientX - rect.left) * scaleX;
                const canvasY = (e.clientY - rect.top) * scaleY;
                const worldX = (canvasX - this.viewTransform.x) / this.viewTransform.scale;
                const worldY = (canvasY - this.viewTransform.y) / this.viewTransform.scale;
                const hit = this.findElementAt(worldX, worldY);
                if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
                    this.isPanning = true;
                    this.panStartX = canvasX;
                    this.panStartY = canvasY;
                    return;
                }
                if (hit) {
                    if (hit.type === 'port') {
                        if (this.connectMode) {
                            if (this.pendingConnection) {
                                if (hit.data.port.direction === 'in') {
                                    const portId = `${hit.data.equipment.id}-${hit.index}`;
                                    if (this.validTargetPorts.has(portId)) {
                                        this.connectPorts(this.pendingConnection.eq, this.pendingConnection.port, hit.data.equipment, hit.data.port);
                                        this.pendingConnection = null; this.connectMode = false; this.validTargetPorts.clear();
                                        document.getElementById('connectBtn').style.background = '#238636';
                                    } else this.showNotification('Este puerto no es compatible', true);
                                }
                            } else {
                                if (hit.data.port.direction === 'out') {
                                    this.pendingConnection = { eq: hit.data.equipment, port: hit.data.port };
                                    this.showNotification('Selecciona puerto de entrada compatible');
                                    this.highlightValidTargets({ eq: hit.data.equipment, port: hit.data.port });
                                }
                            }
                        } else {
                            this.selectedEquipment = hit.data.equipment;
                            this.selectedStream = null;
                            this.closeStreamInspector();
                        }
                    } else if (hit.type === 'equipo') {
                        if (this.connectMode) {
                            const outPort = hit.data.ports.find(p=>p.direction==='out');
                            if (outPort) {
                                this.pendingConnection = { eq: hit.data, port: outPort };
                                this.showNotification('Selecciona puerto de entrada compatible');
                                this.highlightValidTargets({ eq: hit.data, port: outPort });
                            } else this.showNotification('Este equipo no tiene puerto de salida', true);
                        } else {
                            if (e.shiftKey) {
                                if (this.selectedEquipments.includes(hit.data)) this.selectedEquipments = this.selectedEquipments.filter(e=>e!==hit.data);
                                else this.selectedEquipments.push(hit.data);
                                this.selectedEquipment = hit.data;
                            } else {
                                this.selectedEquipments = [hit.data];
                                this.selectedEquipment = hit.data;
                            }
                            this.selectedStream = null;
                            this.closeInspector(); this.closeStreamInspector();
                            if (!e.shiftKey || this.selectedEquipments.length===1) {
                                this.isDragging = true;
                                this.dragElements = [...this.selectedEquipments];
                                this.dragElement = hit.data;
                                this.offsetX = worldX - hit.data.x;
                                this.offsetY = worldY - hit.data.y;
                                this.dragStartState = JSON.parse(JSON.stringify(this.db));
                            }
                            if (this.accessibility.enabled) this.announcer.announceElementSelected(hit.data);
                        }
                    } else if (hit.type === 'stream') {
                        this.selectedStream = hit.data;
                        this.selectedEquipment = null;
                        this.selectedEquipments = [];
                        this.closeInspector();
                        this.openStreamInspector(hit.data);
                    }
                } else {
                    this.selectedEquipment = null;
                    this.selectedEquipments = [];
                    this.selectedStream = null;
                    this.closeInspector(); this.closeStreamInspector();
                }
                this.render();
            },

            onMouseMove: function(e) {
                if (this.isPanning) {
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width / rect.width;
                    const scaleY = this.canvas.height / rect.height;
                    const canvasX = (e.clientX - rect.left) * scaleX;
                    const canvasY = (e.clientY - rect.top) * scaleY;
                    const dx = canvasX - this.panStartX;
                    const dy = canvasY - this.panStartY;
                    this.viewTransform.x += dx;
                    this.viewTransform.y += dy;
                    this.panStartX = canvasX;
                    this.panStartY = canvasY;
                    this.applyTransform();
                    this.render();
                    return;
                }
                if (!this.isDragging || !this.dragElement) return;
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const canvasX = (e.clientX - rect.left) * scaleX;
                const canvasY = (e.clientY - rect.top) * scaleY;
                const worldX = (canvasX - this.viewTransform.x) / this.viewTransform.scale;
                const worldY = (canvasY - this.viewTransform.y) / this.viewTransform.scale;
                const newX = worldX - this.offsetX;
                const newY = worldY - this.offsetY;
                const deltaX = newX - this.dragElement.x;
                const deltaY = newY - this.dragElement.y;
                for (let eq of this.dragElements) { eq.x += deltaX; eq.y += deltaY; this.updateLineOnEquipmentMove(eq); }
                this.dragElement.x = newX; this.dragElement.y = newY;
                if (this.accessibility.enabled && this.accessibility.announcePositions) {
                    const dist = Math.hypot(this.dragElement.x - this.lastAnnouncedPosition.x, this.dragElement.y - this.lastAnnouncedPosition.y);
                    if (dist > 50) { this.announcer.announcePosition(this.dragElement); this.lastAnnouncedPosition = { x: this.dragElement.x, y: this.dragElement.y }; }
                }
                this.render();
            },

            onMouseUp: function() {
                if (this.isPanning) { this.isPanning = false; return; }
                if (this.isDragging) {
                    this.isDragging = false;
                    this.dragElements = [];
                    this.dragElement = null;
                    if (this.dragStartState) {
                        const newState = JSON.parse(JSON.stringify(this.db));
                        this.db.history.push(JSON.stringify(this.dragStartState));
                        this.db.history.push(JSON.stringify(newState));
                        this.db.historyIndex = this.db.history.length - 1;
                        if (this.db.history.length > 30) this.db.history.shift();
                        this.dragStartState = null;
                    }
                    this.saveState();
                    this.updateAllLineJumps();
                    if (this.accessibility.enabled) this.announcer.announce('Posición fijada');
                }
            },

            onWheel: function(e) {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const mouseX = (e.clientX - rect.left) * scaleX;
                const mouseY = (e.clientY - rect.top) * scaleY;
                const worldX = (mouseX - this.viewTransform.x) / this.viewTransform.scale;
                const worldY = (mouseY - this.viewTransform.y) / this.viewTransform.scale;
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = this.viewTransform.scale * delta;
                if (newScale < 0.1 || newScale > 10) return;
                this.viewTransform.x = mouseX - worldX * newScale;
                this.viewTransform.y = mouseY - worldY * newScale;
                this.viewTransform.scale = newScale;
                this.applyTransform();
                this.render();
            },

            onTouchStart: function(e) {
                e.preventDefault();
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const touch = e.touches[0];
                const canvasX = (touch.clientX - rect.left) * scaleX;
                const canvasY = (touch.clientY - rect.top) * scaleY;
                const worldX = (canvasX - this.viewTransform.x) / this.viewTransform.scale;
                const worldY = (canvasY - this.viewTransform.y) / this.viewTransform.scale;
                const hit = this.findElementAt(worldX, worldY);
                if (e.touches.length === 2) {
                    this.isPanning = true;
                    this.panStartX = canvasX;
                    this.panStartY = canvasY;
                    return;
                }
                if (hit && hit.type === 'port') {
                    if (this.connectMode) {
                        if (this.pendingConnection) {
                            if (hit.data.port.direction === 'in') {
                                const portId = `${hit.data.equipment.id}-${hit.index}`;
                                if (this.validTargetPorts.has(portId)) {
                                    this.connectPorts(this.pendingConnection.eq, this.pendingConnection.port, hit.data.equipment, hit.data.port);
                                    this.pendingConnection = null; this.connectMode = false; this.validTargetPorts.clear();
                                    document.getElementById('connectBtn').style.background = '#238636';
                                }
                            }
                        } else {
                            if (hit.data.port.direction === 'out') {
                                this.pendingConnection = { eq: hit.data.equipment, port: hit.data.port };
                                this.showNotification('Selecciona puerto de entrada');
                                this.highlightValidTargets({ eq: hit.data.equipment, port: hit.data.port });
                            }
                        }
                    }
                } else if (hit && hit.type === 'equipo') {
                    if (this.connectMode) {
                        const outPort = hit.data.ports.find(p=>p.direction==='out');
                        if (outPort) {
                            this.pendingConnection = { eq: hit.data, port: outPort };
                            this.showNotification('Selecciona puerto de entrada');
                            this.highlightValidTargets({ eq: hit.data, port: outPort });
                        }
                    } else {
                        this.isDragging = true;
                        this.dragElements = [hit.data];
                        this.dragElement = hit.data;
                        this.offsetX = worldX - hit.data.x;
                        this.offsetY = worldY - hit.data.y;
                        if (e.touches.length === 1 && this.accessibility.enabled) this.announcer.announceElementSelected(hit.data);
                    }
                }
            },

            onTouchMove: function(e) {
                e.preventDefault();
                if (this.isPanning && e.touches.length === 2) {
                    const rect = this.canvas.getBoundingClientRect();
                    const scaleX = this.canvas.width / rect.width;
                    const scaleY = this.canvas.height / rect.height;
                    const touch = e.touches[0];
                    const canvasX = (touch.clientX - rect.left) * scaleX;
                    const canvasY = (touch.clientY - rect.top) * scaleY;
                    const dx = canvasX - this.panStartX;
                    const dy = canvasY - this.panStartY;
                    this.viewTransform.x += dx;
                    this.viewTransform.y += dy;
                    this.panStartX = canvasX;
                    this.panStartY = canvasY;
                    this.applyTransform();
                    this.render();
                    return;
                }
                if (!this.isDragging || !this.dragElement) return;
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const touch = e.touches[0];
                const canvasX = (touch.clientX - rect.left) * scaleX;
                const canvasY = (touch.clientY - rect.top) * scaleY;
                const worldX = (canvasX - this.viewTransform.x) / this.viewTransform.scale;
                const worldY = (canvasY - this.viewTransform.y) / this.viewTransform.scale;
                const newX = worldX - this.offsetX;
                const newY = worldY - this.offsetY;
                const deltaX = newX - this.dragElement.x;
                const deltaY = newY - this.dragElement.y;
                for (let eq of this.dragElements) { eq.x += deltaX; eq.y += deltaY; this.updateLineOnEquipmentMove(eq); }
                this.dragElement.x = newX; this.dragElement.y = newY;
                if (this.accessibility.enabled && this.accessibility.announcePositions && e.touches.length === 1) {
                    const dist = Math.hypot(this.dragElement.x - this.lastAnnouncedPosition.x, this.dragElement.y - this.lastAnnouncedPosition.y);
                    if (dist > 100) { this.announcer.announcePosition(this.dragElement); this.lastAnnouncedPosition = { x: this.dragElement.x, y: this.dragElement.y }; }
                }
                this.render();
            },

            onTouchEnd: function(e) {
                e.preventDefault();
                if (this.isPanning) { this.isPanning = false; return; }
                if (this.isDragging) {
                    this.isDragging = false;
                    this.dragElements = [];
                    this.dragElement = null;
                    this.saveState();
                    this.updateAllLineJumps();
                    if (this.accessibility.enabled) this.announcer.announce('Posición fijada');
                }
            },

            onDoubleClick: function(e) {
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                const canvasX = (e.clientX - rect.left) * scaleX;
                const canvasY = (e.clientY - rect.top) * scaleY;
                const worldX = (canvasX - this.viewTransform.x) / this.viewTransform.scale;
                const worldY = (canvasY - this.viewTransform.y) / this.viewTransform.scale;
                const hit = this.findElementAt(worldX, worldY);
                if (hit && hit.type === 'equipo') this.openEquipmentInspector(hit.data);
                else if (hit && hit.type === 'stream') this.openStreamInspector(hit.data);
            },

            // ========== HISTORIAL ==========
            saveState: function() {
                if (this.db.historyIndex < this.db.history.length - 1) this.db.history = this.db.history.slice(0, this.db.historyIndex+1);
                const state = JSON.stringify({ equipos: this.db.equipos, streams: this.db.streams, lines: this.db.lines, controlLoops: this.db.controlLoops, tagCounter: this.db.tagCounter, mto: this.db.mto, settings: this.db.settings });
                this.db.history.push(state);
                if (this.db.history.length > 30) this.db.history.shift();
                this.db.historyIndex = this.db.history.length - 1;
                if (this.saveTimeout) clearTimeout(this.saveTimeout);
                this.saveTimeout = setTimeout(() => {
                    try {
                        const dataStr = JSON.stringify(this.db);
                        if (window.LZString) localStorage.setItem('acqProyecto', LZString.compress(dataStr));
                        else localStorage.setItem('acqProyecto', dataStr);
                    } catch(e) { console.warn('Error guardando proyecto:', e); }
                }, 2000);
            },

            undo: function() {
                if (this.db.historyIndex > 0) {
                    this.db.historyIndex--;
                    const state = JSON.parse(this.db.history[this.db.historyIndex]);
                    this.db.equipos = state.equipos;
                    this.db.streams = state.streams;
                    this.db.lines = state.lines;
                    this.db.controlLoops = state.controlLoops || [];
                    this.db.tagCounter = state.tagCounter;
                    this.db.mto = state.mto;
                    this.db.settings = state.settings || this.db.settings;
                    if (this.selectedEquipment && !this.db.equipos.find(e=>e.id===this.selectedEquipment.id)) this.closeInspector();
                    if (this.selectedStream && !this.db.streams.find(s=>s.id===this.selectedStream.id)) this.closeStreamInspector();
                    this.render(); this.updateAllLineJumps();
                    this.showNotification('↩️ Deshacer');
                    if (this.accessibility.enabled) this.announcer.announce('Deshacer');
                }
            },

            redo: function() {
                if (this.db.historyIndex < this.db.history.length - 1) {
                    this.db.historyIndex++;
                    const state = JSON.parse(this.db.history[this.db.historyIndex]);
                    this.db.equipos = state.equipos;
                    this.db.streams = state.streams;
                    this.db.lines = state.lines;
                    this.db.controlLoops = state.controlLoops || [];
                    this.db.tagCounter = state.tagCounter;
                    this.db.mto = state.mto;
                    this.db.settings = state.settings || this.db.settings;
                    if (this.selectedEquipment && !this.db.equipos.find(e=>e.id===this.selectedEquipment.id)) this.closeInspector();
                    if (this.selectedStream && !this.db.streams.find(s=>s.id===this.selectedStream.id)) this.closeStreamInspector();
                    this.render(); this.updateAllLineJumps();
                    this.showNotification('↪️ Rehacer');
                    if (this.accessibility.enabled) this.announcer.announce('Rehacer');
                }
            },

            // ========== EXPORTACIÓN A EXCEL ==========
            exportToExcel: function() {
                const wb = XLSX.utils.book_new();
                const equiposSheet = this.db.equipos.map(e=>({ ID:e.id, Tag:e.tag, Tipo:e.type, X:Math.round(e.x), Y:Math.round(e.y), Puertos:JSON.stringify(e.ports), DesignParams:JSON.stringify(e.designParams), CatalogRef:JSON.stringify(e.catalogRef) }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(equiposSheet), 'Equipos');
                const streamsSheet = this.db.streams.map(s=>({ ID:s.id, Nombre:s.name, Tipo:s.lineType, Desde_equipo:s.source.equipmentId, Desde_puerto:s.source.portId, Hasta_equipo:s.target.equipmentId, Hasta_puerto:s.target.portId, Diametro:s.diameter, Material:s.material, Cedula:s.schedule, Fluido:s.fluid?JSON.stringify(s.fluid):null, Componentes:JSON.stringify(s.components) }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(streamsSheet), 'Streams');
                const linesSheet = this.db.lines.map(l=>({ ID:l.id, StreamId:l.streamId, Path:JSON.stringify(l.path), Jumps:JSON.stringify(l.jumps||[]) }));
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linesSheet), 'Lineas');
                XLSX.writeFile(wb, `ACQ_Proyecto_${Date.now()}.xlsx`);
                this.showNotification('✅ Proyecto exportado a Excel');
            },

            importFromExcel: function() {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = '.xlsx, .xls';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const data = new Uint8Array(ev.target.result);
                            const wb = XLSX.read(data, { type: 'array' });
                            if (wb.SheetNames.includes('Equipos')) {
                                const equipos = XLSX.utils.sheet_to_json(wb.Sheets['Equipos']);
                                this.db.equipos = equipos.map(e=>({ id:e.ID||this.generateId(), tag:e.Tag, type:e.Tipo, x:e.X, y:e.Y, ports:JSON.parse(e.Puertos||'[]'), designParams:JSON.parse(e.DesignParams||'{}'), catalogRef:JSON.parse(e.CatalogRef||'null') }));
                            }
                            if (wb.SheetNames.includes('Streams')) {
                                const streams = XLSX.utils.sheet_to_json(wb.Sheets['Streams']);
                                this.db.streams = streams.map(s=>({ id:s.ID||this.generateId(), name:s.Nombre, lineType:s.Tipo, source:{ equipmentId:s.Desde_equipo, portId:s.Desde_puerto }, target:{ equipmentId:s.Hasta_equipo, portId:s.Hasta_puerto }, diameter:s.Diametro, material:s.Material, schedule:s.Cedula, fluid:s.Fluido?JSON.parse(s.Fluido):null, components:JSON.parse(s.Componentes||'[]'), lineId:null }));
                            }
                            if (wb.SheetNames.includes('Lineas')) {
                                const lines = XLSX.utils.sheet_to_json(wb.Sheets['Lineas']);
                                this.db.lines = lines.map(l=>({ id:l.ID||this.generateId(), streamId:l.StreamId, path:JSON.parse(l.Path), jumps:JSON.parse(l.Jumps||'[]') }));
                                this.db.streams.forEach(s=>{ const line=this.db.lines.find(l=>l.streamId===s.id); if(line) s.lineId=line.id; });
                            }
                            this.render(); this.updateAllLineJumps();
                            this.showNotification('✅ Proyecto importado desde Excel');
                        } catch(err) { this.showNotification('❌ Error al importar Excel: '+err.message, true); }
                    };
                    reader.readAsArrayBuffer(file);
                };
                input.click();
            },

            // ========== EXPORTACIÓN PCF ==========
            exportToPCF: function() {
                let pcf = '!PipingComponentFile\nVERSION 2\nUNIT METRIC\nPROJECT "'+this.db.settings.projectName+'"\nENGINEER "'+this.db.settings.engineerName+'"\nDATE '+new Date().toISOString().slice(0,10)+'\n';
                this.db.streams.filter(s=>s.lineType==='process').forEach(stream=>{
                    const line = this.db.lines.find(l=>l.streamId===stream.id);
                    if (!line) return;
                    pcf += `\n!LINE ${stream.name}\n  BORE ${stream.diameter}\n  SCHEDULE ${stream.schedule||'40'}\n  MATERIAL ${stream.material}\n  FLUID ${stream.fluid?.components?.[0]?.name||'agua'}\n  TEMP_DESIGN ${stream.fluid?.temperature||25}\n  PRESS_DESIGN ${stream.fluid?.pressure||1}\n`;
                    stream.components.forEach(comp=>{
                        if (comp.type==='PIPE') {
                            pcf += `  PIPE\n    BORE ${comp.bore}\n    SCHEDULE ${comp.schedule}\n    MATERIAL ${comp.material}\n    LENGTH ${comp.length.toFixed(3)}\n`;
                            comp.points.forEach(pt=> pcf += `    POINT ${pt.x.toFixed(3)} ${pt.y.toFixed(3)} 0\n`);
                            pcf += `  END\n`;
                        } else if (comp.type==='VALVE') {
                            pcf += `  VALVE\n    TAG ${comp.tag}\n    TYPE ${comp.valveType}\n    SIZE ${comp.size}\n    RATING ${comp.rating}\n    MATERIAL ${comp.material}\n    END_TYPE ${comp.extremos}\n    POINT ${comp.point.x.toFixed(3)} ${comp.point.y.toFixed(3)} 0\n  END\n`;
                        }
                    });
                    pcf += `!END\n`;
                });
                const blob = new Blob([pcf], { type:'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href=url; a.download=`proyecto_${Date.now()}.pcf`; a.click();
                URL.revokeObjectURL(url);
                this.showNotification('✅ Archivo PCF generado');
            },

            importPCF: function() {
                const input = document.createElement('input');
                input.type='file'; input.accept='.pcf';
                input.onchange=(e)=>{
                    const file=e.target.files[0];
                    if(!file) return;
                    const reader=new FileReader();
                    reader.onload=(ev)=>{ this.parsePCF(ev.target.result); };
                    reader.readAsText(file);
                };
                input.click();
            },

            parsePCF: function(content) {
                this.showNotification('Analizando archivo PCF...');
                const lines = content.split('\n');
                let currentLine=null, currentComponent=null, inComponent=false;
                const newStreams=[], newLines=[], newEquipos=[], valveComponents=[];
                for(let line of lines) {
                    line=line.trim();
                    if(line.startsWith('!LINE')) {
                        if(currentLine) this.processPCFLine(currentLine, newStreams, newLines, valveComponents);
                        currentLine={ name:line.substring(6).trim(), components:[], bore:6, schedule:'40', material:'ACERO', fluid:'agua', temp:25, press:1 };
                    } else if(line.startsWith('BORE') && currentLine) currentLine.bore=parseFloat(line.split(/\s+/)[1]);
                    else if(line.startsWith('SCHEDULE') && currentLine) currentLine.schedule=line.split(/\s+/)[1];
                    else if(line.startsWith('MATERIAL') && currentLine) currentLine.material=line.split(/\s+/)[1];
                    else if(line.startsWith('FLUID') && currentLine) currentLine.fluid=line.split(/\s+/)[1];
                    else if(line.startsWith('TEMP_DESIGN') && currentLine) currentLine.temp=parseFloat(line.split(/\s+/)[1]);
                    else if(line.startsWith('PRESS_DESIGN') && currentLine) currentLine.press=parseFloat(line.split(/\s+/)[1]);
                    else if(line.startsWith('PIPE')) { currentComponent={ type:'PIPE', points:[] }; inComponent=true; }
                    else if(line.startsWith('VALVE')) { currentComponent={ type:'VALVE' }; inComponent=true; }
                    else if(line.startsWith('END') && currentComponent) {
                        if(currentLine && currentComponent) {
                            currentLine.components.push(currentComponent);
                            if(currentComponent.type==='VALVE') valveComponents.push(currentComponent);
                        }
                        currentComponent=null; inComponent=false;
                    } else if(inComponent && currentComponent) {
                        if(line.startsWith('BORE')) currentComponent.bore=parseFloat(line.split(/\s+/)[1]);
                        else if(line.startsWith('SCHEDULE')) currentComponent.schedule=line.split(/\s+/)[1];
                        else if(line.startsWith('MATERIAL')) currentComponent.material=line.split(/\s+/)[1];
                        else if(line.startsWith('LENGTH')) currentComponent.length=parseFloat(line.split(/\s+/)[1]);
                        else if(line.startsWith('POINT') && currentComponent.type==='PIPE') {
                            const parts=line.split(/\s+/);
                            currentComponent.points.push({ x:parseFloat(parts[1]), y:parseFloat(parts[2]), z:parseFloat(parts[3]) });
                        } else if(line.startsWith('TAG') && currentComponent.type==='VALVE') currentComponent.tag=line.split(/\s+/)[1];
                        else if(line.startsWith('TYPE') && currentComponent.type==='VALVE') currentComponent.valveType=line.split(/\s+/)[1];
                        else if(line.startsWith('SIZE') && currentComponent.type==='VALVE') currentComponent.size=parseInt(line.split(/\s+/)[1]);
                        else if(line.startsWith('RATING') && currentComponent.type==='VALVE') currentComponent.rating=line.split(/\s+/)[1];
                        else if(line.startsWith('END_TYPE') && currentComponent.type==='VALVE') currentComponent.extremos=line.split(/\s+/)[1];
                        else if(line.startsWith('POINT') && currentComponent.type==='VALVE') {
                            const parts=line.split(/\s+/);
                            currentComponent.point={ x:parseFloat(parts[1]), y:parseFloat(parts[2]), z:parseFloat(parts[3]) };
                        }
                    } else if(line==='!END') {
                        if(currentLine) this.processPCFLine(currentLine, newStreams, newLines, valveComponents);
                        currentLine=null;
                    }
                }
                valveComponents.forEach((comp,idx)=>{
                    if(!comp.tag) comp.tag=this.generateTag('V');
                    const valve={ id:this.generateId(), tag:comp.tag, type:comp.valveType||'GATE', x:comp.point?comp.point.x/MM_PER_PX:300+idx*100, y:comp.point?comp.point.y/MM_PER_PX:300, ports:this.getDefaultPorts('CONTROL_VALVE'), designParams:{ size:comp.size||6, rating:comp.rating||'150#', material:comp.material||'WCB', extremos:comp.extremos||'bridado' }, catalogRef:null };
                    newEquipos.push(valve);
                    comp.equipmentId=valve.id;
                });
                newStreams.forEach(stream=>{
                    stream.components.forEach(comp=>{
                        if(comp.type==='VALVE' && comp.equipmentId) {
                            const valve=newEquipos.find(v=>v.id===comp.equipmentId);
                            if(valve) comp.tag=valve.tag;
                        }
                    });
                });
                this.db.equipos=[...this.db.equipos, ...newEquipos];
                this.db.streams=[...this.db.streams, ...newStreams];
                this.db.lines=[...this.db.lines, ...newLines];
                this.render(); this.updateAllLineJumps();
                this.showNotification(`✅ PCF importado: ${newStreams.length} líneas, ${newEquipos.length} válvulas`);
            },

            processPCFLine: function(lineData, streams, lines, valveComponents) {
                const streamId=this.generateId();
                const lineId=this.generateId();
                let path=[];
                const firstPipe=lineData.components.find(c=>c.type==='PIPE');
                if(firstPipe && firstPipe.points.length>0) path=firstPipe.points.map(p=>({ x:p.x/MM_PER_PX, y:p.y/MM_PER_PX }));
                else path=[{x:100,y:100},{x:200,y:100},{x:200,y:200}];
                const stream={ id:streamId, name:lineData.name, lineType:'process', fluid:{ components:[{name:lineData.fluid||'agua', fraction:1.0}], phase:'liquid', temperature:lineData.temp, pressure:lineData.press, flow:100 }, source:{ equipmentId:null, portId:null }, target:{ equipmentId:null, portId:null }, lineId:lineId, diameter:lineData.bore, material:lineData.material, schedule:lineData.schedule, components:lineData.components };
                const line={ id:lineId, streamId:streamId, path, jumps:[] };
                streams.push(stream); lines.push(line);
                if(path.length>=2) {
                    const startPoint=path[0], endPoint=path[path.length-1];
                    [...this.db.equipos, ...valveComponents.map(v=>({ id:v.equipmentId, x:v.point?.x/MM_PER_PX||0, y:v.point?.y/MM_PER_PX||0, ports:[{direction:'in'},{direction:'out'}] }))].forEach(eq=>{
                        if(!eq) return;
                        const distStart=Math.hypot(eq.x-startPoint.x, eq.y-startPoint.y);
                        const distEnd=Math.hypot(eq.x-endPoint.x, eq.y-endPoint.y);
                        if(distStart<50 && !stream.source.equipmentId) {
                            const outPort=eq.ports?.find(p=>p.direction==='out');
                            if(outPort) stream.source={ equipmentId:eq.id, portId:outPort.id||'out' };
                        }
                        if(distEnd<50 && !stream.target.equipmentId) {
                            const inPort=eq.ports?.find(p=>p.direction==='in');
                            if(inPort) stream.target={ equipmentId:eq.id, portId:inPort.id||'in' };
                        }
                    });
                }
            },

            // ========== MTO ==========
            generateMTO: function() {
                let mto={ pipes:[], valves:[] };
                const pipeMap=new Map();
                this.db.streams.filter(s=>s.lineType==='process').forEach(stream=>{
                    stream.components.forEach(comp=>{
                        if(comp.type==='PIPE') {
                            const key=`${stream.name}-${comp.bore}-${comp.schedule}-${comp.material}`;
                            const pesoPorMetro=CATALOGO.tuberias.pesos_kg_m[comp.bore]?.[comp.schedule]||28.26;
                            if(pipeMap.has(key)) {
                                pipeMap.get(key).longitud+=comp.length;
                                pipeMap.get(key).peso=(pipeMap.get(key).longitud*pesoPorMetro).toFixed(2);
                            } else {
                                pipeMap.set(key,{ linea:stream.name, diametro:comp.bore, longitud:comp.length, material:comp.material, peso:(comp.length*pesoPorMetro).toFixed(2) });
                            }
                        } else if(comp.type==='VALVE') {
                            mto.valves.push({ tag:comp.tag, tipo:comp.valveType, tamaño:comp.size, rating:comp.rating, material:comp.material });
                        }
                    });
                });
                mto.pipes=Array.from(pipeMap.values());
                let html='<h3 style="color:#58a6ff;">Lista de Materiales (MTO)</h3><h4>Tuberías</h4><table class="mto-table"><tr><th>Línea</th><th>Ø</th><th>Longitud (m)</th><th>Material</th><th>Peso (kg)</th></tr>';
                mto.pipes.forEach(p=>html+=`<tr><td>${p.linea}</td><td>${p.diametro}"</td><td>${p.longitud.toFixed(2)}</td><td>${p.material}</td><td>${p.peso}</td></tr>`);
                html+='</table><h4>Válvulas</h4><table class="mto-table"><tr><th>Tag</th><th>Tipo</th><th>Tamaño</th><th>Rating</th><th>Material</th></tr>';
                mto.valves.forEach(v=>html+=`<tr><td>${v.tag}</td><td>${v.tipo}</td><td>${v.tamaño}"</td><td>${v.rating}</td><td>${v.material}</td></tr>`);
                html+='</table>';
                this.showNotification(html, false, true);
                const wb=XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mto.pipes), 'Tuberías');
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(mto.valves), 'Válvulas');
                XLSX.writeFile(wb, `MTO_${Date.now()}.xlsx`);
                this.showNotification('✅ MTO exportado a Excel');
            },

            // ========== SPOOLS ==========
            generateSpools: function() {
                let spools=[];
                this.db.streams.filter(s=>s.lineType==='process').forEach(stream=>{
                    const line=this.db.lines.find(l=>l.streamId===stream.id);
                    if(!line) return;
                    const maxSpoolLength=6;
                    let currentPos=0;
                    let currentSpool={ components:[], length:0, points:[], streamName:stream.name };
                    const totalLength=this.calcPathLength(line.path)*M_PER_PX;
                    while(currentPos<totalLength) {
                        const endPos=Math.min(currentPos+maxSpoolLength,totalLength);
                        const segmentPoints=this.getSubpathPoints(line.path,currentPos,endPos);
                        const segmentLength=endPos-currentPos;
                        const pipeComp={ type:'PIPE', bore:stream.diameter, schedule:stream.schedule, material:stream.material, length:segmentLength, points:segmentPoints.map(p=>({ x:p.x*MM_PER_PX, y:p.y*MM_PER_PX, z:0 })) };
                        currentSpool.components.push(pipeComp);
                        currentSpool.length+=segmentLength;
                        currentSpool.points=currentSpool.points.concat(segmentPoints);
                        stream.components.forEach(comp=>{
                            if(comp.type==='VALVE' && comp.point) {
                                const valvePosM=comp.point.x/1000;
                                if(valvePosM>=currentPos && valvePosM<=endPos && !currentSpool.components.includes(comp)) currentSpool.components.push(comp);
                            }
                        });
                        if(endPos>=totalLength || currentSpool.length>=maxSpoolLength) {
                            spools.push({ ...currentSpool });
                            currentSpool={ components:[], length:0, points:[], streamName:stream.name };
                        }
                        currentPos=endPos;
                    }
                });
                let html='<h3 style="color:#58a6ff;">Spools generados</h3>';
                spools.forEach((spool,idx)=>{
                    html+=`<h4>Spool ${idx+1} (Línea ${spool.streamName}) - Longitud total: ${spool.length.toFixed(2)} m</h4><table class="mto-table"><tr><th>Componente</th><th>Detalle</th></tr>`;
                    spool.components.forEach(c=>{
                        if(c.type==='PIPE') html+=`<tr><td>Tubería</td><td>Ø${c.bore}" ${c.material} L=${c.length.toFixed(2)}m</td></tr>`;
                        else if(c.type==='VALVE') html+=`<tr><td>Válvula</td><td>${c.tag} ${c.valveType} ${c.size}" ${c.rating}</td></tr>`;
                    });
                    html+='</table>';
                });
                this.showNotification(html, false, true);
                spools.forEach((spool,idx)=>{
                    let dxf="0\nSECTION\n2\nHEADER\n0\nENDSEC\n0\nSECTION\n2\nBLOCKS\n0\nBLOCK\n2\nVALVE_BLOCK\n70\n0\n10\n0\n20\n0\n30\n0\n0\nCIRCLE\n8\n0\n10\n0\n20\n0\n30\n0\n40\n8\n0\nLINE\n8\n0\n10\n-5\n20\n0\n30\n0\n11\n5\n21\n0\n31\n0\n0\nLINE\n8\n0\n10\n0\n20\n-5\n30\n0\n11\n0\n21\n5\n31\n0\n0\nENDBLK\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n";
                    spool.components.forEach(comp=>{
                        if(comp.type==='PIPE' && comp.points) {
                            for(let i=0;i<comp.points.length-1;i++) {
                                dxf+=`0\nLINE\n8\nSPOOL_${idx+1}\n10\n${comp.points[i].x}\n20\n${-comp.points[i].y}\n30\n0\n11\n${comp.points[i+1].x}\n21\n${-comp.points[i+1].y}\n31\n0\n`;
                            }
                        } else if(comp.type==='VALVE' && comp.point) {
                            dxf+=`0\nINSERT\n8\nSPOOL_${idx+1}\n2\nVALVE_BLOCK\n10\n${comp.point.x}\n20\n${-comp.point.y}\n30\n0\n41\n1\n42\n1\n43\n1\n`;
                        }
                    });
                    dxf+="0\nENDSEC\n0\nEOF";
                    const blob=new Blob([dxf],{type:'application/dxf'});
                    const url=URL.createObjectURL(blob);
                    const a=document.createElement('a'); a.href=url; a.download=`spool_${idx+1}_${Date.now()}.dxf`; a.click();
                });
                this.showNotification('✅ Spools generados y DXF exportados');
            },

            getSubpathPoints: function(path,startM,endM) {
                if(path.length<2) return [];
                const points=[];
                let accumulated=0;
                const totalPx=this.calcPathLength(path);
                const totalM=totalPx*M_PER_PX;
                startM=Math.max(0,startM); endM=Math.min(totalM,endM);
                for(let i=0;i<path.length-1;i++) {
                    const p1=path[i],p2=path[i+1];
                    const segPx=Math.hypot(p2.x-p1.x,p2.y-p1.y);
                    const segM=segPx*M_PER_PX;
                    const segStartM=accumulated, segEndM=accumulated+segM;
                    if(segEndM<startM) { accumulated+=segM; continue; }
                    if(segStartM>endM) break;
                    const tStart=Math.max(0,(startM-segStartM)/segM);
                    const tEnd=Math.min(1,(endM-segStartM)/segM);
                    if(tStart<1 && tEnd>0) {
                        const xStart=p1.x+(p2.x-p1.x)*tStart;
                        const yStart=p1.y+(p2.y-p1.y)*tStart;
                        if(points.length===0) points.push({x:xStart,y:yStart});
                        if(tEnd<1) {
                            const xEnd=p1.x+(p2.x-p1.x)*tEnd;
                            const yEnd=p1.y+(p2.y-p1.y)*tEnd;
                            points.push({x:xEnd,y:yEnd});
                        } else points.push({x:p2.x,y:p2.y});
                    }
                    accumulated+=segM;
                }
                return points;
            },

            generateIsometric: function() {
                if(this.db.lines.length===0) { this.showNotification('⚠️ No hay líneas para generar isométrico',true); return; }
                const isoCanvas=document.createElement('canvas');
                isoCanvas.width=800; isoCanvas.height=600;
                const ctx=isoCanvas.getContext('2d');
                ctx.clearRect(0,0,isoCanvas.width,isoCanvas.height);
                ctx.translate(200,100);
                this.db.lines.forEach(line=>{
                    const stream=this.db.streams.find(s=>s.id===line.streamId);
                    if(!stream||stream.lineType!=='process') return;
                    const points=this.convertToIsometric(line.path);
                    ctx.beginPath(); ctx.strokeStyle='#000'; ctx.lineWidth=2;
                    ctx.moveTo(points[0].x,points[0].y);
                    for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x,points[i].y);
                    ctx.stroke();
                    stream.components.forEach(comp=>{
                        if(comp.type==='VALVE' && comp.point) {
                            const pos=this.convertToIsometric([{x:comp.point.x/MM_PER_PX,y:comp.point.y/MM_PER_PX}])[0];
                            ctx.fillStyle='#f00'; ctx.fillRect(pos.x-5,pos.y-5,10,10);
                        }
                    });
                });
                this.showIsometricModal(isoCanvas);
                this.exportIsometricDXF();
            },

            convertToIsometric: function(points) {
                let iso=[], z=0;
                for(let i=0;i<points.length;i++) {
                    if(i>0 && Math.abs(points[i].y-points[i-1].y)>10) z+=30;
                    iso.push({ x:points[i].x-points[i].y*0.5, y:(points[i].x*0.5+points[i].y*0.5)-z*0.3 });
                }
                return iso;
            },

            showIsometricModal: function(canvas) {
                const overlay=document.createElement('div'); overlay.className='overlay'; overlay.onclick=()=>{ overlay.remove(); modal.remove(); };
                const modal=document.createElement('div'); modal.className='modal'; modal.style.width='850px';
                modal.innerHTML=`<h2 style="color:#58a6ff;">Vista Isométrica</h2><div style="text-align:center;">${canvas.outerHTML}</div><div style="display:flex; gap:10px; justify-content:center; margin-top:15px;"><button class="btn-success" onclick="App.exportIsometricDXF()">📥 Descargar DXF</button><button class="btn-warning" onclick="this.closest('.modal').remove(); document.querySelector('.overlay').remove();">Cerrar</button></div>`;
                document.body.appendChild(overlay); document.body.appendChild(modal);
            },

            exportIsometricDXF: function() {
                let dxf="0\nSECTION\n2\nHEADER\n0\nENDSEC\n0\nSECTION\n2\nBLOCKS\n0\nBLOCK\n2\nVALVE_BLOCK\n70\n0\n10\n0\n20\n0\n30\n0\n0\nCIRCLE\n8\n0\n10\n0\n20\n0\n30\n0\n40\n8\n0\nLINE\n8\n0\n10\n-5\n20\n0\n30\n0\n11\n5\n21\n0\n31\n0\n0\nLINE\n8\n0\n10\n0\n20\n-5\n30\n0\n11\n0\n21\n5\n31\n0\n0\nENDBLK\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n";
                this.db.lines.forEach(line=>{
                    const stream=this.db.streams.find(s=>s.id===line.streamId);
                    if(!stream||stream.lineType!=='process') return;
                    const points=this.convertToIsometric(line.path);
                    for(let i=0;i<points.length-1;i++) {
                        dxf+=`0\nLINE\n8\nTUBERIA\n10\n${points[i].x}\n20\n${-points[i].y}\n30\n0\n11\n${points[i+1].x}\n21\n${-points[i+1].y}\n31\n0\n`;
                    }
                    stream.components.forEach(comp=>{
                        if(comp.type==='VALVE' && comp.point) {
                            const pos=this.convertToIsometric([{x:comp.point.x/MM_PER_PX,y:comp.point.y/MM_PER_PX}])[0];
                            dxf+=`0\nINSERT\n8\nVALVULAS\n2\nVALVE_BLOCK\n10\n${pos.x}\n20\n${-pos.y}\n30\n0\n41\n1\n42\n1\n43\n1\n`;
                        }
                    });
                });
                dxf+="0\nENDSEC\n0\nEOF";
                const blob=new Blob([dxf],{type:'application/dxf'});
                const url=URL.createObjectURL(blob);
                const a=document.createElement('a'); a.href=url; a.download=`isometrico_${Date.now()}.dxf`; a.click();
                this.showNotification('✅ Isométrico DXF generado (con bloques)');
            },

            calculateHMB: function() {
                this.showNotification('⚖️ Calculando balance de masa y energía...');
                let massBalance={}, inconsistencies=[];
                this.db.streams.filter(s=>s.lineType==='process').forEach(s=>{
                    const from=this.db.equipos.find(e=>e.id===s.source.equipmentId);
                    const to=this.db.equipos.find(e=>e.id===s.target.equipmentId);
                    if(from) { if(!massBalance[from.id]) massBalance[from.id]={in:0,out:0}; massBalance[from.id].out+=s.fluid.flow; }
                    if(to) { if(!massBalance[to.id]) massBalance[to.id]={in:0,out:0}; massBalance[to.id].in+=s.fluid.flow; }
                });
                let html='<h3 style="color:#58a6ff;">📊 Balance de Masa</h3><table class="mto-table"><tr><th>Equipo</th><th>Entrada</th><th>Salida</th><th>Balance</th></tr>';
                for(let eqId in massBalance) {
                    const eq=this.db.equipos.find(e=>e.id===eqId);
                    const balance=massBalance[eqId].in-massBalance[eqId].out;
                    html+=`<tr><td>${eq?eq.tag:eqId}</td><td>${massBalance[eqId].in.toFixed(2)}</td><td>${massBalance[eqId].out.toFixed(2)}</td><td>${balance.toFixed(2)}</td></tr>`;
                    if(Math.abs(balance)>0.1) inconsistencies.push(`Desbalance en ${eq?eq.tag:eqId}: ${balance.toFixed(2)}`);
                }
                html+='</table>';
                if(inconsistencies.length) { html+='<h4 style="color:#d73a49;">⚠️ Inconsistencias</h4><ul>'; inconsistencies.forEach(i=>html+=`<li>${i}</li>`); html+='</ul>'; }
                this.showNotification(html,false,true);
            },

            exportHMBToExcel: function() {
                const data=this.db.streams.filter(s=>s.lineType==='process').map(s=>({ Corriente:s.name, Temperatura:s.fluid.temperature, Presión:s.fluid.pressure, Caudal:s.fluid.flow, Fase:s.fluid.phase }));
                const wb=XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),'Corrientes');
                XLSX.writeFile(wb,`Balance_${Date.now()}.xlsx`);
                this.showNotification('✅ Balance exportado a Excel');
            },

            guardarProyecto: function() {
                const dataStr=JSON.stringify(this.db,null,2);
                const blob=new Blob([dataStr],{type:'application/json'});
                const url=URL.createObjectURL(blob);
                const a=document.createElement('a'); a.href=url; a.download=`proyecto_${new Date().toISOString().slice(0,10)}.json`; a.click();
                URL.revokeObjectURL(url);
                this.showNotification('✅ Proyecto guardado');
            },

            cargarProyecto: function(event) {
                const file=event.target.files[0];
                if(!file) return;
                const reader=new FileReader();
                reader.onload=(e)=>{
                    try {
                        const loaded=JSON.parse(e.target.result);
                        this.db=this.mergeWithDefaults(loaded);
                        this.render(); this.ocultarInicio(); this.updateAllLineJumps(); this.fitToScreen();
                        this.showNotification('📂 Proyecto cargado');
                    } catch(err) {
                        this.showNotification('❌ Error al cargar', true);
                    }
                };
                reader.readAsText(file);
            },

            mergeWithDefaults: function(loaded) {
                return {
                    equipos: loaded.equipos || [],
                    streams: loaded.streams || [],
                    lines: loaded.lines || [],
                    controlLoops: loaded.controlLoops || [],
                    tagCounter: loaded.tagCounter || { P:0, T:0, E:0, V:0, S:0, INST:100, VALVE:100, LOOP:1 },
                    mto: loaded.mto || null,
                    settings: loaded.settings || { engineerName: 'Ing. Usuario', companyName: 'ACQ', projectName: 'Proyecto ACQ', snapToGrid: true, gridSize: 25, showFlowArrows: true, theme: 'dark' },
                    history: loaded.history || [],
                    historyIndex: loaded.historyIndex !== undefined ? loaded.historyIndex : -1
                };
            },

            nuevoProyecto: function() {
                this.db = {
                    equipos: [],
                    streams: [],
                    lines: [],
                    controlLoops: [],
                    tagCounter: { P:0, T:0, E:0, V:0, S:0, INST:100, VALVE:100, LOOP:1 },
                    mto: null,
                    settings: this.db.settings,
                    history: [],
                    historyIndex: -1
                };
                this.createDefaultEquipment('TANK', 'T-100', 300, 250);
                this.createDefaultEquipment('PUMP', 'P-101', 500, 250);
                this.saveState();
                this.render();
                this.ocultarInicio();
                this.fitToScreen();
                this.showNotification('🆕 Nuevo proyecto');
            },

            createDefaultEquipment: function(type, tag, x, y) {
                let ports = this.getDefaultPorts(type);
                const equipo = {
                    id: this.generateId(),
                    tag, type,
                    x, y,
                    ports: ports,
                    designParams: { material: 'Acero', flow: 100, pressure: 1, temperature: 25 },
                    catalogRef: null
                };
                this.db.equipos.push(equipo);
            },

            abrirProyecto: function() {
                document.getElementById('cargarArchivo').click();
            },

            // ========== GENERADORES DE TEXTO (PFD/DTI) ==========
            showTextInputDialog: function(type) {
                const overlay = document.createElement('div');
                overlay.className = 'overlay';
                overlay.onclick = () => this.closeTextDialog();
                const modal = document.createElement('div');
                modal.className = 'modal';
                if (type === 'PFD') {
                    modal.innerHTML = `
                        <h2 style="color:#58a6ff;">Generar PFD por Texto</h2>
                        <p>Describa el proceso (se reconocerán equipos con formato T-100, P-101, etc.):</p>
                        <textarea id="pfdText" rows="6" style="width:100%;">Ej: Tanque T-100 alimenta a bomba P-101, que envía a intercambiador E-101</textarea>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn-primary" onclick="App.processPFDText()">Generar</button>
                            <button class="btn-warning" onclick="App.closeTextDialog()">Cancelar</button>
                        </div>
                    `;
                } else {
                    modal.innerHTML = `
                        <h2 style="color:#8e44ad;">Generar DTI por Texto</h2>
                        <p>Describa la instrumentación:</p>
                        <textarea id="dtiText" rows="8" style="width:100%;">Ejemplo:
Lazo TIC-101:
- TT-101 en línea 6", rango 0-100°C, señal 4-20mA
- TIC-101 en panel
- FCV-101 6" 150# (válvula de control)
- Señal TT-101 → TIC-101 → FCV-101</textarea>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn-primary" onclick="App.processDTIText()">Generar</button>
                            <button class="btn-warning" onclick="App.closeTextDialog()">Cancelar</button>
                        </div>
                    `;
                }
                document.body.appendChild(overlay);
                document.body.appendChild(modal);
                setTimeout(() => (type==='PFD'?document.getElementById('pfdText'):document.getElementById('dtiText'))?.focus(), 100);
            },

            processPFDText: function() {
                const text = document.getElementById('pfdText')?.value;
                if (!text) return;
                this.closeTextDialog();
                this.pfdFromText(text);
            },

            processDTIText: function() {
                const text = document.getElementById('dtiText')?.value;
                if (!text) return;
                this.closeTextDialog();
                this.dtiFromText(text);
            },

            closeTextDialog: function() {
                document.querySelectorAll('.overlay, .modal').forEach(el => el.remove());
            },

            pfdFromText: function(text) {
                this.showNotification('Analizando texto PFD...');
                this.db.equipos = []; this.db.streams = []; this.db.lines = [];
                this.db.tagCounter = { P:0, T:0, E:0, V:0, S:0, INST:100, VALVE:100, LOOP:1 };
                const tokens = text.toLowerCase().split(/\s+/);
                tokens.forEach(token => {
                    const match = token.match(/([a-z]+)[-]?(\d+)/i);
                    if (match) {
                        const prefix = match[1].toUpperCase();
                        const num = match[2];
                        const tag = `${prefix}-${num}`;
                        let type = 'TANK';
                        if (prefix === 'P') type = 'PUMP';
                        else if (prefix === 'E') type = 'HEAT_EXCHANGER';
                        else if (prefix === 'V') type = 'CONTROL_VALVE';
                        if (!this.db.equipos.find(e => e.tag === tag)) {
                            const eq = {
                                id: this.generateId(),
                                tag, type,
                                x: 200 + this.db.equipos.length * 150,
                                y: 200 + (Math.floor(this.db.equipos.length / 5) * 150),
                                ports: this.getDefaultPorts(type),
                                designParams: { tipo: 'estándar', material: 'Acero' }
                            };
                            this.db.equipos.push(eq);
                        }
                    }
                });
                this.render();
                this.updateAllLineJumps();
                this.fitToScreen();
                this.showNotification(`✅ PFD generado: ${this.db.equipos.length} equipos`);
            },

            dtiFromText: function(text) {
                this.showNotification('Analizando texto DTI...');
                this.db.equipos = []; this.db.streams = []; this.db.lines = [];
                this.db.controlLoops = [];
                this.db.tagCounter = { P:0, T:0, E:0, V:0, S:0, INST:100, VALVE:100, LOOP:1 };
                const lines = text.split('\n');
                lines.forEach(line => {
                    const instMatch = line.match(/(TT|PT|FT|LT|TIC|PIC|FIC|LIC|TI|PI|FI|LI)-(\d+)/i);
                    if (instMatch) {
                        const type = instMatch[1].toUpperCase();
                        const num = instMatch[2];
                        const tag = `${type}-${num}`;
                        const inst = {
                            id: this.generateId(),
                            tag, type,
                            x: 200 + this.db.equipos.length * 120,
                            y: 200 + (Math.floor(this.db.equipos.length / 6) * 120),
                            ports: [],
                            designParams: {
                                location: line.match(/panel/i) ? 'PANEL' : 'FIELD',
                                range: line.match(/rango\s*([^,]+)/i)?.[1] || '0-100%',
                                signal: line.match(/(4-20mA|HART)/i)?.[0] || '4-20mA'
                            }
                        };
                        this.db.equipos.push(inst);
                    }
                    const valveMatch = line.match(/(FCV|PCV|LCV|PSV|GATE|GLOBE|BALL|BUTTERFLY|CHECK)-(\d+)/i);
                    if (valveMatch) {
                        const type = valveMatch[1].toUpperCase();
                        const num = valveMatch[2];
                        const tag = `${type}-${num}`;
                        const sizeMatch = line.match(/(\d+)"\s*(\d{3}#)?/);
                        const size = sizeMatch ? parseInt(sizeMatch[1]) : 6;
                        const rating = sizeMatch && sizeMatch[2] ? sizeMatch[2] : '150#';
                        const valve = {
                            id: this.generateId(),
                            tag, type,
                            x: 200 + this.db.equipos.length * 120,
                            y: 400 + (Math.floor(this.db.equipos.length / 4) * 100),
                            ports: this.getDefaultPorts('CONTROL_VALVE'),
                            designParams: { size, rating, material: 'WCB' }
                        };
                        this.db.equipos.push(valve);
                    }
                });
                this.render();
                this.updateAllLineJumps();
                this.fitToScreen();
                this.showNotification(`✅ DTI generado: ${this.db.equipos.filter(e => /^[A-Z]{2}$/.test(e.type) && e.type.endsWith('T')).length} instrumentos, ${this.db.equipos.filter(e => e.type.includes('VALVE')||['FCV','PCV','LCV','PSV'].includes(e.type)).length} válvulas`);
            },

            runSimulation: function() {
                this.showNotification('🔄 Simulando...');
                setTimeout(() => {
                    this.db.equipos.forEach(eq => {
                        if (eq.type === 'PUMP') eq.designParams.pressure = (eq.designParams.pressure || 1) + 4;
                        else if (eq.type === 'HEAT_EXCHANGER') eq.designParams.temperature = (eq.designParams.temperature || 25) + 50;
                    });
                    this.render();
                    this.showNotification('✅ Simulación completada');
                }, 1500);
            },

            exportToPDF: function() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('landscape');

                doc.setFontSize(16);
                doc.text('ACQ SmartFlow Pro - Reporte de Ingeniería', 10, 10);
                doc.setFontSize(10);
                doc.text(`Ingeniero: ${this.db.settings.engineerName}`, 10, 20);
                doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 10, 25);

                const canvasData = this.canvas.toDataURL('image/png');
                doc.addImage(canvasData, 'PNG', 10, 30, 280, 150);

                const equiposHeaders = [['Tag', 'Tipo', 'Tamaño', 'Material']];
                const equiposData = this.db.equipos.map(e => [e.tag, e.type, e.designParams?.size || '-', e.designParams?.material || '-']);
                doc.autoTable({ head: equiposHeaders, body: equiposData, startY: 190 });

                doc.addPage();
                doc.text('Corrientes de Proceso', 10, 10);
                const streamsHeaders = [['Nombre', 'Tipo', 'Temperatura', 'Presión', 'Caudal']];
                const streamsData = this.db.streams.filter(s => s.lineType === 'process').map(s => [
                    s.name, s.lineType, s.fluid?.temperature || '-', s.fluid?.pressure || '-', s.fluid?.flow || '-'
                ]);
                doc.autoTable({ head: streamsHeaders, body: streamsData, startY: 20 });

                doc.save(`reporte_${Date.now()}.pdf`);
                this.showNotification('✅ PDF generado');
            },

            exportToImage: function() {
                const dataURL = this.canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `diagrama_${Date.now()}.png`;
                link.href = dataURL;
                link.click();
                this.showNotification('✅ Imagen PNG exportada');
            },

            exportToDWG: function() {
                // Exporta DXF con extensión .dwg (simulación)
                this.exportIsometricDXF();
                this.showNotification('✅ DXF generado (renombrar a .dwg para AutoCAD)');
            },

            exportToAspen: function() {
                let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
                xml += '<AspenData>\n';
                xml += '  <Header>\n';
                xml += `    <Source>ACQ SmartFlow Pro</Source>\n`;
                xml += `    <Engineer>${this.db.settings.engineerName}</Engineer>\n`;
                xml += `    <Date>${new Date().toISOString()}</Date>\n`;
                xml += '  </Header>\n';
                xml += '  <MaterialStreams>\n';

                this.db.streams.filter(s => s.lineType === 'process').forEach(s => {
                    xml += `    <MaterialStream name="${s.name}">\n`;
                    xml += `      <Temperature unit="C">${s.fluid?.temperature || 25}</Temperature>\n`;
                    xml += `      <Pressure unit="bar">${s.fluid?.pressure || 1}</Pressure>\n`;
                    xml += `      <FlowRate unit="m3/h">${s.fluid?.flow || 100}</FlowRate>\n`;
                    xml += `      <Phase>${s.fluid?.phase || 'liquid'}</Phase>\n`;
                    xml += `    </MaterialStream>\n`;
                });

                xml += '  </MaterialStreams>\n';
                xml += '</AspenData>';

                const blob = new Blob([xml], { type: 'application/xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `aspen_${Date.now()}.xml`;
                a.click();
                this.showNotification('✅ Archivo Aspen Plus XML generado');
            }
        };

        // Helper para roundRect (Canvas)
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        class AccessibilityAnnouncer {
            constructor(app) {
                this.app = app;
                this.div = document.createElement('div');
                this.div.className = 'sr-only';
                this.div.setAttribute('role', 'status');
                document.body.appendChild(this.div);
                this.alertDiv = document.createElement('div');
                this.alertDiv.className = 'sr-only';
                this.alertDiv.setAttribute('role', 'alert');
                document.body.appendChild(this.alertDiv);
                this.synth = window.speechSynthesis;
                this.queue = [];
                this.speaking = false;
            }
            announce(msg, urgent = false) {
                if (!this.app.accessibility.enabled) return;
                const target = urgent ? this.alertDiv : this.div;
                target.textContent = '';
                setTimeout(() => target.textContent = msg, 50);
                this.speak(msg, urgent);
            }
            speak(text, urgent = false) {
                if (!this.app.accessibility.enabled || !this.synth) return;
                if (urgent) {
                    this.synth.cancel();
                    this.queue = [];
                }
                this.queue.push(text);
                if (!this.speaking) this.processQueue();
            }
            processQueue() {
                if (this.queue.length === 0) {
                    this.speaking = false;
                    return;
                }
                this.speaking = true;
                const text = this.queue.shift();
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = this.app.accessibility.voiceLanguage;
                utter.rate = this.app.accessibility.voiceRate;
                utter.pitch = this.app.accessibility.voicePitch;
                utter.volume = this.app.accessibility.voiceVolume;
                utter.onend = () => this.processQueue();
                utter.onerror = () => this.processQueue();
                this.synth.speak(utter);
            }
            announceElementSelected(elem) {
                if (!this.app.accessibility.autoAnnounce) return;
                this.announce(`${elem.tag} seleccionado`);
            }
            announcePosition(elem) {
                if (!this.app.accessibility.announcePositions) return;
                this.announce(`${elem.tag} en X ${Math.round(elem.x)} Y ${Math.round(elem.y)}`);
            }
            announceAction(action, elem) {
                this.announce(`${action} ${elem.tag}`, true);
            }
        }

        window.onload = () => App.init();
        window.App = App;
    </script>
