<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ACQ SmartFlow Pro · Isométricos 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            background: #161b22;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-bottom: 1px solid #30363d;
            align-items: center;
        }
        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            background: #21262d;
            color: #e0e0e0;
            transition: 0.2s;
            font-size: 13px;
        }
        button:hover { background: #2c313a; transform: translateY(-1px); }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; }
        .btn-danger:hover { background: #f85149; }
        .btn-warning { background: #d29922; color: #1f1f1f; }
        .btn-warning:hover { background: #e3b341; }
        .canvas-container {
            flex: 1;
            position: relative;
            background: #0a0f1a;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        .inspector, .command-panel {
            position: fixed;
            background: #1e1e2e;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid #3a3a4a;
            z-index: 1000;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            color: #eee;
        }
        .inspector { right: 20px; top: 80px; width: 320px; display: none; }
        .command-panel { left: 20px; bottom: 20px; width: 480px; display: none; background: #1e1e2e; }
        .command-panel textarea {
            width: 100%;
            height: 120px;
            background: #0f0f17;
            color: #eee;
            border: 1px solid #3a3a4a;
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        .command-panel button { margin-top: 8px; }
        .ins-row { margin-bottom: 12px; }
        .ins-row label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; }
        .ins-row input, .ins-row select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #3a3a4a;
            background: #0f0f17;
            color: #eee;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #161b22;
            border: 1px solid #238636;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            z-index: 2000;
            display: none;
            pointer-events: none;
        }
        .status-bar {
            background: #0f0f17;
            padding: 4px 12px;
            font-size: 12px;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
        }
        hr { border-color: #30363d; margin: 10px 0; }
        h3 { margin-bottom: 8px; color: #58a6ff; }
        .component-list { max-height: 200px; overflow-y: auto; margin-top: 8px; }
        .component-item { background: #0f0f17; padding: 4px 8px; margin: 4px 0; border-radius: 4px; font-size: 11px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="toolbar">
        <button id="btnNew" class="btn-primary">📄 Nuevo</button>
        <button id="btnImportPCF">📂 Importar PCF</button>
        <button id="btnExportPCF">💾 Exportar PCF</button>
        <button id="btnCommandPanel">⌨️ Comandos</button>
        <button id="btnMTO">📊 MTO</button>
        <button id="btnValidate">🌊 Validar Hidráulica</button>
        <button id="btnSupports">🏗️ Soportes</button>
        <button id="btnPDF">📄 PDF</button>
        <button id="btnPNG">🖼️ PNG</button>
        <button id="btnDXF">📐 DXF (beta)</button>
        <button id="btnResetView">🔄 Reset Vista</button>
        <button id="btnInspectorClose" style="margin-left:auto;">❌ Cerrar</button>
    </div>
    <div class="canvas-container">
        <canvas id="isoCanvas"></canvas>
    </div>
    <div class="status-bar">
        <span id="statusMsg">✅ Listo</span>
        <span>🔘 Shift+arrastrar = mover | Rueda = zoom</span>
    </div>

    <!-- Inspector -->
    <div id="inspector" class="inspector">
        <h3>Propiedades</h3>
        <div id="inspectorContent"></div>
        <div style="display:flex; gap:8px; margin-top:12px;">
            <button id="inspectorSave" class="btn-primary">Guardar</button>
            <button id="inspectorCancel">Cancelar</button>
        </div>
    </div>

    <!-- Panel de comandos de texto -->
    <div id="commandPanel" class="command-panel">
        <h3>Comandos de texto (similar a PFD/DTI)</h3>
        <textarea id="commandText" placeholder="Ejemplos:
line L-101 diameter 6 material PPR schedule 40 points (0,0,0) (5000,0,0) (5000,3000,0)
component valve V-101 at L-101 param 0.3 type gate size 6 rating 150# material PPR
equipment T-100 at (2000,0,500)
component flange F-101 at L-101 param 0.1 size 6 rating 150# material SS
component reducer R-101 at L-101 param 0.7 end1-size 6 end2-size 4
component elbow E-101 at L-101 param 0.9 angle 90
component instrument I-101 at L-101 param 0.5 type PT"></textarea>
        <button id="runCommands" class="btn-primary">▶ Ejecutar</button>
        <button id="closeCommandPanel">Cerrar</button>
        <hr>
        <div><strong>Ayuda rápida:</strong> line [tag] diameter [pulg] material [CS/SS/PPR/PVC/PE] schedule [40/80] points (x,y,z) ...<br>
        component [tipo] [tag] at [linea] param [0..1] [propiedades específicas]</div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // ==================== MODELO DE DATOS ====================
        let db = {
            lines: [],        // cada línea: { tag, diameter, material, schedule, points3D, components, caudal, fluido, temp, color, velocidad, perdida }
            equipos: [],      // cada equipo: { tag, x, y, z, tipo? }
            supports: [],
            selected: null,
            selectedType: null,
            settings: { engineerName: "Ing. Proyectista", projectName: "Isométrico" }
        };

        // Parámetros de cámara
        let cam = {
            rotateY: 0.5,
            scale: 1,
            panX: 0, panY: 0
        };
        let isDragging = false;
        let dragMode = 'rotate';
        let lastMouse = { x: 0, y: 0 };

        // Referencias DOM
        const canvas = document.getElementById('isoCanvas');
        const ctx = canvas.getContext('2d');
        const statusSpan = document.getElementById('statusMsg');

        // ==================== FUNCIONES AUXILIARES ====================
        function notify(msg, isErr = false) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.background = isErr ? '#da3633' : '#238636';
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 4000);
            statusSpan.textContent = msg;
        }

        function saveToLocal() {
            try {
                localStorage.setItem('acq_iso', JSON.stringify({
                    lines: db.lines,
                    equipos: db.equipos,
                    supports: db.supports,
                    settings: db.settings
                }));
            } catch(e) {}
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('acq_iso');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    db.lines = data.lines || [];
                    db.equipos = data.equipos || [];
                    db.supports = data.supports || [];
                    db.settings = data.settings || db.settings;
                    notify('Proyecto restaurado');
                } catch(e) {}
            }
        }

        // ==================== RENDERIZADO ISOMÉTRICO ====================
        function project(p) {
            const x = p.x * Math.cos(cam.rotateY) - p.z * Math.sin(cam.rotateY);
            const y = p.y;
            const z = p.x * Math.sin(cam.rotateY) + p.z * Math.cos(cam.rotateY);
            const cos30 = Math.cos(30 * Math.PI/180);
            const sin30 = Math.sin(30 * Math.PI/180);
            const isoX = x - y * cos30;
            const isoY = (x + y) * sin30 - z;
            return { x: isoX * cam.scale + cam.panX, y: isoY * cam.scale + cam.panY };
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            // Dibujar líneas
            for (const line of db.lines) {
                if (!line.points3D || line.points3D.length < 2) continue;
                ctx.beginPath();
                const proj = line.points3D.map(p => project(p));
                ctx.moveTo(proj[0].x, proj[0].y);
                for (let i = 1; i < proj.length; i++) ctx.lineTo(proj[i].x, proj[i].y);
                ctx.strokeStyle = line.color || '#58a6ff';
                ctx.lineWidth = Math.max(1, (line.diameter || 6) * cam.scale / 8);
                ctx.stroke();
                // Dibujar componentes
                if (line.components) {
                    for (const comp of line.components) {
                        drawComponent(comp, line);
                    }
                }
            }
            // Equipos
            for (const eq of db.equipos) {
                const p = project(eq);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8 * cam.scale, 0, 2*Math.PI);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${10 * cam.scale}px Arial`;
                ctx.fillText(eq.tag, p.x + 12, p.y + 4);
            }
            // Soportes
            for (const s of db.supports) {
                const p = project(s);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, 2*Math.PI);
                ctx.fillStyle = '#ffaa33';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawComponent(comp, line) {
            const pos3d = getPositionOnLine(line, comp.param);
            if (!pos3d) return;
            const p = project(pos3d);
            ctx.save();
            ctx.translate(p.x, p.y);
            // Rotar según dirección de la línea en ese punto
            const dir = getDirectionOnLine(line, comp.param);
            if (dir) ctx.rotate(Math.atan2(dir.y, dir.x));
            // Dibujar símbolo según tipo
            ctx.beginPath();
            switch (comp.type) {
                case 'VALVE':
                    ctx.moveTo(-8, -5); ctx.lineTo(0, 0); ctx.lineTo(8, -5); ctx.lineTo(0, 10);
                    ctx.closePath();
                    ctx.fillStyle = '#ffaa33';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'FLANGE':
                    ctx.arc(0, 0, 6, 0, 2*Math.PI);
                    ctx.fillStyle = '#cccc99';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'REDUCER':
                    ctx.ellipse(0, 0, 6, 4, 0, 0, 2*Math.PI);
                    ctx.fillStyle = '#bb9966';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'ELBOW':
                    ctx.arc(0, 0, 6, 0, Math.PI/2);
                    ctx.lineTo(6, 0);
                    ctx.fillStyle = '#88aaff';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'TEE':
                    ctx.moveTo(-6, -4); ctx.lineTo(6, -4); ctx.lineTo(0, 8);
                    ctx.closePath();
                    ctx.fillStyle = '#88aaff';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'INSTRUMENT':
                    ctx.rect(-5, -5, 10, 10);
                    ctx.fillStyle = '#ffaa88';
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#000';
                    ctx.font = '8px monospace';
                    ctx.fillText(comp.tag || 'I', -3, 3);
                    break;
            }
            ctx.restore();
        }

        function getPositionOnLine(line, t) {
            const pts = line.points3D;
            if (!pts || pts.length < 2) return null;
            if (t <= 0) return pts[0];
            if (t >= 1) return pts[pts.length-1];
            const idx = Math.floor(t * (pts.length - 1));
            const segT = (t * (pts.length - 1)) - idx;
            const p1 = pts[idx];
            const p2 = pts[idx+1];
            return {
                x: p1.x + segT * (p2.x - p1.x),
                y: p1.y + segT * (p2.y - p1.y),
                z: p1.z + segT * (p2.z - p1.z)
            };
        }

        function getDirectionOnLine(line, t) {
            const pts = line.points3D;
            if (!pts || pts.length < 2) return null;
            const idx = Math.min(Math.floor(t * (pts.length - 1)), pts.length - 2);
            const p1 = pts[idx];
            const p2 = pts[idx+1];
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const len = Math.hypot(dx, dy);
            if (len === 0) return null;
            return { x: dx / len, y: dy / len };
        }

        // ==================== COMANDOS DE TEXTO ====================
        function parseCommands(text) {
            const lines = text.split('\n');
            for (let raw of lines) {
                raw = raw.trim();
                if (!raw || raw.startsWith('//')) continue;
                const parts = raw.split(/\s+/);
                const cmd = parts[0].toLowerCase();
                if (cmd === 'line') {
                    const tag = parts[1];
                    let diam = null, material = null, schedule = null;
                    let points = [];
                    for (let i = 2; i < parts.length; i++) {
                        if (parts[i] === 'diameter') diam = parseFloat(parts[++i]);
                        else if (parts[i] === 'material') {
                            const mat = parts[++i].toUpperCase();
                            if (['CS','SS','PPR','PVC','PE'].includes(mat)) material = mat;
                            else material = 'CS';
                        }
                        else if (parts[i] === 'schedule') schedule = parts[++i];
                        else if (parts[i] === 'points') {
                            let j = i+1;
                            while (j < parts.length) {
                                const match = parts[j].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
                                if (match) {
                                    points.push({ x: parseFloat(match[1]), y: parseFloat(match[2]), z: parseFloat(match[3]) });
                                    j++;
                                } else break;
                            }
                            break;
                        }
                    }
                    if (tag && diam && material && schedule && points.length >= 2) {
                        const newLine = {
                            tag, diameter: diam, material, schedule,
                            points3D: points, components: [], caudal: null, fluido: 'agua', temp: 25,
                            color: '#58a6ff'
                        };
                        db.lines.push(newLine);
                        notify(`Línea ${tag} creada`);
                    } else notify(`Error en línea: ${raw}`, true);
                }
                else if (cmd === 'component') {
                    const tipo = parts[1];
                    const tag = parts[2];
                    const atIdx = parts.indexOf('at');
                    const lineTag = parts[atIdx+1];
                    const paramIdx = parts.indexOf('param');
                    const param = parseFloat(parts[paramIdx+1]);
                    const line = db.lines.find(l => l.tag === lineTag);
                    if (!line) { notify(`Línea ${lineTag} no encontrada`, true); continue; }
                    let comp = { type: tipo.toUpperCase(), tag, param, material: line.material };
                    for (let i = paramIdx+2; i < parts.length; i++) {
                        const key = parts[i];
                        const val = parts[++i];
                        if (key === 'type') comp.valveType = val;
                        else if (key === 'size') comp.size = parseFloat(val);
                        else if (key === 'rating') comp.rating = val;
                        else if (key === 'operator') comp.operator = val;
                        else if (key === 'end1-size') comp.end1Size = parseFloat(val);
                        else if (key === 'end2-size') comp.end2Size = parseFloat(val);
                        else if (key === 'angle') comp.angle = parseFloat(val);
                        else if (key === 'radius') comp.radius = parseFloat(val);
                        else if (key === 'branch-size') comp.branchSize = parseFloat(val);
                        else if (key === 'material') {
                            const mat = val.toUpperCase();
                            if (['CS','SS','PPR','PVC','PE'].includes(mat)) comp.material = mat;
                        }
                    }
                    if (!line.components) line.components = [];
                    line.components.push(comp);
                    notify(`Componente ${tag} añadido a ${lineTag}`);
                }
                else if (cmd === 'equipment') {
                    const tag = parts[1];
                    const atIdx = parts.indexOf('at');
                    const coords = parts[atIdx+1].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
                    if (coords) {
                        const eq = {
                            tag,
                            x: parseFloat(coords[1]),
                            y: parseFloat(coords[2]),
                            z: parseFloat(coords[3])
                        };
                        db.equipos.push(eq);
                        notify(`Equipo ${tag} añadido`);
                    } else notify('Coordenadas inválidas', true);
                }
                else {
                    notify(`Comando desconocido: ${cmd}`, true);
                }
            }
            render();
            saveToLocal();
        }

        // ==================== IMPORTACIÓN/EXPORTACIÓN PCF ====================
        function importPCFFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const contenido = e.target.result;
                    const parsed = parsePCF(contenido);
                    db.lines = parsed.lines;
                    db.equipos = parsed.equipos;
                    db.supports = parsed.supports;
                    render();
                    saveToLocal();
                    notify(`PCF importado: ${db.lines.length} líneas, ${db.equipos.length} equipos`);
                } catch(err) {
                    notify('Error al importar PCF: ' + err.message, true);
                }
            };
            reader.readAsText(file);
        }

        function parsePCF(text) {
            const lines = [];
            const equipos = [];
            const supports = [];
            let currentPipe = null;
            let currentComp = null;
            let currentPoints = [];
            const lineas = text.split('\n');
            for (let raw of lineas) {
                let line = raw.trim();
                if (!line || line.startsWith('!')) continue;
                if (line === 'NEWPIPE') {
                    if (currentPipe) {
                        currentPipe.points3D = currentPoints;
                        lines.push(currentPipe);
                    }
                    currentPipe = { components: [], points3D: [] };
                    currentPoints = [];
                    currentComp = null;
                    continue;
                }
                if (line === 'ENDPIPE') {
                    if (currentPipe) {
                        currentPipe.points3D = currentPoints;
                        lines.push(currentPipe);
                    }
                    currentPipe = null;
                    currentPoints = [];
                    continue;
                }
                if (!currentPipe) continue;
                if (line.startsWith('COMPONENT-IDENTIFIER')) currentPipe.tag = line.split(' ')[1];
                else if (line.startsWith('DIAMETER')) {
                    const diamMM = parseFloat(line.split(' ')[1]);
                    currentPipe.diameter = Math.round(diamMM / 25.4 * 10) / 10;
                }
                else if (line.startsWith('MATERIAL')) {
                    const mat = line.split(' ')[1];
                    if (['CS','SS','PPR','PVC','PE'].includes(mat)) currentPipe.material = mat;
                    else currentPipe.material = 'CS';
                }
                else if (line.startsWith('SCHEDULE')) currentPipe.schedule = line.split(' ')[1];
                else if (line.startsWith('FLOW-RATE')) currentPipe.caudal = parseFloat(line.split(' ')[1]);
                else if (line.startsWith('TEMPERATURE')) currentPipe.temp = parseFloat(line.split(' ')[1]);
                else if (line.startsWith('FLUID')) currentPipe.fluido = line.split(' ')[1];
                else if (line.startsWith('POINT')) {
                    const match = line.match(/POINT\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/i);
                    if (match) currentPoints.push({ x: parseFloat(match[1]), y: parseFloat(match[2]), z: parseFloat(match[3]) });
                }
                // Componentes
                else if (line === 'NEWVALVE') { currentComp = { type: 'VALVE' }; continue; }
                else if (line === 'NEWFLANGE') { currentComp = { type: 'FLANGE' }; continue; }
                else if (line === 'NEWREDUCER') { currentComp = { type: 'REDUCER' }; continue; }
                else if (line === 'NEWELBOW') { currentComp = { type: 'ELBOW' }; continue; }
                else if (line === 'NEWTEE') { currentComp = { type: 'TEE' }; continue; }
                else if (line === 'NEWINSTRUMENT') { currentComp = { type: 'INSTRUMENT' }; continue; }
                else if (line.startsWith('ENDVALVE') || line.startsWith('ENDFLANGE') || line.startsWith('ENDREDUCER') ||
                         line.startsWith('ENDELBOW') || line.startsWith('ENDTEE') || line.startsWith('ENDINSTRUMENT')) {
                    if (currentComp) {
                        if (currentComp.pos) {
                            const pos3d = currentComp.pos;
                            let bestDist = Infinity;
                            let bestT = 0;
                            for (let i = 0; i < currentPoints.length-1; i++) {
                                const p1 = currentPoints[i];
                                const p2 = currentPoints[i+1];
                                const t = ((pos3d.x-p1.x)*(p2.x-p1.x)+(pos3d.y-p1.y)*(p2.y-p1.y)+(pos3d.z-p1.z)*(p2.z-p1.z)) /
                                          (Math.pow(p2.x-p1.x,2)+Math.pow(p2.y-p1.y,2)+Math.pow(p2.z-p1.z,2));
                                if (t>=0 && t<=1) {
                                    const proj = { x: p1.x + t*(p2.x-p1.x), y: p1.y + t*(p2.y-p1.y), z: p1.z + t*(p2.z-p1.z) };
                                    const dist = Math.hypot(pos3d.x-proj.x, pos3d.y-proj.y, pos3d.z-proj.z);
                                    if (dist < bestDist) { bestDist = dist; bestT = i + t; }
                                }
                            }
                            currentComp.param = bestT / (currentPoints.length-1);
                        }
                        if (!currentComp.material && currentPipe) currentComp.material = currentPipe.material;
                        if (!currentPipe.components) currentPipe.components = [];
                        currentPipe.components.push(currentComp);
                        currentComp = null;
                    }
                    continue;
                }
                else if (currentComp) {
                    if (line.startsWith('COMPONENT-IDENTIFIER')) currentComp.tag = line.split(' ')[1];
                    else if (line.startsWith('SIZE')) currentComp.size = parseFloat(line.split(' ')[1]);
                    else if (line.startsWith('RATING')) currentComp.rating = line.split(' ')[1];
                    else if (line.startsWith('VALVE-TYPE')) currentComp.valveType = line.split(' ')[1];
                    else if (line.startsWith('OPERATOR')) currentComp.operator = line.split(' ')[1];
                    else if (line.startsWith('END1-SIZE')) currentComp.end1Size = parseFloat(line.split(' ')[1]);
                    else if (line.startsWith('END2-SIZE')) currentComp.end2Size = parseFloat(line.split(' ')[1]);
                    else if (line.startsWith('ANGLE')) currentComp.angle = parseFloat(line.split(' ')[1]);
                    else if (line.startsWith('RADIUS')) currentComp.radius = parseFloat(line.split(' ')[1]);
                    else if (line.startsWith('BRANCH-SIZE')) currentComp.branchSize = parseFloat(line.split(' ')[1]);
                    else if (line.startsWith('MATERIAL')) {
                        const mat = line.split(' ')[1];
                        if (['CS','SS','PPR','PVC','PE'].includes(mat)) currentComp.material = mat;
                    }
                    else if (line.startsWith('POINT')) {
                        const match = line.match(/POINT\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/i);
                        if (match) currentComp.pos = { x: parseFloat(match[1]), y: parseFloat(match[2]), z: parseFloat(match[3]) };
                    }
                }
            }
            if (currentPipe) { currentPipe.points3D = currentPoints; lines.push(currentPipe); }
            return { lines, equipos, supports };
        }

        function exportToPCF() {
            if (!db.lines.length) { notify('No hay líneas para exportar', true); return; }
            let pcf = `! PCF v7.0 - ACQ SmartFlow Pro\nUNITS MM\nPROJECT-NAME "${db.settings.projectName}"\nENGINEER "${db.settings.engineerName}"\nDATE ${new Date().toISOString().slice(0,10)}\n\n`;
            for (const line of db.lines) {
                if (!line.points3D || line.points3D.length < 2) continue;
                pcf += `NEWPIPE\n`;
                pcf += ` COMPONENT-IDENTIFIER ${line.tag}\n`;
                pcf += ` DIAMETER ${(line.diameter * 25.4).toFixed(1)} MM\n`;
                pcf += ` MATERIAL ${line.material || 'CS'}\n`;
                pcf += ` SCHEDULE ${line.schedule || 'STD'}\n`;
                if (line.caudal) pcf += ` FLOW-RATE ${line.caudal} M3/HR\n`;
                if (line.fluido) pcf += ` FLUID ${line.fluido}\n`;
                if (line.temp) pcf += ` TEMPERATURE ${line.temp} C\n`;
                for (const p of line.points3D) {
                    pcf += ` POINT ${p.x.toFixed(0)} ${p.y.toFixed(0)} ${p.z.toFixed(0)}\n`;
                }
                if (line.components) {
                    for (const comp of line.components) {
                        const pos = getPositionOnLine(line, comp.param);
                        if (!pos) continue;
                        switch (comp.type) {
                            case 'VALVE':
                                pcf += ` NEWVALVE\n`;
                                pcf += `  COMPONENT-IDENTIFIER ${comp.tag}\n`;
                                if (comp.valveType) pcf += `  VALVE-TYPE ${comp.valveType}\n`;
                                if (comp.size) pcf += `  SIZE ${comp.size}\n`;
                                if (comp.rating) pcf += `  RATING ${comp.rating}\n`;
                                if (comp.operator) pcf += `  OPERATOR ${comp.operator}\n`;
                                if (comp.material) pcf += `  MATERIAL ${comp.material}\n`;
                                pcf += `  POINT ${pos.x.toFixed(0)} ${pos.y.toFixed(0)} ${pos.z.toFixed(0)}\n`;
                                pcf += ` ENDVALVE\n`;
                                break;
                            case 'FLANGE':
                                pcf += ` NEWFLANGE\n`;
                                pcf += `  COMPONENT-IDENTIFIER ${comp.tag}\n`;
                                if (comp.size) pcf += `  SIZE ${comp.size}\n`;
                                if (comp.rating) pcf += `  RATING ${comp.rating}\n`;
                                if (comp.material) pcf += `  MATERIAL ${comp.material}\n`;
                                pcf += `  POINT ${pos.x.toFixed(0)} ${pos.y.toFixed(0)} ${pos.z.toFixed(0)}\n`;
                                pcf += ` ENDFLANGE\n`;
                                break;
                            case 'REDUCER':
                                pcf += ` NEWREDUCER\n`;
                                pcf += `  COMPONENT-IDENTIFIER ${comp.tag}\n`;
                                if (comp.end1Size) pcf += `  END1-SIZE ${comp.end1Size}\n`;
                                if (comp.end2Size) pcf += `  END2-SIZE ${comp.end2Size}\n`;
                                if (comp.material) pcf += `  MATERIAL ${comp.material}\n`;
                                pcf += `  POINT ${pos.x.toFixed(0)} ${pos.y.toFixed(0)} ${pos.z.toFixed(0)}\n`;
                                pcf += ` ENDREDUCER\n`;
                                break;
                            case 'ELBOW':
                                pcf += ` NEWELBOW\n`;
                                pcf += `  COMPONENT-IDENTIFIER ${comp.tag}\n`;
                                if (comp.angle) pcf += `  ANGLE ${comp.angle}\n`;
                                if (comp.radius) pcf += `  RADIUS ${comp.radius}\n`;
                                if (comp.material) pcf += `  MATERIAL ${comp.material}\n`;
                                pcf += `  POINT ${pos.x.toFixed(0)} ${pos.y.toFixed(0)} ${pos.z.toFixed(0)}\n`;
                                pcf += ` ENDELBOW\n`;
                                break;
                            case 'TEE':
                                pcf += ` NEWTEE\n`;
                                pcf += `  COMPONENT-IDENTIFIER ${comp.tag}\n`;
                                if (comp.branchSize) pcf += `  BRANCH-SIZE ${comp.branchSize}\n`;
                                if (comp.material) pcf += `  MATERIAL ${comp.material}\n`;
                                pcf += `  POINT ${pos.x.toFixed(0)} ${pos.y.toFixed(0)} ${pos.z.toFixed(0)}\n`;
                                pcf += ` ENDTEE\n`;
                                break;
                            case 'INSTRUMENT':
                                pcf += ` NEWINSTRUMENT\n`;
                                pcf += `  COMPONENT-IDENTIFIER ${comp.tag}\n`;
                                if (comp.instrumentType) pcf += `  INSTRUMENT-TYPE ${comp.instrumentType}\n`;
                                pcf += `  POINT ${pos.x.toFixed(0)} ${pos.y.toFixed(0)} ${pos.z.toFixed(0)}\n`;
                                pcf += ` ENDINSTRUMENT\n`;
                                break;
                        }
                    }
                }
                pcf += `ENDPIPE\n\n`;
            }
            for (const eq of db.equipos) {
                pcf += `NEWNOZZLE\n`;
                pcf += ` COMPONENT-IDENTIFIER ${eq.tag}\n`;
                pcf += ` POINT ${eq.x.toFixed(0)} ${eq.y.toFixed(0)} ${eq.z.toFixed(0)}\n`;
                pcf += `ENDNOZZLE\n\n`;
            }
            for (let i=0; i<db.supports.length; i++) {
                const s = db.supports[i];
                pcf += `NEWSUPPORT\n`;
                pcf += ` SUPPORT-ID S${String(i+1).padStart(3,'0')}\n`;
                pcf += ` POINT ${s.x.toFixed(0)} ${s.y.toFixed(0)} ${s.z.toFixed(0)}\n`;
                pcf += `ENDSUPPORT\n\n`;
            }
            const blob = new Blob([pcf], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `isometrico_${db.settings.projectName.replace(/\s/g,'_')}.pcf`;
            a.click();
            URL.revokeObjectURL(url);
            notify('PCF exportado correctamente');
        }

        // ==================== OTRAS FUNCIONES ====================
        function generarSoportes() {
            db.supports = [];
            const distMax = 3.0; // metros
            for (const line of db.lines) {
                let acum = 0;
                for (let i=0; i<line.points3D.length-1; i++) {
                    const p1 = line.points3D[i];
                    const p2 = line.points3D[i+1];
                    const seg = Math.hypot(p2.x-p1.x, p2.y-p1.y, p2.z-p1.z);
                    if (i===0) db.supports.push({ x:p1.x, y:p1.y, z:p1.z });
                    acum += seg;
                    while (acum >= distMax * 1000) {
                        const t = 1 - (acum - distMax*1000)/seg;
                        const x = p1.x + t*(p2.x-p1.x);
                        const y = p1.y + t*(p2.y-p1.y);
                        const z = p1.z + t*(p2.z-p1.z);
                        db.supports.push({ x,y,z });
                        acum -= distMax * 1000;
                    }
                }
            }
            render();
            notify(`Generados ${db.supports.length} soportes`);
        }

        function validarHidraulica() {
            let alertas = [];
            for (const line of db.lines) {
                if (!line.caudal) continue;
                const Q = line.caudal / 3600;
                const D = (line.diameter * 0.0254);
                const area = Math.PI * D*D/4;
                const v = Q / area;
                line.velocidad = v;
                const long = line.points3D.reduce((sum, p, idx, arr) => {
                    if (idx===0) return 0;
                    return sum + Math.hypot(p.x-arr[idx-1].x, p.y-arr[idx-1].y, p.z-arr[idx-1].z);
                }, 0) / 1000;
                const f = 0.02;
                const hf = f * (long / D) * v*v / (2*9.81);
                line.perdida = hf;
                if (v > 3.0) {
                    alertas.push(`${line.tag}: velocidad ${v.toFixed(2)} m/s > 3.0`);
                    line.color = '#f85149';
                } else if (hf > 10) {
                    alertas.push(`${line.tag}: pérdida ${hf.toFixed(2)} mca > 10`);
                    line.color = '#ffaa33';
                } else line.color = '#58a6ff';
            }
            if (alertas.length) notify('⚠️ ' + alertas.join(', '), true);
            else notify('✅ Todo dentro de norma');
            render();
        }

        function exportarMTO() {
            if (!db.lines.length) { notify('No hay líneas', true); return; }
            const tuberias = [];
            const componentes = [];

            for (const line of db.lines) {
                const long = line.points3D.reduce((sum, p, idx, arr) => {
                    if (idx===0) return 0;
                    return sum + Math.hypot(p.x-arr[idx-1].x, p.y-arr[idx-1].y, p.z-arr[idx-1].z);
                }, 0) / 1000;

                tuberias.push({
                    Tag: line.tag,
                    Diámetro_pulg: line.diameter,
                    Material: line.material,
                    Schedule: line.schedule,
                    Longitud_m: long.toFixed(2),
                    Velocidad_mps: (line.velocidad || 0).toFixed(2),
                    Pérdida_mca: (line.perdida || 0).toFixed(2)
                });

                if (line.components) {
                    line.components.forEach(comp => {
                        componentes.push({
                            Tag: comp.tag,
                            Tipo: comp.type,
                            Diámetro_pulg: comp.size || (comp.end1Size ? `${comp.end1Size}x${comp.end2Size}` : ''),
                            Rating: comp.rating || '',
                            Material: comp.material || line.material,
                            Línea: line.tag
                        });
                    });
                }
            }

            const wb = XLSX.utils.book_new();
            const wsTub = XLSX.utils.json_to_sheet(tuberias);
            XLSX.utils.book_append_sheet(wb, wsTub, 'Tuberías');
            if (componentes.length) {
                const wsComp = XLSX.utils.json_to_sheet(componentes);
                XLSX.utils.book_append_sheet(wb, wsComp, 'Componentes');
            }
            XLSX.writeFile(wb, `MTO_${Date.now()}.xlsx`);
            notify(`MTO exportado: ${tuberias.length} tuberías, ${componentes.length} componentes`);
        }

        function exportarPNG() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = '#ffffff';
            tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            tempCtx.drawImage(canvas, 0, 0);
            const link = document.createElement('a');
            link.download = 'isometrico.png';
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
            notify('✅ PNG exportado');
        }

        function exportarDXF() {
            // Placeholder: DXF export no implementado
            notify('⚠️ Exportación DXF en desarrollo', true);
        }

        function generarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            doc.setFontSize(16);
            doc.text('Reporte Isométrico - ACQ SmartFlow Pro', 10, 10);
            doc.setFontSize(10);
            doc.text(`Ingeniero: ${db.settings.engineerName}`, 10, 20);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 10, 25);
            const data = db.lines.map(l => [l.tag, l.diameter, l.material, l.schedule, (l.velocidad||0).toFixed(2), (l.perdida||0).toFixed(2)]);
            doc.autoTable({ head: [['Tag','Diám.','Material','Schedule','Vel (m/s)','Pérdida (mca)']], body: data, startY: 35 });
            try {
                const imgData = canvas.toDataURL('image/png');
                doc.addPage();
                doc.text('Vista Isométrica', 10, 10);
                doc.addImage(imgData, 'PNG', 10, 15, 280, 150);
            } catch(e) {}
            doc.save(`isometrico_${Date.now()}.pdf`);
            notify('PDF generado');
        }

        function nuevoProyecto() {
            if (confirm('¿Borrar todo el proyecto actual?')) {
                db.lines = [];
                db.equipos = [];
                db.supports = [];
                render();
                saveToLocal();
                notify('Nuevo proyecto');
            }
        }

        // ==================== INSPECTOR ====================
        function showInspector(element, type) {
            db.selected = element;
            db.selectedType = type;
            const div = document.getElementById('inspectorContent');
            if (type === 'line') {
                div.innerHTML = `
                    <div class="ins-row"><label>Tag</label><input id="editTag" value="${element.tag}"></div>
                    <div class="ins-row"><label>Diámetro (pulg)</label><input id="editDiam" type="number" step="0.5" value="${element.diameter}"></div>
                    <div class="ins-row"><label>Material</label><select id="editMat">
                        <option ${element.material==='CS'?'selected':''}>CS</option>
                        <option ${element.material==='SS'?'selected':''}>SS</option>
                        <option ${element.material==='PPR'?'selected':''}>PPR</option>
                        <option ${element.material==='PVC'?'selected':''}>PVC</option>
                        <option ${element.material==='PE'?'selected':''}>PE</option>
                    </select></div>
                    <div class="ins-row"><label>Schedule</label><select id="editSch"><option ${element.schedule==='40'?'selected':''}>40</option><option ${element.schedule==='80'?'selected':''}>80</option></select></div>
                    <div class="ins-row"><label>Caudal (m³/h)</label><input id="editFlow" type="number" value="${element.caudal||0}"></div>
                    <div class="ins-row"><label>Fluido</label><input id="editFluid" value="${element.fluido||'agua'}"></div>
                    <div class="ins-row"><label>Temp (°C)</label><input id="editTemp" type="number" value="${element.temp||25}"></div>
                    <h4>Componentes</h4><div id="compList" class="component-list"></div>`;
                const compDiv = document.getElementById('compList');
                if (element.components) {
                    element.components.forEach(c => {
                        const compDivItem = document.createElement('div');
                        compDivItem.className = 'component-item';
                        compDivItem.textContent = `${c.type} ${c.tag} param=${c.param} material=${c.material||element.material}`;
                        compDiv.appendChild(compDivItem);
                    });
                }
            }
            document.getElementById('inspector').style.display = 'block';
        }

        function saveInspector() {
            if (!db.selected) return;
            if (db.selectedType === 'line') {
                db.selected.tag = document.getElementById('editTag').value;
                db.selected.diameter = parseFloat(document.getElementById('editDiam').value);
                db.selected.material = document.getElementById('editMat').value;
                db.selected.schedule = document.getElementById('editSch').value;
                db.selected.caudal = parseFloat(document.getElementById('editFlow').value);
                db.selected.fluido = document.getElementById('editFluid').value;
                db.selected.temp = parseFloat(document.getElementById('editTemp').value);
            }
            render();
            saveToLocal();
            document.getElementById('inspector').style.display = 'none';
            notify('Guardado');
        }

        // ==================== EVENTOS Y RENDER LOOP ====================
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            render();
        }

        function resetView() {
            cam.scale = 1;
            cam.rotateY = 0.5;
            cam.panX = canvas.width/2;
            cam.panY = canvas.height/2;
            render();
        }

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouse = { x: e.clientX, y: e.clientY };
            dragMode = e.shiftKey ? 'pan' : 'rotate';
            e.preventDefault();
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            if (dragMode === 'rotate') cam.rotateY += dx * 0.005;
            else { cam.panX += dx; cam.panY += dy; }
            lastMouse = { x: e.clientX, y: e.clientY };
            render();
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            cam.scale *= e.deltaY > 0 ? 0.9 : 1.1;
            cam.scale = Math.min(Math.max(0.2, cam.scale), 5);
            render();
        }, { passive: false });
        window.addEventListener('resize', () => resizeCanvas());

        // Botones
        document.getElementById('btnNew').onclick = () => nuevoProyecto();
        document.getElementById('btnImportPCF').onclick = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.pcf';
            input.onchange = e => importPCFFile(e.target.files[0]);
            input.click();
        };
        document.getElementById('btnExportPCF').onclick = () => exportToPCF();
        document.getElementById('btnCommandPanel').onclick = () => document.getElementById('commandPanel').style.display = 'block';
        document.getElementById('closeCommandPanel').onclick = () => document.getElementById('commandPanel').style.display = 'none';
        document.getElementById('runCommands').onclick = () => {
            const text = document.getElementById('commandText').value;
            parseCommands(text);
            document.getElementById('commandPanel').style.display = 'none';
        };
        document.getElementById('btnMTO').onclick = () => exportarMTO();
        document.getElementById('btnValidate').onclick = () => validarHidraulica();
        document.getElementById('btnSupports').onclick = () => generarSoportes();
        document.getElementById('btnPDF').onclick = () => generarPDF();
        document.getElementById('btnPNG').onclick = () => exportarPNG();
        document.getElementById('btnDXF').onclick = () => exportarDXF();
        document.getElementById('btnResetView').onclick = () => resetView();
        document.getElementById('btnInspectorClose').onclick = () => document.getElementById('inspector').style.display = 'none';
        document.getElementById('inspectorSave').onclick = () => saveInspector();
        document.getElementById('inspectorCancel').onclick = () => document.getElementById('inspector').style.display = 'none';

        // Inicialización
        loadFromLocal();
        resizeCanvas();
        resetView();
        render();
        // Ejemplo de línea de demostración (con PPR)
        if (db.lines.length === 0) {
            db.lines.push({
                tag: 'L-001', diameter: 6, material: 'PPR', schedule: '40',
                points3D: [{x:0,y:0,z:0},{x:5000,y:0,z:0},{x:5000,y:3000,z:0}],
                components: [], caudal: 100, fluido: 'agua', temp: 25, color: '#58a6ff'
            });
            render();
        }
    </script>
