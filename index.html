<script>
// ==================== SmartFlow Pro v10.1 ====================
// Nuevo: Colector inteligente (manifold) con puertos de entrada y salida
// Comando: create manifold M-01 at (x,y,z) entries N spacing D output left|center|right diameter D material M

// ==================== CONFIGURACIÓN GLOBAL ====================
let db = { equipos: [], lines: [] };
let cam = { scale: 0.5, panX: 0, panY: 0 };
let selectedElement = null;
let voiceEnabled = true;
let history = { past: [], future: [], maxSize: 30 };
let toolMode = 'select';

let draggingEquipment = false;
let draggedEquip = null;
let dragLastPos = { x: 0, y: 0 };
let panning = false;
let panStart = { x: 0, y: 0 };

const canvas = document.getElementById('isoCanvas');
const ctx = canvas.getContext('2d');

// ==================== FUNCIONES AUXILIARES ====================
function notify(msg, isErr = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.backgroundColor = isErr ? '#da3633' : '#238636';
    n.style.display = 'block';
    document.getElementById('statusMsg').innerHTML = msg;
    if (voiceEnabled && window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        setTimeout(() => window.speechSynthesis.speak(u), 50);
    }
    setTimeout(() => n.style.display = 'none', 4000);
}

function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}
function undo() {
    if (history.past.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.future.push(current);
    const prev = history.past.pop();
    db.equipos = prev.equipos;
    db.lines = prev.lines;
    selectedElement = null;
    render();
    notify("↩️ Deshecho");
}
function redo() {
    if (history.future.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos;
    db.lines = next.lines;
    selectedElement = null;
    render();
    notify("↪️ Rehecho");
}

// ==================== PROYECCIÓN ISOMÉTRICA ====================
function project(p) {
    const cos30 = Math.cos(30 * Math.PI / 180);
    const sin30 = Math.sin(30 * Math.PI / 180);
    const x = (p.x - p.z) * cos30;
    const y = (p.x + p.z) * sin30 - p.y;
    return { x: x * cam.scale + cam.panX, y: y * cam.scale + cam.panY };
}

function inverseProject(screenX, screenY) {
    const cos30 = Math.cos(30 * Math.PI / 180);
    const sin30 = Math.sin(30 * Math.PI / 180);
    const X = (screenX - cam.panX) / cam.scale;
    const Y = (screenY - cam.panY) / cam.scale;
    const A = X / cos30;
    const B = Y / sin30;
    const x = (A + B) / 2;
    const z = (B - A) / 2;
    return { x, y: 0, z };
}

// ==================== EQUIPOS CON PUERTOS ====================
function crearEquipoConPuertos(tipo, tag, x, y, z, params = {}) {
    let puertos = [];
    const diam = params.diametro || 2400;
    const alt = params.altura || 2500;
    if (tipo === 'tanque_v') {
        puertos = [
            { id: 'N1', label: 'Salida fondo', relX: 0, relY: -alt/2, relZ: 0, diametro: 4, tipoConexion: 'NPT', orientacion: {dx:0, dy:-1, dz:0}, material: 'CS', rating: '150#' },
            { id: 'N2', label: 'Entrada superior', relX: 0, relY: alt/2, relZ: 0, diametro: 3, tipoConexion: 'NPT', orientacion: {dx:0, dy:1, dz:0}, material: 'CS', rating: '150#' },
            { id: 'N3', label: 'Venteo', relX: 0, relY: alt/2, relZ: diam/2, diametro: 1, tipoConexion: 'NPT', orientacion: {dx:0, dy:1, dz:0}, material: 'CS', rating: '150#' }
        ];
    } else if (tipo === 'bomba') {
        puertos = [
            { id: 'SUC', label: 'Succión', relX: -500, relY: 0, relZ: 0, diametro: 4, tipoConexion: 'NPT', orientacion: {dx:-1, dy:0, dz:0}, material: 'SS', rating: '300#' },
            { id: 'DESC', label: 'Descarga', relX: 500, relY: 0, relZ: 0, diametro: 3, tipoConexion: 'NPT', orientacion: {dx:1, dy:0, dz:0}, material: 'SS', rating: '300#' }
        ];
    } else if (tipo === 'colector') {
        // Los puertos se generan en la función crearColector, no aquí
        puertos = [];
    }
    return {
        tag, tipo, x, y, z,
        diametro: diam,
        altura: alt,
        puertos: puertos
    };
}

function obtenerPosicionPuerto(equipTag, nozzleId) {
    const eq = db.equipos.find(e => e.tag === equipTag);
    if (!eq) return null;
    const nz = eq.puertos?.find(n => n.id === nozzleId);
    if (!nz) return null;
    return {
        x: eq.x + nz.relX,
        y: eq.y + nz.relY,
        z: eq.z + nz.relZ
    };
}

function obtenerDireccionSalida(nozzle) {
    if (nozzle && nozzle.orientacion) {
        const { dx, dy, dz } = nozzle.orientacion;
        const len = Math.hypot(dx, dy, dz);
        if (len > 0) return { dx: dx/len, dy: dy/len, dz: dz/len };
    }
    return { dx: 1, dy: 0, dz: 0 };
}

// ==================== COLECTOR INTELIGENTE ====================
function crearColector(tag, x, y, z, numEntradas, spacing, outputPos, diametro, material) {
    const puertos = [];
    // Puertos de entrada (orientación hacia abajo por defecto)
    for (let i = 0; i < numEntradas; i++) {
        puertos.push({
            id: `IN${i+1}`,
            label: `Entrada ${i+1}`,
            relX: i * spacing,
            relY: 0,
            relZ: 0,
            diametro: diametro,
            tipoConexion: 'Flange',
            orientacion: { dx: 0, dy: -1, dz: 0 },
            material: material,
            rating: '150#'
        });
    }
    // Puerto de salida
    let salidaRelX = 0;
    if (outputPos === 'left') salidaRelX = 0;
    else if (outputPos === 'right') salidaRelX = (numEntradas-1) * spacing;
    else if (outputPos === 'center') salidaRelX = (numEntradas-1) * spacing / 2;
    puertos.push({
        id: 'OUT',
        label: 'Salida',
        relX: salidaRelX,
        relY: 0,
        relZ: 0,
        diametro: diametro,
        tipoConexion: 'Flange',
        orientacion: { dx: 1, dy: 0, dz: 0 },
        material: material,
        rating: '150#'
    });
    
    const colector = {
        tag: tag,
        tipo: 'colector',
        x: x,
        y: y,
        z: z,
        diametro: diametro,
        altura: 0,
        puertos: puertos
    };
    db.equipos.push(colector);
    notify(`Colector ${tag} creado con ${numEntradas} entradas y salida ${outputPos}`);
    render();
    autoCenter();
}

// ==================== ENRUTAMIENTO ORTOGONAL ====================
function calcularRutaOrtogonalConRespeto(p1, p2, nozzleStart, nozzleEnd, offsetSalida = 300) {
    let puntos = [p1];
    if (nozzleStart) {
        const dir = obtenerDireccionSalida(nozzleStart);
        const salida = {
            x: p1.x + dir.dx * offsetSalida,
            y: p1.y + dir.dy * offsetSalida,
            z: p1.z + dir.dz * offsetSalida
        };
        puntos.push(salida);
    }
    let current = puntos[puntos.length-1];
    if (current.x !== p2.x) {
        puntos.push({ x: p2.x, y: current.y, z: current.z });
    }
    current = puntos[puntos.length-1];
    if (current.z !== p2.z) {
        puntos.push({ x: current.x, y: current.y, z: p2.z });
    }
    current = puntos[puntos.length-1];
    if (current.y !== p2.y) {
        puntos.push({ x: current.x, y: p2.y, z: current.z });
    }
    if (nozzleEnd) {
        const dirEnd = obtenerDireccionSalida(nozzleEnd);
        const llegada = {
            x: p2.x - dirEnd.dx * offsetSalida,
            y: p2.y - dirEnd.dy * offsetSalida,
            z: p2.z - dirEnd.dz * offsetSalida
        };
        puntos.splice(puntos.length-1, 0, llegada);
    }
    const clean = [];
    for (let i = 0; i < puntos.length; i++) {
        if (i === 0 || puntos[i].x !== puntos[i-1].x || puntos[i].y !== puntos[i-1].y || puntos[i].z !== puntos[i-1].z) {
            clean.push(puntos[i]);
        }
    }
    return clean;
}

function actualizarTuberiasConectadas(equipTag) {
    db.lines.forEach(line => {
        if (line.anchors && (line.anchors.start.equipTag === equipTag || line.anchors.end.equipTag === equipTag)) {
            const p1 = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
            const p2 = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
            if (p1 && p2) {
                const eqStart = db.equipos.find(e => e.tag === line.anchors.start.equipTag);
                const nozzleStart = eqStart?.puertos?.find(n => n.id === line.anchors.start.nozzleId);
                const eqEnd = db.equipos.find(e => e.tag === line.anchors.end.equipTag);
                const nozzleEnd = eqEnd?.puertos?.find(n => n.id === line.anchors.end.nozzleId);
                const puntos = calcularRutaOrtogonalConRespeto(p1, p2, nozzleStart, nozzleEnd, 300);
                line._cachedPoints = puntos;
                line.codos = puntos.length - 2;
            }
        }
    });
}

function recalcularTodo() {
    db.lines.forEach(line => {
        if (line.anchors) {
            const p1 = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
            const p2 = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
            if (p1 && p2) {
                const eqStart = db.equipos.find(e => e.tag === line.anchors.start.equipTag);
                const nozzleStart = eqStart?.puertos?.find(n => n.id === line.anchors.start.nozzleId);
                const eqEnd = db.equipos.find(e => e.tag === line.anchors.end.equipTag);
                const nozzleEnd = eqEnd?.puertos?.find(n => n.id === line.anchors.end.nozzleId);
                const puntos = calcularRutaOrtogonalConRespeto(p1, p2, nozzleStart, nozzleEnd, 300);
                line._cachedPoints = puntos;
                line.codos = puntos.length - 2;
            }
        }
    });
    render();
}

// ==================== DIBUJO ====================
function drawGrid() {
    const step = 1000;
    const minX = -8000, maxX = 20000, minZ = -8000, maxZ = 15000;
    ctx.beginPath();
    ctx.strokeStyle = '#2a4a6a';
    ctx.lineWidth = 1;
    for (let x = minX; x <= maxX; x += step) {
        const p1 = project({ x, y: 0, z: minZ });
        const p2 = project({ x, y: 0, z: maxZ });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
    for (let z = minZ; z <= maxZ; z += step) {
        const p1 = project({ x: minX, y: 0, z });
        const p2 = project({ x: maxX, y: 0, z });
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
    }
}

function drawOrigin() {
    const o = project({ x: 0, y: 0, z: 0 });
    ctx.beginPath();
    ctx.moveTo(o.x - 20, o.y);
    ctx.lineTo(o.x + 20, o.y);
    ctx.moveTo(o.x, o.y - 20);
    ctx.lineTo(o.x, o.y + 20);
    ctx.strokeStyle = '#ff8888';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ff8888';
    ctx.font = '14px monospace';
    ctx.fillText('ORIGEN (0,0,0)', o.x + 15, o.y - 8);
}

function drawTank(eq) {
    const p = project(eq);
    const w = (eq.diametro / 2) * cam.scale;
    const h = eq.altura * cam.scale;
    const topY = p.y - h/2;
    const bottomY = p.y + h/2;
    ctx.save();
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(p.x - w, topY, w, h);
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(p.x, topY, w, h);
    ctx.beginPath();
    ctx.ellipse(p.x, topY, w, w*0.5, 0, 0, 2*Math.PI);
    ctx.fillStyle = '#60a5fa';
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(p.x, bottomY, w, w*0.5, 0, 0, 2*Math.PI);
    ctx.fillStyle = '#2563eb';
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.max(12, 14 * cam.scale)}px Arial`;
    ctx.fillText(eq.tag, p.x - 18, topY - 10);
    if (eq.puertos) {
        eq.puertos.forEach(nz => {
            const pos = { x: eq.x + nz.relX, y: eq.y + nz.relY, z: eq.z + nz.relZ };
            const proj = project(pos);
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = '#ff8800';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '8px monospace';
            ctx.fillText(nz.id, proj.x-4, proj.y-4);
        });
    }
    ctx.restore();
}

function drawBomba(eq) {
    const p = project(eq);
    const rad = 12 * cam.scale;
    const grad = ctx.createRadialGradient(p.x-3, p.y-3, 2, p.x, p.y, rad);
    grad.addColorStop(0, '#f39c12');
    grad.addColorStop(1, '#b85c00');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, rad, 0, 2*Math.PI);
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x - rad, p.y);
    ctx.lineTo(p.x + rad, p.y);
    ctx.strokeStyle = '#e67e22';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = 'white';
    ctx.font = `${Math.max(10, 12 * cam.scale)}px Arial`;
    ctx.fillText(eq.tag, p.x + 15, p.y - 5);
    if (eq.puertos) {
        eq.puertos.forEach(nz => {
            const pos = { x: eq.x + nz.relX, y: eq.y + nz.relY, z: eq.z + nz.relZ };
            const proj = project(pos);
            ctx.beginPath();
            ctx.arc(proj.x, proj.y, 5, 0, 2*Math.PI);
            ctx.fillStyle = '#ff8800';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '8px monospace';
            ctx.fillText(nz.id, proj.x-4, proj.y-4);
        });
    }
}

function drawColector(eq) {
    const p = project(eq);
    const anchoTotal = (eq.puertos.length-1) * (eq.puertos[1]?.relX - eq.puertos[0]?.relX) || 2000;
    const pIzq = project({ x: eq.x, y: eq.y, z: eq.z });
    const pDer = project({ x: eq.x + anchoTotal, y: eq.y, z: eq.z });
    ctx.beginPath();
    ctx.moveTo(pIzq.x, pIzq.y);
    ctx.lineTo(pDer.x, pDer.y);
    ctx.strokeStyle = '#facc15';
    ctx.lineWidth = Math.max(4, (eq.diametro || 4) * cam.scale);
    ctx.stroke();
    // Dibujar círculos en cada puerto
    eq.puertos.forEach(nz => {
        const pos = { x: eq.x + nz.relX, y: eq.y + nz.relY, z: eq.z + nz.relZ };
        const proj = project(pos);
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, 6, 0, 2*Math.PI);
        ctx.fillStyle = '#ff8800';
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = '8px monospace';
        ctx.fillText(nz.id, proj.x-4, proj.y-4);
    });
    ctx.fillStyle = 'white';
    ctx.font = `bold ${12 * cam.scale}px Arial`;
    ctx.fillText(eq.tag, pIzq.x - 15, pIzq.y - 10);
}

function getPointAtDistance(from, to, dist) {
    const d = Math.hypot(to.x - from.x, to.y - from.y, to.z - from.z);
    const t = Math.min(dist / d, 0.5);
    return {
        x: from.x + (to.x - from.x) * t,
        y: from.y + (to.y - from.y) * t,
        z: from.z + (to.z - from.z) * t
    };
}

function drawPipeWithElbows(line) {
    const pts = line._cachedPoints || line.points3D;
    if (!pts || pts.length < 2) return;
    const diamMM = (line.diameter || 4) * 25.4;
    const radio = Math.min(diamMM * 1.5, 500);
    ctx.beginPath();
    let firstProj = project(pts[0]);
    ctx.moveTo(firstProj.x, firstProj.y);
    for (let i = 1; i < pts.length - 1; i++) {
        const pPrev = pts[i-1];
        const pCurr = pts[i];
        const pNext = pts[i+1];
        const pIn = getPointAtDistance(pCurr, pPrev, radio);
        const pOut = getPointAtDistance(pCurr, pNext, radio);
        const projIn = project(pIn);
        const projOut = project(pOut);
        const projCurr = project(pCurr);
        ctx.lineTo(projIn.x, projIn.y);
        ctx.quadraticCurveTo(projCurr.x, projCurr.y, projOut.x, projOut.y);
    }
    const lastProj = project(pts[pts.length-1]);
    ctx.lineTo(lastProj.x, lastProj.y);
    ctx.strokeStyle = '#facc15';
    ctx.lineWidth = Math.max(4, (line.diameter || 4) * cam.scale);
    ctx.stroke();
}

function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    drawGrid();
    drawOrigin();
    // Tuberías
    for (let line of db.lines) drawPipeWithElbows(line);
    // Equipos
    for (let eq of db.equipos) {
        if (eq.tipo === 'tanque_v') drawTank(eq);
        else if (eq.tipo === 'bomba') drawBomba(eq);
        else if (eq.tipo === 'colector') drawColector(eq);
    }
    // Resaltar selección
    if (selectedElement) {
        if (selectedElement.type === 'equipment') {
            const eq = selectedElement.obj;
            const p = project(eq);
            if (eq.tipo === 'colector') {
                const ancho = (eq.puertos.length-1) * (eq.puertos[1]?.relX - eq.puertos[0]?.relX) || 2000;
                const pIzq = project({ x: eq.x, y: eq.y, z: eq.z });
                const pDer = project({ x: eq.x + ancho, y: eq.y, z: eq.z });
                ctx.beginPath();
                ctx.moveTo(pIzq.x, pIzq.y);
                ctx.lineTo(pDer.x, pDer.y);
                ctx.strokeStyle = '#facc15';
                ctx.lineWidth = Math.max(6, (eq.diametro||4)*cam.scale);
                ctx.stroke();
            } else {
                const w = (eq.diametro/2)*cam.scale;
                const h = eq.altura*cam.scale;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y - h/2, w+3, (w+3)*0.5, 0, 0, 2*Math.PI);
                ctx.strokeStyle = '#facc15';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        } else if (selectedElement.type === 'line') {
            const line = selectedElement.obj;
            const pts = line._cachedPoints || line.points3D;
            if (pts && pts.length) {
                ctx.beginPath();
                const proj = pts.map(p => project(p));
                ctx.moveTo(proj[0].x, proj[0].y);
                for (let i=1; i<proj.length; i++) ctx.lineTo(proj[i].x, proj[i].y);
                ctx.strokeStyle = '#facc15';
                ctx.lineWidth = Math.max(6, (line.diameter||4)*cam.scale);
                ctx.stroke();
            }
        }
    }
    ctx.restore();
}

function parseConnect(cmd) {
    const parts = cmd.split(/\s+/);
    if (parts[0].toLowerCase() !== 'connect') return false;
    let idx = 1;
    const fromEquip = parts[idx++];
    const fromNozzle = parts[idx++];
    if (parts[idx].toLowerCase() !== 'to') return false;
    idx++;
    const toEquip = parts[idx++];
    const toNozzle = parts[idx++];
    let diameter = 4, material = 'PPR';
    while (idx < parts.length) {
        const key = parts[idx++].toLowerCase();
        if (key === 'diameter') diameter = parseFloat(parts[idx++]);
        else if (key === 'material') material = parts[idx++].toUpperCase();
    }
    const eqFrom = db.equipos.find(e => e.tag === fromEquip);
    const eqTo = db.equipos.find(e => e.tag === toEquip);
    if (!eqFrom || !eqTo) { notify("Equipo no encontrado", true); return true; }
    const nzFrom = eqFrom.puertos?.find(n => n.id === fromNozzle);
    const nzTo = eqTo.puertos?.find(n => n.id === toNozzle);
    if (!nzFrom || !nzTo) { notify("Puerto no encontrado", true); return true; }
    if (nzFrom.diametro !== nzTo.diametro && diameter !== nzFrom.diametro) {
        notify(`Diámetros incompatibles: ${nzFrom.diametro}" vs ${nzTo.diametro}"`, true);
        return true;
    }
    const tag = `L-${db.lines.length+1}`;
    const newLine = {
        tag,
        diameter,
        material,
        anchors: {
            start: { equipTag: fromEquip, nozzleId: fromNozzle },
            end: { equipTag: toEquip, nozzleId: toNozzle }
        },
        waypoints: [],
        _cachedPoints: null
    };
    db.lines.push(newLine);
    actualizarTuberiasConectadas(fromEquip);
    actualizarTuberiasConectadas(toEquip);
    saveState();
    render();
    notify(`Conectado ${fromEquip}.${fromNozzle} con ${toEquip}.${toNozzle} (${tag})`);
    return true;
}

function parseCreateManifold(cmd) {
    const parts = cmd.split(/\s+/);
    if (parts[0].toLowerCase() !== 'create' || parts[1].toLowerCase() !== 'manifold') return false;
    let idx = 2;
    const tag = parts[idx++];
    if (parts[idx] !== 'at') return false;
    idx++;
    const coords = parts[idx++].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
    if (!coords) return false;
    const x = parseFloat(coords[1]), y = parseFloat(coords[2]), z = parseFloat(coords[3]);
    let numEntradas = 2, spacing = 3000, outputPos = 'center', diametro = 4, material = 'PPR';
    while (idx < parts.length) {
        const key = parts[idx++].toLowerCase();
        if (key === 'entries') numEntradas = parseInt(parts[idx++]);
        else if (key === 'spacing') spacing = parseFloat(parts[idx++]);
        else if (key === 'output') outputPos = parts[idx++].toLowerCase();
        else if (key === 'diameter') diametro = parseFloat(parts[idx++]);
        else if (key === 'material') material = parts[idx++].toUpperCase();
    }
    crearColector(tag, x, y, z, numEntradas, spacing, outputPos, diametro, material);
    return true;
}

function parseEditCommand(cmd) {
    const parts = cmd.split(/\s+/);
    if (parts[0].toLowerCase() !== 'edit') return false;
    const type = parts[1].toLowerCase();
    if (type === 'equipment') {
        const tag = parts[2];
        const action = parts[3].toLowerCase();
        const eq = db.equipos.find(e => e.tag === tag);
        if (!eq) { notify(`Equipo ${tag} no encontrado`, true); return true; }
        if (action === 'move') {
            const coords = parts[4] === 'to' ? parts[5] : parts[4];
            const match = coords.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
            if (match) {
                eq.x = parseFloat(match[1]);
                eq.y = parseFloat(match[2]);
                eq.z = parseFloat(match[3]);
                actualizarTuberiasConectadas(tag);
                saveState();
                render();
                notify(`Equipo ${tag} movido a (${eq.x},${eq.y},${eq.z})`);
                return true;
            }
        }
    } else if (type === 'line') {
        const tag = parts[2];
        const line = db.lines.find(l => l.tag === tag);
        if (!line) { notify(`Línea ${tag} no encontrada`, true); return true; }
        const action = parts[3].toLowerCase();
        if (action === 'add' && parts[4] === 'waypoint') {
            const coords = parts[5];
            const match = coords.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
            if (match) {
                const wp = { x: parseFloat(match[1]), y: parseFloat(match[2]), z: parseFloat(match[3]) };
                let after = null;
                if (parts[6] === 'after') after = parseInt(parts[7]);
                if (after !== null && after >= 0 && after < (line.waypoints?.length || 0)) {
                    line.waypoints.splice(after+1, 0, wp);
                } else {
                    if (!line.waypoints) line.waypoints = [];
                    line.waypoints.push(wp);
                }
                const p1 = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
                const p2 = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
                if (p1 && p2) {
                    let puntos = [p1];
                    if (line.waypoints) puntos.push(...line.waypoints);
                    puntos.push(p2);
                    line._cachedPoints = puntos;
                }
                saveState();
                render();
                notify(`Waypoint añadido a ${tag}`);
                return true;
            }
        } else if (action === 'remove' && parts[4] === 'waypoint') {
            const idx = parseInt(parts[5]) - 1;
            if (line.waypoints && idx >= 0 && idx < line.waypoints.length) {
                line.waypoints.splice(idx, 1);
                const p1 = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
                const p2 = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
                if (p1 && p2) {
                    let puntos = [p1];
                    if (line.waypoints) puntos.push(...line.waypoints);
                    puntos.push(p2);
                    line._cachedPoints = puntos;
                }
                saveState();
                render();
                notify(`Waypoint eliminado de ${tag}`);
                return true;
            }
        }
    }
    return false;
}

function autoCenter() {
    if (!canvas) return;
    let points = [];
    db.equipos.forEach(eq => {
        points.push({ x: eq.x, y: eq.y, z: eq.z });
    });
    db.lines.forEach(line => {
        if (line._cachedPoints) points.push(...line._cachedPoints);
    });
    if (points.length === 0) points = [{ x: -2000, y: 0, z: -2000 }, { x: 2000, y: 2000, z: 2000 }];
    const cos30 = Math.cos(30 * Math.PI / 180);
    const sin30 = Math.sin(30 * Math.PI / 180);
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    points.forEach(p => {
        const rawX = (p.x - p.z) * cos30;
        const rawY = (p.x + p.z) * sin30 - p.y;
        if (rawX < minX) minX = rawX;
        if (rawX > maxX) maxX = rawX;
        if (rawY < minY) minY = rawY;
        if (rawY > maxY) maxY = rawY;
    });
    const marginX = (maxX - minX) * 0.15;
    const marginY = (maxY - minY) * 0.15;
    minX -= marginX;
    maxX += marginX;
    minY -= marginY;
    maxY += marginY;
    const worldW = maxX - minX;
    const worldH = maxY - minY;
    const padding = Math.min(Math.max(canvas.width * 0.1, 20), 80);
    const scaleX = (canvas.width - padding) / worldW;
    const scaleY = (canvas.height - padding) / worldH;
    let newScale = Math.min(scaleX, scaleY);
    newScale = Math.min(newScale, 0.6);
    newScale = Math.max(newScale, 0.12);
    cam.scale = newScale;
    const worldCenterX = (minX + maxX) / 2;
    const worldCenterY = (minY + maxY) / 2;
    cam.panX = canvas.width / 2 - worldCenterX * cam.scale;
    cam.panY = canvas.height / 2 - worldCenterY * cam.scale;
    render();
}

// ==================== INTERACCIÓN Y SELECCIÓN ====================
function pickElement(mouseCanvas) {
    for (let eq of db.equipos) {
        const p = project(eq);
        let radio = (eq.diametro/2)*cam.scale;
        if (eq.tipo === 'colector') {
            const ancho = (eq.puertos.length-1) * (eq.puertos[1]?.relX - eq.puertos[0]?.relX) || 2000;
            const pIzq = project({ x: eq.x, y: eq.y, z: eq.z });
            const pDer = project({ x: eq.x + ancho, y: eq.y, z: eq.z });
            const dist = pointToSegmentDistance(mouseCanvas, pIzq, pDer);
            if (dist < 15) return { type: 'equipment', obj: eq };
        } else {
            const dist = Math.hypot(mouseCanvas.x - p.x, mouseCanvas.y - p.y);
            if (dist < radio+5) return { type: 'equipment', obj: eq };
        }
    }
    for (let line of db.lines) {
        const pts = line._cachedPoints;
        if (!pts) continue;
        const proj = pts.map(p => project(p));
        for (let i=0; i<proj.length-1; i++) {
            const dist = pointToSegmentDistance(mouseCanvas, proj[i], proj[i+1]);
            if (dist < 10) return { type: 'line', obj: line };
        }
    }
    return null;
}
function pointToSegmentDistance(p, a, b) {
    const ax = p.x-a.x, ay = p.y-a.y;
    const bx = b.x-a.x, by = b.y-a.y;
    const dot = ax*bx + ay*by;
    const len2 = bx*bx + by*by;
    if (len2===0) return Math.hypot(ax,ay);
    let t = dot/len2;
    t = Math.max(0, Math.min(1,t));
    const projX = a.x + t*bx;
    const projY = a.y + t*by;
    return Math.hypot(p.x-projX, p.y-projY);
}

function initCanvasEvents() {
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseCanvas = {
            x: (e.clientX - rect.left) * canvas.width / rect.width,
            y: (e.clientY - rect.top) * canvas.height / rect.height
        };
        const picked = pickElement(mouseCanvas);
        if (toolMode === 'select') {
            if (picked) selectedElement = picked;
            else selectedElement = null;
            render();
        } else if (toolMode === 'moveEq') {
            if (picked && picked.type === 'equipment') {
                draggingEquipment = true;
                draggedEquip = picked.obj;
                dragLastPos = { x: e.clientX, y: e.clientY };
                canvas.style.cursor = 'grabbing';
                e.preventDefault();
            }
        } else if (toolMode === 'addPoint') {
            if (picked && picked.type === 'line') {
                const line = picked.obj;
                const pts = line._cachedPoints;
                if (pts) {
                    let minDist = Infinity;
                    let bestSeg = 0;
                    let bestParam = 0;
                    const proj = pts.map(p => project(p));
                    for (let i=0; i<proj.length-1; i++) {
                        const a = proj[i], b = proj[i+1];
                        const ax = mouseCanvas.x - a.x, ay = mouseCanvas.y - a.y;
                        const bx = b.x - a.x, by = b.y - a.y;
                        const dot = ax*bx + ay*by;
                        const len2 = bx*bx + by*by;
                        if (len2 === 0) continue;
                        let t = dot / len2;
                        t = Math.max(0, Math.min(1, t));
                        const projX = a.x + t*bx;
                        const projY = a.y + t*by;
                        const dist = Math.hypot(mouseCanvas.x - projX, mouseCanvas.y - projY);
                        if (dist < minDist) {
                            minDist = dist;
                            bestSeg = i;
                            bestParam = t;
                        }
                    }
                    if (minDist < 15) {
                        const p1 = pts[bestSeg];
                        const p2 = pts[bestSeg+1];
                        const newPoint = {
                            x: p1.x + bestParam * (p2.x - p1.x),
                            y: p1.y + bestParam * (p2.y - p1.y),
                            z: p1.z + bestParam * (p2.z - p1.z)
                        };
                        if (!line.waypoints) line.waypoints = [];
                        line.waypoints.push(newPoint);
                        const pStart = obtenerPosicionPuerto(line.anchors.start.equipTag, line.anchors.start.nozzleId);
                        const pEnd = obtenerPosicionPuerto(line.anchors.end.equipTag, line.anchors.end.nozzleId);
                        let puntos = [pStart];
                        puntos.push(...line.waypoints);
                        puntos.push(pEnd);
                        line._cachedPoints = puntos;
                        saveState();
                        render();
                        notify("Waypoint añadido");
                    }
                }
            }
        }
    });
    window.addEventListener('mousemove', (e) => {
        if (draggingEquipment && draggedEquip) {
            const dx = (e.clientX - dragLastPos.x) / cam.scale;
            const dy = (e.clientY - dragLastPos.y) / cam.scale;
            draggedEquip.x += dx;
            draggedEquip.z += dy;
            actualizarTuberiasConectadas(draggedEquip.tag);
            dragLastPos = { x: e.clientX, y: e.clientY };
            render();
        } else if (panning) {
            const dx = e.clientX - panStart.x;
            const dy = e.clientY - panStart.y;
            cam.panX += dx;
            cam.panY += dy;
            panStart = { x: e.clientX, y: e.clientY };
            render();
        }
    });
    window.addEventListener('mouseup', () => {
        if (draggingEquipment) {
            draggingEquipment = false;
            draggedEquip = null;
            saveState();
            canvas.style.cursor = 'grab';
        }
        if (panning) {
            panning = false;
            canvas.style.cursor = 'grab';
        }
    });
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        cam.scale *= delta;
        cam.scale = Math.min(Math.max(0.1, cam.scale), 1.5);
        render();
    });
    canvas.addEventListener('mousedown', (e) => {
        if (toolMode === 'select' && !selectedElement && !draggingEquipment) {
            panning = true;
            panStart = { x: e.clientX, y: e.clientY };
            canvas.style.cursor = 'grabbing';
            e.preventDefault();
        }
    });
}

function resizeCanvas() {
    const container = canvas.parentElement;
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    autoCenter();
}

// ==================== INICIALIZACIÓN ====================
function init() {
    resizeCanvas();
    initCanvasEvents();
    // Datos de ejemplo: un tanque y una bomba (para probar)
    const tk01 = crearEquipoConPuertos('tanque_v', 'TK-1', 0, 1250, 0, { diametro: 2400, altura: 2500 });
    const b01 = crearEquipoConPuertos('bomba', 'B-1', 5000, 800, 0, { diametro: 800, altura: 800 });
    db.equipos.push(tk01, b01);
    render();
    autoCenter();
    saveState();

    // Eventos UI
    document.getElementById('btnNew').onclick = nuevoProyecto;
    document.getElementById('btnOpen').onclick = cargarProyecto;
    document.getElementById('btnSave').onclick = guardarProyecto;
    document.getElementById('btnReset').onclick = autoCenter;
    document.getElementById('btnCommand').onclick = () => document.getElementById('commandPanel').style.display = 'block';
    document.getElementById('closeCommand').onclick = () => document.getElementById('commandPanel').style.display = 'none';
    document.getElementById('runCommands').onclick = () => {
        const text = document.getElementById('commandText').value;
        const lines = text.split('\n');
        for (let raw of lines) {
            let cmd = raw.trim();
            if (!cmd || cmd.startsWith('//')) continue;
            saveState();
            if (!parseConnect(cmd) && !parseCreateManifold(cmd) && !parseEditCommand(cmd) && !parseHelp(cmd)) {
                notify(`❌ No entendí: "${cmd.substring(0,50)}..."`, true);
            }
        }
        document.getElementById('commandPanel').style.display = 'none';
        render();
    };
    document.getElementById('clearCommand').onclick = () => document.getElementById('commandText').value = '';
    document.getElementById('btnAddTank').onclick = () => {
        const tag = `TK-${db.equipos.filter(e=>e.tipo==='tanque_v').length+1}`;
        const newEq = crearEquipoConPuertos('tanque_v', tag, 0, 1250, 0);
        db.equipos.push(newEq);
        saveState();
        render();
        autoCenter();
    };
    document.getElementById('btnAddPump').onclick = () => {
        const tag = `B-${db.equipos.filter(e=>e.tipo==='bomba').length+1}`;
        const newEq = crearEquipoConPuertos('bomba', tag, 0, 800, 0);
        db.equipos.push(newEq);
        saveState();
        render();
        autoCenter();
    };
    document.getElementById('btnMTO').onclick = exportarMTO;
    document.getElementById('btnPDF').onclick = exportPDF;
    document.getElementById('btnUndo').onclick = undo;
    document.getElementById('btnRedo').onclick = redo;
    document.getElementById('btnVoice').onclick = toggleVoice;
    document.getElementById('btnApplyNorm').onclick = aplicarNormas;
    document.getElementById('btnSpeakSummary').onclick = resumenProyecto;
    document.getElementById('btnCatalog').onclick = () => mostrarReporte("Usa 'help equipos' o 'help accesorios' en el panel de comandos.");
    document.getElementById('btnRecalc').onclick = recalcularTodo;

    // Herramientas
    const setTool = (mode) => {
        toolMode = mode;
        document.querySelectorAll('#toolsPanel button').forEach(btn => btn.classList.remove('active'));
        if (mode === 'select') document.getElementById('toolSelect').classList.add('active');
        else if (mode === 'moveEq') document.getElementById('toolMoveEq').classList.add('active');
        else if (mode === 'editPipe') document.getElementById('toolEditPipe').classList.add('active');
        else if (mode === 'addPoint') document.getElementById('toolAddPoint').classList.add('active');
    };
    document.getElementById('toolSelect').onclick = () => setTool('select');
    document.getElementById('toolMoveEq').onclick = () => setTool('moveEq');
    document.getElementById('toolEditPipe').onclick = () => setTool('editPipe');
    document.getElementById('toolAddPoint').onclick = () => setTool('addPoint');

    window.addEventListener('resize', () => { resizeCanvas(); autoCenter(); });
    notify("SmartFlow Pro v10.1 - Colector inteligente disponible. Ejemplo: create manifold M-01 at (0,1500,2000) entries 6 spacing 3000 output center diameter 4 material PPR");
}

init();
</script>
