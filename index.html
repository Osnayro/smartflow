<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SmartProject | AcQuaBlue</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary-bg: #0a0e17;
            --panel-bg: rgba(20, 28, 45, 0.95);
            --accent-cyan: #00f2ff;
            --accent-blue: #1e4eb8;
            --text-main: #e0e6ed;
            --toolbar-bg: #0f172a;
            --button-bg: #1e293b;
            --button-border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--primary-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #10172a 0%, #020617 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-content { text-align: center; width: 350px; }
        .corporate-header { margin-bottom: 25px; }
        .company-name { font-size: 11px; letter-spacing: 3px; color: #fff; opacity: 0.6; text-transform: uppercase; display: block; }
        .powered-by { font-size: 8px; color: var(--accent-cyan); letter-spacing: 1px; text-transform: uppercase; }

        .hex-container {
            width: 120px; height: 120px;
            margin: 0 auto 30px;
            border: 1px solid var(--accent-cyan);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 242, 255, 0.05);
            animation: hex-pulse 2.5s infinite ease-in-out;
        }
        .hex-container img { width: 70%; filter: drop-shadow(0 0 10px #00f2ff); }

        @keyframes hex-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(0,242,255,0.1); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,242,255,0.3); }
        }

        .splash-title { font-size: 30px; letter-spacing: 8px; color: white; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .splash-subtitle { color: var(--accent-cyan); letter-spacing: 4px; font-size: 10px; margin-bottom: 35px; opacity: 0.8; font-weight: bold; }

        .loading-bar-container { width: 200px; height: 1px; background: rgba(255,255,255,0.1); margin: 0 auto 15px; overflow: hidden; }
        .loading-bar-fill { width: 0%; height: 100%; background: var(--accent-cyan); animation: fill-bar 4.5s forwards cubic-bezier(0.19, 1, 0.22, 1); }

        .splash-status { font-family: monospace; font-size: 9px; color: #64748b; text-transform: uppercase; margin-bottom: 50px; height: 15px; }

        .author-footer { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .leader-by { font-size: 9px; color: #fff; opacity: 0.5; text-transform: uppercase; }
        .engineer-name { font-size: 13px; font-weight: bold; color: #fff; display: block; letter-spacing: 1.5px; margin-top: 4px; }

        @keyframes fill-bar { 0% { width: 0%; } 100% { width: 100%; } }
        .splash-hidden { opacity: 0; visibility: hidden; }

        #welcome-panel {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--primary-bg);
            z-index: 9000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .welcome-container {
            width: 600px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--accent-cyan);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .header-names {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            text-align: left;
        }

        .corp-name { color: var(--accent-cyan); font-size: 16px; font-weight: 800; line-height: 1.3; text-transform: uppercase; letter-spacing: 2px; }
        .user-name { color: #fff; font-size: 16px; font-weight: 600; line-height: 1.3; text-transform: uppercase; letter-spacing: 2px; text-align: right; }

        .button-group { display: flex; flex-direction: column; gap: 16px; }

        .welcome-btn {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 16px 24px;
            font-size: 18px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 3px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .welcome-btn:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 30px rgba(0,242,255,0.4); }

        .toolbar {
            background: var(--toolbar-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid var(--accent-blue);
        }

        .toolbar-title { color: var(--accent-cyan); font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        button {
            background: var(--button-bg); border: 1px solid var(--button-border);
            color: white; padding: 8px 14px; border-radius: 4px;
            font-size: 12px; font-weight: 600; cursor: pointer;
        }

        .canvas-container { flex: 1; background: #000; position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: grab; }

        .property-panel {
            position: absolute; top: 20px; right: 20px; width: 280px;
            background: var(--panel-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--accent-blue); border-radius: 8px;
            padding: 15px; z-index: 100; transition: transform 0.3s ease;
        }
        .property-panel.hidden { transform: translateX(320px); }

        .status-bar {
            background: #020617; padding: 8px 20px; font-size: 10px;
            border-top: 1px solid var(--accent-blue); color: var(--accent-cyan);
            display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="corporate-header">
                <span class="company-name">AcQuaBlue International Corp.</span>
                <span class="powered-by">Smart Engineering Systems</span>
            </div>
            <div class="hex-container">
                <img src="img/logo.PNG" alt="Logo" onerror="this.style.display='none'">
            </div>
            <h1 class="splash-title">SmartProject</h1>
            <p class="splash-subtitle">INGENIERÍA INTELIGENTE</p>
            <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
            <div class="splash-status" id="splash-status">Inicializando...</div>
            <div class="author-footer">
                <span class="leader-by">Ingeniero Líder de Proyecto:</span>
                <span class="engineer-name">Ing. Osnay Romero</span>
            </div>
        </div>
    </div>

    <div id="welcome-panel">
        <div class="welcome-container">
            <div class="header-names">
                <h1 class="corp-name">ACQUABLUE<br>INTERNATIONAL CORP.</h1>
                <h2 class="user-name">ING.<br>OSNAY ROMERO</h2>
            </div>
            <div class="button-group">
                <button class="welcome-btn" id="welcome-new-project">➕ NUEVO PROYECTO</button>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <span class="toolbar-title">SmartProject</span>
        <button id="btnReset">🔄 Centrar</button>
        <button id="btnCommand" style="background:#238636">🤖 Comandos</button>
        <button id="btnMTO">📊 MTO</button>
    </div>

    <div class="canvas-container">
        <canvas id="isoCanvas"></canvas>
        <div id="side-panel" class="property-panel hidden">
            <div id="panel-content"></div>
            <button onclick="togglePanel(false)">Cerrar</button>
        </div>
    </div>

    <div class="status-bar">
        <div id="statusMsg">SISTEMA LISTO</div>
        <div>AcQuaBlue | Ing. Osnay Romero</div>
    </div>

    <script src="js/core.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/commands.js"></script>
    <script src="js/router.js"></script>

    <script>
        window.voiceEnabled = true;

        // --- CORRECCIÓN 1: Stub de Accesibilidad ---
        window.SmartFlowAccessibility = { 
            isVoiceEnabled: () => window.voiceEnabled, 
            speak: (m) => console.log("IA Voice:", m) 
        };

        function updateStatus(msg, isErr) {
            const el = document.getElementById('statusMsg');
            if (el) {
                el.innerText = msg;
                el.style.color = isErr ? '#ef4444' : '#00f2ff';
            }
        }

        // --- CORRECCIÓN 2: Fix de variable 'obj' ---
        function updatePropertyPanel(obj) {
            const content = document.getElementById('panel-content');
            if (!obj) { togglePanel(false); return; }
            togglePanel(true);
            content.innerHTML = `<strong>TAG:</strong> ${obj.tag}<br><strong>Tipo:</strong> ${obj.tipo}`;
        }

        function togglePanel(show) {
            document.getElementById('side-panel').classList.toggle('hidden', !show);
        }

        // --- CORRECCIÓN 3: Orden de inicialización ---
        window.addEventListener('load', () => {
            // Inicializar Core
            if (typeof SmartFlowCore !== 'undefined') {
                SmartFlowCore.init(updateStatus, 
                () => { if(window.SmartFlowRenderer) SmartFlowRenderer.render(); }, 
                updatePropertyPanel);
            }

            // Inicializar Renderer ANTES que Router
            if (typeof SmartFlowRenderer !== 'undefined') {
                SmartFlowRenderer.init(document.getElementById('isoCanvas'), SmartFlowCore, updateStatus);
            }

            // Inicializar Router y Comandos
            if (typeof SmartFlowRouter !== 'undefined') {
                SmartFlowRouter.init(SmartFlowCore, SmartFlowCatalog, updateStatus, () => SmartFlowRenderer.render());
            }

            if (typeof SmartFlowCommands !== 'undefined') {
                SmartFlowCommands.init(SmartFlowCore, SmartFlowCatalog, SmartFlowRenderer, updateStatus, () => SmartFlowRenderer.render());
            }

            // Splash Screen Logic
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
            }, 3000);
        });
    </script>
</body>
</html>
