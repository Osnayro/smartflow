<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ACQ SmartFlow Pro · Isométricos 3D con IA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .toolbar {
            background: #161b22;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-bottom: 1px solid #30363d;
            align-items: center;
        }
        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            background: #21262d;
            color: #e0e0e0;
            transition: 0.2s;
            font-size: 13px;
        }
        button:hover { background: #2c313a; transform: translateY(-1px); }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; }
        .btn-danger { background: #da3633; }
        .btn-danger:hover { background: #f85149; }
        .btn-warning { background: #d29922; color: #1f1f1f; }
        .btn-warning:hover { background: #e3b341; }
        .btn-ai { background: linear-gradient(45deg, #7c3aed, #c084fc); color: white; }
        .canvas-container {
            flex: 1;
            position: relative;
            background: #0a0f1a;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }
        .inspector, .command-panel, .ai-panel {
            position: fixed;
            background: #1e1e2e;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid #3a3a4a;
            z-index: 1000;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
            color: #eee;
        }
        .inspector { right: 20px; top: 80px; width: 320px; display: none; }
        .command-panel { left: 20px; bottom: 20px; width: 480px; display: none; }
        .ai-panel { left: 20px; top: 80px; width: 500px; display: none; }
        textarea {
            width: 100%;
            background: #0f0f17;
            color: #eee;
            border: 1px solid #3a3a4a;
            border-radius: 8px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        .ins-row { margin-bottom: 12px; }
        .ins-row label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 12px; }
        .ins-row input, .ins-row select {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #3a3a4a;
            background: #0f0f17;
            color: #eee;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #161b22;
            border: 1px solid #238636;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            z-index: 2000;
            display: none;
            pointer-events: none;
        }
        .status-bar {
            background: #0f0f17;
            padding: 4px 12px;
            font-size: 12px;
            border-top: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
        }
        hr { border-color: #30363d; margin: 10px 0; }
        h3 { margin-bottom: 8px; color: #58a6ff; }
        .component-list { max-height: 200px; overflow-y: auto; margin-top: 8px; }
        .component-item { background: #0f0f17; padding: 4px 8px; margin: 4px 0; border-radius: 4px; font-size: 11px; }
        .ai-preview {
            margin-top: 12px;
            padding: 8px;
            background: #0f0f17;
            border-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            max-height: 100px;
            overflow: auto;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="toolbar">
        <button id="btnNew" class="btn-primary">📄 Nuevo</button>
        <button id="btnImportPCF">📂 Importar PCF</button>
        <button id="btnExportPCF">💾 Exportar PCF</button>
        <button id="btnCommandPanel">⌨️ Comandos</button>
        <button id="btnAI" class="btn-ai">🤖 IA Natural</button>
        <button id="btnMTO">📊 MTO</button>
        <button id="btnValidate">🌊 Validar Hidráulica</button>
        <button id="btnSupports">🏗️ Soportes</button>
        <button id="btnPDF">📄 PDF</button>
        <button id="btnPNG">🖼️ PNG</button>
        <button id="btnDXF">📐 DXF (beta)</button>
        <button id="btnResetView">🔄 Reset Vista</button>
        <button id="btnInspectorClose" style="margin-left:auto;">❌ Cerrar</button>
    </div>
    <div class="canvas-container">
        <canvas id="isoCanvas"></canvas>
    </div>
    <div class="status-bar">
        <span id="statusMsg">✅ Listo</span>
        <span>🔘 Shift+arrastrar = mover | Rueda = zoom</span>
    </div>

    <!-- Inspector -->
    <div id="inspector" class="inspector">
        <h3>Propiedades</h3>
        <div id="inspectorContent"></div>
        <div style="display:flex; gap:8px; margin-top:12px;">
            <button id="inspectorSave" class="btn-primary">Guardar</button>
            <button id="inspectorCancel">Cancelar</button>
        </div>
    </div>

    <!-- Panel de comandos clásicos -->
    <div id="commandPanel" class="command-panel">
        <h3>Comandos de texto (sintaxis clásica)</h3>
        <textarea id="commandText" placeholder="Ejemplos:
line L-101 diameter 6 material PPR schedule 40 points (0,0,0) (5000,0,0) (5000,3000,0)
component valve V-101 at L-101 param 0.3 type gate size 6 rating 150# material PPR
equipment T-100 at (2000,0,500)"></textarea>
        <button id="runCommands" class="btn-primary">▶ Ejecutar</button>
        <button id="closeCommandPanel">Cerrar</button>
        <hr>
        <div><strong>Ayuda:</strong> line, component, equipment</div>
    </div>

    <!-- Panel IA Natural Language -->
    <div id="aiPanel" class="ai-panel">
        <h3>🤖 Asistente IA - Lenguaje Natural</h3>
        <textarea id="aiText" rows="4" placeholder="Ejemplos que entiende la IA:
• crea tubería de 6 pulgadas PPR desde (0,0,0) hasta (5000,3000,0)
• añade válvula V-101 en L-001
• equipo T-100 en (2000,0,500)
• línea de 4&quot; acero schedule 40 desde (0,0,0) a (10000,0,0)
• codo 90° E-101 en L-001 posición 0.7"></textarea>
        <div style="display:flex; gap:8px; margin-top:8px;">
            <button id="runAI" class="btn-primary">🚀 Ejecutar IA</button>
            <button id="aiExamples">💡 Ejemplos</button>
            <button id="closeAI">Cerrar</button>
        </div>
        <div id="aiPreview" class="ai-preview"></div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // ==================== MODELO DE DATOS ====================
        let db = {
            lines: [],
            equipos: [],
            supports: [],
            selected: null,
            selectedType: null,
            settings: { engineerName: "Ing. Proyectista", projectName: "Isométrico" }
        };

        // Parámetros de cámara
        let cam = {
            rotateY: 0.5,
            scale: 1,
            panX: 0, panY: 0
        };
        let isDragging = false;
        let dragMode = 'rotate';
        let lastMouse = { x: 0, y: 0 };

        const canvas = document.getElementById('isoCanvas');
        const ctx = canvas.getContext('2d');
        const statusSpan = document.getElementById('statusMsg');

        // ==================== FUNCIONES AUXILIARES ====================
        function notify(msg, isErr = false) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.style.background = isErr ? '#da3633' : '#238636';
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 4000);
            statusSpan.textContent = msg;
        }

        function saveToLocal() {
            try {
                localStorage.setItem('acq_iso', JSON.stringify({
                    lines: db.lines,
                    equipos: db.equipos,
                    supports: db.supports,
                    settings: db.settings
                }));
            } catch(e) {}
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('acq_iso');
            if (!saved) return;
            try {
                const data = JSON.parse(saved);
                db.lines = data.lines || [];
                db.equipos = data.equipos || [];
                db.supports = data.supports || [];
                db.settings = data.settings || db.settings;
                notify('Proyecto restaurado');
            } catch(e) {
                // Datos corruptos, eliminarlos
                localStorage.removeItem('acq_iso');
                console.warn('Datos corruptos eliminados');
            }
        }

        // ==================== RENDERIZADO ISOMÉTRICO ====================
        function project(p) {
            const x = p.x * Math.cos(cam.rotateY) - p.z * Math.sin(cam.rotateY);
            const y = p.y;
            const z = p.x * Math.sin(cam.rotateY) + p.z * Math.cos(cam.rotateY);
            const cos30 = Math.cos(30 * Math.PI/180);
            const sin30 = Math.sin(30 * Math.PI/180);
            const isoX = x - y * cos30;
            const isoY = (x + y) * sin30 - z;
            return { x: isoX * cam.scale + cam.panX, y: isoY * cam.scale + cam.panY };
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            for (const line of db.lines) {
                if (!line.points3D || line.points3D.length < 2) continue;
                ctx.beginPath();
                const proj = line.points3D.map(p => project(p));
                ctx.moveTo(proj[0].x, proj[0].y);
                for (let i = 1; i < proj.length; i++) ctx.lineTo(proj[i].x, proj[i].y);
                ctx.strokeStyle = line.color || '#58a6ff';
                ctx.lineWidth = Math.max(1, (line.diameter || 6) * cam.scale / 8);
                ctx.stroke();
                if (line.components) {
                    for (const comp of line.components) drawComponent(comp, line);
                }
            }
            for (const eq of db.equipos) {
                const p = project(eq);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8 * cam.scale, 0, 2*Math.PI);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = `${10 * cam.scale}px Arial`;
                ctx.fillText(eq.tag, p.x + 12, p.y + 4);
            }
            for (const s of db.supports) {
                const p = project(s);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, 2*Math.PI);
                ctx.fillStyle = '#ffaa33';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawComponent(comp, line) {
            const pos3d = getPositionOnLine(line, comp.param);
            if (!pos3d) return;
            const p = project(pos3d);
            ctx.save();
            ctx.translate(p.x, p.y);
            const dir = getDirectionOnLine(line, comp.param);
            if (dir) ctx.rotate(Math.atan2(dir.y, dir.x));
            ctx.beginPath();
            switch (comp.type) {
                case 'VALVE':
                    ctx.moveTo(-8, -5); ctx.lineTo(0, 0); ctx.lineTo(8, -5); ctx.lineTo(0, 10);
                    ctx.closePath();
                    ctx.fillStyle = '#ffaa33';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'FLANGE':
                    ctx.arc(0, 0, 6, 0, 2*Math.PI);
                    ctx.fillStyle = '#cccc99';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'REDUCER':
                    ctx.ellipse(0, 0, 6, 4, 0, 0, 2*Math.PI);
                    ctx.fillStyle = '#bb9966';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'ELBOW':
                    ctx.arc(0, 0, 6, 0, Math.PI/2);
                    ctx.lineTo(6, 0);
                    ctx.fillStyle = '#88aaff';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'TEE':
                    ctx.moveTo(-6, -4); ctx.lineTo(6, -4); ctx.lineTo(0, 8);
                    ctx.closePath();
                    ctx.fillStyle = '#88aaff';
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'INSTRUMENT':
                    ctx.rect(-5, -5, 10, 10);
                    ctx.fillStyle = '#ffaa88';
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#000';
                    ctx.font = '8px monospace';
                    ctx.fillText(comp.tag || 'I', -3, 3);
                    break;
            }
            ctx.restore();
        }

        function getPositionOnLine(line, t) {
            const pts = line.points3D;
            if (!pts || pts.length < 2) return null;
            if (t <= 0) return pts[0];
            if (t >= 1) return pts[pts.length-1];
            const idx = Math.floor(t * (pts.length - 1));
            const segT = (t * (pts.length - 1)) - idx;
            const p1 = pts[idx];
            const p2 = pts[idx+1];
            return {
                x: p1.x + segT * (p2.x - p1.x),
                y: p1.y + segT * (p2.y - p1.y),
                z: p1.z + segT * (p2.z - p1.z)
            };
        }

        function getDirectionOnLine(line, t) {
            const pts = line.points3D;
            if (!pts || pts.length < 2) return null;
            const idx = Math.min(Math.floor(t * (pts.length - 1)), pts.length - 2);
            const p1 = pts[idx];
            const p2 = pts[idx+1];
            const dx = p2.x - p1.x, dy = p2.y - p1.y;
            const len = Math.hypot(dx, dy);
            if (len === 0) return null;
            return { x: dx / len, y: dy / len };
        }

        // ==================== PARSER CLÁSICO (existente) ====================
        function parseClassic(raw) {
            const parts = raw.split(/\s+/);
            if (parts.length === 0) return { success: false };
            const cmd = parts[0].toLowerCase();
            if (cmd === 'line') {
                const tag = parts[1];
                let diam = null, material = null, schedule = null;
                let points = [];
                for (let i = 2; i < parts.length; i++) {
                    if (parts[i] === 'diameter') {
                        if (i+1 >= parts.length) return { success: false };
                        diam = parseFloat(parts[++i]);
                    } else if (parts[i] === 'material') {
                        if (i+1 >= parts.length) return { success: false };
                        const mat = parts[++i].toUpperCase();
                        if (['CS','SS','PPR','PVC','PE'].includes(mat)) material = mat;
                        else material = 'CS';
                    } else if (parts[i] === 'schedule') {
                        if (i+1 >= parts.length) return { success: false };
                        schedule = parts[++i];
                    } else if (parts[i] === 'points') {
                        let j = i+1;
                        while (j < parts.length) {
                            const match = parts[j].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
                            if (!match) break;
                            points.push({ x: parseFloat(match[1]), y: parseFloat(match[2]), z: parseFloat(match[3]) });
                            j++;
                        }
                        if (points.length < 2) return { success: false };
                        break;
                    }
                }
                if (tag && diam && material && schedule && points.length >= 2) {
                    return {
                        success: true,
                        command: {
                            type: 'line',
                            tag, diameter: diam, material, schedule,
                            points3D: points,
                            components: [],
                            color: '#58a6ff',
                            caudal: null, fluido: 'agua', temp: 25
                        }
                    };
                }
            } else if (cmd === 'component') {
                if (parts.length < 7) return { success: false };
                const tipo = parts[1];
                const tag = parts[2];
                const atIdx = parts.indexOf('at');
                if (atIdx === -1) return { success: false };
                const lineTag = parts[atIdx+1];
                const paramIdx = parts.indexOf('param');
                if (paramIdx === -1) return { success: false };
                const param = parseFloat(parts[paramIdx+1]);
                if (isNaN(param)) return { success: false };
                const line = db.lines.find(l => l.tag === lineTag);
                if (!line) return { success: false };
                let comp = { type: tipo.toUpperCase(), tag, param, material: line.material };
                for (let i = paramIdx+2; i < parts.length; i++) {
                    const key = parts[i];
                    if (i+1 >= parts.length) break;
                    const val = parts[++i];
                    switch (key) {
                        case 'type': comp.valveType = val; break;
                        case 'size': comp.size = parseFloat(val); break;
                        case 'rating': comp.rating = val; break;
                        case 'operator': comp.operator = val; break;
                        case 'end1-size': comp.end1Size = parseFloat(val); break;
                        case 'end2-size': comp.end2Size = parseFloat(val); break;
                        case 'angle': comp.angle = parseFloat(val); break;
                        case 'radius': comp.radius = parseFloat(val); break;
                        case 'branch-size': comp.branchSize = parseFloat(val); break;
                        case 'material': {
                            const mat = val.toUpperCase();
                            if (['CS','SS','PPR','PVC','PE'].includes(mat)) comp.material = mat;
                            break;
                        }
                    }
                }
                return {
                    success: true,
                    command: {
                        type: 'component',
                        comp: comp,
                        lineTag: lineTag
                    }
                };
            } else if (cmd === 'equipment') {
                const tag = parts[1];
                const atIdx = parts.indexOf('at');
                if (atIdx === -1) return { success: false };
                const coordsStr = parts[atIdx+1];
                const coords = coordsStr.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
                if (!coords) return { success: false };
                return {
                    success: true,
                    command: {
                        type: 'equipment',
                        tag: tag,
                        x: parseFloat(coords[1]),
                        y: parseFloat(coords[2]),
                        z: parseFloat(coords[3])
                    }
                };
            }
            return { success: false };
        }

        // ==================== PARSER IA NATURAL ====================
        async function parseWithAI(text) {
            // Patrones semánticos
            const patterns = {
                line: [
                    /crea\s+(?:tubería|linea|tubo?)\s+(?:de\s+)?(\d+(?:[.,]\d+)?)\s*(?:pulgadas?|")?\s*(CS|SS|PPR|PVC|PE)?(?:\s+(?:sch|schedule)\s+(\d+))?/i,
                    /l[íi]nea\s+(\w+)\s+diametro\s+(\d+)/i,
                    /tuberia\s+de\s+(\d+)\s*pulgadas?\s+(?:desde|de)\s+\(?(.*?)\)?\s+(?:hasta|a)\s+\(?(.*?)\)?/i
                ],
                component: [
                    /añade\s+(?:válvula|valvula|valv)\s+(\w+)\s+(?:en|a)\s+([A-Z0-9-]+)/i,
                    /(?:coloca|pone)\s+(flange|codo|reductor|tee|instrumento)\s+(\w+)\s+(?:en|a)\s+([A-Z0-9-]+)/i
                ],
                equipment: [
                    /equipo\s+(\w+)\s+(?:en|a|en)\s+\(?(.*?)\)?/i,
                    /bomba\s+(\w+)\s+(?:a|a)\s+\(?(.*?)\)?/i,
                    /tanque\s+(\w+)\s+(?:en|a)\s+\(?(.*?)\)?/i
                ]
            };

            let cmdType = null;
            let matches = [];
            for (const [type, regexes] of Object.entries(patterns)) {
                for (const regex of regexes) {
                    const m = text.match(regex);
                    if (m) {
                        cmdType = type;
                        matches = m;
                        break;
                    }
                }
                if (cmdType) break;
            }
            if (!cmdType) return { success: false };

            // Extraer puntos
            const pointMatches = [...text.matchAll(/\((-?\d+(?:[.,]\d+)?),\s*(-?\d+(?:[.,]\d+)?),\s*(-?\d+(?:[.,]\d+)?)\)/g)];
            const points = pointMatches.map(m => ({
                x: parseFloat(m[1]) * 1000,
                y: parseFloat(m[2]) * 1000,
                z: parseFloat(m[3]) * 1000
            }));

            if (cmdType === 'line') {
                let diameter = parseFloat(matches[1] || '6');
                let material = (matches[2] || 'PPR').toUpperCase();
                let schedule = matches[3] || '40';
                if (!['CS','SS','PPR','PVC','PE'].includes(material)) material = 'PPR';

                // Si no hay puntos, inferir desde texto
                if (points.length < 2) {
                    const fromMatch = text.match(/desde\s+\(?([^)]+)\)?/i);
                    const toMatch = text.match(/hasta\s+\(?([^)]+)\)?/i);
                    if (fromMatch && toMatch) {
                        const fromCoords = fromMatch[1].match(/(-?\d+(?:[.,]\d+)?)/g);
                        const toCoords = toMatch[1].match(/(-?\d+(?:[.,]\d+)?)/g);
                        if (fromCoords && fromCoords.length>=2 && toCoords && toCoords.length>=2) {
                            points.push({
                                x: parseFloat(fromCoords[0]) * 1000,
                                y: parseFloat(fromCoords[1]) * 1000,
                                z: parseFloat(fromCoords[2] || 0) * 1000
                            });
                            points.push({
                                x: parseFloat(toCoords[0]) * 1000,
                                y: parseFloat(toCoords[1]) * 1000,
                                z: parseFloat(toCoords[2] || 0) * 1000
                            });
                        }
                    }
                }
                if (points.length < 2) {
                    points.push({x:0, y:0, z:0});
                    points.push({x:5000, y:0, z:0});
                }
                const tag = `L-${String(db.lines.length+1).padStart(3,'0')}`;
                return {
                    success: true,
                    command: {
                        type: 'line',
                        tag, diameter, material, schedule,
                        points3D: points,
                        components: [],
                        color: '#58a6ff',
                        caudal: null, fluido: 'agua', temp: 25
                    }
                };
            }
            else if (cmdType === 'component') {
                let compType = inferComponentType(text);
                const tag = matches[1];
                const lineTag = matches[2] || matches[3];
                const line = db.lines.find(l => l.tag === lineTag);
                if (!line) return { success: false };
                const param = 0.5; // por defecto mitad
                // Intentar extraer posición si se menciona
                const posMatch = text.match(/posici[oó]n\s+(\d+(?:[.,]\d+)?)/i);
                if (posMatch) {
                    const p = parseFloat(posMatch[1]);
                    if (!isNaN(p) && p>=0 && p<=1) param = p;
                }
                return {
                    success: true,
                    command: {
                        type: 'component',
                        comp: { type: compType, tag, param, material: line.material },
                        lineTag: lineTag
                    }
                };
            }
            else if (cmdType === 'equipment') {
                const tag = matches[1];
                let x=0,y=0,z=0;
                if (points.length > 0) {
                    x = points[0].x;
                    y = points[0].y;
                    z = points[0].z;
                } else {
                    // buscar coordenadas en texto
                    const coordMatch = text.match(/\(([^)]+)\)/);
                    if (coordMatch) {
                        const nums = coordMatch[1].match(/(-?\d+(?:[.,]\d+)?)/g);
                        if (nums && nums.length>=2) {
                            x = parseFloat(nums[0])*1000;
                            y = parseFloat(nums[1])*1000;
                            z = parseFloat(nums[2]||0)*1000;
                        }
                    }
                }
                return {
                    success: true,
                    command: { type: 'equipment', tag, x, y, z }
                };
            }
            return { success: false };
        }

        function inferComponentType(text) {
            const map = {
                'válvula':'VALVE', 'valvula':'VALVE', 'valv':'VALVE',
                'flange':'FLANGE', 'brida':'FLANGE',
                'codo':'ELBOW', 'corbete':'ELBOW',
                'reductor':'REDUCER',
                'tee':'TEE', 't':'TEE',
                'instrumento':'INSTRUMENT', 'pt':'INSTRUMENT'
            };
            for (const [word, type] of Object.entries(map)) {
                if (text.toLowerCase().includes(word)) return type;
            }
            return 'VALVE';
        }

        // ==================== COMANDOS UNIFICADOS ====================
        async function parseCommands(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('//'));
            for (let raw of lines) {
                try {
                    // 1) IA
                    let result = await parseWithAI(raw);
                    if (result.success) {
                        applyCommand(result.command);
                        notify(`🤖 IA: ${raw}`);
                        continue;
                    }
                    // 2) Clásico
                    result = parseClassic(raw);
                    if (result.success) {
                        applyCommand(result.command);
                        notify(`📋 ${raw}`);
                        continue;
                    }
                    notify(`❌ Comando no reconocido: ${raw}`, true);
                } catch (err) {
                    notify(`Error: ${err.message}`, true);
                }
            }
            render();
            saveToLocal();
        }

        function applyCommand(cmd) {
            if (cmd.type === 'line') {
                db.lines.push(cmd);
            } else if (cmd.type === 'component') {
                const line = db.lines.find(l => l.tag === cmd.lineTag);
                if (line) {
                    if (!line.components) line.components = [];
                    line.components.push(cmd.comp);
                }
            } else if (cmd.type === 'equipment') {
                db.equipos.push(cmd);
            }
        }

        // ==================== IMPORTACIÓN/EXPORTACIÓN PCF (resumido) ====================
        function importPCFFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const contenido = e.target.result;
                    const parsed = parsePCF(contenido);
                    db.lines = parsed.lines;
                    db.equipos = parsed.equipos;
                    db.supports = parsed.supports;
                    render();
                    saveToLocal();
                    notify(`PCF importado: ${db.lines.length} líneas, ${db.equipos.length} equipos`);
                } catch(err) {
                    notify('Error al importar PCF: ' + err.message, true);
                }
            };
            reader.readAsText(file);
        }

        function parsePCF(text) {

        function exportToPCF() {
            if (!db.lines.length) { notify('No hay líneas para exportar', true); return; }
            let pcf = `! PCF v7.0 - ACQ SmartFlow Pro\nUNITS MM\nPROJECT-NAME "${db.settings.projectName}"\nENGINEER "${db.settings.engineerName}"\nDATE ${new Date().toISOString().slice(0,10)}\n\n`;
            for (const line of db.lines) {
                if (!line.points3D || line.points3D.length < 2) continue;
                pcf += `NEWPIPE\n`;
                pcf += ` COMPONENT-IDENTIFIER ${line.tag}\n`;
                pcf += ` DIAMETER ${(line.diameter * 25.4).toFixed(1)} MM\n`;
                pcf += ` MATERIAL ${line.material || 'CS'}\n`;
                pcf += ` SCHEDULE ${line.schedule || 'STD'}\n`;
                if (line.caudal) pcf += ` FLOW-RATE ${line.caudal} M3/HR\n`;
                if (line.fluido) pcf += ` FLUID ${line.fluido}\n`;
                if (line.temp) pcf += ` TEMPERATURE ${line.temp} C\n`;
                for (const p of line.points3D) pcf += ` POINT ${p.x.toFixed(0)} ${p.y.toFixed(0)} ${p.z.toFixed(0)}\n`;
                // componentes
                if (line.components) {
                    for (const comp of line.components) {
                        const pos = getPositionOnLine(line, comp.param);
                        if (!pos) continue;
                        // ... añadir bloque según tipo (simplificado)
                    }
                }
                pcf += `ENDPIPE\n\n`;
            }
            const blob = new Blob([pcf], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `isometrico_${db.settings.projectName.replace(/\s/g,'_')}.pcf`;
            a.click();
            URL.revokeObjectURL(url);
            notify('PCF exportado correctamente');
        }
