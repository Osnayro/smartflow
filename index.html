<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartFlow Pro v - Ingeniería Inteligente</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .toolbar{background:#1a1a2e;padding:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;border-bottom:1px solid #2a2a4a}
    button{background:#2c3e66;border:none;color:white;padding:8px 12px;border-radius:6px;font-weight:bold;cursor:pointer;font-size:12px}
    button:hover{background:#3b5a8c}
    .btn-primary{background:#238636}
    .btn-warning{background:#d29922;color:#1f1f1f}
    .canvas-container{flex:1;position:relative;background:#000}
    canvas{display:block;width:100%;height:100%;cursor:grab}
    canvas:active{cursor:grabbing}
    .command-panel{position:fixed;left:10px;bottom:10px;width:90%;max-width:500px;background:#1e1e2e;border-radius:12px;border:1px solid #7c3aed;z-index:1000;display:none}
    .command-header{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #3a3a4a}
    .command-buttons{display:flex;gap:8px;padding:12px}
    textarea{width:calc(100% - 24px);margin:12px;background:#0f0f17;color:#eee;border:none;border-radius:8px;padding:12px;font-family:monospace;font-size:14px;resize:vertical}
    .notification{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#238636;padding:10px 20px;border-radius:8px;z-index:2000;display:none;text-align:center}
    .status-bar{background:#111;padding:6px;font-size:12px;text-align:center;border-top:1px solid #2a2a4a}
    .modal-reporte{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1e2e;border:2px solid #7c3aed;border-radius:12px;padding:20px;max-width:90%;max-height:80vh;overflow:auto;z-index:3000;font-family:monospace;white-space:pre-wrap}
    .modal-close{float:right;background:none;border:none;color:white;font-size:20px;cursor:pointer}
    @media (max-width:768px){button{padding:8px;font-size:11px}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<body>
<div class="toolbar">
    <button id="btnNew" class="btn-primary">Nuevo</button>
    <button id="btnOpen">Abrir</button>
    <button id="btnSave">Guardar</button>
    <button id="btnReset">Centrar</button>
    <button id="btnCommand" class="btn-primary">Comandos</button>
    <button id="btnMTO">MTO</button>
    <button id="btnPDF">PDF</button>
    <button id="btnUndo" class="btn-warning">Deshacer</button>
    <button id="btnRedo" class="btn-warning">Rehacer</button>
    <button id="btnVoice" style="background:#7c3aed">Voz ON</button>
    <button id="btnApplyNorm">Normas</button>
</div>
<div class="canvas-container"><canvas id="isoCanvas"></canvas></div>
<div id="commandPanel" class="command-panel">
    <div class="command-header"><strong>Comando de voz o texto</strong><button id="closeCommand" style="background:none;border:none;color:white;font-size:20px;">Cerrar</button></div>
    <textarea id="commandText" rows="6" placeholder="Ejemplos:
crear tanque de 2400 mm diametro y 2900 mm altura material acero carbono
crear bomba centrifuga entrada 3 pulgadas salida 3 pulgadas
conectar 4 pulgadas PPR desde salida de TK-01 hasta entrada de B-01
comenzar tuberia 4 pulgadas PPR desde salida de TK-01 avanzar 50 cm frente avanzar 30 cm derecha conectar con entrada de B-01
instalar distribuidor de 4 pulgadas PPR desde entrada de TK-01 hasta entrada de TK-06 a 80 cm
agregar valvula de bola acero en tuberia L-001 posicion 0.5
resumen
eliminar TK-01"></textarea>
    <div class="command-buttons"><button id="runCommands" class="btn-primary">Ejecutar</button><button id="clearCommand">Limpiar</button></div>
</div>
<div id="notification" class="notification"></div>
<div class="status-bar" id="statusMsg">SmartFlow Pro v7.9 - Listo</div>

<script>
// ==================== CONFIGURACIÓN GLOBAL ====================
let db = { equipos: [], lines: [], puntosLibres: [] };
let cam = { scale: 0.5, panX: 0, panY: 0 };
let dragging = false, lastPos = { x: 0, y: 0 };
let selectedElement = null;
let voiceEnabled = true;
let history = { past: [], future: [], maxSize: 30 };
let nextPointId = 1;
let currentCursor = null;

const canvas = document.getElementById('isoCanvas');
const ctx = canvas.getContext('2d');

// ==================== FUNCIONES AUXILIARES ====================
function notify(msg, isErr = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.backgroundColor = isErr ? '#da3633' : '#238636';
    n.style.display = 'block';
    document.getElementById('statusMsg').innerHTML = msg;
    if (voiceEnabled && window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        setTimeout(() => window.speechSynthesis.speak(u), 50);
    }
    setTimeout(() => n.style.display = 'none', 4000);
}

function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines, puntosLibres: db.puntosLibres }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}
function undo() {
    if (history.past.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines, puntosLibres: db.puntosLibres }));
    history.future.push(current);
    const prev = history.past.pop();
    db.equipos = prev.equipos || [];
    db.lines = prev.lines || [];
    db.puntosLibres = prev.puntosLibres || [];
    selectedElement = null;
    render();
    autoCenter();
    notify("Deshecho");
}
function redo() {
    if (history.future.length === 0) return;
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines, puntosLibres: db.puntosLibres }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos || [];
    db.lines = next.lines || [];
    db.puntosLibres = next.puntosLibres || [];
    selectedElement = null;
    render();
    autoCenter();
    notify("Rehecho");
}

// ==================== GENERACIÓN DE TAGS AUTOMÁTICOS ====================
function generarTagAutomatico(tipo) {
    const prefijos = { 'tanque': 'TK', 'tanque_v': 'TK', 'tanque_h': 'TK', 'bomba': 'B', 'intercambiador': 'E', 'torre': 'CT', 'colector': 'COL', 'distribuidor': 'COL' };
    const prefijo = prefijos[tipo] || 'EQ';
    let numero = 1;
    while (db.equipos.some(eq => eq.tag === `${prefijo}-${String(numero).padStart(2,'0')}`)) numero++;
    return `${prefijo}-${String(numero).padStart(2,'0')}`;
}

function generarTagLinea() {
    let numero = 1;
    while (db.lines.some(l => l.tag === `L-${String(numero).padStart(3,'0')}`)) numero++;
    return `L-${String(numero).padStart(3,'0')}`;
}

// ==================== SISTEMA DE VOZ SIN INTERRUPCIONES ====================
let speechQueue = [];
let isSpeaking = false;
let voiceEnabled = true;

function speakText(text, isUrgent = false) {
    if (!voiceEnabled || !text) return;
    
    if (isUrgent) {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        speechQueue = [];
        isSpeaking = false; // ✅ CORRECCIÓN: Resetear el flag al limpiar por urgencia
    }
    
    speechQueue.push(text);
    processSpeechQueue();
}

function processSpeechQueue() {
    if (isSpeaking || speechQueue.length === 0) return;
    if (!window.speechSynthesis) return;
    
    isSpeaking = true;
    const text = speechQueue.shift();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-ES';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    
    utterance.onend = () => {
        isSpeaking = false;
        processSpeechQueue();
    };
    
    utterance.onerror = () => {
        isSpeaking = false;
        processSpeechQueue();
    };
    
    window.speechSynthesis.speak(utterance);
}

function notify(msg, isErr = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.backgroundColor = isErr ? 'var(--danger)' : 'var(--success)';
    n.style.display = 'block';
    document.getElementById('statusMsg').innerHTML = msg;
    
    speakText(msg, isErr);
    
    setTimeout(() => {
        if (n.style.display === 'block') n.style.display = 'none';
    }, 5000);
}

// ==================== DATOS DEL PROYECTO ====================
let proyectoData = { nombre: 'Proyecto Sin Nombre', autor: 'Ingeniero' };

function mostrarModalProyecto(obligatorio = true) {
    const modal = document.getElementById('modalProyecto');
    modal.style.display = 'block';
    if (!obligatorio) {
        document.getElementById('proyectoNombre').value = proyectoData.nombre;
        document.getElementById('proyectoAutor').value = proyectoData.autor;
    }
}

function guardarProyecto() {
    const nombre = document.getElementById('proyectoNombre').value.trim();
    const autor = document.getElementById('proyectoAutor').value.trim();
    
    if (nombre) proyectoData.nombre = nombre;
    if (autor) proyectoData.autor = autor;
    
    document.getElementById('modalProyecto').style.display = 'none';
    notify(`Proyecto: ${proyectoData.nombre} | Ingeniero: ${proyectoData.autor}`);
    speakText(`Bienvenido ${proyectoData.autor}. Proyecto ${proyectoData.nombre} cargado. Sistema listo para comandos.`);
}

function editarProyecto() {
    mostrarModalProyecto(false);
}

// ==================== CONFIGURACIÓN GLOBAL ====================
let db = { equipos: [], lines: [], puntosLibres: [] };
let cam = { scale: 0.5, panX: 0, panY: 0 };
let dragging = false, lastPos = { x: 0, y: 0 };
let selectedElement = null;
let editMode = false;
let measuringMode = false;
let snapEnabled = true;
let currentCursor = { x: 0, y: 0, z: 0 };
let history = { past: [], future: [], maxSize: 30 };

const canvas = document.getElementById('isoCanvas');
const ctx = canvas.getContext('2d');

// ==================== FUNCIONES BÁSICAS ====================
function autoCenter() {
    cam.panX = canvas.width / 2;
    cam.panY = canvas.height / 2;
    cam.scale = 0.5;
    render();
}

function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}

function undo() {
    if (history.past.length === 0) return notify("Nada que deshacer", true);
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.future.push(current);
    const prev = history.past.pop();
    db.equipos = prev.equipos || [];
    db.lines = prev.lines || [];
    selectedElement = null;
    render();
    notify("Acción deshecha");
}

function redo() {
    if (history.future.length === 0) return notify("Nada que rehacer", true);
    const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(current);
    const next = history.future.pop();
    db.equipos = next.equipos || [];
    db.lines = next.lines || [];
    selectedElement = null;
    render();
    notify("Acción rehecha");
}

function generarTagAutomatico(tipo) {
    const prefijos = { 'tanque': 'TK', 'bomba': 'B' };
    const prefijo = prefijos[tipo] || 'EQ';
    let numero = 1;
    while (db.equipos.some(eq => eq.tag === `${prefijo}-${String(numero).padStart(2,'0')}`)) numero++;
    return `${prefijo}-${String(numero).padStart(2,'0')}`;
}

function generarTagLinea() {
    let numero = 1;
    while (db.lines.some(l => l.tag === `L-${String(numero).padStart(3,'0')}`)) numero++;
    return `L-${String(numero).padStart(3,'0')}`;
}

function calcularLongitud(line) {
    if (!line.points3D || line.points3D.length < 2) return 0;
    let total = 0;
    for (let i = 1; i < line.points3D.length; i++) {
        const p1 = line.points3D[i-1];
        const p2 = line.points3D[i];
        total += Math.hypot(p2.x - p1.x, p2.y - p1.y, p2.z - p1.z);
    }
    return total;
}

// ==================== MOTOR DE RENDER ====================
function project(p) {
    const cos30 = 0.866, sin30 = 0.5;
    const x = (p.x - p.z) * cos30;
    const y = (p.x + p.z) * sin30 - (p.y || 0);
    return { x: x * cam.scale + cam.panX, y: y * cam.scale + cam.panY };
}

function drawGrid() {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = -10000; i <= 10000; i += 1000) {
        const p1 = project({ x: i, y: 0, z: -10000 });
        const p2 = project({ x: i, y: 0, z: 10000 });
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
        
        const p3 = project({ x: -10000, y: 0, z: i });
        const p4 = project({ x: 10000, y: 0, z: i });
        ctx.beginPath();
        ctx.moveTo(p3.x, p3.y);
        ctx.lineTo(p4.x, p4.y);
        ctx.stroke();
    }
    ctx.restore();
}

function drawTank(eq) {
    const p = project(eq);
    const r = (eq.diametro / 2) * cam.scale;
    const h = eq.altura * cam.scale;
    
    let color = '#3b82f6';
    if (eq.material === 'Acero Inoxidable') color = '#94a3b8';
    if (eq.material === 'Acero al Carbono') color = '#475569';
    if (eq.material === 'PPR') color = '#22c55e';
    
    ctx.fillStyle = color;
    ctx.fillRect(p.x - r, p.y - h, r * 2, h);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y - h, r, r * 0.5, 0, 0, 2 * Math.PI);
    ctx.fill();
    
    if (selectedElement && selectedElement.obj === eq) {
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(p.x - r - 5, p.y - h - 5, r * 2 + 10, h + 10);
    }
    
    ctx.fillStyle = 'white';
    ctx.font = `bold ${12 * cam.scale}px 'Segoe UI'`;
    ctx.textAlign = 'center';
    ctx.fillText(eq.tag, p.x, p.y - h - 10);
    
    if (eq.tipo === 'bomba') {
        ctx.fillStyle = '#ffaa00';
        ctx.font = `10px 'Segoe UI'`;
        ctx.fillText(`${eq.potencia} HP`, p.x, p.y - h - 25);
    }
}

function drawPipe(line) {
    if (!line.points3D || line.points3D.length < 2) return;
    ctx.beginPath();
    const start = project(line.points3D[0]);
    ctx.moveTo(start.x, start.y);
    for (let i = 1; i < line.points3D.length; i++) {
        const p = project(line.points3D[i]);
        ctx.lineTo(p.x, p.y);
    }
    
    let color = '#94a3b8';
    if (line.material === 'PPR') color = '#22c55e';
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(3, (line.diameter || 4) * 1.5);
    ctx.stroke();
    
    if (selectedElement && selectedElement.obj === line) {
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = Math.max(3, (line.diameter || 4) * 1.5) + 2;
        ctx.stroke();
    }
    
    if (line.components) {
        line.components.forEach(comp => {
            if (comp.type === 'VALVE' && line.points3D) {
                const idx = Math.floor(comp.param * (line.points3D.length - 1));
                if (idx < line.points3D.length) {
                    const pos = project(line.points3D[idx]);
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.rect(pos.x - 8, pos.y - 4, 16, 8);
                    ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = '8px monospace';
                    ctx.fillText(comp.skey || 'VLV', pos.x - 6, pos.y - 6);
                }
            }
        });
    }
}

function render() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    for (let line of db.lines) drawPipe(line);
    for (let eq of db.equipos) drawTank(eq);
    if (currentCursor) {
        document.getElementById('coords').innerHTML = `X: ${currentCursor.x.toFixed(0)} | Z: ${currentCursor.z.toFixed(0)}`;
    }
}

// ==================== CONSTANTES DE UNIDADES ====================
const PULGADA_A_MM = 25.4;
const MM_A_PULGADA = 1 / 25.4;

function pulgadasToMM(pulgadas) {
    return pulgadas * PULGADA_A_MM;
}

// ==================== CREACIÓN DE ELEMENTOS ====================
function crearTanque(diametro, altura, material) {
    saveState();
    const tag = generarTagAutomatico('tanque');
    let x = 0, z = 0;
    if (db.equipos.length > 0) {
        const ultimo = db.equipos[db.equipos.length - 1];
        x = ultimo.x + 4000;
    }
    db.equipos.push({ 
        type: 'equipment', 
        tag, x, y: 0, z, 
        tipo: 'tanque_v', 
        diametro: parseFloat(diametro), 
        altura: parseFloat(altura), 
        material 
    });
    notify(`Tanque ${tag} creado. Diámetro ${diametro} mm, altura ${altura} mm, material ${material}`);
    render();
    autoCenter();
}

function crearBomba(potencia) {
    saveState();
    const tag = generarTagAutomatico('bomba');
    let x = 2000, z = 2000;
    if (db.equipos.length > 0) {
        const ultimo = db.equipos[db.equipos.length - 1];
        x = ultimo.x + 3000;
        z = ultimo.z;
    }
    db.equipos.push({ 
        type: 'equipment', 
        tag, x, y: 0, z, 
        tipo: 'bomba', 
        diametro: 500,
        altura: 800,
        potencia: parseFloat(potencia), 
        material: 'Hierro Fundido' 
    });
    notify(`Bomba ${tag} de ${potencia} HP creada`);
    render();
}

function addPipe(tag, diam, material, points) {
    const newLine = { 
        tag: tag || generarTagLinea(), 
        diameter: diam, 
        material, 
        points3D: points, 
        components: [] 
    };
    db.lines.push(newLine);
    saveState();
    render();
    return newLine;
}

function conectarEquipos(diamPulgadas, mat, tag1, tag2) {
    const eq1 = db.equipos.find(e => e.tag === tag1);
    const eq2 = db.equipos.find(e => e.tag === tag2);
    if (!eq1 || !eq2) return notify(`No se encontró ${tag1} o ${tag2}`, true);
    
    const diamMM = pulgadasToMM(diamPulgadas);
    const distanciaConexion = 1000; // 1 metro en mm
    const alturaTuberia = 500;       // 0.5 metros en mm
    
    const p1 = { x: eq1.x + distanciaConexion, y: alturaTuberia, z: eq1.z };
    const p2 = { x: eq2.x - distanciaConexion, y: alturaTuberia, z: eq2.z };
    const puntos = [p1, p2];
    
    const line = addPipe(null, diamPulgadas, mat, puntos);
    notify(`Conexión creada entre ${tag1} y ${tag2}. Tubería de ${diamPulgadas}" (${diamMM.toFixed(0)} mm), material ${mat}, longitud ${(calcularLongitud(line)/1000).toFixed(1)} metros`);
}

function agregarValvula(tagLinea, tipo) {
    const line = db.lines.find(l => l.tag === tagLinea);
    if (!line) return notify(`Tubería ${tagLinea} no encontrada`, true);
    if (!line.components) line.components = [];
    const skey = tipo === 'bola' ? 'VBAL' : (tipo === 'check' ? 'VCHK' : 'VGATE');
    line.components.push({ 
        type: 'VALVE', 
        tag: `VLV-${line.components.length+1}`, 
        skey: skey, 
        param: 0.5,
        descripcion: `Válvula de ${tipo}`
    });
    notify(`Válvula de ${tipo} agregada en tubería ${tagLinea}`);
    render();
}

function generarResumen() {
    let msg = `Proyecto: ${proyectoData.nombre}. Ingeniero: ${proyectoData.autor}. `;
    msg += `Total equipos: ${db.equipos.length}. `;
    db.equipos.forEach(e => {
        if (e.tipo === 'tanque_v') msg += `${e.tag} de ${e.diametro}mm diámetro y ${e.altura}mm altura. `;
        if (e.tipo === 'bomba') msg += `${e.tag} de ${e.potencia} HP. `;
    });
    msg += `Total tuberías: ${db.lines.length}. `;
    let totalValvulas = db.lines.reduce((acc, l) => acc + (l.components?.length || 0), 0);
    msg += `Componentes instalados: ${totalValvulas}.`;
    notify(msg);
}

function aplicarNormas() {
    let cambios = 0;
    let soportes = 0;
    for (let line of db.lines) {
        const diamMM = (line.diameter || 4) * 25.4;
        if (diamMM >= 110) {
            const long = calcularLongitud(line) || 0;
            const necesarios = Math.max(1, Math.floor(long / 1500));
            const actuales = line.components?.filter(c => c.type === 'SOPORTE').length || 0;
            for (let i = actuales; i < necesarios; i++) {
                if (!line.components) line.components = [];
                line.components.push({ type: 'SOPORTE', tag: `SUP-${line.tag}-${i+1}`, param: (i+1)/(necesarios+1) });
                soportes++;
                cambios++;
            }
        }
    }
    if (cambios > 0) notify(`Normas aplicadas: ${soportes} soportes agregados a tuberías de ≥4"`);
    else notify("El diseño cumple normas Acquablue");
    render();
}

// ==================== PARSER DE COMANDOS ====================
function parseCommand(input) {
    const cmd = input.toLowerCase().trim();
    saveState();
    
    if (cmd.includes('tanque')) {
        const diam = parseInt(cmd.match(/(\d+)\s*mm\s*diametro/)?.[1]) || 2000;
        const alt = parseInt(cmd.match(/(\d+)\s*mm\s*altura/)?.[1]) || 2500;
        let mat = "Acero al Carbono";
        if (cmd.includes('inox')) mat = "Acero Inoxidable";
        if (cmd.includes('ppr')) mat = "PPR";
        crearTanque(diam, alt, mat);
    }
    else if (cmd.includes('bomba')) {
        const pot = parseInt(cmd.match(/(\d+)\s*hp/)?.[1]) || 5;
        crearBomba(pot);
    }
    else if (cmd.includes('conectar')) {
        const diam = parseInt(cmd.match(/(\d+)\s*pulgadas/)?.[1]) || 4;
        let mat = cmd.includes('ppr') ? "PPR" : "CS";
        const tags = cmd.match(/[A-Z]{2,3}-\d{2}/g);
        if (tags && tags.length >= 2) conectarEquipos(diam, mat, tags[0], tags[1]);
        else notify("Formato: conectar 4 pulgadas desde TK-01 hasta B-01", true);
    }
    else if (cmd.includes('valvula') || cmd.includes('válvula')) {
        const tagLinea = cmd.match(/[L]-\d{3}/i)?.[0]?.toUpperCase();
        let tipo = 'bola';
        if (cmd.includes('compuerta')) tipo = 'compuerta';
        if (cmd.includes('check')) tipo = 'check';
        if (tagLinea) agregarValvula(tagLinea, tipo);
        else notify("Especifique tubería L-XXX", true);
    }
    else if (cmd.includes('resumen')) {
        generarResumen();
    }
    else if (cmd.includes('normas')) {
        aplicarNormas();
    }
    else if (cmd.includes('eliminar') || cmd.includes('borrar')) {
        const tag = cmd.match(/[A-Z]{2,3}-\d{2}/i)?.[0]?.toUpperCase();
        if (tag) {
            const beforeEq = db.equipos.length;
            const beforeLn = db.lines.length;
            db.equipos = db.equipos.filter(e => e.tag !== tag);
            db.lines = db.lines.filter(l => l.tag !== tag);
            if (beforeEq !== db.equipos.length) notify(`Equipo ${tag} eliminado`);
            else if (beforeLn !== db.lines.length) notify(`Tubería ${tag} eliminada`);
            else notify(`No se encontró ${tag}`, true);
            render();
        }
    }
    else {
        notify("Comando no reconocido. Use: crear tanque, crear bomba, conectar, resumen, normas", true);
    }
}

// ==================== FUNCIONES ADICIONALES PARA UI ====================
function eliminarSeleccionado() {
    if (!selectedElement) return;
    saveState();
    if (selectedElement.type === 'equipment') {
        db.equipos = db.equipos.filter(e => e !== selectedElement.obj);
        notify(`Equipo ${selectedElement.obj.tag} eliminado`);
    } else if (selectedElement.type === 'line') {
        db.lines = db.lines.filter(l => l !== selectedElement.obj);
        notify(`Tubería ${selectedElement.obj.tag} eliminada`);
    }
    selectedElement = null;
    document.getElementById('property-panel').style.display = 'none';
    render();
}

function setTool(tool) {
    currentTool = tool;
    notify(`Herramienta: ${tool}`);
}

function toggleMeasureMode() {
    measuringMode = !measuringMode;
    notify(measuringMode ? "Modo medición activado - Haga clic en dos puntos" : "Modo medición desactivado");
}

function toggleSnap() {
    snapEnabled = !snapEnabled;
    const btn = document.getElementById('btnSnap');
    btn.textContent = snapEnabled ? "🧲 Snap ON" : "🧲 Snap OFF";
    notify(`Ajuste a rejilla ${snapEnabled ? 'activado' : 'desactivado'}`);
}

function obtenerPuntoEquipo(tag, punto) {
    const e = db.equipos.find(eq => eq.tag === tag);
    return e ? { x: e.x, y: 500, z: e.z } : null;
}

// ==================== UTILIDAD PARA SELECCIÓN PRECISA (RAYCASTING ISOMÉTRICO) ====================
function puntoDentroDeElipse(x, y, cx, cy, rx, ry) {
    const dx = (x - cx) / rx;
    const dy = (y - cy) / ry;
    return (dx * dx + dy * dy) <= 1;
}

// ==================== EVENTOS DEL CANVAS ====================
function initCanvasEvents() {
    canvas.addEventListener('mousedown', (e) => {
        dragging = true;
        lastPos = { x: e.clientX, y: e.clientY };
        
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        for (let eq of db.equipos) {
            const p = project(eq);
            const r = (eq.diametro / 2) * cam.scale;
            const h = eq.altura * cam.scale;
            
            const dentroCuerpo = (mx > p.x - r && mx < p.x + r && my > p.y - h && my < p.y);
            const dentroTapaSup = puntoDentroDeElipse(mx, my, p.x, p.y - h, r, r * 0.5);
            const dentroTapaInf = puntoDentroDeElipse(mx, my, p.x, p.y, r, r * 0.5);
            
            if (dentroCuerpo || dentroTapaSup || dentroTapaInf) {
                selectedElement = { type: 'equipment', obj: eq };
                if (editMode) {
                    document.getElementById('property-panel').style.display = 'block';
                    document.getElementById('prop-tag').innerHTML = `Equipo: ${eq.tag}`;
                    document.getElementById('prop-diam-slider').value = eq.diametro;
                    document.getElementById('prop-diam-num').value = eq.diametro;
                    document.getElementById('prop-alt-slider').value = eq.altura;
                    document.getElementById('prop-alt-num').value = eq.altura;
                    let matVal = 'CS';
                    if (eq.material === 'Acero Inoxidable') matVal = 'SS';
                    if (eq.material === 'PPR') matVal = 'PPR';
                    document.getElementById('prop-mat').value = matVal;
                    
                    const updateProp = () => {
                        eq.diametro = parseFloat(document.getElementById('prop-diam-num').value);
                        eq.altura = parseFloat(document.getElementById('prop-alt-num').value);
                        const matSelect = document.getElementById('prop-mat');
                        const matText = matSelect.options[matSelect.selectedIndex].text;
                        eq.material = matText;
                        render();
                        saveState();
                    };
                    document.getElementById('prop-diam-slider').oninput = (e) => {
                        document.getElementById('prop-diam-num').value = e.target.value;
                        updateProp();
                    };
                    document.getElementById('prop-diam-num').onchange = updateProp;
                    document.getElementById('prop-alt-slider').oninput = (e) => {
                        document.getElementById('prop-alt-num').value = e.target.value;
                        updateProp();
                    };
                    document.getElementById('prop-alt-num').onchange = updateProp;
                    document.getElementById('prop-mat').onchange = updateProp;
                }
                render();
                return;
            }
        }
        if (!editMode) selectedElement = null;
        render();
    });
    
    window.addEventListener('mousemove', (e) => {
        if (!dragging) {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const cos30 = 0.866, sin30 = 0.5;
            const x = (mx - cam.panX) / cam.scale;
            const y = (my - cam.panY) / cam.scale;
            const z = (x / cos30 - y / sin30) / 2;
            const xw = (x / cos30 + y / sin30) / 2;
            currentCursor = { x: xw, y: 0, z: z };
            render();
            return;
        }
        
        if (selectedElement && editMode && selectedElement.type === 'equipment') {
            const dx = (e.clientX - lastPos.x) / cam.scale;
            const dy = (e.clientY - lastPos.y) / cam.scale;
            selectedElement.obj.x += dx;
            selectedElement.obj.z += dy;
            if (snapEnabled) {
                selectedElement.obj.x = Math.round(selectedElement.obj.x / 500) * 500;
                selectedElement.obj.z = Math.round(selectedElement.obj.z / 500) * 500;
            }
            render();
        } else if (!selectedElement || !editMode) {
            cam.panX += e.clientX - lastPos.x;
            cam.panY += e.clientY - lastPos.y;
            render();
        }
        lastPos = { x: e.clientX, y: e.clientY };
    });
    
    window.addEventListener('mouseup', () => {
        if (dragging && selectedElement) saveState();
        dragging = false;
    });
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        cam.scale = Math.min(Math.max(cam.scale * (e.deltaY > 0 ? 0.9 : 1.1), 0.2), 1.5);
        render();
    }, { passive: false });
}

// ==================== FUNCIÓN PARA EJEMPLOS INICIALES (SIN LLENAR HISTORIAL) ====================
function crearEjemplosIniciales() {
    const originalSaveState = saveState;
    saveState = () => {};
    
    crearTanque(2500, 3000, "Acero Inoxidable");
    crearBomba(7.5);
    conectarEquipos(4, "CS", "TK-01", "B-01");
    
    saveState = originalSaveState;
    history.past = [];
    history.future = [];
}

// ==================== INICIALIZACIÓN PRINCIPAL ====================
function init() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    initCanvasEvents();
    
    document.getElementById('btnNew').onclick = () => { 
        db = { equipos: [], lines: [], puntosLibres: [] }; 
        selectedElement = null;
        render(); 
        notify("Nuevo proyecto creado"); 
    };
    document.getElementById('btnOpen').onclick = () => { 
        const data = localStorage.getItem('acquablue_save'); 
        if(data){ 
            db = JSON.parse(data); 
            render(); 
            notify("Proyecto cargado exitosamente"); 
        } else {
            notify("No hay proyecto guardado", true);
        }
    };
    document.getElementById('btnSave').onclick = () => { 
        localStorage.setItem('acquablue_save', JSON.stringify(db)); 
        notify(`Proyecto "${proyectoData.nombre}" guardado`); 
    };
    document.getElementById('btnReset').onclick = autoCenter;
    document.getElementById('btnUndo').onclick = undo;
    document.getElementById('btnRedo').onclick = redo;
    document.getElementById('btnMTO').onclick = () => notify("Reporte MTO generado - Versión completa en desarrollo");
    document.getElementById('btnPDF').onclick = () => notify("Documento PDF generado");
    document.getElementById('btnApplyNorm').onclick = aplicarNormas;
    document.getElementById('btnVoice').onclick = () => { 
        voiceEnabled = !voiceEnabled; 
        notify(voiceEnabled ? "Voz activada" : "Voz desactivada"); 
    };
    document.getElementById('btnEditProyecto').onclick = editarProyecto;
    
    document.getElementById('btnCommand').onclick = () => {
        document.getElementById('commandPanel').style.display = 'block';
        document.getElementById('commandText').focus();
        speakText("Panel de comandos abierto. Puede escribir o dictar comandos.");
    };
    document.getElementById('closeCommand').onclick = () => {
        document.getElementById('commandPanel').style.display = 'none';
        speakText("Panel de comandos cerrado");
    };
    document.getElementById('runCommands').onclick = () => {
        const text = document.getElementById('commandText').value;
        if (text.trim()) {
            const lines = text.split('\n');
            lines.forEach(line => { if(line.trim()) parseCommand(line.trim()); });
            document.getElementById('commandText').value = '';
            speakText(`${lines.length} comandos ejecutados. El panel permanece abierto.`);
        } else {
            speakText("No hay comandos para ejecutar");
        }
    };
    document.getElementById('clearCommand').onclick = () => {
        document.getElementById('commandText').value = '';
        speakText("Texto limpiado");
    };
    
    document.getElementById('guardarProyectoBtn').onclick = guardarProyecto;
    
    document.getElementById('btnManual').onclick = () => {
        editMode = !editMode;
        const bar = document.getElementById('edit-toolbar');
        bar.style.display = editMode ? 'flex' : 'none';
        if (!editMode) document.getElementById('property-panel').style.display = 'none';
        notify(editMode ? "Modo manual activado - Puede mover equipos" : "Modo manual desactivado");
    };
    
    crearEjemplosIniciales();
    
    autoCenter();
    render();
    mostrarModalProyecto(true);
}

// ==================== CIERRE DE LA APLICACIÓN ====================
window.onload = init;
window.onresize = () => { 
    canvas.width = canvas.parentElement.clientWidth; 
    canvas.height = canvas.parentElement.clientHeight; 
    autoCenter(); 
    render(); 
};
