// ==================== FUNCIONES AUXILIARES ====================
function notify(msg, isErr = false) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.backgroundColor = isErr ? '#da3633' : '#238636';
    n.style.display = 'block';
    document.getElementById('statusMsg').innerHTML = msg;
    if (voiceEnabled && window.speechSynthesis) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = 'es-ES';
        setTimeout(() => window.speechSynthesis.speak(u), 50);
    }
    setTimeout(() => n.style.display = 'none', 4000);
}

function saveState() {
    const state = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines }));
    history.past.push(state);
    if (history.past.length > history.maxSize) history.past.shift();
    history.future = [];
}
function undo() { if (history.past.length===0) return; const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines })); history.future.push(current); const prev = history.past.pop(); db.equipos = prev.equipos; db.lines = prev.lines; selectedElement = null; render(); notify("↩️ Deshecho"); }
function redo() { if (history.future.length===0) return; const current = JSON.parse(JSON.stringify({ equipos: db.equipos, lines: db.lines })); history.past.push(current); const next = history.future.pop(); db.equipos = next.equipos; db.lines = next.lines; selectedElement = null; render(); notify("↪️ Rehecho"); }

// Proyección isométrica
function project(p) { const c30=0.866, s30=0.5; return { x:(p.x-p.z)*c30*cam.scale+cam.panX, y:(p.x+p.z)*s30*cam.scale-p.y*cam.scale+cam.panY }; }
function inverseProject(screenX, screenY) { const X=(screenX-cam.panX)/cam.scale, Y=(screenY-cam.panY)/cam.scale; const A=X/0.866, B=Y/0.5; return { x:(A+B)/2, y:0, z:(B-A)/2 }; }

// Crear equipo con puertos automáticos
function crearEquipo(tipo, tag, x, y, z, params = {}) {
    const template = EquiposCatalogo[tipo];
    if (!template) { notify(`Tipo de equipo desconocido: ${tipo}`, true); return null; }
    let diam = params.diametro || (tipo.includes('tanque') ? 2400 : 1000);
    let alt = params.altura || (tipo.includes('tanque') ? 2500 : 1500);
    let largo = params.largo || diam;
    let material = params.material || 'CS';
    let potencia = params.potencia || 5;
    let equipoBase = { tag, tipo, x, y, z, diametro: diam, altura: alt, largo, material, potencia };
    // Generar puertos según la función del template
    let puertos = template.puertos(equipoBase);
    if (tipo === 'colector') puertos = params.puertos || [];
    const equipo = { ...equipoBase, puertos };
    db.equipos.push(equipo);
    notify(`Equipo ${tag} (${template.nombre}) creado`);
    saveState();
    render();
    autoCenter();
    return equipo;
}

function crearColector(tag, x, y, z, numEntradas, spacing, outputPos, diametro, material) {
    const puertos = [];
    for (let i = 0; i < numEntradas; i++) puertos.push({ id: `IN${i+1}`, label: `Entrada ${i+1}`, relX: i*spacing, relY:0, relZ:0, diametro, tipoConexion:'Flange', orientacion:{dx:0,dy:-1,dz:0}, material });
    let salidaRelX = outputPos==='left'?0:(outputPos==='right'?(numEntradas-1)*spacing:(numEntradas-1)*spacing/2);
    puertos.push({ id:'OUT', label:'Salida', relX:salidaRelX, relY:0, relZ:0, diametro, tipoConexion:'Flange', orientacion:{dx:1,dy:0,dz:0}, material });
    const colector = { tag, tipo:'colector', x, y, z, diametro, altura:0, largo: (numEntradas-1)*spacing, material, puertos };
    db.equipos.push(colector);
    notify(`Colector ${tag} creado con ${numEntradas} entradas y salida ${outputPos}`);
    render();
    autoCenter();
}

function obtenerPosicionPuerto(equipTag, nozzleId) {
    const eq = db.equipos.find(e => e.tag === equipTag);
    if (!eq) return null;
    const nz = eq.puertos?.find(n => n.id === nozzleId);
    if (!nz) return null;
    return { x: eq.x + nz.relX, y: eq.y + nz.relY, z: eq.z + nz.relZ };
}
function obtenerDireccionSalida(nozzle) { if(nozzle?.orientacion){ const {dx,dy,dz}=nozzle.orientacion; const len=Math.hypot(dx,dy,dz); if(len>0) return {dx:dx/len,dy:dy/len,dz:dz/len}; } return {dx:1,dy:0,dz:0}; }

function calcularRutaOrtogonalConRespeto(p1,p2,nozzleStart,nozzleEnd,offset=300){
    let puntos=[p1];
    if(nozzleStart){ const dir=obtenerDireccionSalida(nozzleStart); puntos.push({x:p1.x+dir.dx*offset, y:p1.y+dir.dy*offset, z:p1.z+dir.dz*offset}); }
    let cur=puntos[puntos.length-1];
    if(cur.x!==p2.x) puntos.push({x:p2.x, y:cur.y, z:cur.z});
    cur=puntos[puntos.length-1];
    if(cur.z!==p2.z) puntos.push({x:cur.x, y:cur.y, z:p2.z});
    cur=puntos[puntos.length-1];
    if(cur.y!==p2.y) puntos.push({x:cur.x, y:p2.y, z:cur.z});
    if(nozzleEnd){ const dirEnd=obtenerDireccionSalida(nozzleEnd); const llegada={x:p2.x-dirEnd.dx*offset, y:p2.y-dirEnd.dy*offset, z:p2.z-dirEnd.dz*offset}; puntos.splice(puntos.length-1,0,llegada); }
    const clean=[]; for(let i=0;i<puntos.length;i++) if(i===0||puntos[i].x!==puntos[i-1].x||puntos[i].y!==puntos[i-1].y||puntos[i].z!==puntos[i-1].z) clean.push(puntos[i]);
    return clean;
}
function actualizarTuberiasConectadas(equipTag){
    db.lines.forEach(line=>{
        if(line.anchors && (line.anchors.start.equipTag===equipTag || line.anchors.end.equipTag===equipTag)){
            const p1=obtenerPosicionPuerto(line.anchors.start.equipTag,line.anchors.start.nozzleId);

// ==================== DIBUJO DE EQUIPOS (varios tipos) ====================
function drawTankV(eq){
    const p=project(eq); const w=(eq.diametro/2)*cam.scale; const h=eq.altura*cam.scale; const topY=p.y-h/2; const bottomY=p.y+h/2;
    ctx.fillStyle='#1e40af'; ctx.fillRect(p.x-w, topY, w, h);
    ctx.fillStyle='#3b82f6'; ctx.fillRect(p.x, topY, w, h);
    ctx.beginPath(); ctx.ellipse(p.x, topY, w, w*0.5,0,0,2*Math.PI); ctx.fillStyle='#60a5fa'; ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(p.x, bottomY, w, w*0.5,0,0,2*Math.PI); ctx.fillStyle='#2563eb'; ctx.fill(); ctx.stroke();
    ctx.fillStyle='white'; ctx.font=`bold ${12*cam.scale}px Arial`; ctx.fillText(eq.tag, p.x-18, topY-10);
    eq.puertos?.forEach(nz=>{ const pos={x:eq.x+nz.relX,y:eq.y+nz.relY,z:eq.z+nz.relZ}; const proj=project(pos); ctx.beginPath(); ctx.arc(proj.x,proj.y,5,0,2*Math.PI); ctx.fillStyle='#ff8800'; ctx.fill(); ctx.fillStyle='white'; ctx.font='8px monospace'; ctx.fillText(nz.id,proj.x-4,proj.y-4); });
}
function drawTankH(eq){
    const p=project(eq); const w=(eq.diametro/2)*cam.scale; const h=eq.altura*cam.scale; const l=eq.largo*cam.scale;
    ctx.fillStyle='#3b82f6'; ctx.fillRect(p.x-l/2, p.y-h/2, l, h);
    ctx.beginPath(); ctx.ellipse(p.x-l/2, p.y, w, w*0.5,0,0,2*Math.PI); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(p.x+l/2, p.y, w, w*0.5,0,0,2*Math.PI); ctx.fill(); ctx.stroke();
    ctx.fillStyle='white'; ctx.fillText(eq.tag, p.x-15, p.y-10);
    eq.puertos?.forEach(nz=>{ const pos={x:eq.x+nz.relX,y:eq.y+nz.relY,z:eq.z+nz.relZ}; const proj=project(pos); ctx.beginPath(); ctx.arc(proj.x,proj.y,5,0,2*Math.PI); ctx.fillStyle='#ff8800'; ctx.fill(); ctx.fillStyle='white'; ctx.fillText(nz.id,proj.x-4,proj.y-4); });
}
function drawBomba(eq){
    const p=project(eq); const rad=12*cam.scale; const grad=ctx.createRadialGradient(p.x-3,p.y-3,2,p.x,p.y,rad); grad.addColorStop(0,'#f39c12'); grad.addColorStop(1,'#b85c00');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,2*Math.PI); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x-rad,p.y); ctx.lineTo(p.x+rad,p.y); ctx.stroke();
    ctx.fillStyle='white'; ctx.fillText(eq.tag, p.x+15, p.y-5);
    eq.puertos?.forEach(nz=>{ const pos={x:eq.x+nz.relX,y:eq.y+nz.relY,z:eq.z+nz.relZ}; const proj=project(pos); ctx.beginPath(); ctx.arc(proj.x,proj.y,5,0,2*Math.PI); ctx.fillStyle='#ff8800'; ctx.fill(); ctx.fillText(nz.id,proj.x-4,proj.y-4); });
}
function drawRectEquip(eq, color){
    const p=project(eq); const w=eq.largo*cam.scale/2; const h=eq.altura*cam.scale/2;
    ctx.fillStyle=color; ctx.fillRect(p.x-w, p.y-h, w*2, h*2); ctx.strokeStyle='white'; ctx.strokeRect(p.x-w, p.y-h, w*2, h*2);
    ctx.fillStyle='white'; ctx.fillText(eq.tag, p.x-15, p.y-10);
    eq.puertos?.forEach(nz=>{ const pos={x:eq.x+nz.relX,y:eq.y+nz.relY,z:eq.z+nz.relZ}; const proj=project(pos); ctx.beginPath(); ctx.arc(proj.x,proj.y,5,0,2*Math.PI); ctx.fillStyle='#ff8800'; ctx.fill(); ctx.fillText(nz.id,proj.x-4,proj.y-4); });
}
function drawColector(eq){
    const p=project(eq); const anchoTotal=eq.largo; const pIzq=project({x:eq.x, y:eq.y, z:eq.z}); const pDer=project({x:eq.x+anchoTotal, y:eq.y, z:eq.z});
    ctx.beginPath(); ctx.moveTo(pIzq.x,pIzq.y); ctx.lineTo(pDer.x,pDer.y); ctx.strokeStyle='#facc15'; ctx.lineWidth=Math.max(4,(eq.diametro||4)*cam.scale); ctx.stroke();
    eq.puertos?.forEach(nz=>{ const pos={x:eq.x+nz.relX,y:eq.y+nz.relY,z:eq.z+nz.relZ}; const proj=project(pos); ctx.beginPath(); ctx.arc(proj.x,proj.y,6,0,2*Math.PI); ctx.fillStyle='#ff8800'; ctx.fill(); ctx.fillStyle='white'; ctx.fillText(nz.id,proj.x-4,proj.y-4); });
    ctx.fillStyle='white'; ctx.fillText(eq.tag, pIzq.x-15, pIzq.y-10);

// Función principal de renderizado
function render() {
    if (!ctx) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save();
    // Grilla simple
    for(let i=-8000;i<=20000;i+=1000){ const p1=project({x:i,y:0,z:-8000}); const p2=project({x:i,y:0,z:15000}); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.strokeStyle='#2a4a6a'; ctx.stroke(); }
    for(let i=-8000;i<=15000;i+=1000){ const p1=project({x:-8000,y:0,z:i}); const p2=project({x:20000,y:0,z:i}); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke(); }
    const o=project({x:0,y:0,z:0}); ctx.fillStyle='#ff8888'; ctx.fillText('ORIGEN',o.x+10,o.y-5);
    // Tuberías
    for(let line of db.lines) drawPipeWithElbows(line);
    // Equipos según tipo
    for(let eq of db.equipos){
        if(eq.tipo==='tanque_v') drawTankV(eq);
        else if(eq.tipo==='tanque_h') drawTankH(eq);
        else if(eq.tipo==='bomba') drawBomba(eq);
        else if(eq.tipo==='colector') drawColector(eq);
        else if(['intercambiador','torre','reactor','caldera','compresor','separador','clarificador','filtro_arena','osmosis','tanque_acero','pasteurizador','homogeneizador'].includes(eq.tipo)) drawRectEquip(eq, '#3b82f6');
        else drawRectEquip(eq, '#6c757d');
    }
    // Resaltar selección
    if(selectedElement){
        if(selectedElement.type==='equipment'){
            const eq=selectedElement.obj;
            const p=project(eq);
            if(eq.tipo==='colector'){ const ancho=eq.largo; const pIzq=project({x:eq.x,y:eq.y,z:eq.z}); const pDer=project({x:eq.x+ancho,y:eq.y,z:eq.z}); ctx.beginPath(); ctx.moveTo(pIzq.x,pIzq.y); ctx.lineTo(pDer.x,pDer.y); ctx.strokeStyle='#facc15'; ctx.lineWidth=6; ctx.stroke(); }
            else{ const w=(eq.diametro/2)*cam.scale; const h=eq.altura*cam.scale; ctx.beginPath(); ctx.ellipse(p.x, p.y-h/2, w+3, (w+3)*0.5,0,0,2*Math.PI); ctx.strokeStyle='#facc15'; ctx.lineWidth=3; ctx.stroke(); }
        } else if(selectedElement.type==='line'){
            const line=selectedElement.obj; const pts=line._cachedPoints||line.points3D;
            if(pts && pts.length){ ctx.beginPath(); const proj=pts.map(p=>project(p)); ctx.moveTo(proj[0].x,proj[0].y); for(let i=1;i<proj.length;i++) ctx.lineTo(proj[i].x,proj[i].y); ctx.strokeStyle='#facc15'; ctx.lineWidth=6; ctx.stroke(); }
        }
    }
    ctx.restore();
}
function getPointAtDistance(from,to,dist){ const d=Math.hypot(to.x-from.x,to.y-from.y,to.z-from.z); const t=Math.min(dist/d,0.5); return {x:from.x+(to.x-from.x)*t, y:from.y+(to.y-from.y)*t, z:from.z+(to.z-from.z)*t}; }
function drawPipeWithElbows(line){
    const pts=line._cachedPoints||line.points3D; if(!pts||pts.length<2) return;
    const diamMM=(line.diameter||4)*25.4; const radio=Math.min(diamMM*1.5,500);
    ctx.beginPath(); let first=project(pts[0]); ctx.moveTo(first.x,first.y);
    for(let i=1;i<pts.length-1;i++){
        const pPrev=pts[i-1], pCurr=pts[i], pNext=pts[i+1];
        const pIn=getPointAtDistance(pCurr,pPrev,radio), pOut=getPointAtDistance(pCurr,pNext,radio);
        const projIn=project(pIn), projOut=project(pOut), projCurr=project(pCurr);
        ctx.lineTo(projIn.x,projIn.y); ctx.quadraticCurveTo(projCurr.x,projCurr.y,projOut.x,projOut.y);
    }
    const last=project(pts[pts.length-1]); ctx.lineTo(last.x,last.y);
    ctx.strokeStyle='#facc15'; ctx.lineWidth=Math.max(4,(line.diameter||4)*cam.scale); ctx.stroke();
}

function parseCreate(cmd){
    const parts=cmd.split(/\s+/); if(parts[0]!=='create') return false;
    const tipo=parts[1].toLowerCase();
    const tag=parts[2];
    if(parts[3]!=='at') return false;
    const coords=parts[4].match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
    if(!coords) return false;
    const x=parseFloat(coords[1]), y=parseFloat(coords[2]), z=parseFloat(coords[3]);
    let params={};
    for(let i=5;i<parts.length;i++){
        if(parts[i]==='diam') params.diametro=parseFloat(parts[++i])*1000;
        else if(parts[i]==='height') params.altura=parseFloat(parts[++i])*1000;
        else if(parts[i]==='largo') params.largo=parseFloat(parts[++i])*1000;
        else if(parts[i]==='material') params.material=parts[++i].toUpperCase();
        else if(parts[i]==='power') params.potencia=parseFloat(parts[++i]);
    }
    if(EquiposCatalogo[tipo]) crearEquipo(tipo,tag,x,y,z,params);
    else notify(`Tipo de equipo desconocido: ${tipo}`, true);
    return true;
}
function parseConnect(cmd){
    const parts=cmd.split(/\s+/); if(parts[0]!=='connect') return false;
    const fromEquip=parts[1], fromNozzle=parts[2];
    if(parts[3]!=='to') return false;
    const toEquip=parts[4], toNozzle=parts[5];
    let diameter=4, material='PPR';
    for(let i=6;i<parts.length;i++){
        if(parts[i]==='diameter') diameter=parseFloat(parts[++i]);
        else if(parts[i]==='material') material=parts[++i].toUpperCase();
    }
    const eqFrom=db.equipos.find(e=>e.tag===fromEquip), eqTo=db.equipos.find(e=>e.tag===toEquip);
    if(!eqFrom||!eqTo){ notify("Equipo no encontrado",true); return true; }
    const nzFrom=eqFrom.puertos?.find(n=>n.id===fromNozzle), nzTo=eqTo.puertos?.find(n=>n.id===toNozzle);
    if(!nzFrom||!nzTo){ notify("Puerto no encontrado",true); return true; }
    const tag=`L-${db.lines.length+1}`;
    db.lines.push({ tag, diameter, material, anchors:{ start:{equipTag:fromEquip, nozzleId:fromNozzle}, end:{equipTag:toEquip, nozzleId:toNozzle} }, waypoints:[], _cachedPoints:null });
    actualizarTuberiasConectadas(fromEquip); actualizarTuberiasConectadas(toEquip);
    saveState(); render();
    notify(`Conectado ${fromEquip}.${fromNozzle} con ${toEquip}.${toNozzle} (${tag})`);
    return true;
}
function parseEditCommand(cmd){
    const parts=cmd.split(/\s+/); if(parts[0]!=='edit') return false;
    const type=parts[1]; if(type==='equipment'){
        const tag=parts[2]; const action=parts[3]; const eq=db.equipos.find(e=>e.tag===tag);
        if(!eq){ notify(`Equipo ${tag} no encontrado`,true); return true; }
        if(action==='move'){
            const coords=parts[4]==='to'?parts[5]:parts[4];
            const m=coords.match(/\((-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?),(-?\d+(?:\.\d+)?)\)/);
            if(m){ eq.x=parseFloat(m[1]); eq.y=parseFloat(m[2]); eq.z=parseFloat(m[3]); actualizarTuberiasConectadas(tag); saveState(); render(); notify(`Equipo ${tag} movido`); return true; }
        }
    }
    return false;
}

function autoCenter(){
    if(!canvas) return;
    let points=[];
    db.equipos.forEach(eq=>points.push({x:eq.x,y:eq.y,z:eq.z}));
    db.lines.forEach(line=>{if(line._cachedPoints) points.push(...line._cachedPoints);});
    if(points.length===0) points=[{x:-2000,y:0,z:-2000},{x:2000,y:2000,z:2000}];
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    points.forEach(p=>{ const rawX=(p.x-p.z)*0.866; const rawY=(p.x+p.z)*0.5-p.y; if(rawX<minX) minX=rawX; if(rawX>maxX) maxX=rawX; if(rawY<minY) minY=rawY; if(rawY>maxY) maxY=rawY; });
    const marginX=(maxX-minX)*0.15, marginY=(maxY-minY)*0.15;
    minX-=marginX; maxX+=marginX; minY-=marginY; maxY+=marginY;
    const worldW=maxX-minX, worldH=maxY-minY;
    const padding=Math.min(Math.max(canvas.width*0.1,20),80);
    const scaleX=(canvas.width-padding)/worldW, scaleY=(canvas.height-padding)/worldH;
    let newScale=Math.min(scaleX,scaleY,0.6,0.12);
    cam.scale=newScale;
    const worldCenterX=(minX+maxX)/2, worldCenterY=(minY+maxY)/2;
    cam.panX=canvas.width/2-worldCenterX*cam.scale;
    cam.panY=canvas.height/2-worldCenterY*cam.scale;
    render();
}

// ==================== INTERACCIÓN Y SELECCIÓN ====================
function pointToSegmentDistance(p,a,b){ const ax=p.x-a.x, ay=p.y-a.y; const bx=b.x-a.x, by=b.y-a.y; const dot=ax*bx+ay*by; const len2=bx*bx+by*by; if(len2===0) return Math.hypot(ax,ay); let t=dot/len2; t=Math.max(0,Math.min(1,t)); const projX=a.x+t*bx, projY=a.y+t*by; return Math.hypot(p.x-projX,p.y-projY); }
function pickElement(mouseCanvas){
    for(let eq of db.equipos){
        const p=project(eq); let radio=(eq.diametro/2)*cam.scale;
        if(eq.tipo==='colector'){ const ancho=eq.largo; const pIzq=project({x:eq.x,y:eq.y,z:eq.z}); const pDer=project({x:eq.x+ancho,y:eq.y,z:eq.z}); if(pointToSegmentDistance(mouseCanvas,pIzq,pDer)<15) return {type:'equipment', obj:eq}; }
        else if(Math.hypot(mouseCanvas.x-p.x,mouseCanvas.y-p.y)<radio+5) return {type:'equipment', obj:eq};
    }
    for(let line of db.lines){
        const pts=line._cachedPoints; if(!pts) continue;
        const proj=pts.map(p=>project(p));
        for(let i=0;i<proj.length-1;i++) if(pointToSegmentDistance(mouseCanvas,proj[i],proj[i+1])<10) return {type:'line', obj:line};
    }
    return null;
}
function initCanvasEvents(){
    let panningLocal=false, panStartLocal={x:0,y:0};
    canvas.addEventListener('mousedown',(e)=>{
        const rect=canvas.getBoundingClientRect();
        const mouseCanvas={x:(e.clientX-rect.left)*canvas.width/rect.width, y:(e.clientY-rect.top)*canvas.height/rect.height};
        const picked=pickElement(mouseCanvas);
        if(toolMode==='select'){ if(picked) selectedElement=picked; else selectedElement=null; render(); }
        else if(toolMode==='moveEq' && picked?.type==='equipment'){ draggingEquipment=true; draggedEquip=picked.obj; dragLastPos={x:e.clientX,y:e.clientY}; canvas.style.cursor='grabbing'; e.preventDefault(); }
        else if(toolMode==='addPoint' && picked?.type==='line'){
            const line=picked.obj; const pts=line._cachedPoints;
            if(pts){
                let minDist=Infinity, bestSeg=0, bestParam=0;
                const proj=pts.map(p=>project(p));
                for(let i=0;i<proj.length-1;i++){
                    const a=proj[i], b=proj[i+1];
                    const ax=mouseCanvas.x-a.x, ay=mouseCanvas.y-a.y;
                    const bx=b.x-a.x, by=b.y-a.y;
                    const dot=ax*bx+ay*by, len2=bx*bx+by*by;
                    if(len2===0) continue;
                    let t=dot/len2; t=Math.max(0,Math.min(1,t));
                    const projX=a.x+t*bx, projY=a.y+t*by;
                    const dist=Math.hypot(mouseCanvas.x-projX,mouseCanvas.y-projY);
                    if(dist<minDist){ minDist=dist; bestSeg=i; bestParam=t; }
                }
                if(minDist<15){
                    const p1=pts[bestSeg], p2=pts[bestSeg+1];
                    const newPoint={x:p1.x+bestParam*(p2.x-p1.x), y:p1.y+bestParam*(p2.y-p1.y), z:p1.z+bestParam*(p2.z-p1.z)};
                    if(!line.waypoints) line.waypoints=[];
                    line.waypoints.push(newPoint);
                    const pStart=obtenerPosicionPuerto(line.anchors.start.equipTag,line.anchors.start.nozzleId);
                    const pEnd=obtenerPosicionPuerto(line.anchors.end.equipTag,line.anchors.end.nozzleId);
                    let puntos=[pStart]; if(line.waypoints) puntos.push(...line.waypoints); puntos.push(pEnd);
                    line._cachedPoints=puntos;
                    saveState(); render(); notify("Waypoint añadido");
                }
            }
        }
        else { panningLocal=true; panStartLocal={x:e.clientX,y:e.clientY}; canvas.style.cursor='grabbing'; e.preventDefault(); }
    });
    window.addEventListener('mousemove',(e)=>{
        if(draggingEquipment && draggedEquip){
            const dx=(e.clientX-dragLastPos.x)/cam.scale, dy=(e.clientY-dragLastPos.y)/cam.scale;
            draggedEquip.x+=dx; draggedEquip.z+=dy;
            actualizarTuberiasConectadas(draggedEquip.tag);
            dragLastPos={x:e.clientX,y:e.clientY}; render();
        } else if(panningLocal){
            const dx=e.clientX-panStartLocal.x, dy=e.clientY-panStartLocal.y;
            cam.panX+=dx; cam.panY+=dy;
            panStartLocal={x:e.clientX,y:e.clientY}; render();
        }
    });
    window.addEventListener('mouseup',()=>{ draggingEquipment=false; panningLocal=false; canvas.style.cursor='grab'; if(draggingEquipment) saveState(); });
    canvas.addEventListener('wheel',(e)=>{ e.preventDefault(); const delta=e.deltaY>0?0.9:1.1; cam.scale*=delta; cam.scale=Math.min(Math.max(0.1,cam.scale),1.5); render(); });
}
function resizeCanvas(){ const container=canvas.parentElement; canvas.width=container.clientWidth; canvas.height=container.clientHeight; autoCenter(); }

// ==================== CONSTRUCCIÓN DEL PANEL FLOTANTE DE EQUIPOS ====================
function buildEquipmentPanel(){
    const categorias = {
        'petrolera': ['tanque_v','tanque_h','bomba','intercambiador','torre','reactor','caldera','compresor','separador'],
        'agua': ['clarificador','filtro_arena','osmosis'],
        'alimentos': ['tanque_acero','pasteurizador','homogeneizador'],
        'otros': ['colector']
    };
    let html='';
    for(let [cat, tipos] of Object.entries(categorias)){
        html+=`<div class="equipment-category"><h4>${cat==='petrolera'?'🛢️ Petrolera/Petroquímica':cat==='agua'?'💧 Tratamiento de Agua':cat==='alimentos'?'🍎 Alimentos':'📌 Otros'}</h4><div class="equipment-buttons">`;
        for(let tipo of tipos){
            const nombre=EquiposCatalogo[tipo]?.nombre||tipo;
            html+=`<button onclick="crearEquipoPorTipo('${tipo}')">${nombre}</button>`;
        }
        html+=`</div></div>`;
    }
    // Sección de componentes
    html+=`<div class="component-category"><h4>🔧 Válvulas y Accesorios</h4><div class="equipment-buttons"><button onclick="crearComponente('VALVE','bola')">Válvula Bola</button><button onclick="crearComponente('VALVE','compuerta')">Válvula Compuerta</button><button onclick="crearComponente('VALVE','mariposa')">Válvula Mariposa</button><button onclick="crearComponente('ELBOW')">Codo 90°</button><button onclick="crearComponente('FLANGE')">Brida</button><button onclick="crearComponente('REDUCER')">Reductor</button><button onclick="crearComponente('INSTRUMENT','presostato')">Presostato</button><button onclick="crearComponente('INSTRUMENT','termometro')">Termómetro</button></div></div>`;
    document.getElementById('eqPanelContent').innerHTML=html;
}
function crearEquipoPorTipo(tipo){
    let tag = `${tipo.toUpperCase()}-${db.equipos.filter(e=>e.tipo===tipo).length+1}`;
    let x = 0, z = 0;
    const ultimo = db.equipos[db.equipos.length-1];
    if(ultimo){ x = ultimo.x + 3000; z = ultimo.z; }
    let y = 1000;
    let params = {};
    if(tipo==='tanque_v'){ params.diametro=2400; params.altura=2500; y=1250; }
    else if(tipo==='tanque_h'){ params.diametro=2000; params.altura=2000; params.largo=4000; y=1000; }
    else if(tipo==='bomba'){ params.diametro=800; params.altura=800; y=400; }
    else if(['intercambiador','torre','reactor','caldera','compresor','separador','clarificador','filtro_arena','osmosis','tanque_acero','pasteurizador','homogeneizador'].includes(tipo)){ params.diametro=2000; params.altura=3000; params.largo=4000; y=1500; }
    crearEquipo(tipo, tag, x, y, z, params);
}
function crearComponente(tipo, subtipo=null){
    if(!selectedElement || selectedElement.type!=='line'){ notify("Selecciona una tubería primero",true); return; }
    const line=selectedElement.obj;
    const tag=`${tipo}-${Date.now()}`;
    const param=parseFloat(prompt("Posición en la tubería (0-1):","0.5"));
    if(isNaN(param)) return;
    const comp={ type:tipo, tag:tag, param:param, size:line.diameter };
    if(tipo==='VALVE' && subtipo) comp.subtype=subtipo;
    if(!line.components) line.components=[];
    line.components.push(comp);
    saveState(); render();
    notify(`Componente ${tag} añadido a ${line.tag}`);
}

// ==================== INICIALIZACIÓN ====================
function init(){
    resizeCanvas();
    initCanvasEvents();
    buildEquipmentPanel();
    // Datos de ejemplo
    crearEquipo('tanque_v','TK-1',0,1250,0,{diametro:2400,altura:2500});
    crearEquipo('bomba','B-1',5000,800,0,{diametro:800,altura:800});
    render();
    autoCenter();
    saveState();
    // Eventos UI
    document.getElementById('btnNew').onclick=nuevoProyecto;
    document.getElementById('btnOpen').onclick=cargarProyecto;
    document.getElementById('btnSave').onclick=guardarProyecto;
    document.getElementById('btnReset').onclick=autoCenter;
    document.getElementById('btnCommand').onclick=()=>document.getElementById('commandPanel').style.display='block';
    document.getElementById('closeCommand').onclick=()=>document.getElementById('commandPanel').style.display='none';
    document.getElementById('runCommands').onclick=()=>{
        const text=document.getElementById('commandText').value;
        const lines=text.split('\n');
        for(let raw of lines){
            let cmd=raw.trim();
            if(!cmd || cmd.startsWith('//')) continue;
            saveState();
            if(!parseCreate(cmd) && !parseConnect(cmd) && !parseEditCommand(cmd) && !parseHelp(cmd)) notify(`❌ No entendí: "${cmd.substring(0,50)}..."`,true);
        }
        document.getElementById('commandPanel').style.display='none';
        render();
    };
    document.getElementById('clearCommand').onclick=()=>document.getElementById('commandText').value='';
    document.getElementById('btnMTO').onclick=exportarMTO;
    document.getElementById('btnPDF').onclick=exportPDF;
    document.getElementById('btnUndo').onclick=undo;
    document.getElementById('btnRedo').onclick=redo;
    document.getElementById('btnVoice').onclick=toggleVoice;
    document.getElementById('btnApplyNorm').onclick=aplicarNormas;
    document.getElementById('btnSpeakSummary').onclick=resumenProyecto;
    document.getElementById('btnRecalc').onclick=recalcularTodo;
    document.getElementById('btnToggleEqPanel').onclick=()=>{
        const panel=document.getElementById('equipmentPanel');
        const content=document.querySelector('#equipmentPanel .equipment-panel-content');
        if(panel.style.display==='none'){ panel.style.display='flex'; content.style.display='flex'; }
        else{ panel.style.display='none'; }
    };
    document.querySelector('#equipmentPanel .equipment-panel-header').onclick=()=>{
        const content=document.querySelector('#equipmentPanel .equipment-panel-content');
        if(content.style.display==='none') content.style.display='flex';
        else content.style.display='none';
    };
    const setTool=(mode)=>{ toolMode=mode; document.querySelectorAll('#toolsPanel button').forEach(btn=>btn.classList.remove('active')); if(mode==='select') document.getElementById('toolSelect').classList.add('active'); else if(mode==='moveEq') document.getElementById('toolMoveEq').classList.add('active'); else if(mode==='editPipe') document.getElementById('toolEditPipe').classList.add('active'); else if(mode==='addPoint') document.getElementById('toolAddPoint').classList.add('active'); };
    document.getElementById('toolSelect').onclick=()=>setTool('select');
    document.getElementById('toolMoveEq').onclick=()=>setTool('moveEq');
    document.getElementById('toolEditPipe').onclick=()=>setTool('editPipe');
    document.getElementById('toolAddPoint').onclick=()=>setTool('addPoint');
    window.addEventListener('resize',()=>{ resizeCanvas(); autoCenter(); });
    notify("SmartFlow Pro v10.2 - Panel de equipos disponible. Haz clic en 'Equipos' para abrir el catálogo.");
}
init();
</script>
