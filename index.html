<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AQC SmartFlow - Ing. Osnay Romero</title>
    <style>
        :root { --dark: #0d1117; --panel: #161b22; --accent: #58a6ff; --success: #238636; --text: #c9d1d9; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; z-index: 1000; background: var(--dark); }
        .hidden { display: none !important; }
        
        /* Estilo de la Firma */
        .owner-name { color: var(--accent); font-size: 1.4rem; font-weight: 600; letter-spacing: 1px; margin-bottom: 5px; }
        .app-title { font-size: 2.2rem; margin-top: 0; margin-bottom: 30px; color: white; }
        
        input { width: 85%; max-width: 320px; padding: 18px; margin: 15px 0; background: #161b22; border: 2px solid #30363d; color: white; border-radius: 12px; font-size: 1.2rem; text-align: center; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .btn-access { width: 85%; max-width: 320px; padding: 18px; background: var(--success); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-access:active { transform: scale(0.98); opacity: 0.9; }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen" role="main">
        <div class="owner-name" aria-label="Propietario">Ing. Osnay Romero</div>
        <h1 class="app-title">AQC SmartFlow</h1>
        
        <p style="margin-bottom: 10px; opacity: 0.8;">Acceso Restringido - Ingeniería</p>
        
        <input type="password" id="pass-input" placeholder="Contraseña" aria-label="Introduzca la clave de ingeniería" autofocus>
        
        <button class="btn-access" id="login-btn">Entrar a la Suite</button>
        
        <div id="login-announcer" class="sr-only" aria-live="assertive"></div>
    </div>

    <div id="splash-screen" class="screen hidden">
        <h1 style="color: var(--accent);">Panel de Control</h1>
        <p>Sesión activa: Ing. Osnay Romero</p>
        <button class="btn-access" id="btn-nuevo" style="background: var(--accent); color: black; margin-bottom: 15px;">Crear Nuevo Proyecto</button>
        <button class="btn-access" id="btn-cargar" style="background: transparent; border: 2px solid #30363d;">Abrir Archivo .json</button>
    </div>

    <div id="app-main" class="hidden" style="height: 100vh; display: flex; flex-direction: column;">
        <header style="padding: 15px; background: var(--panel); border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: bold; color: var(--accent);">AQC | Romero</span>
            <button onclick="location.reload()" style="background: none; border: 1px solid #d73a49; color: #d73a49; padding: 5px 10px; border-radius: 5px;">Salir</button>
        </header>
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;">
            <h2 id="project-status">Lienzo ISO 10628 Activo</h2>
            <p>Listo para iniciar el diseño de fluidos.</p>
        </div>
    </div>

    <script>
        const PASS_SECRET = "AQC2026";
        const loginScreen = document.getElementById('login-screen');
        const splashScreen = document.getElementById('splash-screen');
        const appMain = document.getElementById('app-main');
        const passInput = document.getElementById('pass-input');
        const loginAnnouncer = document.getElementById('login-announcer');

        // Función de Acceso
        function handleLogin() {
            if (passInput.value === PASS_SECRET) {
                loginAnnouncer.textContent = "Acceso concedido para el Ingeniero Osnay Romero.";
                loginScreen.classList.add('hidden');
                splashScreen.classList.remove('hidden');
            } else {
                loginAnnouncer.textContent = "Contraseña incorrecta. Intente de nuevo.";
                passInput.value = "";
                passInput.focus();
            }
        }

        document.getElementById('login-btn').onclick = handleLogin;
        passInput.onkeypress = (e) => { if(e.key === 'Enter') handleLogin(); };

        // Botón Nuevo Proyecto
        document.getElementById('btn-nuevo').onclick = () => {
            splashScreen.classList.add('hidden');
            appMain.classList.remove('hidden');
        };
    </script>
</body>
</html>
